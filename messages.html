<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHADOWNET — Mensajes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;height:100vh;display:flex;flex-direction:column}
header{padding:12px 20px;background:rgba(1,2,12,.97);border-bottom:1px solid #0d2744;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-family:Orbitron,sans-serif;font-size:15px;color:#ff2255;letter-spacing:.12em;cursor:pointer}
.page-title{font-family:Orbitron,sans-serif;font-size:12px;color:#5a8aaa;letter-spacing:.1em}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:300px;border-right:1px solid #0d2744;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:14px 16px;border-bottom:1px solid #0d2744;display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-family:Orbitron,sans-serif;font-size:11px;color:#5a8aaa;letter-spacing:.1em}
.new-chat-btn{padding:6px 12px;border-radius:6px;border:1px solid rgba(0,229,255,.4);background:rgba(0,229,255,.08);color:#00e5ff;font-family:Rajdhani,sans-serif;font-weight:700;font-size:11px;cursor:pointer;text-transform:uppercase}
.conv-list{flex:1;overflow-y:auto}
.conv-item{padding:12px 16px;border-bottom:1px solid rgba(13,39,68,.4);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s}
.conv-item:hover,.conv-item.active{background:rgba(0,229,255,.06)}
.conv-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;flex-shrink:0;overflow:hidden}
.conv-avatar img{width:100%;height:100%;object-fit:cover}
.conv-info{flex:1;min-width:0}
.conv-name{font-weight:700;font-size:13px;color:#e8f4ff;display:flex;justify-content:space-between}
.conv-time{font-size:10px;color:#5a8aaa}
.conv-last{font-size:12px;color:#5a8aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;margin-top:2px}
.conv-unread{background:#ff2255;color:#fff;border-radius:10px;font-size:10px;font-weight:800;padding:2px 6px;flex-shrink:0}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:14px 20px;border-bottom:1px solid #0d2744;display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-user-name{font-weight:700;font-size:15px;cursor:pointer}
.chat-user-name:hover{color:#00e5ff}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;max-width:80%}
.msg.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-break:break-word}
.msg.theirs .msg-bubble{background:rgba(7,15,30,.8);border:1px solid #0d2744;border-radius:12px 12px 12px 4px}
.msg.mine .msg-bubble{background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border-radius:12px 12px 4px 12px}
.msg-time{font-size:10px;color:#5a8aaa;align-self:flex-end;padding-bottom:2px}
.msg-avatar-sm{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
.msg-avatar-sm img{width:100%;height:100%;object-fit:cover}
.chat-input{padding:12px 16px;border-top:1px solid #0d2744;display:flex;gap:8px;flex-shrink:0}
.msg-inp{flex:1;background:rgba(7,15,30,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:24px;padding:10px 16px;font-family:Rajdhani,sans-serif;font-size:14px;outline:none;resize:none;max-height:80px}
.msg-inp:focus{border-color:#00e5ff}
.send-btn{width:42px;height:42px;border-radius:50%;background:#ff2255;border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{background:#cc0033}
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#5a8aaa;gap:12px}
.empty-chat-icon{font-size:48px}
.empty-chat p{font-size:14px}
.new-chat-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:none;align-items:center;justify-content:center}
.new-chat-modal.open{display:flex}
.modal-box{background:#070f1e;border:1px solid #0d2744;border-radius:12px;padding:24px;width:100%;max-width:380px;margin:0 16px}
.modal-title{font-family:Orbitron,sans-serif;font-size:13px;color:#00e5ff;margin-bottom:16px}
.search-inp-modal{width:100%;padding:10px 14px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-family:Rajdhani,sans-serif;font-size:14px;outline:none;margin-bottom:12px}
.search-inp-modal:focus{border-color:#00e5ff}
.search-results{max-height:200px;overflow-y:auto}
.search-result-item{padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;border-radius:8px;transition:background .15s}
.search-result-item:hover{background:rgba(0,229,255,.08)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(7,15,30,.95);border:1px solid #00ff88;color:#00ff88;padding:10px 20px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;z-index:9999;display:none}
.login-wall{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#5a8aaa}
.login-wall a{color:#00e5ff;text-decoration:none;font-weight:700}
@media(max-width:600px){.sidebar{width:100%;position:absolute;z-index:10;background:#01020c;height:calc(100vh - 52px)}.sidebar.hidden{display:none}.chat-area{width:100%}}

/* Instagram Notes/Status */
.note-bar{padding:12px 16px;border-bottom:1px solid rgba(13,39,68,.4);background:rgba(7,15,30,.5)}
.note-bar-title{font-size:10px;color:#5a8aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.note-bubbles-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.note-bubbles-row::-webkit-scrollbar{display:none}
.note-bubble{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;min-width:60px}
.note-av-wrap{position:relative}
.note-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;border:2px solid #0d2744;overflow:hidden}
.note-av img{width:100%;height:100%;object-fit:cover}
.note-text-bubble{position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #0d2744;border-radius:12px 12px 12px 0;padding:4px 8px;font-size:10px;color:#e8f4ff;white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.note-username{font-size:10px;color:#5a8aaa;text-align:center;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.my-note-bubble .note-av{border-color:#00e5ff}
/* Note input modal */
.note-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:none;align-items:center;justify-content:center}
.note-modal.open{display:flex}
.note-box{background:#070f1e;border:1px solid #0d2744;border-radius:14px;padding:24px;width:100%;max-width:360px;margin:0 16px}
.note-box-title{font-family:Orbitron,sans-serif;font-size:12px;color:#00e5ff;letter-spacing:.1em;margin-bottom:6px}
.note-box-sub{font-size:12px;color:#5a8aaa;margin-bottom:16px;line-height:1.5}
.note-inp-wrap{position:relative;margin-bottom:14px}
.note-inp{width:100%;padding:12px 14px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-family:Rajdhani,sans-serif;font-size:14px;outline:none;resize:none;height:80px}
.note-inp:focus{border-color:#00e5ff}
.note-char-count{position:absolute;bottom:8px;right:10px;font-size:10px;color:#5a8aaa}
.note-btns{display:flex;gap:8px}
.note-clear-btn{flex:1;padding:10px;background:transparent;border:1px solid rgba(255,34,85,.3);color:#ff6680;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-transform:uppercase}
.note-save-btn{flex:2;padding:10px;background:linear-gradient(135deg,#00e5ff,#0080aa);color:#000;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:12px;cursor:pointer;text-transform:uppercase}
</style>
</head>
<body>
<header>
  <span class="logo" onclick="window.location.href='/'">SN</span>
  <span class="page-title">MENSAJES</span>
</header>
<div id="loginWall" class="layout" style="display:none"><div class="login-wall"><p>Inicia sesión para ver tus mensajes</p><a href="/">Ir al inicio</a></div></div>
<div class="layout" id="mainLayout" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">CONVERSACIONES</span>
      <button class="new-chat-btn" onclick="openNewChat()">+ Nuevo</button>
    </div>
    <div class="note-bar" id="noteBar">
    <div class="note-bar-title">NOTAS</div>
    <div class="note-bubbles-row" id="noteBubblesRow">
      <div class="note-bubble my-note-bubble" onclick="openNoteModal()">
        <div class="note-av-wrap">
          <div class="note-av" id="myNoteAv" style="border-color:#00e5ff;font-size:20px">+</div>
          <div class="note-text-bubble" id="myNoteBubble" style="display:none"></div>
        </div>
        <div class="note-username">Tu nota</div>
      </div>
    </div>
  </div>
  <div class="conv-list" id="convList"><div style="padding:20px;color:#5a8aaa;font-size:13px">Sin conversaciones</div></div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-chat" id="emptyChat"><div class="empty-chat-icon">&#128172;</div><p>Selecciona una conversación</p></div>
    <div id="activeChatHeader" style="display:none" class="chat-header">
      <div class="conv-avatar" id="chatAvatar"></div>
      <div class="chat-user-name" id="chatUserName" onclick="goToProfile()"></div>
    </div>
    <div class="chat-msgs" id="chatMsgsArea" style="display:none"></div>
    <div class="chat-input" id="chatInputArea" style="display:none">
      <textarea class="msg-inp" id="msgInp" placeholder="Escribe un mensaje..." rows="1"></textarea>
      <button class="send-btn" onclick="sendDM()">&#9658;</button>
    </div>
  </div>
</div>
<div class="new-chat-modal" id="newChatModal">
  <div class="modal-box">
    <div class="modal-title">NUEVO MENSAJE</div>
    <input class="search-inp-modal" id="searchUserInp" placeholder="Buscar usuario...">
    <div class="search-results" id="searchResults"></div>
    <button onclick="document.getElementById('newChatModal').classList.remove('open')" style="margin-top:10px;padding:8px 16px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:6px;cursor:pointer;font-family:Rajdhani,sans-serif;font-weight:700;width:100%">Cancelar</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var SB_URL="https://cdokplvoqivducsqrejt.supabase.co";
var SB_KEY="sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su";
var sb=supabase.createClient(SB_URL,SB_KEY);
var currentUser=null;
var currentProfile=null;
var activeConvId=null;
var activePeerId=null;
var activePeerProfile=null;
var _dmSub=null;
var _convSub=null;
var searchTimer=null;

sb.auth.getSession().then(function(r){
  if(!r.data.session){document.getElementById("loginWall").style.display="flex";return;}
  currentUser=r.data.session.user;
  sb.from("profiles").select("id,username,avatar_url").eq("id",currentUser.id).single().then(function(p){
    currentProfile=p.data;
    document.getElementById("mainLayout").style.display="flex";
    loadConversations();
    subscribeToNewMessages();
    loadNotes();
    var target=new URLSearchParams(location.search).get("with");
    if(target) openChatWith(target);
  });
});

async function loadConversations(){
  var list=document.getElementById("convList");
  var r=await sb.from("conversations").select("*").or("user1_id.eq."+currentUser.id+",user2_id.eq."+currentUser.id).order("last_message_at",{ascending:false}).limit(30);
  if(!r.data||r.data.length===0){list.innerHTML="<div style=\"padding:20px;color:#5a8aaa;font-size:13px\">Sin conversaciones a\xFAn</div>";return;}
  // Get peer profiles
  var peerIds=[...new Set(r.data.map(function(c){return c.user1_id===currentUser.id?c.user2_id:c.user1_id;}))]
  var profiles=await sb.from("profiles").select("id,username,avatar_url").in("id",peerIds);
  var pm={}; (profiles.data||[]).forEach(function(p){pm[p.id]=p;});
  list.innerHTML="";
  r.data.forEach(function(conv){
    var peerId=conv.user1_id===currentUser.id?conv.user2_id:conv.user1_id;
    var peer=pm[peerId]||{username:"usuario"};
    var unread=conv.user1_id===currentUser.id?conv.unread_count_1:conv.unread_count_2;
    var item=document.createElement("div");item.className="conv-item";item.dataset.convId=conv.id;item.dataset.peerId=peerId;
    var av=document.createElement("div");av.className="conv-avatar";
    if(peer.avatar_url){var img=document.createElement("img");img.src=peer.avatar_url;av.appendChild(img);}else av.textContent=(peer.username||"?")[0].toUpperCase();
    var info=document.createElement("div");info.className="conv-info";
    var nameRow=document.createElement("div");nameRow.className="conv-name";
    var nm=document.createElement("span");nm.textContent="@"+(peer.username||"usuario");
    var tm=document.createElement("span");tm.className="conv-time";tm.textContent=getTimeAgo(conv.last_message_at);
    nameRow.appendChild(nm);nameRow.appendChild(tm);
    var last=document.createElement("div");last.className="conv-last";last.textContent=conv.last_message||"...";
    info.appendChild(nameRow);info.appendChild(last);
    item.appendChild(av);item.appendChild(info);
    if(unread>0){var badge=document.createElement("span");badge.className="conv-unread";badge.textContent=unread;item.appendChild(badge);}
    item.addEventListener("click",function(){openConversation(conv.id,peerId,peer);});
    list.appendChild(item);
  });
}

async function openConversation(convId,peerId,peer){
  activeConvId=convId;activePeerId=peerId;activePeerProfile=peer;
  document.querySelectorAll(".conv-item").forEach(function(el){el.classList.remove("active");});
  var el=document.querySelector("[data-conv-id=\""+convId+"\"]");if(el)el.classList.add("active");
  document.getElementById("emptyChat").style.display="none";
  var hdr=document.getElementById("activeChatHeader");hdr.style.display="flex";
  var av=document.getElementById("chatAvatar");av.innerHTML="";
  if(peer.avatar_url){var img=document.createElement("img");img.src=peer.avatar_url;av.appendChild(img);}else av.textContent=(peer.username||"?")[0].toUpperCase();
  document.getElementById("chatUserName").textContent="@"+(peer.username||"usuario");
  document.getElementById("chatUserName").dataset.username=peer.username;
  document.getElementById("chatMsgsArea").style.display="flex";
  document.getElementById("chatInputArea").style.display="flex";
  await loadMessages(convId);
  // Mark as read
  var field=activeConvId?"unread_count_1":"unread_count_2";
  var isUser1=!!(await sb.from("conversations").select("user1_id").eq("id",convId).single()).data?.user1_id===currentUser.id;
  var uf=isUser1?"unread_count_1":"unread_count_2";
  var upd={}; upd[uf]=0;
  await sb.from("conversations").update(upd).eq("id",convId);
  subscribeToMessages(convId);
}

async function loadMessages(convId){
  var area=document.getElementById("chatMsgsArea");
  area.innerHTML="";
  var r=await sb.from("direct_messages").select("*").eq("sender_id",currentUser.id).or("sender_id.eq."+activePeerId).order("created_at",{ascending:true}).limit(50);
  // Filter for this conversation
  var msgs=(r.data||[]).filter(function(m){return (m.sender_id===currentUser.id&&m.receiver_id===activePeerId)||(m.sender_id===activePeerId&&m.receiver_id===currentUser.id);});
  msgs.forEach(function(m){appendMsg(m);});
  area.scrollTop=area.scrollHeight;
}

function appendMsg(m){
  var area=document.getElementById("chatMsgsArea");
  var isMine=m.sender_id===currentUser.id;
  var wrap=document.createElement("div");wrap.className="msg "+(isMine?"mine":"theirs");
  if(!isMine){
    var av=document.createElement("div");av.className="msg-avatar-sm";
    if(activePeerProfile&&activePeerProfile.avatar_url){var img=document.createElement("img");img.src=activePeerProfile.avatar_url;av.appendChild(img);}else av.textContent=(activePeerProfile?.username||"?")[0].toUpperCase();
    wrap.appendChild(av);
  }
  var bubble=document.createElement("div");bubble.className="msg-bubble";bubble.textContent=m.message;
  var time=document.createElement("div");time.className="msg-time";time.textContent=getTimeAgo(m.created_at);
  wrap.appendChild(bubble);wrap.appendChild(time);
  area.appendChild(wrap);
}

async function sendDM(){
  var inp=document.getElementById("msgInp");
  var msg=inp.value.trim();
  if(!msg||!activePeerId||!currentUser||!activeConvId) return;
  inp.value="";
  var r=await sb.from("direct_messages").insert({sender_id:currentUser.id,receiver_id:activePeerId,message:msg});
  if(r.error){showToast("Error: "+r.error.message,true);return;}
  // Update conversation last message
  var isUser1=(await sb.from("conversations").select("user1_id").eq("id",activeConvId).single()).data?.user1_id===currentUser.id;
  var unreadField=isUser1?"unread_count_2":"unread_count_1";
  var upd={last_message:msg,last_message_at:new Date().toISOString()};
  upd[unreadField]=1;
  await sb.from("conversations").update(upd).eq("id",activeConvId);
}

function subscribeToMessages(convId){
  if(_dmSub)sb.removeChannel(_dmSub);
  _dmSub=sb.channel("dm-"+convId).on("postgres_changes",{event:"INSERT",schema:"public",table:"direct_messages"},function(p){
    var m=p.new;
    if((m.sender_id===currentUser.id&&m.receiver_id===activePeerId)||(m.sender_id===activePeerId&&m.receiver_id===currentUser.id)){
      appendMsg(m);
      var area=document.getElementById("chatMsgsArea");area.scrollTop=area.scrollHeight;
    }
  }).subscribe();
}

function subscribeToNewMessages(){
  _convSub=sb.channel("convs-"+currentUser.id).on("postgres_changes",{event:"INSERT",schema:"public",table:"direct_messages",filter:"receiver_id=eq."+currentUser.id},function(p){
    showToast("\uD83D\uDCAC Nuevo mensaje");
    loadConversations();
  }).subscribe();
}

async function openChatWith(username){
  var r=await sb.from("profiles").select("id,username,avatar_url").eq("username",username).single();
  if(r.error||!r.data){showToast("Usuario no encontrado",true);return;}
  var peer=r.data;
  // Find or create conversation
  var uid1=currentUser.id<peer.id?currentUser.id:peer.id;
  var uid2=currentUser.id<peer.id?peer.id:currentUser.id;
  var conv=await sb.from("conversations").select("*").eq("user1_id",uid1).eq("user2_id",uid2).single();
  if(!conv.data){
    var nc=await sb.from("conversations").insert({user1_id:uid1,user2_id:uid2}).select().single();
    if(nc.data){openConversation(nc.data.id,peer.id,peer);loadConversations();}
  }else{openConversation(conv.data.id,peer.id,peer);}
}

function openNewChat(){
  document.getElementById("newChatModal").classList.add("open");
  document.getElementById("searchUserInp").value="";
  document.getElementById("searchResults").innerHTML="";
  setTimeout(function(){document.getElementById("searchUserInp").focus();},100);
}

document.getElementById("searchUserInp").addEventListener("input",function(){
  clearTimeout(searchTimer);
  var q=this.value.trim();
  if(!q){document.getElementById("searchResults").innerHTML="";return;}
  searchTimer=setTimeout(async function(){
    var r=await sb.from("profiles").select("id,username,avatar_url").ilike("username","%"+q+"%").neq("id",currentUser.id).limit(8);
    var res=document.getElementById("searchResults");res.innerHTML="";
    (r.data||[]).forEach(function(u){
      var item=document.createElement("div");item.className="search-result-item";
      var av=document.createElement("div");av.className="conv-avatar";av.style.cssText="width:36px;height:36px;font-size:14px";
      if(u.avatar_url){var img=document.createElement("img");img.src=u.avatar_url;av.appendChild(img);}else av.textContent=u.username[0].toUpperCase();
      var nm=document.createElement("span");nm.style.cssText="font-weight:700;font-size:13px";nm.textContent="@"+u.username;
      item.appendChild(av);item.appendChild(nm);
      item.addEventListener("click",function(){
        document.getElementById("newChatModal").classList.remove("open");
        openChatWith(u.username);
      });
      res.appendChild(item);
    });
    if(!r.data||r.data.length===0)res.innerHTML="<div style=\"padding:12px;color:#5a8aaa;font-size:13px\">Sin resultados</div>";
  },300);
});

document.getElementById("msgInp").addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendDM();}
});

function goToProfile(){
  var un=document.getElementById("chatUserName").dataset.username;
  if(un)window.location.href="/profile.html?u="+un;
}

function getTimeAgo(ts){
  var d=(Date.now()-new Date(ts).getTime())/1000;
  if(d<60)return "ahora"; if(d<3600)return Math.floor(d/60)+"m";
  if(d<86400)return Math.floor(d/3600)+"h"; return Math.floor(d/86400)+"d";
}

function showToast(msg,err){
  var t=document.getElementById("toast");
  t.textContent=msg; t.style.borderColor=err?"#ff2255":"#00ff88"; t.style.color=err?"#ff2255":"#00ff88";
  t.style.display="block"; setTimeout(function(){t.style.display="none";},2500);
}

// =============================================
// INSTAGRAM NOTES / STATUS
// =============================================
async function loadNotes(){
  var row = document.getElementById("noteBubblesRow");
  if(!row||!currentUser) return;

  // Load my own note first
  var myProf = await sb.from("profiles").select("username,avatar_url,note_text,note_expires_at").eq("id",currentUser.id).single();
  if(myProf.data){
    var myAv = document.getElementById("myNoteAv");
    if(myAv){
      myAv.innerHTML="";
      if(myProf.data.avatar_url){var img=document.createElement("img");img.src=myProf.data.avatar_url;myAv.appendChild(img);}
      else myAv.textContent=(myProf.data.username||"?")[0].toUpperCase();
    }
    // Show note if not expired
    var nb=document.getElementById("myNoteBubble");
    if(nb&&myProf.data.note_text&&new Date(myProf.data.note_expires_at)>new Date()){
      nb.textContent=myProf.data.note_text;nb.style.display="block";
    }
  }

  // Load notes from people I follow
  var follows=await sb.from("follows").select("following_id").eq("follower_id",currentUser.id);
  var ids=(follows.data||[]).map(function(f){return f.following_id;});
  if(!ids.length) return;
  var notes=await sb.from("profiles").select("id,username,avatar_url,note_text,note_expires_at").in("id",ids).not("note_text","is","null");
  var now=new Date();
  (notes.data||[]).forEach(function(p){
    if(!p.note_text||new Date(p.note_expires_at)<now) return;
    var bubble=document.createElement("div");bubble.className="note-bubble";
    var wrap=document.createElement("div");wrap.className="note-av-wrap";
    var av=document.createElement("div");av.className="note-av";
    if(p.avatar_url){var img2=document.createElement("img");img2.src=p.avatar_url;av.appendChild(img2);}else av.textContent=(p.username||"?")[0].toUpperCase();
    var noteTxt=document.createElement("div");noteTxt.className="note-text-bubble";noteTxt.textContent=p.note_text;
    wrap.appendChild(noteTxt);wrap.appendChild(av);
    var uname=document.createElement("div");uname.className="note-username";uname.textContent="@"+p.username;
    bubble.appendChild(wrap);bubble.appendChild(uname);
    bubble.addEventListener("click",function(){openChatWith(p.username);});
    row.appendChild(bubble);
  });
}

function openNoteModal(){
  if(!currentUser){return;}
  var inp=document.getElementById("noteInp");
  if(inp){
    sb.from("profiles").select("note_text").eq("id",currentUser.id).single().then(function(r){
      inp.value=r.data?.note_text||"";
      updateNoteCount();
    });
  }
  document.getElementById("noteModal").classList.add("open");
}

function updateNoteCount(){
  var inp=document.getElementById("noteInp");
  var cnt=document.getElementById("noteCharCount");
  if(inp&&cnt)cnt.textContent=inp.value.length;
}

async function saveMyNote(){
  if(!currentUser) return;
  var text=document.getElementById("noteInp")?.value?.trim()||"";
  var expires=new Date(Date.now()+24*60*60*1000).toISOString();
  await sb.from("profiles").update({note_text:text||null,note_expires_at:text?expires:null}).eq("id",currentUser.id);
  document.getElementById("noteModal").classList.remove("open");
  var nb=document.getElementById("myNoteBubble");
  if(nb){nb.textContent=text;nb.style.display=text?"block":"none";}
  showToast(text?"\u2713 Nota compartida (24h)":"Nota eliminada");
  setTimeout(loadNotes,300);
}

async function clearMyNote(){
  await sb.from("profiles").update({note_text:null,note_expires_at:null}).eq("id",currentUser?.id);
  document.getElementById("noteInp").value="";
  document.getElementById("noteModal").classList.remove("open");
  var nb=document.getElementById("myNoteBubble");
  if(nb){nb.textContent="";nb.style.display="none";}
  showToast("Nota eliminada");
}

document.addEventListener("DOMContentLoaded",function(){
  var inp=document.getElementById("noteInp");
  if(inp)inp.addEventListener("input",updateNoteCount);
});
</script>
<div class="note-modal" id="noteModal">
  <div class="note-box">
    <div class="note-box-title">&#128172; TU NOTA</div>
    <div class="note-box-sub">Comparte lo que piensas. Visible para tus seguidores durante 24h.</div>
    <div class="note-inp-wrap">
      <textarea class="note-inp" id="noteInp" placeholder="Escribe algo..." maxlength="60"></textarea>
      <div class="note-char-count"><span id="noteCharCount">0</span>/60</div>
    </div>
    <div class="note-btns">
      <button class="note-clear-btn" onclick="clearMyNote()">Borrar nota</button>
      <button class="note-save-btn" onclick="saveMyNote()">Compartir</button>
    </div>
    <div style="text-align:center;margin-top:10px">
      <span style="font-size:11px;color:#5a8aaa;cursor:pointer" onclick="document.getElementById('noteModal').classList.remove('open')">Cancelar</span>
    </div>
  </div>
</div>
</body>
</html>
