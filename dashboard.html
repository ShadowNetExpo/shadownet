<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#ff2255">
<link rel="manifest" href="/manifest.json">
<meta property="og:title" content="Dashboard &mdash; SHADOWNET">
<meta property="og:description" content="Panel de control para creadores">
<meta name="description" content="Dashboard de creador SHADOWNET">
<title>Dashboard &mdash; SHADOWNET</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080e1a;color:#e0e8f0;font-family:Inter,sans-serif;min-height:100vh;padding-bottom:90px}
.sn-hd{display:flex;align-items:center;padding:16px;background:#080e1a;border-bottom:1px solid #0d2744;position:sticky;top:0;z-index:100;gap:12px}
.sn-hd-title{flex:1;font-family:Rajdhani,sans-serif;font-weight:900;font-size:20px;color:#fff}
.d-main{padding:16px;max-width:600px;margin:0 auto}
.sn-sec{margin-bottom:20px}
.sn-sec-t{font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;color:#5a8aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;border-left:3px solid #ff2255;padding-left:8px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:14px;padding:14px;text-align:center}
.kpi-val{font-family:Rajdhani,sans-serif;font-weight:900;font-size:28px;color:#fff}
.kpi-lbl{font-size:11px;color:#555;font-family:Rajdhani,sans-serif;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.kpi-delta{font-size:11px;color:#00c853;font-family:Rajdhani,sans-serif;margin-top:2px}
.kpi-delta.neg{color:#ff2255}
.sn-card{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:14px;padding:14px}
.sn-tf-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a2e;cursor:pointer}
.sn-tf-row:last-child{border-bottom:none}
.sn-tf-rank{font-family:Rajdhani,sans-serif;font-weight:900;font-size:16px;width:22px;text-align:center;color:#333}
.sn-tf-rank.r1{color:#ffd700}.sn-tf-rank.r2{color:#c0c0c0}.sn-tf-rank.r3{color:#cd7f32}
.sn-tf-av{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid #1a1a2e;flex-shrink:0}
.sn-tf-name{flex:1;font-family:Rajdhani,sans-serif;font-weight:700;color:#ccc;font-size:14px}
.sn-tf-badge{font-size:18px}
.sn-tf-pts{font-size:11px;color:#555;font-family:Rajdhani,sans-serif}
.sn-post-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a2e}
.sn-post-row:last-child{border-bottom:none}
.sn-post-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:#1a1a2e;flex-shrink:0}
.sn-post-info{flex:1;min-width:0}
.sn-post-txt{font-size:12px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sn-post-stats{font-size:11px;color:#555;font-family:Rajdhani,sans-serif;margin-top:2px}
.sn-empty{text-align:center;padding:20px;color:#333;font-family:Rajdhani,sans-serif;font-size:13px}
.sn-earn-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a2e}
.sn-earn-row:last-child{border-bottom:none}
.sn-earn-lbl{font-size:13px;color:#888}
.sn-earn-val{font-family:Rajdhani,sans-serif;font-weight:800;font-size:15px;color:#fff}
/* NOTIF */
.sn-nb{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:color .2s}.sn-nb:hover{color:#fff}
.sn-nbc{position:absolute;top:2px;right:8px;background:#ff2255;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:900;display:none;align-items:center;justify-content:center;font-family:Rajdhani,sans-serif;border:1.5px solid #000}.sn-nbc.on{display:flex}
.sn-np{position:fixed;top:0;right:0;width:min(360px,100vw);height:100vh;background:#111;z-index:9998;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;border-left:1px solid #1a1a2e}.sn-np.open{transform:translateX(0)}
.sn-nov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9997;display:none}.sn-nov.on{display:block}
.sn-nh{display:flex;align-items:center;padding:16px;border-bottom:1px solid #1a1a2e;flex-shrink:0}.sn-nht{flex:1;font-family:Rajdhani,sans-serif;font-weight:900;font-size:18px;color:#fff}
.sn-nmr{background:none;border:1px solid #1a1a2e;color:#666;border-radius:8px;padding:4px 10px;font-family:Rajdhani,sans-serif;font-size:11px;font-weight:700;cursor:pointer}.sn-ncl{background:none;border:none;color:#555;font-size:22px;cursor:pointer;padding:0 4px;margin-left:8px}
.sn-nl{flex:1;overflow-y:auto;padding:4px 0}.sn-ni{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid #0d0d1a;cursor:pointer}.sn-ni.u{background:rgba(255,34,85,.04);border-left:3px solid #ff2255}
.sn-nic{width:40px;height:40px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}.sn-nid{flex:1;min-width:0}.sn-nit{font-size:13px;color:#ccc;line-height:1.4}.sn-niz{font-size:11px;color:#555;font-family:Rajdhani,sans-serif}
.sn-nem{text-align:center;padding:40px 20px;color:#333;font-family:Rajdhani,sans-serif;font-size:14px}
/* NAV */
.sn-bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0f1c;border-top:1px solid #0d2744;display:flex;justify-content:space-around;padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:900}
.sn-bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:color .2s}
.sn-bn-item:hover,.sn-bn-item.active{color:#ff2255}.sn-bn-icon{font-size:22px;line-height:1}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div class="sn-hd"><div class="sn-hd-title">&#128202; Dashboard</div></div>
<div class="d-main">
  <div class="sn-sec">
    <div class="sn-sec-t">Resumen</div>
    <div class="kpi-grid" id="d-kpi">
      <div class="kpi"><div class="kpi-val" id="k-subs">-</div><div class="kpi-lbl">Suscriptores</div></div>
      <div class="kpi"><div class="kpi-val" id="k-followers">-</div><div class="kpi-lbl">Seguidores</div></div>
      <div class="kpi"><div class="kpi-val" id="k-almas">-</div><div class="kpi-lbl">Almas</div></div>
      <div class="kpi"><div class="kpi-val" id="k-posts">-</div><div class="kpi-lbl">Posts</div></div>
    </div>
  </div>
  <div class="sn-sec">
    <div class="sn-sec-t">Ganancias del mes</div>
    <div class="sn-card" id="d-earn">
      <div class="sn-earn-row"><span class="sn-earn-lbl">Suscripciones</span><span class="sn-earn-val" id="e-subs">-</span></div>
      <div class="sn-earn-row"><span class="sn-earn-lbl">PPV</span><span class="sn-earn-val" id="e-ppv">-</span></div>
      <div class="sn-earn-row"><span class="sn-earn-lbl">Tips</span><span class="sn-earn-val" id="e-tips">-</span></div>
      <div class="sn-earn-row" style="border-top:1px solid #ff2255;margin-top:4px;padding-top:10px"><span class="sn-earn-lbl" style="color:#ff2255;font-weight:700">Total</span><span class="sn-earn-val" style="color:#ff2255" id="e-total">-</span></div>
    </div>
  </div>
  <div class="sn-sec">
    <div class="sn-sec-t">Top Posts</div>
    <div class="sn-card" id="d-posts"><div class="sn-empty">Cargando...</div></div>
  </div>
  <div class="sn-sec">
    <div class="sn-sec-t">&#128081; Top Fans</div>
    <div class="sn-card" id="d-top-fans"><div class="sn-empty">Cargando...</div></div>
  </div>
</div>
<nav class="sn-bottom-nav" id="snBottomNav">
  <a class="sn-bn-item" href="/feed.html"><span class="sn-bn-icon">&#127968;</span>Feed</a>
  <a class="sn-bn-item" href="/search.html"><span class="sn-bn-icon">&#128269;</span>Buscar</a>
  <a class="sn-bn-item active" href="/dashboard.html"><span class="sn-bn-icon">&#128202;</span>Stats</a>
  <a class="sn-bn-item" href="/messages.html"><span class="sn-bn-icon">&#128172;</span>Msgs</a>
  <a class="sn-bn-item" href="/profile.html"><span class="sn-bn-icon">&#128100;</span>Perfil</a>
  <button class="sn-nb" id="sn-nb" onclick="snNO()"><span style="font-size:20px">&#128276;</span><div class="sn-nbc" id="sn-nbc"></div>NOTIF</button>
</nav>
<div class="sn-nov" id="sn-nov" onclick="snNC()"></div>
<div class="sn-np" id="sn-np">
  <div class="sn-nh"><div class="sn-nht">Notificaciones</div><button class="sn-nmr" onclick="snNMR()">Todo le&iacute;do</button><button class="sn-ncl" onclick="snNC()">&#10005;</button></div>
  <div class="sn-nl" id="sn-nl"><div class="sn-nem">Cargando...</div></div>
</div>

<script>
var _SB="https://cdokplvoqivducsqrejt.supabase.co",_AK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkb2twbHZvcWl2ZHVjc3FyZWp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTk4NjksImV4cCI6MjA5MDI3NDg2OX0.aFXuBGq5MPReDdkzHlG-lRNKwFeuapLVBJs2Y5n1L0g",_uid=null,_tok=null,_NCh=null;
function snNTA(ts){var s=Math.floor((Date.now()-new Date(ts))/1000);return s<60?"ahora":s<3600?Math.floor(s/60)+"m":s<86400?Math.floor(s/3600)+"h":Math.floor(s/86400)+"d";}
function snNSB(n){var b=document.getElementById("sn-nbc");if(!b)return;if(n>0){b.textContent=n>9?"9+":n;b.classList.add("on");}else{b.classList.remove("on");b.textContent="";}}
function snNL(){if(!_uid||!_tok)return;fetch(_SB+"/rest/v1/notifications?user_id=eq."+_uid+"&order=created_at.desc&limit=20",{headers:{"apikey":_AK,"Authorization":"Bearer "+_tok}}).then(function(r){return r.json();}).then(function(ns){ns=ns||[];var el=document.getElementById("sn-nl");if(!el)return;el.innerHTML="";if(!ns.length){var e=document.createElement("div");e.className="sn-nem";e.textContent="No hay notificaciones";el.appendChild(e);return;}ns.forEach(function(n){var it=document.createElement("div");it.className="sn-ni"+(n.is_read?"":" u");var ic=document.createElement("div");ic.className="sn-nic";ic.textContent="\uD83D\uDD14";var ct=document.createElement("div");ct.className="sn-nid";var tx=document.createElement("div");tx.className="sn-nit";tx.textContent=n.title||n.message||"";var ti=document.createElement("div");ti.className="sn-niz";ti.textContent=snNTA(n.created_at);ct.appendChild(tx);ct.appendChild(ti);it.appendChild(ic);it.appendChild(ct);el.appendChild(it);});var u=ns.filter(function(n){return !n.is_read;}).length;snNSB(u);}).catch(function(){});}
window.snNO=function(){document.getElementById("sn-np").classList.add("open");document.getElementById("sn-nov").classList.add("on");snNL();};
window.snNC=function(){document.getElementById("sn-np").classList.remove("open");document.getElementById("sn-nov").classList.remove("on");};
window.snNMR=function(){if(!_uid||!_tok)return;fetch(_SB+"/rest/v1/rpc/mark_notifications_read",{method:"POST",headers:{"Content-Type":"application/json","apikey":_AK,"Authorization":"Bearer "+_tok},body:JSON.stringify({p_user_id:_uid})}).then(function(){snNL();}).catch(function(){});};
function dKPIs(){
  Promise.all([
    fetch(_SB+"/rest/v1/profiles?id=eq."+_uid+"&select=subscriber_count,follower_count,coins_balance",{headers:{"apikey":_AK,"Authorization":"Bearer "+_tok}}).then(function(r){return r.json();}),
    fetch(_SB+"/rest/v1/posts?user_id=eq."+_uid+"&select=id",{headers:{"apikey":_AK,"Authorization":"Bearer "+_tok,"Prefer":"count=exact"},}).then(function(r){return r.headers.get("content-range");})
  ]).then(function(results){
    var p=results[0]&&results[0][0]||{};
    var cnt=(results[1]||"0/").split("/")[0]||"0";
    document.getElementById("k-subs").textContent=p.subscriber_count||0;
    document.getElementById("k-followers").textContent=p.follower_count||0;
    document.getElementById("k-almas").textContent=p.coins_balance||0;
    document.getElementById("k-posts").textContent=cnt;
  }).catch(function(){});
}
function dEarnings(){
  var start=new Date();start.setDate(1);start.setHours(0,0,0,0);
  var since=start.toISOString();
  Promise.all([
    fetch(_SB+"/rest/v1/subscriptions?creator_id=eq."+_uid+"&created_at=gte."+since+"&select=amount",{headers:{"apikey":_AK,"Authorization":"Bearer "+_tok}}).then(function(r){return r.json();}),
    fetch(_SB+"/rest/v1/ppv_purchases?creator_id=eq."+_uid+"&created_at=gte."+since+"&select=almas_amount",{headers:{"apikey":_AK,"Authorization":"Bearer "+_tok}}).then(function(r){return r.json();})
  ]).then(function(results){
    var subAmt=(results[0]||[]).reduce(function(s,r){return s+parseFloat(r.amount||0);},0);
    var ppvAmt=(results[1]||[]).reduce(function(s,r){return s+parseFloat(r.almas_amount||0)*0.9;},0);
    document.getElementById("e-subs").textContent=subAmt.toFixed(2)+"\u20AC";
    document.getElementById("e-ppv").textContent=ppvAmt.toFixed(0)+" Almas";
    document.getElementById("e-tips").textContent="-";
    document.getElementById("e-total").textContent=(subAmt>0?(subAmt.toFixed(2)+"\u20AC"):"")+(ppvAmt>0?" + "+ppvAmt.toFixed(0)+" Almas":"") || "0";
  }).catch(function(){});
}
function dPosts(){
  fetch(_SB+"/rest/v1/posts?user_id=eq."+_uid+"&order=like_count.desc&limit=5&select=content,image_url,like_count,comment_count,view_count",{headers:{"apikey":_AK,"Authorization":"Bearer "+_tok}})
  .then(function(r){return r.json();})
  .then(function(posts){
    var el=document.getElementById("d-posts");if(!el)return;
    el.innerHTML="";
    if(!posts||!posts.length){var e=document.createElement("div");e.className="sn-empty";e.textContent="No tienes posts a\u00FAn";el.appendChild(e);return;}
    posts.forEach(function(p){
      var row=document.createElement("div");row.className="sn-post-row";
      if(p.image_url){var img=document.createElement("img");img.className="sn-post-thumb";img.src=p.image_url;row.appendChild(img);}
      var info=document.createElement("div");info.className="sn-post-info";
      var txt=document.createElement("div");txt.className="sn-post-txt";txt.textContent=p.content||"Post sin texto";
      var stats=document.createElement("div");stats.className="sn-post-stats";
      stats.textContent="\u2764\uFE0F "+(p.like_count||0)+"  \uD83D\uDCAC "+(p.comment_count||0)+"  \uD83D\uDC41 "+(p.view_count||0);
      info.appendChild(txt);info.appendChild(stats);row.appendChild(info);
      el.appendChild(row);
    });
  }).catch(function(){});
}
function snTopFans(){
  fetch(_SB+"/rest/v1/rpc/get_creator_top_fans",{
    method:"POST",headers:{"Content-Type":"application/json","apikey":_AK,"Authorization":"Bearer "+_tok},
    body:JSON.stringify({p_creator_id:_uid,p_limit:10})
  }).then(function(r){return r.json();})
  .then(function(fans){
    var el=document.getElementById("d-top-fans");if(!el)return;
    el.innerHTML="";
    if(!fans||!fans.length){var e=document.createElement("div");e.className="sn-empty";e.textContent="A\u00FAn no tienes fans con puntos acumulados";el.appendChild(e);return;}
    fans.forEach(function(f,i){
      var row=document.createElement("div");row.className="sn-tf-row";
      row.onclick=function(){location.href="profile.html?u="+encodeURIComponent(f.username||"");};
      var rn=document.createElement("div");rn.className="sn-tf-rank"+(i===0?" r1":i===1?" r2":i===2?" r3":"");rn.textContent=i+1;
      var av=document.createElement("img");av.className="sn-tf-av";
      av.src=f.avatar_url||("https://api.dicebear.com/7.x/personas/svg?seed="+(f.username||"u"));
      var nm=document.createElement("div");nm.className="sn-tf-name";nm.textContent=f.username||"?";
      var bd=document.createElement("div");bd.className="sn-tf-badge";bd.textContent=f.badge_emoji||"\u2B50";
      var pt=document.createElement("div");pt.className="sn-tf-pts";pt.textContent=(f.total_points||0)+" pts";
      row.appendChild(rn);row.appendChild(av);row.appendChild(nm);row.appendChild(bd);row.appendChild(pt);
      el.appendChild(row);
    });
  }).catch(function(){});
}
function dRender(){
  dKPIs();
  dEarnings();
  dPosts();
  setTimeout(snTopFans,300);
}
(function(){
  function init(){
    if(!window.sb){setTimeout(init,400);return;}
    window.sb.auth.getSession().then(function(s){
      if(!s.data||!s.data.session){
        location.href="/";
        return;
      }
      _uid=s.data.session.user.id;
      _tok=s.data.session.access_token;
      // Load unread notifications badge
      fetch(_SB+"/rest/v1/rpc/get_unread_count",{method:"POST",headers:{"Content-Type":"application/json","apikey":_AK,"Authorization":"Bearer "+_tok},body:JSON.stringify({p_user_id:_uid})}).then(function(r){return r.json();}).then(function(c){snNSB(c||0);}).catch(function(){});
      if(!_NCh){_NCh=window.sb.channel("notif:"+_uid).on("postgres_changes",{event:"INSERT",schema:"public",table:"notifications",filter:"user_id=eq."+_uid},function(p){var n=p.new;if(!n)return;var b=document.getElementById("sn-nbc");var cur=parseInt((b&&b.textContent)||"0")||0;snNSB(cur+1);}).subscribe();}
      dRender();
    });
  }
  // Load Supabase
  var s=document.createElement("script");
  s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
  s.onload=function(){
    window.sb=supabase.createClient("https://cdokplvoqivducsqrejt.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkb2twbHZvcWl2ZHVjc3FyZWp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTk4NjksImV4cCI6MjA5MDI3NDg2OX0.aFXuBGq5MPReDdkzHlG-lRNKwFeuapLVBJs2Y5n1L0g");
    setTimeout(init,200);
  };
  document.head.appendChild(s);
})();
<\/script>
</body>
</html>
