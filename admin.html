<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHADOWNET &mdash; Panel de Moderación</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:system-ui,sans-serif;min-height:100vh}
header{background:#070f1e;border-bottom:1px solid #0d2744;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:monospace;font-size:14px;color:#ff2255;font-weight:700;letter-spacing:.1em}
.admin-badge{background:rgba(255,34,85,.15);color:#ff6680;border:1px solid rgba(255,34,85,.3);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.logout-btn{padding:6px 14px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:6px;font-size:12px;cursor:pointer}
.logout-btn:hover{border-color:#ff2255;color:#ff6680}
.tabs{display:flex;gap:0;border-bottom:1px solid #0d2744;background:#070f1e;padding:0 20px;position:sticky;top:57px;z-index:99;overflow-x:auto}
.tab{padding:12px 18px;font-size:12px;font-weight:700;color:#5a8aaa;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px}
.tab:hover{color:#e8f4ff}
.tab.active{color:#ff2255;border-bottom-color:#ff2255}
.badge{background:#ff2255;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700}
.content{max-width:1100px;margin:0 auto;padding:20px}
.section{display:none}
.section.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:#070f1e;border:1px solid #0d2744;border-radius:10px;padding:14px;text-align:center}
.stat-num{font-size:26px;font-weight:700;font-family:monospace}
.stat-lbl{font-size:10px;color:#5a8aaa;margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.card{background:#070f1e;border:1px solid #0d2744;border-radius:10px;margin-bottom:14px;overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid #0d2744;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-title{font-size:13px;font-weight:700;color:#e8f4ff}
.card-sub{font-size:11px;color:#5a8aaa;margin-top:2px}
.card-body{padding:14px}
.user-row{display:flex;align-items:center;gap:10px;min-width:0}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:700;color:#e8f4ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-meta{font-size:11px;color:#5a8aaa;margin-top:1px}
.actions{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.btn{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .2s;text-transform:uppercase;letter-spacing:.04em;text-decoration:none;display:inline-flex;align-items:center}
.btn-approve{background:rgba(0,200,83,.15);color:#00c853;border:1px solid rgba(0,200,83,.3)}
.btn-approve:hover{background:rgba(0,200,83,.3)}
.btn-reject{background:rgba(255,34,85,.1);color:#ff6680;border:1px solid rgba(255,34,85,.3)}
.btn-reject:hover{background:rgba(255,34,85,.25)}
.btn-ban{background:rgba(255,68,68,.08);color:#ff4444;border:1px solid rgba(255,68,68,.25)}
.btn-ban:hover{background:rgba(255,68,68,.2)}
.btn-unban{background:rgba(0,229,255,.08);color:#00e5ff;border:1px solid rgba(0,229,255,.25)}
.btn-unban:hover{background:rgba(0,229,255,.2)}
.btn-view{background:transparent;color:#5a8aaa;border:1px solid #0d2744}
.btn-view:hover{border-color:#00e5ff;color:#00e5ff}
.btn-dismiss{background:transparent;color:#5a8aaa;border:1px solid #0d2744}
.btn-del{background:rgba(255,34,85,.08);color:#ff6680;border:1px solid rgba(255,34,85,.25)}
.btn-del:hover{background:rgba(255,34,85,.2)}
.status-pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.s-pending{background:rgba(255,170,0,.12);color:#ffaa00;border:1px solid rgba(255,170,0,.3)}
.s-verified{background:rgba(0,200,83,.1);color:#00c853;border:1px solid rgba(0,200,83,.25)}
.s-rejected{background:rgba(255,34,85,.1);color:#ff6680;border:1px solid rgba(255,34,85,.3)}
.s-banned{background:rgba(255,68,68,.1);color:#ff4444;border:1px solid rgba(255,68,68,.3)}
.s-active{background:rgba(0,229,255,.08);color:#00e5ff;border:1px solid rgba(0,229,255,.2)}
.kyc-imgs{display:flex;gap:10px;margin-top:12px}
.kyc-img-box{flex:1;min-width:0;background:#01020c;border:1px solid #0d2744;border-radius:8px;overflow:hidden;height:160px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.kyc-img-box img{width:100%;height:100%;object-fit:cover}
.kyc-img-label{font-size:10px;color:#5a8aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.report-reason{background:#0a1020;border:1px solid #0d2744;border-radius:6px;padding:9px 12px;font-size:12px;color:#8a9bb0;margin:8px 0;line-height:1.5}
.empty{text-align:center;padding:40px;color:#5a8aaa;font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:#070f1e;border:1px solid #0d2744;border-radius:14px;padding:22px;width:100%;max-width:420px}
.modal-title{font-size:14px;font-weight:700;color:#e8f4ff;margin-bottom:12px}
.modal-input{width:100%;padding:10px 12px;background:#01020c;border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-size:12px;outline:none;margin-bottom:12px;resize:vertical;min-height:70px}
.modal-input:focus{border-color:#ff2255}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.search-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-input{flex:1;min-width:160px;padding:8px 12px;background:#070f1e;border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-size:12px;outline:none}
.search-input:focus{border-color:#00e5ff}
.filter-select{padding:8px 10px;background:#070f1e;border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-size:11px;outline:none;cursor:pointer}
.toast{position:fixed;bottom:20px;right:20px;background:#070f1e;border-radius:8px;padding:10px 16px;font-size:12px;font-weight:700;z-index:99999;display:none;border:1px solid #00ff88;color:#00ff88;max-width:280px}
.toast.err{border-color:#ff2255;color:#ff6680}
.section-heading{font-size:10px;font-weight:700;color:#5a8aaa;text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid #0d2744}
.post-media-thumb{max-height:120px;width:100%;object-fit:cover;border-radius:6px;margin-top:8px;cursor:pointer}
.loading{text-align:center;padding:28px;color:#5a8aaa;font-size:12px}
</style>
<link rel="stylesheet" href="/sn-design.css">
<link rel="manifest" href="/manifest.json">

<body>
<header class="sn-header">
  <button class="sn-header-btn" onclick="location.href=\x27/feed.html\x27">&#8592;</button>
  <span class="sn-header-logo">ADMIN</span>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('stats')" id="tab-stats">📊 Stats</button>
  <button class="tab" onclick="switchTab('kyc')" id="tab-kyc">📋 KYC <span class="badge" id="kyc-badge">0</span></button>
  <button class="tab" onclick="switchTab('reports')" id="tab-reports">⚠️ Reportes <span class="badge" id="rep-badge">0</span></button>
  <button class="tab" onclick="switchTab('users')" id="tab-users">👥 Usuarios</button>
  <button class="tab" onclick="switchTab('posts')" id="tab-posts">🖼 Posts</button>
</div>
<div class="content">
  <div class="section active" id="sec-stats">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="st-users">-</div><div class="stat-lbl">Usuarios</div></div>
      <div class="stat-card"><div class="stat-num" id="st-creators">-</div><div class="stat-lbl">Creadores</div></div>
      <div class="stat-card"><div class="stat-num" id="st-posts">-</div><div class="stat-lbl">Posts</div></div>
      <div class="stat-card"><div class="stat-num" id="st-verified">-</div><div class="stat-lbl">KYC verificados</div></div>
      <div class="stat-card"><div class="stat-num" id="st-pending" style="color:#ffaa00">-</div><div class="stat-lbl">KYC pendientes</div></div>
      <div class="stat-card"><div class="stat-num" id="st-banned" style="color:#ff4444">-</div><div class="stat-lbl">Baneados</div></div>
      <div class="stat-card"><div class="stat-num" id="st-reports" style="color:#ff6680">-</div><div class="stat-lbl">Reportes activos</div></div>
      <div class="stat-card"><div class="stat-num" id="st-subs" style="color:#00ff88">-</div><div class="stat-lbl">Suscripciones</div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">🕒 Registros recientes</span></div>
      <div class="card-body" id="recent-users"><div class="loading">Cargando...</div></div>
    </div>
  </div>
  <div class="section" id="sec-kyc">
    <p class="section-heading">Solicitudes de verificación pendientes</p>
    <div id="kyc-list"><div class="loading">Cargando...</div></div>
  </div>
  <div class="section" id="sec-reports">
    <p class="section-heading">Contenido reportado</p>
    <div id="reports-list"><div class="loading">Cargando...</div></div>
  </div>
  <div class="section" id="sec-users">
    <div class="search-bar">
      <input class="search-input" id="user-search" placeholder="Buscar usuario..." oninput="searchUsers()">
      <select class="filter-select" id="user-filter" onchange="searchUsers()">
        <option value="">Todos</option><option value="creator">Creadores</option><option value="viewer">Espectadores</option><option value="banned">Baneados</option><option value="pending">KYC pendiente</option>
      </select>
    </div>
    <div id="users-list"><div class="loading">Cargando...</div></div>
  </div>
  <div class="section" id="sec-posts">
    <div class="search-bar">
      <input class="search-input" id="post-search" placeholder="Buscar posts..." oninput="searchPosts()">
      <select class="filter-select" id="post-filter" onchange="searchPosts()">
        <option value="">Todos</option><option value="ppv">PPV</option>
      </select>
    </div>
    <div id="posts-list"><div class="loading">Cargando...</div></div>
  </div>
</div>
<div class="modal-overlay" id="banModal">
  <div class="modal-box">
    <p class="modal-title">🚫 Banear usuario</p>
    <textarea class="modal-input" id="banReason" placeholder="Motivo del ban..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-dismiss" onclick="closeBanModal()">Cancelar</button>
      <button class="btn btn-ban" onclick="confirmBan()">Confirmar ban</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="rejectModal">
  <div class="modal-box">
    <p class="modal-title">❌ Rechazar KYC</p>
    <textarea class="modal-input" id="rejectReason" placeholder="Motivo del rechazo..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-dismiss" onclick="closeRejectModal()">Cancelar</button>
      <button class="btn btn-reject" onclick="confirmReject()">Rechazar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var SB_URL='https://cdokplvoqivducsqrejt.supabase.co',SB_KEY='sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su',ADMIN_ID='f8befa4f-08f8-4256-aa4e-1053d36a12c0';
var sb=supabase.createClient(SB_URL,SB_KEY);
window.sb=sb;
var _banTarget=null,_rejectTarget=null;
var _allUsers=[],_allPosts=[];
sb.auth.getSession().then(function(r){
  if(!r.data||!r.data.session){window.location.href='/';return;}
  sb.from('profiles').select('is_admin').eq('id',r.data.session.user.id).single().then(function(p){
    if(!p.data||!p.data.is_admin){alert('Acceso denegado.');window.location.href='/feed.html';return;}
    loadStats();loadKYC();loadReports();loadUsers();
  });
});
function doLogout(){sb.auth.signOut().then(function(){window.location.href='/'});}
function switchTab(n){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.getElementById('tab-'+n).classList.add('active');
  document.getElementById('sec-'+n).classList.add('active');
  if(n==='posts') loadPosts();
}
function showToast(m,e){var t=document.getElementById('toast');t.textContent=m;t.className='toast'+(e?' err':'');t.style.display='block';setTimeout(function(){t.style.display='none';},3000);}
function tsAgo(ts){var s=Math.floor((Date.now()-new Date(ts))/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function escH(s){return s?(s+&apos;).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
async function loadStats(){
  var [u,c,p,v,pe,b,rep,s]=await Promise.all([
    sb.from('profiles').select('id',{count:'exact',head:true}),
    sb.from('profiles').select('id',{count:'exact',head:true}).eq('role','creator'),
    sb.from('posts').select('id',{count:'exact',head:true}),
    sb.from('profiles').select('id',{count:'exact',head:true}).eq('verification_status','verified'),
    sb.from('profiles').select('id',{count:'exact',head:true}).eq('verification_status','pending'),
    sb.from('profiles').select('id',{count:'exact',head:true}).eq('is_banned',true),
    sb.from('reports').select('id',{count:'exact',head:true}).eq('status','pending'),
    sb.from('subscriptions').select('id',{count:'exact',head:true}).eq('status','active'),
  ]);
  document.getElementById('st-users').textContent=u.count||0;
  document.getElementById('st-creators').textContent=c.count||0;
  document.getElementById('st-posts').textContent=p.count||0;
  document.getElementById('st-verified').textContent=v.count||0;
  document.getElementById('st-pending').textContent=pe.count||0;
  document.getElementById('st-banned').textContent=b.count||0;
  document.getElementById('st-reports').textContent=rep.count||0;
  document.getElementById('st-subs').textContent=s.count||0;
  document.getElementById('kyc-badge').textContent=pe.count||0;
  document.getElementById('rep-badge').textContent=rep.count||0;
  var rec=await sb.from('profiles').select('id,username,role,created_at,verification_status,avatar_url').order('created_at',{ascending:false}).limit(10);
  var el=document.getElementById('recent-users');
  if(!rec.data||!rec.data.length){el.innerHTML='<div class="empty">Sin registros</div>';return;}
  el.innerHTML=rec.data.map(function(u){
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #0d2744">'+
      '<div class="avatar">'+(u.avatar_url?'<img src="'+u.avatar_url+'" alt="">':escH(u.username[0].toUpperCase()))+'</div>'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:700;color:#e8f4ff">@'+escH(u.username)+'</div><div style="font-size:11px;color:#5a8aaa">'+u.role+' &middot; hace '+tsAgo(u.created_at)+'</div></div>'+
      '<span class="status-pill '+(u.verification_status==='verified'?'s-verified':u.verification_status==='pending'?'s-pending':'s-active')+'">'+u.verification_status+'</span>'+
    '</div>';
  }).join('');
}
async function loadKYC(){
  var r=await sb.from('profiles').select('id,username,avatar_url,doc_url,selfie_url,verification_submitted_at,role').eq('verification_status','pending').order('verification_submitted_at',{ascending:true});
  var el=document.getElementById('kyc-list');
  if(!r.data||!r.data.length){el.innerHTML='<div class="empty">\u2705 No hay KYC pendientes</div>';return;}
  el.innerHTML=r.data.map(function(u){
    return '<div class="card" id="kyc-'+u.id+'">'+
      '<div class="card-header">'+
        '<div class="user-row"><div class="avatar">'+(u.avatar_url?'<img src="'+u.avatar_url+'" alt="">':escH(u.username[0].toUpperCase()))+'</div>'+
        '<div class="user-info"><div class="user-name">@'+escH(u.username)+'</div><div class="user-meta">'+u.role+(u.verification_submitted_at?' &middot; hace '+tsAgo(u.verification_submitted_at):'')+'</div></div></div>'+
        '<div class="actions"><button class="btn btn-approve" onclick="approveKYC(&apos;'+u.id+'&apos;)">Aprobar</button><button class="btn btn-reject" onclick="openRejectModal(&apos;'+u.id+'&apos;)">Rechazar</button></div>'+
      '</div>'+
      '<div class="card-body"><div class="kyc-imgs">'+
        '<div style="flex:1"><div class="kyc-img-label">Documento</div>'+
        (u.doc_url?'<div class="kyc-img-box" onclick="window.open(&apos;'+u.doc_url+'&apos;,&apos;_blank&apos;)"><img src="'+u.doc_url+'" alt="Documento"></div>':'<div class="kyc-img-box"><span style="color:#5a8aaa;font-size:11px">Sin documento</span></div>')+'</div>'+
        '<div style="flex:1"><div class="kyc-img-label">Selfie</div>'+
        (u.selfie_url?'<div class="kyc-img-box" onclick="window.open(&apos;'+u.selfie_url+'&apos;,&apos;_blank&apos;)"><img src="'+u.selfie_url+'" alt="Selfie"></div>':'<div class="kyc-img-box"><span style="color:#5a8aaa;font-size:11px">Sin selfie</span></div>')+'</div>'+
      '</div></div>'+
    '</div>';
  }).join('');
}
async function approveKYC(uid){
  var r=await sb.from('profiles').update({verification_status:'verified'}).eq('id',uid);
  if(r.error){showToast('Error',true);return;}
  await sb.from('notifications').insert({user_id:uid,type:'verification',message:'\u2705 Tu identidad fue verificada. Ya puedes hacer lives y monetizar.'});
  document.getElementById('kyc-'+uid)?.remove();
  showToast('\u2705 KYC aprobado');loadStats();
}
function openRejectModal(uid){_rejectTarget=uid;document.getElementById('rejectReason').value='';document.getElementById('rejectModal').classList.add('open');}
function closeRejectModal(){document.getElementById('rejectModal').classList.remove('open');_rejectTarget=null;}
async function confirmReject(){
  if(!_rejectTarget) return;
  var reason=document.getElementById('rejectReason').value.trim()||'Documentos no v\u00E1lidos';
  await sb.from('profiles').update({verification_status:'rejected',verification_rejection_reason:reason}).eq('id',_rejectTarget);
  await sb.from('notifications').insert({user_id:_rejectTarget,type:'verification',message:'\u274C Verificaci\u00F3n rechazada: '+reason+'. Intenta de nuevo desde Configuraci\u00F3n.'});
  closeRejectModal();
  document.getElementById('kyc-'+_rejectTarget)?.remove();
  showToast('KYC rechazado');loadStats();
}
async function loadReports(){
  var r=await sb.from('reports').select('*').eq('status','pending').order('created_at',{ascending:true}).limit(30);
  var el=document.getElementById('reports-list');
  if(!r.data||!r.data.length){el.innerHTML='<div class="empty">\u2705 No hay reportes pendientes</div>';return;}
  var uids=[...new Set(r.data.flatMap(function(rep){return [rep.reporter_id,rep.reported_user_id].filter(Boolean);}))];
  var um={};if(uids.length){var ur=await sb.from('profiles').select('id,username').in('id',uids);(ur.data||[]).forEach(function(u){um[u.id]=u.username;});}
  el.innerHTML=r.data.map(function(rep){
    return '<div class="card" id="rep-'+rep.id+'">'+
      '<div class="card-header">'+
        '<div><div class="card-title">\u26A0\uFE0F '+escH(rep.reason)+'</div>'+
        '<div class="card-sub">Por @'+(um[rep.reporter_id]||'?')+' contra @'+(um[rep.reported_user_id]||'?')+' &middot; hace '+tsAgo(rep.created_at)+'</div></div>'+
        '<span class="status-pill s-pending">Pendiente</span>'+
      '</div>'+
      '<div class="card-body">'+
        (rep.description?'<div class="report-reason">'+escH(rep.description)+'</div>':'')+
        '<div class="actions" style="margin-top:8px">'+
          (rep.reported_user_id?'<button class="btn btn-ban" onclick="openBanModal(&apos;+rep.reported_user_id+&apos;)">Banear usuario</button>':'')+
          (rep.post_id?'<button class="btn btn-del" onclick="deletePost(&apos;+rep.post_id+&apos;,''+rep.id+&apos;)">Eliminar post</button>':'')+
          '<button class="btn btn-dismiss" onclick="dismissReport(&apos;+rep.id+&apos;)">Desestimar</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}
async function dismissReport(id){
  await sb.from('reports').update({status:'dismissed',reviewed_by:ADMIN_ID,reviewed_at:new Date().toISOString()}).eq('id',id);
  document.getElementById('rep-'+id)?.remove();showToast('Reporte desestimado');loadStats();
}
async function deletePost(postId,reportId){
  if(!confirm('Eliminar este post?')) return;
  await sb.from('posts').delete().eq('id',postId);
  await sb.from('reports').update({status:'resolved',action_taken:'post_deleted',reviewed_by:ADMIN_ID,reviewed_at:new Date().toISOString()}).eq('id',reportId);
  document.getElementById('rep-'+reportId)?.remove();showToast('\uD83D\uDDD1\uFE0F Post eliminado');loadStats();
}
async function loadUsers(){
  var r=await sb.from('profiles').select('id,username,avatar_url,role,is_banned,ban_reason,verification_status,created_at,coins_balance').order('created_at',{ascending:false}).limit(60);
  _allUsers=r.data||[];renderUsers(_allUsers);
}
function renderUsers(users){
  var el=document.getElementById('users-list');
  if(!users.length){el.innerHTML='<div class="empty">Sin resultados</div>';return;}
  el.innerHTML=users.map(function(u){
    var banned=u.is_banned;
    return '<div class="card">'+
      '<div class="card-header">'+
        '<div class="user-row"><div class="avatar">'+(u.avatar_url?'<img src="'+u.avatar_url+'" alt="">':escH(u.username[0].toUpperCase()))+'</div>'+
        '<div class="user-info"><div class="user-name">@'+escH(u.username)+'</div><div class="user-meta">'+u.role+' &middot; '+tsAgo(u.created_at)+' &middot; \uD83D\uDC80 '+(u.coins_balance||0)+'</div></div></div>'+
        '<div class="actions">'+
          '<span class="status-pill '+(banned?'s-banned':u.verification_status==='verified'?'s-verified':u.verification_status==='pending'?'s-pending':'s-active')+'">'+(banned?'baneado':u.verification_status)+'</span>'+
          (banned?'<button class="btn btn-unban" onclick="unbanUser(&apos;+u.id+&apos;)">Desbanear</button>':'<button class="btn btn-ban" onclick="openBanModal(&apos;+u.id+&apos;)">Banear</button>')+
          '<a class="btn btn-view" href="/profile.html?id='+u.id+'" target="_blank">Perfil</a>'+
        '</div>'+
      '</div>'+
      (banned&&u.ban_reason?'<div class="card-body"><div class="report-reason">'+escH(u.ban_reason)+'</div></div>':'')+
    '</div>';
  }).join('');
}
function searchUsers(){
  var q=document.getElementById('user-search').value.toLowerCase();
  var f=document.getElementById('user-filter').value;
  renderUsers(_allUsers.filter(function(u){
    return (!q||u.username.toLowerCase().includes(q))&&(!f||(f==='creator'&&u.role==='creator')||(f==='viewer'&&u.role==='viewer')||(f==='banned'&&u.is_banned)||(f==='pending'&&u.verification_status==='pending'));
  }));
}
function openBanModal(uid){_banTarget=uid;document.getElementById('banReason').value='';document.getElementById('banModal').classList.add('open');}
function closeBanModal(){document.getElementById('banModal').classList.remove('open');_banTarget=null;}
async function confirmBan(){
  if(!_banTarget) return;
  var reason=document.getElementById('banReason').value.trim()||'Violaci\u00F3n de t\u00E9rminos';
  var r=await sb.from('profiles').update({is_banned:true,ban_reason:reason}).eq('id',_banTarget);
  if(r.error){showToast('Error: '+r.error.message,true);return;}
  await sb.from('notifications').insert({user_id:_banTarget,type:'ban',message:'\uD83D\uDEAB Tu cuenta fue suspendida: '+reason});
  closeBanModal();showToast('\uD83D\uDEAB Baneado');loadUsers();loadStats();
}
async function unbanUser(uid){
  await sb.from('profiles').update({is_banned:false,ban_reason:null}).eq('id',uid);
  showToast('\u2705 Desbaneado');loadUsers();loadStats();
}
async function loadPosts(){
  var r=await sb.from('posts').select('id,user_id,content,media_url,media_type,created_at,likes_count,comments_count,is_subscriber_only').order('created_at',{ascending:false}).limit(40);
  _allPosts=r.data||[];
  var uids=[...new Set(_allPosts.map(function(p){return p.user_id;}))];
  if(uids.length){var ur=await sb.from('profiles').select('id,username').in('id',uids);var um={};(ur.data||[]).forEach(function(u){um[u.id]=u.username;});_allPosts=_allPosts.map(function(p){return Object.assign({},p,{username:um[p.user_id]||'?'});});}
  renderPosts(_allPosts);
}
function renderPosts(posts){
  var el=document.getElementById('posts-list');
  if(!posts.length){el.innerHTML='<div class="empty">Sin posts</div>';return;}
  el.innerHTML=posts.map(function(p){
    return '<div class="card">'+
      '<div class="card-header">'+
        '<div><div class="card-title">@'+escH(p.username)+(p.is_subscriber_only?' \uD83D\uDD12':'')+'</div>'+
        '<div class="card-sub">hace '+tsAgo(p.created_at)+' &middot; \u2764 '+p.likes_count+' &middot; \uD83D\uDCAC '+p.comments_count+'</div></div>'+
        '<button class="btn btn-del" onclick="deletePostAdmin(''+p.id+&apos;)">Eliminar</button>'+
      '</div>'+
      (p.content||p.media_url?'<div class="card-body">'+
        (p.content?'<div class="report-reason">'+escH(p.content.slice(0,200))+'</div>':'')+
        (p.media_url&&p.media_type==='image'?'<img class="post-media-thumb" src="'+p.media_url+'" onclick="window.open(''+p.media_url+&apos;,'_blank')" alt="">':'')+
        (p.media_url&&p.media_type==='video'?'<video class="post-media-thumb" src="'+p.media_url+'" controls muted></video>':'')+
      '</div>':'')+
    '</div>';
  }).join('');
}
async function deletePostAdmin(id){
  if(!confirm('Eliminar este post?')) return;
  await sb.from('posts').delete().eq('id',id);
  _allPosts=_allPosts.filter(function(p){return p.id!==id;});
  renderPosts(_allPosts);showToast('\uD83D\uDDD1\uFE0F Eliminado');
}
function searchPosts(){
  var q=document.getElementById('post-search').value.toLowerCase();
  var f=document.getElementById('post-filter').value;
  renderPosts(_allPosts.filter(function(p){
    return (!q||(p.content&&p.content.toLowerCase().includes(q))||(p.username&&p.username.toLowerCase().includes(q)))&&(!f||(f==='ppv'&&p.is_subscriber_only));
  }));
}
</script>
