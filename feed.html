<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff2255">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SHADOWNET">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHADOWNET — Feed</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:100;padding:12px 20px;background:rgba(1,2,12,.95);border-bottom:1px solid #0d2744;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-family:Orbitron,sans-serif;font-size:15px;color:#ff2255;letter-spacing:.12em;cursor:pointer}
.nav-btns{display:flex;gap:8px}
.nbtn{padding:7px 14px;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;border:1px solid #0d2744;background:transparent;color:#5a8aaa}
.nbtn.active,.nbtn:hover{border-color:#00e5ff;color:#00e5ff;background:rgba(0,229,255,.08)}
.nbtn.red{border-color:#ff2255;color:#ff2255}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.post-box{background:rgba(7,15,30,.7);border:1px solid #0d2744;border-radius:12px;padding:16px;margin-bottom:20px}
.post-box-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.avatar-sm{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;overflow:hidden}
.avatar-sm img{width:100%;height:100%;object-fit:cover}
.post-username{font-weight:700;font-size:14px}
.textarea{width:100%;background:rgba(1,2,12,.6);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;padding:10px 12px;font-family:Rajdhani,sans-serif;font-size:14px;resize:none;min-height:80px;outline:none}
.textarea:focus{border-color:#00e5ff}
.post-actions{display:flex;align-items:center;gap:10px;margin-top:10px}
.upload-btn{padding:8px 14px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
.upload-btn:hover{border-color:#00e5ff;color:#00e5ff}
.submit-btn{margin-left:auto;padding:9px 20px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.media-preview{margin-top:10px;border-radius:8px;overflow:hidden;max-height:300px;display:none}
.media-preview img,.media-preview video{width:100%;border-radius:8px;max-height:300px;object-fit:cover}
.feed{display:flex;flex-direction:column;gap:16px}
.card{background:rgba(7,15,30,.7);border:1px solid #0d2744;border-radius:12px;overflow:hidden}
.card-header{padding:12px 16px;display:flex;align-items:center;gap:10px}
.card-user{flex:1}
.card-name{font-weight:700;font-size:14px;color:#e8f4ff;cursor:pointer}
.card-name:hover{color:#00e5ff}
.card-time{font-size:11px;color:#5a8aaa;margin-top:1px}
.follow-btn{padding:5px 14px;border-radius:20px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:11px;cursor:pointer;border:1px solid rgba(0,229,255,.4);background:rgba(0,229,255,.08);color:#00e5ff;text-transform:uppercase;letter-spacing:.06em}
.follow-btn.following{border-color:#5a8aaa;color:#5a8aaa;background:transparent}
.card-media{position:relative}
.card-media img,.card-media video{width:100%;max-height:500px;object-fit:cover;display:block}
.card-content{padding:12px 16px}
.card-text{font-size:14px;line-height:1.5;color:#c8d8e8;margin-bottom:10px}
.card-footer{padding:10px 16px;border-top:1px solid #0d2744;display:flex;gap:16px}
.action-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:#5a8aaa;cursor:pointer;font-family:Rajdhani,sans-serif;font-weight:600;border:none;background:none;padding:4px 0}
.action-btn:hover,.action-btn.liked{color:#ff2255}
.action-btn.liked .heart{color:#ff2255}
.empty-feed{text-align:center;padding:48px 20px;color:#5a8aaa}
.empty-feed .icon{font-size:48px;margin-bottom:12px}
.empty-feed p{font-size:14px;line-height:1.6}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:rgba(7,15,30,.5);border-radius:8px;padding:4px}
.tab{flex:1;padding:8px;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-align:center;border:none;background:transparent;color:#5a8aaa;text-transform:uppercase;letter-spacing:.06em}
.tab.active{background:rgba(0,229,255,.12);color:#00e5ff}
.loader{text-align:center;padding:24px;color:#5a8aaa;font-size:13px}
.verified-icon{color:#00e5ff;font-size:12px;margin-left:4px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(7,15,30,.95);border:1px solid #00ff88;color:#00ff88;padding:10px 20px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;z-index:9999;display:none;white-space:nowrap}
@media(max-width:480px){.wrap{padding:12px 10px}}

.comments-section{padding:0 16px 12px;border-top:1px solid rgba(13,39,68,.4)}
.comment-form{display:flex;gap:8px;padding:10px 0;border-bottom:1px solid rgba(13,39,68,.3)}
.comment-inp{flex:1;background:rgba(1,2,12,.6);border:1px solid #0d2744;color:#e8f4ff;border-radius:20px;padding:7px 14px;font-family:Rajdhani,sans-serif;font-size:13px;outline:none}
.comment-inp:focus{border-color:#00e5ff}
.comment-send{padding:7px 14px;background:#ff2255;color:#fff;border:none;border-radius:20px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer}
.comment-list{display:flex;flex-direction:column;gap:8px;padding-top:8px}
.comment-item{display:flex;gap:8px;align-items:flex-start}
.comment-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
.comment-av img{width:100%;height:100%;object-fit:cover}
.comment-body{flex:1;background:rgba(7,15,30,.5);border-radius:0 10px 10px 10px;padding:8px 12px}
.comment-name{font-weight:700;font-size:12px;color:#00e5ff;margin-bottom:2px}
.comment-text{font-size:13px;color:#c8d8e8;line-height:1.4}
.comment-time{font-size:10px;color:#5a8aaa;margin-top:3px}
.comments-toggle{font-size:12px;color:#5a8aaa;cursor:pointer;padding:6px 0;display:block}
.comments-toggle:hover{color:#00e5ff}
.premium-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(1,2,12,0) 0%,rgba(1,2,12,.95) 50%,#01020c 100%);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:20px}
.premium-lock{text-align:center;padding:16px}
.premium-lock-icon{font-size:32px;margin-bottom:8px}
.premium-lock-text{font-family:Orbitron,sans-serif;font-size:12px;color:#e8f4ff;margin-bottom:10px;letter-spacing:.08em}
.premium-sub-btn{padding:10px 24px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em}
.premium-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:#5a8aaa;cursor:pointer;padding:4px 0}
.premium-toggle input{cursor:pointer;accent-color:#ff2255}
.post-premium-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(255,34,85,.15);border:1px solid rgba(255,34,85,.3);color:#ff6680;margin-left:6px}

.report-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center}
.report-modal.open{display:flex}
.report-box{background:#070f1e;border:1px solid #0d2744;border-radius:14px;padding:24px;width:100%;max-width:400px;margin:0 16px}
.report-title{font-family:Orbitron,sans-serif;font-size:13px;color:#ff2255;letter-spacing:.1em;margin-bottom:6px}
.report-sub{font-size:13px;color:#5a8aaa;margin-bottom:18px;line-height:1.5}
.report-reasons{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.report-reason{padding:10px 14px;background:rgba(1,2,12,.6);border:1px solid #0d2744;border-radius:8px;cursor:pointer;font-size:13px;color:#c8d8e8;transition:all .15s;display:flex;align-items:center;gap:10px}
.report-reason:hover,.report-reason.sel{border-color:#ff2255;background:rgba(255,34,85,.1);color:#ff6680}
.report-reason-icon{font-size:16px;flex-shrink:0}
.report-detail{width:100%;padding:10px 12px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-family:Rajdhani,sans-serif;font-size:13px;resize:none;height:70px;margin-bottom:14px;outline:none;display:none}
.report-detail.show{display:block}
.report-detail:focus{border-color:#ff2255}
.report-btns{display:flex;gap:8px}
.rpt-cancel{flex:1;padding:10px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.rpt-submit{flex:2;padding:10px;background:#ff2255;color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase}
.rpt-submit:disabled{opacity:.4;cursor:not-allowed}
/* 3-dot menu on posts */
.post-menu-btn{background:none;border:none;color:#5a8aaa;font-size:18px;cursor:pointer;padding:0 6px;line-height:1;margin-left:auto}
.post-menu-btn:hover{color:#e8f4ff}
.post-menu{position:absolute;top:40px;right:8px;background:#070f1e;border:1px solid #0d2744;border-radius:8px;padding:4px;z-index:50;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.post-menu-item{padding:8px 14px;font-size:13px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px;color:#c8d8e8}
.post-menu-item:hover{background:rgba(255,34,85,.1);color:#ff6680}
</style>
</head>
<body>
<header>
  <span class="logo" onclick="window.location.href='/'">SHADOWNET</span>
  <div class="nav-btns">
    <button class="nbtn active" onclick="window.location.href='/feed.html'">Feed</button>
    <button class="nbtn" onclick="window.location.href='/'">Inicio</button>
    <button class="nbtn" onclick="window.location.href='/search.html'">&#128269;</button>
    <button class="nbtn" id="logoutNavBtn" style="display:none" onclick="doLogout()">Salir</button>
  </div>
</header>
<div class="wrap">
  <div id="postBox" class="post-box" style="display:none">
    <div class="post-box-header">
      <div class="avatar-sm" id="myAvatar">?</div>
      <span class="post-username" id="myUsername">@usuario</span>
    </div>
    <textarea class="textarea" id="postText" placeholder="Comparte algo con tus seguidores..."></textarea>
    <div class="media-preview" id="mediaPreview"></div>
    <div class="post-actions">
      <label class="upload-btn" for="mediaInput">&#128248; Foto/Video<input type="file" id="mediaInput" accept="image/*,video/*" style="display:none"></label>
      <label class="premium-toggle" id="premiumToggle" style="display:none"><input type="checkbox" id="isPremiumCheck"> Exclusivo (solo suscriptores)</label><button class="submit-btn" id="submitPostBtn" onclick="submitPost()">Publicar</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tabAll" onclick="loadFeed('all')">Global</button>
    <button class="tab" id="tabFollowing" onclick="loadFeed('following')">Siguiendo</button>
    <button class="tab" id="tabTrending" onclick="loadFeed('trending')">&#128293; Trending</button>
    <button class="tab" id="tabSaved" onclick="loadFeed('saved')">&#128278; Guardados</button>
  </div>
  <div id="feedContainer" class="feed"><div class="loader">Cargando feed...</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
var SB_URL = "https://cdokplvoqivducsqrejt.supabase.co";
var SB_KEY = "sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su";
var sb = supabase.createClient(SB_URL, SB_KEY);
var currentUser = null;
var currentProfile = null;
var mediaFile = null;
var curTab = "all";

sb.auth.getSession().then(function(r) {
  if (r.data.session) initUser(r.data.session.user);
  else loadFeed("all");
});
sb.auth.onAuthStateChange(function(e, s) {
  if (e === "SIGNED_IN" && s) initUser(s.user);
  if (e === "SIGNED_OUT") { currentUser = null; document.getElementById("postBox").style.display = "none"; document.getElementById("logoutNavBtn").style.display = "none"; }
});

async function initUser(u) {
  currentUser = u;
  var r = await sb.from("profiles").select("username,avatar_url,verification_status").eq("id", u.id).single();
  currentProfile = r.data;
  var box = document.getElementById("postBox");
  if (box) box.style.display = "block";
  var logBtn = document.getElementById("logoutNavBtn");
  if (logBtn) logBtn.style.display = "inline-flex";
  var av = document.getElementById("myAvatar");
  if (av) {
    if (r.data && r.data.avatar_url) av.innerHTML = '<img src="' + r.data.avatar_url + '">'; 
    else av.textContent = r.data ? (r.data.username || "?")[0].toUpperCase() : "?";
  }
  var un = document.getElementById("myUsername");
  if (un && r.data) un.textContent = "@" + r.data.username;
  loadFeed(curTab); checkAndShowPremiumToggle();
}

async function loadFeed(tab) {
  curTab = tab;
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
  var activeTab = tab === "all" ? document.getElementById("tabAll")
    : tab === "following" ? document.getElementById("tabFollowing")
    : tab === "trending" ? document.getElementById("tabTrending")
    : document.getElementById("tabSaved");
  if (activeTab) activeTab.classList.add("active");
  var container = document.getElementById("feedContainer");
  container.innerHTML = '<div class="loader">Cargando...</div>';
  var r;
  if (tab === "trending") {
    r = await sb.from("trending_posts").select("*").limit(20);
    if (r.error || !r.data || r.data.length === 0) {
      container.innerHTML = '<div class="empty-feed"><div class="icon">&#128293;</div><p>No hay posts trending ahora.<br>Publica algo y genera engagement!</p></div>';
      return;
    }
    // Map trending_posts to post format
    var likedSet = {};
    var savedSet = {};
    if (currentUser) {
      var likes = await sb.from("post_likes").select("post_id").eq("user_id", currentUser.id);
      (likes.data||[]).forEach(function(l) { likedSet[l.post_id] = true; });
      var saves = await sb.from("bookmarks").select("post_id").eq("user_id", currentUser.id);
      (saves.data||[]).forEach(function(s) { savedSet[s.post_id] = true; });
    }
    container.innerHTML = "";
    r.data.forEach(function(post) {
      var profile = { id: post.user_id, username: post.username, avatar_url: post.avatar_url, verification_status: post.verification_status };
      var card = buildPostCard(post, profile, likedSet[post.id], savedSet[post.id]);
      container.appendChild(card);
    });
    return;
  }
  if (tab === "saved") {
    if (!currentUser) { container.innerHTML = '<div class="empty-feed"><div class="icon">&#128278;</div><p>Inicia sesión para ver tus guardados</p></div>'; return; }
    var saves2 = await sb.from("bookmarks").select("post_id").eq("user_id", currentUser.id).order("created_at",{ascending:false});
    var ids = (saves2.data||[]).map(function(s){return s.post_id;});
    if (ids.length === 0) { container.innerHTML = '<div class="empty-feed"><div class="icon">&#128278;</div><p>No tienes posts guardados.<br>Toca el icono &#128278; para guardar.</p></div>'; return; }
    r = await sb.from("posts").select("*").in("id", ids);
  } else if (tab === "following" && currentUser) {
    var follows = await sb.from("follows").select("following_id").eq("follower_id", currentUser.id);
    var ids2 = (follows.data || []).map(function(f) { return f.following_id; });
    if (ids2.length === 0) { container.innerHTML = '<div class="empty-feed"><div class="icon">&#128065;</div><p>No sigues a nadie todavía.<br>Explora el feed global y sigue creadores.</p></div>'; return; }
    r = await sb.from("posts").select("*").in("user_id", ids2).order("created_at", { ascending: false }).limit(30);
  } else {
    r = await sb.from("posts").select("*").order("created_at", { ascending: false }).limit(30);
  }
  if (r.error || !r.data || r.data.length === 0) {
    container.innerHTML = '<div class="empty-feed"><div class="icon">&#128248;</div><p>Aún no hay publicaciones.<br>¡Sé el primero en compartir algo!</p></div>';
    return;
  }
  var userIds = [...new Set(r.data.map(function(p) { return p.user_id; }))];
  var profiles = await sb.from("profiles").select("id,username,avatar_url,verification_status").in("id", userIds);
  var profileMap = {};
  (profiles.data || []).forEach(function(p) { profileMap[p.id] = p; });
  var likedSet2 = {};
  var savedSet2 = {};
  if (currentUser) {
    var likes2 = await sb.from("post_likes").select("post_id").eq("user_id", currentUser.id);
    (likes2.data || []).forEach(function(l) { likedSet2[l.post_id] = true; });
    var saves3 = await sb.from("bookmarks").select("post_id").eq("user_id", currentUser.id);
    (saves3.data || []).forEach(function(s) { savedSet2[s.post_id] = true; });
  }
  container.innerHTML = "";
  r.data.forEach(function(post) {
    var card = buildPostCard(post, profileMap[post.user_id], likedSet2[post.id], savedSet2[post.id]);
    container.appendChild(card);
  });
}

function buildPostCard(post, profile, liked, saved) {
  var card=document.createElement("div"); card.className="card"; card.id="post-"+post.id;
  var uname=profile?profile.username:"usuario";
  var initials=uname[0].toUpperCase();
  var verified=profile&&profile.verification_status==="verified";
  var timeAgo=getTimeAgo(post.created_at);
  var isOwn=currentUser&&post.user_id===currentUser.id;
  // Header
  var header=document.createElement("div");header.className="card-header";
  var av=document.createElement("div");av.className="avatar-sm";
  if(profile&&profile.avatar_url){var img=document.createElement("img");img.src=profile.avatar_url;av.appendChild(img);}else av.textContent=initials;
  var userInfo=document.createElement("div");userInfo.className="card-user";
  var nameEl=document.createElement("div");nameEl.className="card-name";nameEl.textContent="@"+uname;
  nameEl.addEventListener("click",function(){window.location.href="/profile.html?u="+uname;});
  if(verified){var vi=document.createElement("span");vi.className="verified-icon";vi.textContent="✓";nameEl.appendChild(vi);}
  if(post.is_premium){var pb=document.createElement("span");pb.className="post-premium-badge";pb.textContent="🔒 EXCLUSIVO";nameEl.appendChild(pb);}
  var timeEl=document.createElement("div");timeEl.className="card-time";timeEl.textContent=timeAgo;
  userInfo.appendChild(nameEl);userInfo.appendChild(timeEl);
  header.appendChild(av);header.appendChild(userInfo);
  if(!isOwn&&currentUser){
    var fbtn=document.createElement("button");fbtn.className="follow-btn";fbtn.textContent="Seguir";
    fbtn.dataset.uid=post.user_id;
    fbtn.addEventListener("click",function(){toggleFollow(this);});
    checkFollowing(post.user_id,fbtn);
    header.appendChild(fbtn);
  }
  // 3-dot menu for all posts
  if(currentUser){
    var menuBtn=document.createElement("button");menuBtn.className="post-menu-btn";menuBtn.textContent="\u22EE";menuBtn.dataset.postId=post.id;menuBtn.dataset.postUser=post.user_id;
    menuBtn.addEventListener("click",function(e){e.stopPropagation();openPostMenu(this);});
    header.style.position="relative";
    header.appendChild(menuBtn);
  }
  card.appendChild(header);
  // Media
  if(post.media_url){
    var mediaDiv=document.createElement("div");mediaDiv.className="card-media";mediaDiv.style.position="relative";
    if(post.media_type==="video"){var vid=document.createElement("video");vid.src=post.media_url;vid.controls=true;vid.preload="metadata";mediaDiv.appendChild(vid);}
    else{var img2=document.createElement("img");img2.src=post.media_url;img2.alt="post";img2.addEventListener("click",function(){window.open(post.media_url);});mediaDiv.appendChild(img2);}
    card.appendChild(mediaDiv);
    if(post.is_premium&&!isOwn){
      checkSubscriptionCached(post.user_id).then(function(isSub){if(!isSub)showPremiumOverlay(card,post.user_id,uname);});
    }
  }
  // Content
  if(post.content){var content=document.createElement("div");content.className="card-content";var txt=document.createElement("p");txt.className="card-text";txt.textContent=post.content;content.appendChild(txt);card.appendChild(content);}
  // Footer with like + comment + share + save
  var footer=document.createElement("div");footer.className="card-footer";
  // Like
  var likeBtn=document.createElement("button");likeBtn.className="action-btn"+(liked?" liked":"");
  likeBtn.innerHTML='<span class="heart">&#10084;</span> <span class="like-count">'+(post.likes_count||0)+"</span>";
  likeBtn.dataset.postId=post.id;likeBtn.dataset.liked=liked?"1":"0";
  likeBtn.addEventListener("click",function(){toggleLike(this);});
  footer.appendChild(likeBtn);
  // Comment
  var cmtBtn=document.createElement("button");cmtBtn.className="action-btn";
  cmtBtn.innerHTML="&#128172; <span>"+(post.comments_count||0)+"</span>";
  cmtBtn.addEventListener("click",function(){toggleComments(post.id,this);});
  footer.appendChild(cmtBtn);
  // Share
  var shareBtn=document.createElement("button");shareBtn.className="action-btn";
  shareBtn.innerHTML="&#128279; <span>"+(post.shares_count||0)+"</span>";
  shareBtn.dataset.postId=post.id;
  shareBtn.addEventListener("click",function(){sharePost(this.dataset.postId,uname);});
  footer.appendChild(shareBtn);
  // Save/Bookmark
  var saveBtn=document.createElement("button");saveBtn.className="action-btn"+(saved?" liked":"");
  saveBtn.innerHTML="<span>"+(saved?"&#128278;":"&#128278;"+(saved?"":" "))+"</span>";
  saveBtn.innerHTML=saved?"&#128278;":"&#9960;";
  saveBtn.title=saved?"Guardado":"Guardar";
  saveBtn.dataset.postId=post.id;saveBtn.dataset.saved=saved?"1":"0";
  saveBtn.addEventListener("click",function(){toggleSave(this);});
  saveBtn.style.marginLeft="auto";
  footer.appendChild(saveBtn);
  // Delete (own posts)
  if(isOwn){var delBtn=document.createElement("button");delBtn.className="action-btn";delBtn.textContent="🗑";delBtn.style.color="#ff2255";delBtn.dataset.postId=post.id;delBtn.addEventListener("click",function(){deletePost(this.dataset.postId);});footer.appendChild(delBtn);}
  // Report button (for others' posts)
  if(!isOwn&&currentUser){var repBtn=document.createElement("button");repBtn.className="action-btn";repBtn.innerHTML="&#8942;";repBtn.title="Reportar";repBtn.style.color="#5a8aaa";repBtn.dataset.postId=post.id;repBtn.dataset.userId=post.user_id;repBtn.addEventListener("click",function(){openReport(this.dataset.postId,"post",this.dataset.userId);});footer.appendChild(repBtn);}
  card.appendChild(footer);
  // Comments section
  var cmtSection=document.createElement("div");cmtSection.className="comments-section";cmtSection.id="comments-"+post.id;cmtSection.style.display="none";
  if(currentUser){
    var cmtForm=document.createElement("div");cmtForm.className="comment-form";
    var cmtAv=document.createElement("div");cmtAv.className="comment-av";if(currentProfile&&currentProfile.avatar_url){var cimg=document.createElement("img");cimg.src=currentProfile.avatar_url;cmtAv.appendChild(cimg);}else cmtAv.textContent=(currentProfile?.username||"?")[0].toUpperCase();
    var cmtInp=document.createElement("input");cmtInp.className="comment-inp";cmtInp.id="cmtinp-"+post.id;cmtInp.placeholder="Comenta algo...";
    cmtInp.addEventListener("keydown",function(e){if(e.key==="Enter")postComment(post.id);});
    var cmtSend=document.createElement("button");cmtSend.className="comment-send";cmtSend.textContent="▶";cmtSend.addEventListener("click",function(){postComment(post.id);});
    cmtForm.appendChild(cmtAv);cmtForm.appendChild(cmtInp);cmtForm.appendChild(cmtSend);cmtSection.appendChild(cmtForm);
  }
  var cmtList=document.createElement("div");cmtList.className="comment-list";cmtList.id="cmtlist-"+post.id;cmtSection.appendChild(cmtList);
  card.appendChild(cmtSection);
  return card;
}

async function checkFollowing(userId, btn) {
  if (!currentUser) return;
  var r = await sb.from("follows").select("id").eq("follower_id", currentUser.id).eq("following_id", userId).single();
  if (r.data) { btn.textContent = "Siguiendo"; btn.classList.add("following"); btn.dataset.following = "1"; }
}

async function toggleFollow(btn) {
  if (!currentUser) { window.location.href = "/"; return; }
  var uid = btn.dataset.uid;
  var isFollowing = btn.dataset.following === "1";
  if (isFollowing) {
    await sb.from("follows").delete().eq("follower_id", currentUser.id).eq("following_id", uid);
    btn.textContent = "Seguir"; btn.classList.remove("following"); btn.dataset.following = "0";
    showToast("Dejaste de seguir");
  } else {
    await sb.from("follows").insert({ follower_id: currentUser.id, following_id: uid });
    btn.textContent = "Siguiendo"; btn.classList.add("following"); btn.dataset.following = "1";
    showToast("\u2713 Ahora sigues a este creador");
  }
}

async function toggleLike(btn) {
  if (!currentUser) { window.location.href = "/"; return; }
  var postId = btn.dataset.postId;
  var liked = btn.dataset.liked === "1";
  var countEl = btn.querySelector(".like-count");
  var count = parseInt(countEl.textContent) || 0;
  if (liked) {
    await sb.from("post_likes").delete().eq("user_id", currentUser.id).eq("post_id", postId);
    await sb.from("posts").update({ likes_count: Math.max(0, count - 1) }).eq("id", postId);
    btn.classList.remove("liked"); btn.dataset.liked = "0"; countEl.textContent = Math.max(0, count - 1);
  } else {
    await sb.from("post_likes").insert({ user_id: currentUser.id, post_id: postId });
    await sb.from("posts").update({ likes_count: count + 1 }).eq("id", postId);
    btn.classList.add("liked"); btn.dataset.liked = "1"; countEl.textContent = count + 1;
  }
}

async function deletePost(postId) {
  if (!confirm("\xBFBorrar esta publicaci\xF3n?")) return;
  await sb.from("posts").delete().eq("id", postId);
  var card = document.getElementById("post-" + postId);
  if (card) { card.style.opacity = "0"; card.style.transition = "opacity .3s"; setTimeout(function() { card.remove(); }, 300); }
}

document.getElementById("mediaInput").addEventListener("change", function() {
  mediaFile = this.files[0];
  var preview = document.getElementById("mediaPreview");
  if (!mediaFile) { preview.style.display = "none"; return; }
  preview.innerHTML = "";
  preview.style.display = "block";
  var url = URL.createObjectURL(mediaFile);
  if (mediaFile.type.startsWith("video")) {
    var vid = document.createElement("video"); vid.src = url; vid.controls = true; preview.appendChild(vid);
  } else {
    var img = document.createElement("img"); img.src = url; preview.appendChild(img);
  }
});

async function submitPost() {
  var text = document.getElementById("postText").value.trim();
  if (!text && !mediaFile) { showToast("Escribe algo o sube una foto", true); return; }
  if (!currentUser) return;
  var btn = document.getElementById("submitPostBtn");
  btn.disabled = true; btn.textContent = "Publicando...";
  try {
    var mediaUrl = null, mediaType = "image";
    if (mediaFile) {
      var ext = mediaFile.name.split(".").pop();
      var path = "posts/" + currentUser.id + "/" + Date.now() + "." + ext;
      var up = await sb.storage.from("media").upload(path, mediaFile, { upsert: true });
      if (up.error) throw new Error(up.error.message);
      mediaUrl = sb.storage.from("media").getPublicUrl(path).data.publicUrl;
      mediaType = mediaFile.type.startsWith("video") ? "video" : "image";
    }
    var isPremium=document.getElementById("isPremiumCheck")&&document.getElementById("isPremiumCheck").checked;
    var r = await sb.from("posts").insert({ user_id: currentUser.id, content: text || null, media_url: mediaUrl, media_type: mediaType, is_premium: isPremium });
    if (r.error) throw new Error(r.error.message);
    document.getElementById("postText").value = "";
    mediaFile = null;
    document.getElementById("mediaPreview").style.display = "none";
    document.getElementById("mediaInput").value = "";
    showToast("\u2713 Publicado!");
    loadFeed(curTab);
  } catch(e) {
    showToast("Error: " + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = "Publicar";
  }
}

function doLogout() { sb.auth.signOut().then(function() { window.location.href = "/"; }); }

function getTimeAgo(ts) {
  var diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return "ahora";
  if (diff < 3600) return Math.floor(diff/60) + "m";
  if (diff < 86400) return Math.floor(diff/3600) + "h";
  return Math.floor(diff/86400) + "d";
}

function showToast(msg, err) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.style.borderColor = err ? "#ff2255" : "#00ff88"; t.style.color = err ? "#ff2255" : "#00ff88";
  t.style.display = "block"; setTimeout(function() { t.style.display = "none"; }, 2500);
}

// COMENTARIOS
// =============================================
var _openComments = {};

async function toggleComments(postId, btn){
  var section = document.getElementById("comments-"+postId);
  if(!section) return;
  if(section.style.display==="none"||section.style.display===""){
    section.style.display="block";
    btn.textContent="Ocultar comentarios";
    if(!section.dataset.loaded){
      section.dataset.loaded="1";
      await loadComments(postId);
      subscribeComments(postId);
    }
  } else {
    section.style.display="none";
    btn.textContent="&#128172; Ver comentarios";
  }
}

async function loadComments(postId){
  var list = document.getElementById("cmtlist-"+postId);
  if(!list) return;
  var r = await sb.from("comments").select("*").eq("post_id",postId).order("created_at",{ascending:true}).limit(20);
  list.innerHTML="";
  (r.data||[]).forEach(function(c){ list.appendChild(buildComment(c)); });
}

function buildComment(c){
  var item = document.createElement("div"); item.className="comment-item"; item.id="cmt-"+c.id;
  var av = document.createElement("div"); av.className="comment-av";
  if(c.avatar_url){var img=document.createElement("img");img.src=c.avatar_url;av.appendChild(img);}
  else av.textContent=(c.username||"?")[0].toUpperCase();
  var body = document.createElement("div"); body.className="comment-body";
  var name = document.createElement("div"); name.className="comment-name"; name.textContent="@"+(c.username||"usuario");
  var text = document.createElement("div"); text.className="comment-text"; text.textContent=c.content;
  var time = document.createElement("div"); time.className="comment-time"; time.textContent=getTimeAgo(c.created_at);
  body.appendChild(name); body.appendChild(text); body.appendChild(time);
  item.appendChild(av); item.appendChild(body);
  return item;
}

async function postComment(postId){
  var inp = document.getElementById("cmtinp-"+postId);
  var content = inp ? inp.value.trim() : "";
  if(!content||!currentUser) return;
  inp.value="";
  var username = currentProfile?.username||"usuario";
  var avatar = currentProfile?.avatar_url||null;
  var r = await sb.from("comments").insert({post_id:postId,user_id:currentUser.id,username:username,avatar_url:avatar,content:content});
  if(r.error) showToast("Error: "+r.error.message,true);
}

function subscribeComments(postId){
  sb.channel("comments-"+postId).on("postgres_changes",{event:"INSERT",schema:"public",table:"comments",filter:"post_id=eq."+postId},function(p){
    var list=document.getElementById("cmtlist-"+postId);
    if(list) list.appendChild(buildComment(p.new));
  }).subscribe();
}

// Show premium toggle for creators

async function toggleSave(btn){
  if(!currentUser){showToast("Inicia sesión para guardar",true);return;}
  var postId=btn.dataset.postId;
  var isSaved=btn.dataset.saved==="1";
  if(isSaved){
    await sb.from("bookmarks").delete().eq("user_id",currentUser.id).eq("post_id",postId);
    btn.innerHTML="☆";btn.title="Guardar";btn.dataset.saved="0";btn.classList.remove("liked");
    showToast("Eliminado de guardados");
  } else {
    await sb.from("bookmarks").insert({user_id:currentUser.id,post_id:postId});
    btn.innerHTML="&#128278;";btn.title="Guardado";btn.dataset.saved="1";btn.classList.add("liked");
    showToast("\u2713 Post guardado");
  }
}

async function sharePost(postId, username){
  var url=window.location.origin+"/feed.html?post="+postId;
  if(navigator.share){
    try{await navigator.share({title:"@"+username+" en SHADOWNET",url:url});
      await sb.from("posts").update({shares_count:1}).eq("id",postId);
    }catch(e){}
  } else {
    navigator.clipboard.writeText(url).then(function(){showToast("\u2713 Link copiado al portapapeles");}).catch(function(){showToast("Link: "+url);});
    await sb.from("posts").update({shares_count:1}).eq("id",postId);
  }
}

function openReport(contentId, contentType, reportedUserId){
  if(!currentUser){ showToast("Inicia sesion para reportar", true); return; }
  document.getElementById("reportContentId").value = contentId;
  document.getElementById("reportContentType").value = contentType;
  document.getElementById("reportedUserId").value = reportedUserId||"";
  document.getElementById("reportReason").value = "";
  document.getElementById("reportDesc").value = "";
  document.getElementById("reportMsg").style.display = "none";
  document.getElementById("reportModal").classList.add("open");
}

async function submitReport(){
  var reason = document.getElementById("reportReason").value;
  var desc = document.getElementById("reportDesc").value.trim();
  var contentId = document.getElementById("reportContentId").value;
  var contentType = document.getElementById("reportContentType").value;
  var reportedUserId = document.getElementById("reportedUserId").value;
  var msg = document.getElementById("reportMsg");
  if(!reason){ msg.textContent="Selecciona un motivo"; msg.style.color="#ff2255"; msg.style.display="block"; return; }
  var r = await sb.from("reports").insert({
    reporter_id: currentUser.id,
    reported_user_id: reportedUserId||null,
    content_type: contentType,
    content_id: contentId,
    reason: reason,
    description: desc||null
  });
  if(r.error){ msg.textContent="Error: "+r.error.message; msg.style.color="#ff2255"; msg.style.display="block"; return; }
  document.getElementById("reportModal").classList.remove("open");
  showToast("\u2713 Reporte enviado. Lo revisaremos pronto.");
}

// =============================================
// SISTEMA DE REPORTES
// =============================================
var _reportPostId = null;
var _reportUserId = null;
var _reportReason = null;
var REPORT_REASONS = [
  {id:"spam",icon:"\uD83D\uDCE3",label:"Spam o publicidad"},
  {id:"nudity",icon:"\uD83D\uDEAB",label:"Desnudez no autorizada"},
  {id:"harassment",icon:"\u26A0\uFE0F",label:"Acoso o bullying"},
  {id:"fake",icon:"\uD83D\uDC64",label:"Cuenta o contenido falso"},
  {id:"violence",icon:"\uD83D\uDCA5",label:"Violencia o contenido peligroso"},
  {id:"minors",icon:"\uD83D\uDEE1\uFE0F",label:"Contenido con menores"},
  {id:"other",icon:"\u2753",label:"Otro motivo"}
];

function openReport(postId, userId){
  _reportPostId=postId; _reportUserId=userId; _reportReason=null;
  var reasons=document.getElementById("reportReasons");
  reasons.innerHTML="";
  REPORT_REASONS.forEach(function(r){
    var item=document.createElement("div");item.className="report-reason";item.dataset.id=r.id;
    item.innerHTML="<span class=\"report-reason-icon\">"+r.icon+"</span>"+r.label;
    item.addEventListener("click",function(){
      document.querySelectorAll(".report-reason").forEach(function(el){el.classList.remove("sel");});
      this.classList.add("sel");
      _reportReason=this.dataset.id;
      document.getElementById("rptSubmitBtn").disabled=false;
      var det=document.getElementById("reportDetail");
      det.classList.toggle("show",_reportReason==="other");
    });
    reasons.appendChild(item);
  });
  document.getElementById("reportDetail").value="";
  document.getElementById("reportDetail").classList.remove("show");
  document.getElementById("rptSubmitBtn").disabled=true;
  document.getElementById("reportModal").classList.add("open");
}

function closeReport(){
  document.getElementById("reportModal").classList.remove("open");
  _reportPostId=null; _reportUserId=null; _reportReason=null;
}

async function submitReport(){
  if(!currentUser||!_reportReason) return;
  var details=document.getElementById("reportDetail").value.trim();
  var r=await sb.from("reports").insert({
    reporter_id:currentUser.id,
    reported_user_id:_reportUserId||null,
    post_id:_reportPostId||null,
    reason:_reportReason,
    details:details||null
  });
  closeReport();
  if(r.error){showToast("Error al enviar reporte",true);}
  else{showToast("\u2713 Reporte enviado. Gracias.");}
}

// Close menu when clicking outside
document.addEventListener("click",function(e){
  if(!e.target.closest(".post-menu")&&!e.target.closest(".post-menu-btn")){
    document.querySelectorAll(".post-menu").forEach(function(m){m.remove();});
  }
});

function openPostMenu(btn){
  document.querySelectorAll(".post-menu").forEach(function(m){m.remove();});
  var postId=btn.dataset.postId;
  var postUser=btn.dataset.postUser;
  var isOwn=currentUser&&postUser===currentUser.id;
  var menu=document.createElement("div");menu.className="post-menu";
  if(!isOwn){
    var reportItem=document.createElement("div");reportItem.className="post-menu-item";
    reportItem.innerHTML="\u26A0\uFE0F Reportar";
    reportItem.addEventListener("click",function(){menu.remove();openReport(postId,postUser);});
    menu.appendChild(reportItem);
  }
  var shareItem=document.createElement("div");shareItem.className="post-menu-item";
  shareItem.innerHTML="\uD83D\uDD17 Copiar link";
  shareItem.addEventListener("click",function(){menu.remove();sharePost(postId,"usuario");});
  menu.appendChild(shareItem);
  if(isOwn){
    var delItem=document.createElement("div");delItem.className="post-menu-item";
    delItem.style.color="#ff2255";
    delItem.innerHTML="\uD83D\uDDD1 Eliminar post";
    delItem.addEventListener("click",function(){menu.remove();deletePost(postId);});
    menu.appendChild(delItem);
  }
  btn.parentNode.appendChild(menu);
}
</script>
