// Cross-platform camera helper
const getCameraStream = async (audioNeeded) => {
  // Check API availability
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    throw new Error("API de cámara no disponible en este navegador.");
  }
  const isMob = typeof navigator !== "undefined" &&
    (navigator.maxTouchPoints > 0 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent));
  try {
    return await navigator.mediaDevices.getUserMedia({
      video: isMob ? { facingMode: "user" } : { width: { ideal: 640 }, height: { ideal: 480 } },
      audio: !!audioNeeded,
    });
  } catch(e1) {
    // Try minimal constraints as fallback
    try {
      return await navigator.mediaDevices.getUserMedia({ video: true, audio: !!audioNeeded });
    } catch(e2) {
      // Common reasons: NotAllowedError (permisos), NotFoundError (sin cámara),
      // NotReadableError (en uso), SecurityError (iframe sin allow="camera")
      const msg = e2.name === "NotAllowedError"   ? "Permiso de cámara denegado. Actívalo en Ajustes del navegador." :
                  e2.name === "NotFoundError"      ? "No se encontró cámara en este dispositivo." :
                  e2.name === "NotReadableError"   ? "La cámara está siendo usada por otra app." :
                  e2.name === "SecurityError"      ? "Cámara bloqueada por seguridad. Usa el modo demo." :
                  "Sin acceso a la cámara.";
      throw new Error(msg);
    }
  }
};

function AutoTimer({ delay, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, delay);
    return () => clearTimeout(t);
  }, []);
  return null;
}

function FGift({ gift, x, onDone }) {
  const [bot, sB] = useState(70);
  const [op,  sO] = useState(1);
  useEffect(() => {
    const t1 = setTimeout(() => sB(260), 60);
    const t2 = setTimeout(() => sO(0), 1600);
    const t3 = setTimeout(onDone, 2000);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, []);
  return (
    <div style={{
      position:"absolute", left:x, bottom:bot, zIndex:700, pointerEvents:"none",
      transition:"bottom 1.5s cubic-bezier(.1,1,.3,1), opacity 0.4s ease 1.5s",
      opacity:op, display:"flex", flexDirection:"column", alignItems:"center", gap:4,
    }}>
      <div style={{fontSize:44,filter:`drop-shadow(0 0 16px ${gift.color})`}}>{gift.emoji}</div>
      <div style={{
        background:`${gift.color}22`, border:`1px solid ${gift.color}`,
        color:gift.color, fontFamily:FF.u, fontWeight:600, fontSize:11,
        padding:"3px 10px", borderRadius:20, whiteSpace:"nowrap",
      }}>{gift.name}</div>
    </div>
  );

  const em = ["❤️‍🔥","🔥","💀","👑","⚡"][Math.floor(Math.random()*5)];

function DocUpload({ onDone, uploaded }) {
  const [drag,    sDrag]   = useState(false);
  const [scan,    sScan]   = useState(false);
  const [prog,    sProg]   = useState(0);
  const [preview, sPreview]= useState(null);
  const uidRef = useRef("doc_" + Math.random().toString(36).slice(2));
  const uid = uidRef.current;

  const processFile = file => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => sPreview(ev.target.result);
    reader.readAsDataURL(file);
    sScan(true);
    sProg(0);
    let p = 0;
    const iv = setInterval(() => {
      p += 3 + Math.random() * 4;
      sProg(Math.min(p, 98));
      if (p >= 100) {
        clearInterval(iv);
        sScan(false);
        sProg(100);
        onDone(file.name);
      }
    }, 80);
  };

  useEffect(() => {
    const h = e => {
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.startsWith("image")) {
          const f = items[i].getAsFile();
          if (f) processFile(f);
        }
      }
    };
    window.addEventListener("paste", h);
    return () => window.removeEventListener("paste", h);
  }, []);

  if (scan) return (
    <div style={{textAlign:"center",padding:16}}>
      {preview && (
        <div style={{position:"relative",width:"100%",maxWidth:200,height:110,margin:"0 auto 12px",borderRadius:8,overflow:"hidden"}}>
          <img src={preview} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          <div style={{position:"absolute",inset:0,background:"#00000055"}}>
            <div style={{position:"absolute",left:0,right:0,top:`${prog}%`,height:3,background:T.teal,boxShadow:`0 0 10px ${T.teal}`,transition:"top 0.08s"}}/>
          </div>
        </div>
      )}
      <div style={{fontFamily:FF.u,fontWeight:700,fontSize:13,color:T.teal,letterSpacing:"0.1em",marginBottom:8}}>
        ESCANEANDO DOCUMENTO...
      </div>
      <PBar pct={prog} col={T.teal} h={4}/>
      <div style={{fontFamily:FF.u,fontSize:11,color:T.t2,marginTop:6}}>{Math.round(prog)}%</div>
    </div>
  );

  if (uploaded) return (
    <div style={{background:`${T.green}10`,border:`1px solid ${T.green}44`,borderRadius:10,padding:12,display:"flex",alignItems:"center",gap:12}}>
      {preview && <img src={preview} alt="" style={{width:52,height:38,objectFit:"cover",borderRadius:6}}/>}
      <div style={{flex:1}}>
        <div style={{fontFamily:FF.u,fontWeight:700,fontSize:12,color:T.green}}>✓ DOCUMENTO CARGADO</div>
        <div style={{fontFamily:FF.u,fontSize:10,color:T.t2,marginTop:2}}>{uploaded}</div>
      </div>
      <button onClick={() => { onDone(null); sPreview(null); }}
        style={{background:`${T.red}10`,border:`1px solid ${T.red}44`,color:T.red,fontFamily:FF.u,fontWeight:700,fontSize:10,padding:"5px 12px",borderRadius:4,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.06em"}}>
        Cambiar
      </button>
    </div>
  );

  const DEMOS = [
    {name:"cedula.jpg",   label:"🪪 Cédula",    col:T.orange},
    {name:"pasaporte.jpg",label:"📘 Pasaporte",  col:T.blue  },
    {name:"licencia.jpg", label:"🚗 Licencia",   col:T.green },
    {name:"residencia.jpg",label:"🏠 Residencia",col:T.purple},
  ];

  return (
    <div>
      {/* Label-based file picker — the ONLY reliable approach on all platforms.
          The label IS the clickable zone. Clicking it natively opens the file picker
          on iOS Safari, Android Chrome, macOS, Windows — no JS .click() needed. */}
      <label
        htmlFor={uid}
        onDragOver={e => { e.preventDefault(); sDrag(true); }}
        onDragLeave={() => sDrag(false)}
        onDrop={e => { e.preventDefault(); sDrag(false); const f=e.dataTransfer.files[0]; if(f) processFile(f); }}
        style={{
          display:"block",
          background: drag ? `${T.teal}15` : T.card,
          border:`2px dashed ${drag ? T.teal : T.border}`,
          borderRadius:10, padding:"22px 16px", textAlign:"center",
          marginBottom:12, cursor:"pointer",
          transition:"all 0.2s",
          boxShadow: drag ? `0 0 20px ${T.teal}33` : "none",
        }}>
        {/* Hidden input INSIDE label — guaranteed to work on all browsers */}
        <input
          id={uid}
          type="file"
          accept="image/*,application/pdf"
          style={{display:"none"}}
          onChange={e => { const f=e.target.files&&e.target.files[0]; if(f) processFile(f); e.target.value=""; }}
        />
        <div style={{fontSize:30,marginBottom:8,pointerEvents:"none",filter:drag?`drop-shadow(0 0 10px ${T.teal})`:"none"}}>
          📁
        </div>
        <div style={{fontFamily:FF.u,fontWeight:700,fontSize:14,color:drag?T.teal:T.t1,letterSpacing:"0.06em",marginBottom:4,pointerEvents:"none"}}>
          {drag ? "Suelta aquí ↓" : "Toca para subir documento"}
        </div>
        <div style={{fontFamily:FF.u,fontSize:10,color:T.t2,letterSpacing:"0.04em",pointerEvents:"none"}}>
          Imagen · PDF · Arrastra · Pega Ctrl+V
        </div>
      </label>

      {/* Demo buttons */}
      <div style={{fontFamily:FF.u,fontWeight:600,fontSize:10,color:T.t3,marginBottom:6,letterSpacing:"0.1em",textTransform:"uppercase"}}>
        Probar con demo:
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {DEMOS.map(d => (
          <button key={d.name}
            onClick={() => processFile(new File(["demo"], d.name, {type:"image/jpeg"}))}
            style={{background:`${d.col}12`,border:`1.5px solid ${d.col}44`,borderRadius:8,padding:"10px 8px",cursor:"pointer",fontFamily:FF.u,fontWeight:700,fontSize:11,color:d.col,letterSpacing:"0.06em",textTransform:"uppercase"}}
            onMouseEnter={e=>{e.currentTarget.style.background=`${d.col}25`;e.currentTarget.style.borderColor=d.col;}}
            onMouseLeave={e=>{e.currentTarget.style.background=`${d.col}12`;e.currentTarget.style.borderColor=`${d.col}44`;}}>
            {d.label}
          </button>
        ))}
      </div>
    </div>
  );
}

function LiveScreen({ stream, onClose, coins, setCoins }) {
  const videoRef  = useRef(null);
  const streamRef = useRef(null);
  const chatRef   = useRef(null);
  const fidRef    = useRef(0);
  const tapRef    = useRef(0);

  const [msgs,       sMsgs]    = useState([
    {id:1,user:"soul_hunter",  text:"🔥🔥 INCREÍBLE!", col:T.orange},
    {id:2,user:"dark_acolyte", text:"Te ofrezco mi alma 💀",col:T.gold},
  ]);
  const [txt,        sTxt]     = useState("");
  const [showGifts,  sGifts]   = useState(false);
  const [showFX,     sFX]      = useState(false);
  const [showFan,    sFan]     = useState(false);
  const [showMissions,sMiss]   = useState(false);
  const [showCohosts,sCH]      = useState(false);
  const [activeFace, sAFace]   = useState("none");
  const [activeScr,  sAScr]    = useState("none");
  const [floaters,   sFloat]   = useState([]);
  const [taps,       sTaps]    = useState([]);
  const [earn,       sEarn]    = useState(stream.earn);
  const [viewers,    sView]    = useState(stream.viewers);
  const [myPts,      setMyPts] = useState(0);
  const [tapCount,   setTC]    = useState(0);
  const [camOn,      setCamOn] = useState(false);
  const [camErr,     setCamErr]= useState("");
  const [cohosts,    setCH2]   = useState([]);
  const [isFanMember,setFanM] = useState(false);
  const [stats,      setStats] = useState({
    duration:0, newFollowers:0, giftsReceived:0,
    tapCount:0, viewers:stream.viewers, diamonds:0,
  });
  const [mDone, setMDone] = useState({});

  // Timer
  useEffect(() => {
    const iv = setInterval(() => {
      setStats(s => {
        const d = s.duration + 1;
        const newDone = {...mDone};
        let changed = false;
        LIVE_MISSIONS.forEach(m => {
          if (!newDone[m.id]) {
            const val = m.key==="duration" ? d : (s[m.key]||0);
            if (val >= m.target) { newDone[m.id]=true; changed=true; }
          }
        });
        if (changed) setMDone(newDone);
        return {...s, duration:d};
      });
    }, 1000);
    return () => clearInterval(iv);
  }, [mDone]);

  // Chat simulation
  useEffect(() => {
    const us = ["soul_99","dark_fan","phantom_z","hellion_x"];
    const tx = ["🔥🔥","INCREÍBLE!","💀💀","eres la mejor","👑","❤️‍🔥"];
    const iv = setInterval(() => {
      sMsgs(p => [...p.slice(-30), {
        id:Date.now(),
        user: us[Math.floor(Math.random()*us.length)],
        text: tx[Math.floor(Math.random()*tx.length)],
        col: [T.orange,T.gold,T.red,"#cc0088"][Math.floor(Math.random()*4)],
      }]);
      sView(v => Math.max(10, v + Math.floor(Math.random()*14-5)));
    }, 2200);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [msgs]);

  const startCam = async () => {
    try {
      const s = await getCameraStream(true);
      streamRef.current = s;
      if (videoRef.current) { videoRef.current.srcObject = s; videoRef.current.play().catch(()=>{}); }
      setCamOn(true); setCamErr("");
    } catch(e) { setCamErr(e.message || "Sin acceso a cámara. Verifica los permisos."); }
  };
  const stopCam = () => {
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    streamRef.current = null;
    if (videoRef.current) videoRef.current.srcObject = null;
    setCamOn(false);
  };
  useEffect(() => () => {
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
  }, []);

  const sendGift = (g, qty=1) => {
    const total = g.coins * qty;
    if (coins < total) return;
    setCoins(c => c - total);
    sEarn(e => +(e + g.val*qty*0.60).toFixed(2));
    // Fan gifts give x1.5 pts, special join gift gives x2
    const mult = g.special ? 2 : g.fanGift ? 1.5 : 1;
    const ptsGain = Math.round(g.pts * qty * mult);
    setMyPts(p => p + ptsGain);
    // Fan club membership via MIÉNTEME gift
    if (g.fanJoin || g.special) setFanM(true);
    const dias = Math.round(g.val * qty * 10);
    setStats(s => {
      const ng = s.giftsReceived + qty;
      const nd = s.diamonds + dias;
      const newDone = {...mDone};
      let changed = false;
      LIVE_MISSIONS.forEach(m => {
        if (!newDone[m.id]) {
          const val = m.key==="giftsReceived" ? ng : m.key==="diamonds" ? nd : s[m.key];
          if (val >= m.target) { newDone[m.id]=true; changed=true; }
        }
      });
      if (changed) setMDone(newDone);
      return {...s, giftsReceived:ng, diamonds:nd};
    });
    for (let i=0; i<Math.min(qty,3); i++) {
      const id = ++fidRef.current;
      const x  = Math.floor(Math.random()*180+30);
      setTimeout(() => sFloat(f => [...f, {id,g,x}]), i*200);
    }
    sMsgs(p => [...p, {
      id:Date.now(), user:"tú",
      text:`${g.emoji}×${qty} ofreció ${g.name}${g.team?" ⭐":""} (+${fmt(ptsGain)}pts)`,
      col:g.color, isGift:true,
    }]);
  };

  const handleTap = useCallback(e => {
    const rect = e.currentTarget.getBoundingClientRect();
    const id = ++tapRef.current;
    sTaps(t => [...t, {id, x:e.clientX-rect.left, y:e.clientY-rect.top}]);
    setTC(c => c+1);
    if (tapRef.current % 10 === 0) sView(v => v+1);
    setStats(s => {
      const nt = s.tapCount + 1;
      const newDone = {...mDone};
      if (!newDone["tap50"] && nt >= 50) { newDone["tap50"]=true; setMDone(newDone); }
      return {...s, tapCount:nt};
    });
  }, [mDone]);

  const rank        = getRank(myPts);
  const colored     = rank.level >= 10;
  const doneCnt     = Object.values(mDone).filter(Boolean).length;
  const estPct      = Math.min(40, LIVE_MISSIONS.filter(m=>mDone[m.id]).reduce((s,m)=>s+m.pct,20));

  const fmtTime = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  const screenStyle = {
    fire:   {background:`linear-gradient(160deg,${T.red}33,${T.orange}11)`},
    green:  {background:"rgba(0,200,0,0.4)"},

// ── AGE GATE ──────────────────────────────────────────────────────────────────
function AgeGate({ onPass }) {
  const [step,      sStep]   = useState("warn");
  const [docType,   sDT]     = useState(null);
  const [fields,    sF]      = useState({});
  const [photo,     sPh]     = useState(null);
  const [faceOk,    sFK]     = useState(false);
  const [err,       sErr]    = useState("");
  const [prog,      sProg]   = useState(0);
  const [aiS,       sAiS]    = useState(0);
  const [camStream, setCamS] = useState(null);
  const [camErr,    sCamErr] = useState("");
  const [faceAnim,  setFAnim]= useState(0);
  const videoRef   = useRef(null);
  const faceScanRef= useRef(null);

  const AI_STEPS = [
    "📄 Leyendo documento...",
    "🔍 Extrayendo datos...",
    "📅 Verificando fecha de nacimiento...",
    "🤖 Cotejando biometría...",
    "🛡️ Comprobando autenticidad...",
    "✅ Sellando acceso...",
  ];

  // Start camera for face scan
  const startFaceCam = () => {
    sCamErr("");
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      sCamErr("Sin soporte de cámara. Usa Chrome, Firefox o Safari.");
      return;
    }
    getCameraStream(false)
      .then(stream => {
        setCamS(stream);
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.play().catch(() => {});
        }
        // Start face animation scan after 500ms
        setTimeout(() => {
          let p = 0;
          faceScanRef.current = setInterval(() => {
            p += 1.4 + Math.random();
            setFAnim(Math.min(p, 100));
            if (p >= 100) {
              clearInterval(faceScanRef.current);
              // Stop camera
              stream.getTracks().forEach(t => t.stop());
              setCamS(null);
              setTimeout(() => { sFK(true); sStep("review"); }, 600);
            }
          }, 60);
        }, 500);
      })
      .catch(err => {
        sCamErr(err.message || "Sin acceso a la cámara.");
        setTimeout(() => { sCamErr(""); skipFaceCam(); }, 2500);
      });;
  };

  const skipFaceCam = () => {
    if (camStream) camStream.getTracks().forEach(t => t.stop());
    if (faceScanRef.current) clearInterval(faceScanRef.current);
    sFK(true);
    sStep("review");
  };

  useEffect(() => {
    return () => {
      if (camStream) camStream.getTracks().forEach(t => t.stop());
      if (faceScanRef.current) clearInterval(faceScanRef.current);
    };
  }, [camStream]);

  const doScan = () => {
    sStep("processing");
    sProg(0);
    sAiS(0);
    let pct = 0, stage = 0;
    const iv = setInterval(() => {
      pct += Math.random()*3 + 1.5;
      const ns = Math.min(Math.floor(pct/17), AI_STEPS.length-1);
      if (ns !== stage) { stage = ns; sAiS(ns); }
      sProg(Math.min(pct, 100));
      if (pct >= 100) {
        clearInterval(iv);
        const dob = fields["Fecha de nacimiento"] || "01/01/2000";
        const parts = dob.split("/");
        let ok = true;
        if (parts.length === 3) {
          const b = new Date(+parts[2], +parts[1]-1, +parts[0]);
          ok = (Date.now()-b) / (365.25*24*3600*1e3) >= 18;
        }
        setTimeout(() => sStep(ok ? "approved" : "blocked"), 600);
      }
    }, 120);
  };

  const submit = () => {
    const dt = ID_TYPES.find(t => t.id===docType);
    if (!dt) { sErr("Selecciona un tipo de documento."); return; }
    // Only require photo and face - fields are optional (simulate real behavior)
    if (!photo)  { sErr("Sube o fotografía tu documento."); return; }
    if (!faceOk) { sErr("Completa el reconocimiento facial."); return; }
    sErr("");
    doScan();
  };

  const bs = {
    position:"fixed", inset:0, background:T.bg, zIndex:9999,
    display:"flex", flexDirection:"column",
    alignItems:"center", justifyContent:"center",
    padding:28, overflowY:"auto",
  };

  // ── BLOCKED ─────────────────────────────────────────────────────────────────
  if (step==="blocked") return (
    <div style={{...bs, textAlign:"center"}}>
      <div style={{fontSize:64,marginBottom:12}}>🚫</div>
      <div style={{fontFamily:FF.u,fontWeight:800,fontSize:24,color:T.red,letterSpacing:"0.1em"}}>ACCESO DENEGADO</div>
      <div style={{fontFamily:FF.u,fontSize:13,color:T.t2,marginTop:8,letterSpacing:"0.06em"}}>Debes tener 18 años o más.</div>
      <button onClick={() => sStep("warn")}
        style={{marginTop:24,background:`${T.red}18`,border:`1px solid ${T.red}44`,color:T.red,fontFamily:FF.u,fontWeight:700,fontSize:12,padding:"10px 24px",borderRadius:4,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>
        ← Volver
      </button>
    </div>
  );

  // ── APPROVED ────────────────────────────────────────────────────────────────
  if (step==="approved") return (
    <div style={{...bs, textAlign:"center"}}>
      <div style={{fontSize:64,marginBottom:12,animation:"gFloat 2s ease-in-out infinite"}}>🔐</div>
      <div style={{fontFamily:FF.d,fontSize:26,color:T.cyan,marginBottom:6,letterSpacing:"0.16em",textShadow:`0 0 20px ${T.cyan}`}}>
        IDENTIDAD SELLADA
      </div>
      <div style={{fontFamily:FF.u,fontWeight:600,fontSize:13,color:T.teal,letterSpacing:"0.12em",marginBottom:6}}>
        ACCESO CONCEDIDO
      </div>
      <div style={{fontFamily:FF.b,fontSize:13,color:T.t2,fontStyle:"italic",marginBottom:28,lineHeight:1.8}}>
        Bienvenido al sistema. Sin límites.
      </div>
      <RBtn col={T.cyan} onClick={onPass} style={{fontSize:14,padding:"14px 40px"}}>
        ENTRAR → SHADOWNET
      </RBtn>
    </div>
  );

  // ── PROCESSING ──────────────────────────────────────────────────────────────
  if (step==="processing") return (
    <div style={bs}>
      <div style={{maxWidth:340,width:"100%",textAlign:"center"}}>
        <div style={{fontFamily:FF.u,fontWeight:800,fontSize:18,color:T.cyan,letterSpacing:"0.12em",marginBottom:16}}>
          PROCESANDO CON IA
        </div>
        <DCard glow={T.teal} style={{padding:16,marginBottom:14}}>
          <div style={{fontFamily:FF.u,fontSize:12,color:T.teal,letterSpacing:"0.1em",minHeight:32,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {AI_STEPS[aiS]}
          </div>
        </DCard>
        <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:16,textAlign:"left"}}>
          {AI_STEPS.map((s,i) => (

// ── VERIFY FACE MODAL (shared, top-level) ────────────────────────────────────
function VerifyFaceModal({ onDone }) {
  const [stream,   setStream] = useState(null);
  const [progress, setProgress]= useState(0);
  const [status,   setStatus] = useState("idle");
  const [camErr,   setCamErr] = useState("");
  const videoRef  = useRef(null);
  const timerRef  = useRef(null);

  const start = () => {
    setCamErr("");
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setCamErr("Sin soporte de cámara. Usa Chrome, Firefox o Safari.");
      return;
    }
    getCameraStream(false)
      .then(s => {
        setStream(s);
        setStatus("scanning");
        if (videoRef.current) { videoRef.current.srcObject = s; videoRef.current.play().catch(()=>{}); }
        let p = 0;
        timerRef.current = setInterval(() => {
          p += 1.2 + Math.random();
          setProgress(Math.min(p, 100));
          if (p >= 100) {
            clearInterval(timerRef.current);
            s.getTracks().forEach(t => t.stop());
            setStatus("done");
            setTimeout(onDone, 800);
          }
        }, 60);
      })
      .catch(err => {
        setCamErr(err.message || "Sin acceso a la cámara.");
        // Auto-switch to demo after 2s so user isn't stuck
        setTimeout(() => { setCamErr(""); skipDemo(); }, 2500);
      });
  };

  const skipDemo = () => {
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (timerRef.current) clearInterval(timerRef.current);
    setStatus("done");
    setTimeout(onDone, 400);
  };

  useEffect(() => () => {
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (timerRef.current) clearInterval(timerRef.current);
  }, [stream]);

  return (
    <div style={{textAlign:"center"}}>
      <div style={{fontFamily:FF.u,fontWeight:700,fontSize:12,color:T.cyan,letterSpacing:"0.12em",marginBottom:14,textTransform:"uppercase"}}>
        Reconocimiento Facial IA
      </div>
      {/* Video circle */}
      <div style={{position:"relative",width:180,height:180,margin:"0 auto 14px",borderRadius:"50%",overflow:"hidden",border:`3px solid ${status==="done"?T.green:T.teal}`,boxShadow:`0 0 24px ${status==="done"?T.green:T.teal}55`}}>
        <video ref={el => { videoRef.current=el; if(el&&el.srcObject) el.play().catch(()=>{}); }}
          muted playsInline autoPlay
          style={{width:"100%",height:"100%",objectFit:"cover",transform:"scaleX(-1)",background:T.card}}/>
        {status==="idle" && (
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:T.card,flexDirection:"column",gap:8}}>
            <div style={{fontSize:40,opacity:0.4}}>👤</div>
            <div style={{fontFamily:FF.u,fontSize:9,color:T.t3,letterSpacing:"0.08em"}}>Toca activar</div>
          </div>
        )}
        {status==="scanning" && progress < 100 && (
          <div style={{position:"absolute",left:0,right:0,top:`${progress}%`,height:2,background:`linear-gradient(90deg,transparent,${T.cyan},transparent)`,boxShadow:`0 0 10px ${T.cyan}`,transition:"top 0.06s linear"}}/>
        )}
        {status==="done" && (
          <div style={{position:"absolute",inset:0,background:`${T.green}22`,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:48,filter:`drop-shadow(0 0 12px ${T.green})`}}>✅</div>
          </div>
        )}
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:T.border}}>
          <div style={{height:"100%",width:`${progress}%`,background:T.gCyan,transition:"width 0.06s"}}/>
        </div>
      </div>

      {camErr && (
        <div style={{background:`${T.red}12`,border:`1px solid ${T.red}44`,borderRadius:6,padding:"8px 12px",marginBottom:10,fontFamily:FF.u,fontSize:10,color:T.red,letterSpacing:"0.04em"}}>
          {camErr}
        </div>
      )}

      <div style={{fontFamily:FF.u,fontSize:11,color:status==="done"?T.green:status==="scanning"?T.teal:T.t2,letterSpacing:"0.08em",marginBottom:12,minHeight:18}}>
        {status==="idle"?"Listo para escanear":
         progress<40?"Detectando rostro...":
         progress<70?"Analizando 68 puntos biométricos...":
         progress<95?"Verificando identidad...":
         "✓ Identidad confirmada"}
      </div>

      {status==="idle" && (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <RBtn col={T.green} onClick={skipDemo} full>
            ✅ Verificación Demo (Recomendado)
          </RBtn>
          <button onClick={start}
            style={{background:`${T.blue}10`,border:`1px solid ${T.blue}33`,color:T.blue,fontFamily:FF.u,fontWeight:600,fontSize:10,padding:"9px 0",borderRadius:4,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>
            📷 Usar cámara real (requiere permisos)
          </button>
        </div>
      )}
      {status==="scanning" && (
        <div style={{fontFamily:FF.u,fontWeight:700,fontSize:18,color:T.cyan,letterSpacing:"0.1em",textShadow:`0 0 12px ${T.cyan}`}}>
          {Math.round(progress)}%
        </div>
      )}
    </div>
  );
}

function DMChat({ convo, onBack }) {
  const [msgs, sM] = useState([
    {id:1,from:"them",text:"Bienvenido al oscuro reino 💖",time:"10:20"},
    {id:2,from:"me",  text:"Eres increíble!",              time:"10:21"},
    {id:3,from:"them",text:"😈 Nuevos rituales esta noche...",time:"10:22"},
  ]);
  const [txt, sTxt] = useState("");
  const ref = useRef(null);
  useEffect(() => { if(ref.current) ref.current.scrollTop=ref.current.scrollHeight; }, [msgs]);
  const send = () => {
    if (!txt.trim()) return;
    sM(p => [...p, {id:Date.now(),from:"me",text:txt,time:clk()}]);
    sTxt("");
    setTimeout(() => {
      const r = ["🔥","Gracias alma!","❤️‍🔥","💀💀"];
      sM(p => [...p, {id:Date.now()+1,from:"them",text:r[Math.floor(Math.random()*r.length)],time:clk()}]);

  };

  if (!convo.sub) return (
    <div style={{position:"fixed",inset:0,zIndex:950,background:T.bg,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:12}}>

      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>🔒</div>
        <div style={{fontFamily:FF.u,fontWeight:700,fontSize:20,color:T.t1,marginBottom:8}}>Chat sellado</div>
        <div style={{fontFamily:FF.b,fontSize:13,color:T.t2,marginBottom:24,fontStyle:"italic"}}>
          Únete al culto de @{convo.user} para chatear.
        </div>
        {PLANS.map(p => (
          <div key={p.id} style={{width:"100%",background:T.card,border:`1.5px solid ${p.col}44`,borderRadius:14,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
            <div>
              <div style={{fontFamily:FF.u,fontWeight:700,fontSize:14,color:p.col}}>{p.icon} {p.name}</div>
              <div style={{fontFamily:FF.b,fontSize:12,color:T.t2,fontStyle:"italic"}}>{p.perks[0]}</div>

    <div style={{position:"fixed",inset:0,zIndex:950,background:T.bg,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:12,background:`${T.bg}f0`}}>
        <button onClick={onBack} style={{background:"transparent",border:"none",color:T.t2,fontSize:20,cursor:"pointer"}}>←</button>
        <Av init={convo.av} col={convo.col} size={36}/>

          <div style={{fontFamily:FF.u,fontWeight:700,fontSize:14,color:T.t1}}>@{convo.user}</div>

// ── STORY VIEWER ──────────────────────────────────────────────────────────────
function StoryViewer({ story, onClose, onNext, onPrev }) {
  const [prog,   sProg]  = useState(0);
  const [paused, setPaused] = useState(false);

  useEffect(() => {
    if (paused) return;
    const iv = setInterval(() => {
      sProg(p => {
        if (p >= 100) { onNext(); return 0; }
        return p + 2;
      });
    }, 100);
    return () => clearInterval(iv);
  }, [paused]);

  return (
    <div style={{position:"fixed",inset:0,zIndex:1800,background:T.bg,maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      {/* Progress bars */}
      <div style={{display:"flex",gap:3,padding:"12px 12px 8px",background:"linear-gradient(to bottom,#000000aa,transparent)"}}>
        <div style={{flex:1,height:3,background:"#ffffff44",borderRadius:2,overflow:"hidden"}}>
          <div style={{width:`${prog}%`,height:"100%",background:"#fff",borderRadius:2,transition:"width 0.1s"}}/>
        </div>
      </div>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"0 14px 10px"}}>
        <Av init={story.av} col={story.col} size={38}/>
        <div style={{flex:1}}>
          <div style={{fontFamily:FF.u,fontWeight:700,fontSize:13,color:"#fff"}}>@{story.user}</div>
          <div style={{fontFamily:FF.u,fontSize:11,color:"#ffffff88"}}>hace 2h</div>
        </div>
        <button onClick={onClose}
          style={{background:"transparent",border:"none",color:"#fff",fontSize:22,cursor:"pointer"}}>
          ✕
        </button>
      </div>
      {/* Story content */}
      <div style={{flex:1,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 50% 40%,${story.col}44,${T.bg})`}}
        onMouseDown={() => setPaused(true)}
        onMouseUp={() => setPaused(false)}
        onTouchStart={() => setPaused(true)}
        onTouchEnd={() => setPaused(false)}>
        <div style={{width:120,height:120,borderRadius:28,background:`linear-gradient(135deg,${story.col},${story.col}44)`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FF.l,fontSize:40,color:"#fff",border:`3px solid ${story.col}`,boxShadow:`0 0 60px ${story.col}66`}}>
          {story.av}
        </div>
        {/* Tap areas */}
        <div onClick={onPrev} style={{position:"absolute",left:0,top:0,width:"35%",height:"100%",cursor:"pointer"}}/>
        <div onClick={onNext} style={{position:"absolute",right:0,top:0,width:"35%",height:"100%",cursor:"pointer"}}/>
        <div style={{position:"absolute",bottom:60,left:0,right:0,textAlign:"center",fontFamily:FF.b,fontSize:16,color:"#fff",fontStyle:"italic",padding:"0 20px"}}>
          ❤️‍🔥 Una historia desde el abismo
        </div>
      </div>
      {/* Reply bar */}
      <div style={{padding:"12px 14px",background:"#000000aa",display:"flex",gap:8}}>
        <div style={{flex:1,background:"#ffffff22",border:"1px solid #ffffff44",borderRadius:20,display:"flex",alignItems:"center",paddingLeft:14}}>
          <input className="story-reply-input" placeholder="Responder a la historia..."
            style={{flex:1,background:"transparent",border:"none",color:"#fff",fontFamily:FF.b,fontSize:13,outline:"none",padding:"10px 0",fontStyle:"italic"}}/>
        </div>
        <button onClick={() => { const inp=document.querySelector(".story-reply-input"); if(inp){inp.value="";} }} style={{background:`linear-gradient(135deg,${T.cyan}cc,${T.blue}88)`,border:`1px solid ${T.teal}`,borderRadius:3,width:40,height:40,color:"#fff",fontSize:16,cursor:"pointer"}}>❤️</button>
      </div>
    </div>
  );
}

        @keyframes glowPulse{ 0%,100%{box-shadow:0 0 10px ${T.red}44} 50%{box-shadow:0 0 24px ${T.red}88} }
        @keyframes scanBar  { from{width:0} to{width:100%} }
        @keyframes gFloat   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        @keyframes gFlicker { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.92)} }
        @keyframes gSpin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes gPulse   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
        @keyframes gBubble  { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-6px) scale(1.1)} }
        @keyframes gOrbit   { 0%{transform:rotate(0deg) translateX(4px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(4px) rotate(-360deg)} }
        @keyframes gHeart   { 0%,100%{transform:scale(1)} 30%{transform:scale(1.3)} 60%{transform:scale(0.9)} }
        @keyframes gBurn    { 0%,100%{transform:scaleY(1);filter:drop-shadow(0 0 8px #ff6600)} 50%{transform:scaleY(1.2);filter:drop-shadow(0 0 16px #ff2200)} }
        @keyframes gFly     { 0%,100%{transform:translateY(0) rotate(0deg)} 25%{transform:translateY(-10px) rotate(-10deg)} 75%{transform:translateY(-5px) rotate(10deg)} }
        @keyframes gExplode { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
        @keyframes gStorm   { 0%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(1.2)} 100%{transform:rotate(360deg) scale(1)} }
        @keyframes gSlither { 0%,100%{transform:skewX(0deg)} 25%{transform:skewX(10deg)} 75%{transform:skewX(-10deg)} }
        @keyframes gRise    { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-12px) scale(1.15)} }
        @keyframes gSparkle { 0%,100%{filter:brightness(1) drop-shadow(0 0 4px currentColor)} 50%{filter:brightness(1.5) drop-shadow(0 0 12px currentColor)} }
        @keyframes gTentacle{ 0%,100%{transform:rotate(-15deg)} 50%{transform:rotate(15deg)} }
        @keyframes gRift    { 0%,100%{transform:scale(1) rotate(0deg)} 33%{transform:scale(1.1) rotate(-5deg)} 66%{transform:scale(0.95) rotate(5deg)} }
        @keyframes gLightning{0%,100%{opacity:1;filter:brightness(1)} 50%{opacity:0.4;filter:brightness(2)} }
        /* ── FUTURISTIC EFFECTS ── */
        @keyframes scanline  { 0%{transform:translateY(-100%)} 100%{transform:translateY(100vh)} }
        @keyframes neonFlare { 0%,100%{opacity:0.6;text-shadow:0 0 10px currentColor,0 0 20px currentColor} 50%{opacity:1;text-shadow:0 0 20px currentColor,0 0 40px currentColor,0 0 60px currentColor} }
        @keyframes hexPulse  { 0%,100%{box-shadow:0 0 8px currentColor,inset 0 0 8px currentColor} 50%{box-shadow:0 0 20px currentColor,inset 0 0 16px currentColor} }
        @keyframes dataFlow  { 0%{background-position:0 0} 100%{background-position:0 200px} }
        @keyframes glitchX   { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-2px)} 40%{transform:translateX(2px)} 60%{transform:translateX(-1px)} 80%{transform:translateX(1px)} }
        @keyframes borderRun { 0%{background-position:0 0} 100%{background-position:300% 0} }
        @keyframes fadeUp    { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes cyberPulse{ 0%,100%{box-shadow:0 0 5px #00e5ff33,0 0 10px #00e5ff22} 50%{box-shadow:0 0 15px #00e5ff66,0 0 30px #00e5ff33} }
        /* scrollbar */
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:#01020c}
        ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#0088ff,#00e5ff);border-radius:2px}
      `}</style>

      {showSet  && <SettingsPage onBack={() => sSet(false)}/>}
      {showN    && <NotifPanel onClose={() => sShowN(false)}/>}
      {showAI   && <AIChat onClose={() => sAI(false)}/>}
      {liveS    && <LiveScreen stream={liveS} onClose={() => sLive(null)} coins={coins} setCoins={sCoin}/>}

      {!showSet && !showN && !showAI && !liveS && (
        <>
          {/* Header */}
          <div style={{position:"sticky",top:0,background:`${T.bg}f0`,backdropFilter:"blur(20px)",borderBottom:`1px solid ${T.border}`,padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:100}}>
            <div style={{position:"absolute",bottom:0,left:0,right:0,height:"1px",background:`linear-gradient(90deg,transparent,${T.teal}55,${T.blue}55,transparent)`}}/>
            <div>
              <div style={{fontFamily:FF.d,fontSize:18,color:T.cyan,textShadow:`0 0 12px ${T.cyan},0 0 24px ${T.teal}88`,letterSpacing:"0.16em",lineHeight:1,fontWeight:800}}>
                SHADOWNET
              </div>
              <div style={{fontFamily:FF.u,fontSize:7,color:T.blue,letterSpacing:"0.28em",marginTop:2,textTransform:"uppercase",textShadow:`0 0 8px ${T.blue}`}}>
                SIN LÍMITES · SIN CADENAS
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:5,background:T.card,border:`1px solid ${T.border}`,borderRadius:20,padding:"5px 12px"}}>
                <span style={{fontSize:13}}>💀</span>
                <span style={{fontFamily:FF.u,fontWeight:700,fontSize:13,color:T.gold}}>{fmt(coins)}</span>
              </div>
              <button onClick={() => sAI(true)}
                style={{background:T.gFire,border:"none",borderRadius:"50%",width:36,height:36,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>
                🤖
              </button>
              <button onClick={() => sShowN(true)}
                style={{position:"relative",background:T.card,border:`1px solid ${T.border}`,borderRadius:"50%",width:36,height:36,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>
                🔔
                {unreadN>0 && <div style={{position:"absolute",top:-2,right:-2,background:T.red,color:"#fff",fontFamily:FF.u,fontWeight:700,fontSize:9,width:16,height:16,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{unreadN}</div>}
              </button>
              <button onClick={() => sTab("msgs")}
                style={{position:"relative",background:T.card,border:`1px solid ${T.border}`,borderRadius:"50%",width:36,height:36,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>
                💬
                {unreadM>0 && <div style={{position:"absolute",top:-2,right:-2,background:T.red,color:"#fff",fontFamily:FF.u,fontWeight:700,fontSize:9,width:16,height:16,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{unreadM}</div>}
              </button>
            </div>
          </div>

          {/* Content */}
          <div style={{padding:14,paddingBottom:100,position:"relative",zIndex:1}}>
            {tab==="home" && <FeedScreen/>}
            {tab==="explore" && (
              <div>
                <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,display:"flex",alignItems:"center",padding:"12px 16px",marginBottom:16,gap:10}}>
                  <span style={{fontSize:16,color:T.t3}}>🔍</span>
                  <input placeholder="Buscar almas y rituales..."
                    style={{flex:1,background:"transparent",border:"none",color:T.t1,fontFamily:FF.b,fontSize:14,outline:"none",fontStyle:"italic"}}/>
                </div>
                <div style={{fontFamily:FF.u,fontWeight:700,fontSize:14,color:T.t2,marginBottom:10}}>TRENDING</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
                  {["#SinCensura","#RitualesEnVivo","#AlmasLibres","#Adulto18+","#Ofrendas","#Fuego"].map(t => (
                    <Pill key={t} col={T.orange}>{t}</Pill>
                  ))}
                </div>
                {POSTS.map(p => (
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:12,marginBottom:10,cursor:"pointer"}}>
                    <Av init={p.av} col={p.ac} size={48} live={p.live}/>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:FF.u,fontWeight:700,fontSize:13,color:T.t1}}>@{p.user}</div>
                      <div style={{fontFamily:FF.b,fontSize:12,color:T.t2,fontStyle:"italic"}}>{fmt(p.l)} almas</div>
                    </div>
                    <RBtn sm col={followed[p.user]?T.green:T.teal} onClick={() => sFollowed(f=>({...f,[p.user]:!f[p.user]}))}>{followed[p.user]?"✓ Siguiendo":"+ Seguir"}</RBtn>
                  </div>
                ))}
              </div>
            )}
            {tab==="live"    && <LiveCenter onEnter={sLive}/>}
            {tab==="msgs"    && <DMList/>}
            {tab==="profile" && <ProfileView showSettings={() => sSet(true)}/>}
          </div>

          {/* FAB - Publicar */}
          <button onClick={() => sCmp(true)}
            style={{
              position:"fixed", bottom:90, right:16,
              width:52, height:52,
              clipPath:"polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%)",
              background:`linear-gradient(135deg,${T.cyan}cc,${T.blue}88)`,
              border:"none", color:"#fff", fontSize:20, cursor:"pointer",
              boxShadow:`0 0 20px ${T.cyan}66,0 0 40px ${T.cyan}33`,
              animation:"cyberPulse 2s infinite",
              zIndex:200, display:"flex", alignItems:"center", justifyContent:"center",
            }}>
            ✏️
          </button>

          {/* Bottom nav */}
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:`${T.bg}ee`,backdropFilter:"blur(20px)",borderTop:`1px solid ${T.border}`,display:"flex",zIndex:300}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:"1px",background:`linear-gradient(90deg,transparent,${T.teal}66,transparent)`}}/>
            {NAV.map(item => {
              const active = tab===item.id;
              return (
                <button key={item.id} onClick={() => sTab(item.id)}
                  style={{
                    flex:1, background:"transparent", border:"none",
                    color: active ? T.teal : T.t3, cursor:"pointer",
                    padding:"10px 0 12px", display:"flex", flexDirection:"column",
                    alignItems:"center", gap:3,
                    position:"relative",
                    transition:"all 0.2s",
                  }}>
                  {active && (
                    <div style={{position:"absolute",top:0,left:"20%",right:"20%",height:"2px",background:T.teal,boxShadow:`0 0 12px ${T.teal}`,borderRadius:"0 0 2px 2px"}}/>
                  )}
                  <span style={{fontSize:18,filter:active?`drop-shadow(0 0 8px ${T.teal})`:"none"}}>{item.icon}</span>
                  <span style={{fontFamily:FF.u,fontWeight:active?700:500,fontSize:8,letterSpacing:"0.1em",textTransform:"uppercase",textShadow:active?`0 0 8px ${T.teal}`:"none",whiteSpace:"nowrap"}}>
                    {item.label}
                  </span>
                </button>
              );
            })}
          </div>

          {showCompose && <ComposeModal onClose={() => sCmp(false)}/>}
        </>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ShadowNet/>);
  </script>
</body>
</html>
