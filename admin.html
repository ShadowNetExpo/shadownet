<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SHADOWNET Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#01020c;color:#e8f4ff;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#050d1a;border:1px solid #0d2744;border-radius:16px;padding:40px;width:100%;max-width:400px;}
.logo{font-size:26px;font-weight:900;letter-spacing:.15em;color:#ff2255;text-align:center;margin-bottom:4px;}
.sub{color:#3a6080;font-size:13px;text-align:center;margin-bottom:28px;}
input{width:100%;background:#0a1828;border:1px solid #0d2744;border-radius:8px;padding:12px 14px;color:#e8f4ff;font-family:'Rajdhani',sans-serif;font-size:15px;margin-bottom:12px;outline:none;display:block;}
input:focus{border-color:#ff2255;}
button{width:100%;background:linear-gradient(135deg,#ff2255,#cc0030);color:#fff;border:none;border-radius:8px;padding:13px;font-family:'Rajdhani',sans-serif;font-weight:800;font-size:15px;cursor:pointer;}
button:disabled{opacity:.6;cursor:not-allowed;}
.err{color:#ff2255;font-size:13px;margin-top:10px;text-align:center;min-height:20px;}
.info{color:#3a6080;font-size:12px;text-align:center;margin-top:12px;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">SHADOWNET</div>
  <div class="sub">Panel de Administracion</div>
  <input type="email" id="em" placeholder="mikymiky2201l@gmail.com" />
  <input type="password" id="pw" placeholder="Tu contrasena" />
  <button id="btn" onclick="doLogin()">ENTRAR AL PANEL</button>
  <div class="err" id="err"></div>
  <div class="info" id="info">Iniciando conexion...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var READY = false;
var SB_URL = 'https://cdokplvoqivducsqrejt.supabase.co';
var SB_KEY = 'sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su';
var ADMIN  = 'f8befa4f-08f8-4256-aa4e-1053d36a12c0';
var sb;

// Wait for supabase CDN to load
function initSB() {
  if (typeof supabase !== 'undefined') {
    sb = supabase.createClient(SB_URL, SB_KEY);
    READY = true;
    document.getElementById('info').textContent = 'Listo. Ingresa tus credenciales.';
    // Check existing session
    sb.auth.getSession().then(function(r) {
      if (r.data && r.data.session && r.data.session.user.id === ADMIN) {
        document.getElementById('info').textContent = 'Sesion activa. Redirigiendo...';
        setTimeout(function() { window.location.href = '/admin-dashboard.html'; }, 500);
      }
    });
  } else {
    document.getElementById('info').textContent = 'Cargando SDK...';
    setTimeout(initSB, 200);
  }
}
initSB();

async function doLogin() {
  var em  = document.getElementById('em').value.trim();
  var pw  = document.getElementById('pw').value;
  var err = document.getElementById('err');
  var btn = document.getElementById('btn');
  var inf = document.getElementById('info');
  err.textContent = '';

  if (!em) { err.textContent = 'Ingresa tu email'; return; }
  if (!pw) { err.textContent = 'Ingresa tu contrasena'; return; }
  if (!READY || !sb) { err.textContent = 'SDK no cargado, recarga la pagina'; return; }

  btn.disabled = true;
  btn.textContent = 'Verificando...';
  inf.textContent = '';

  try {
    var r = await sb.auth.signInWithPassword({ email: em, password: pw });
    if (r.error) {
      err.textContent = 'Error: ' + r.error.message;
      btn.disabled = false;
      btn.textContent = 'ENTRAR AL PANEL';
      return;
    }
    if (!r.data || !r.data.user) {
      err.textContent = 'No se recibio respuesta del servidor';
      btn.disabled = false;
      btn.textContent = 'ENTRAR AL PANEL';
      return;
    }
    if (r.data.user.id !== ADMIN) {
      await sb.auth.signOut();
      err.textContent = 'Acceso denegado - solo el admin puede entrar';
      btn.disabled = false;
      btn.textContent = 'ENTRAR AL PANEL';
      return;
    }
    // SUCCESS
    inf.textContent = 'Acceso concedido! Cargando panel...';
    btn.textContent = 'Cargando...';
    // Store session token and redirect to dashboard
    localStorage.setItem('sn_admin_ok', '1');
    window.location.href = '/admin-dashboard.html';
  } catch(e) {
    err.textContent = 'Error inesperado: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'ENTRAR AL PANEL';
  }
}

// Allow Enter key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
