<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff2255">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SHADOWNET">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHADOWNET Ã¢ÂÂ Feed</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:100;padding:12px 20px;background:rgba(1,2,12,.95);border-bottom:1px solid #0d2744;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-family:Orbitron,sans-serif;font-size:15px;color:#ff2255;letter-spacing:.12em;cursor:pointer}
.nav-btns{display:flex;gap:8px}
.nbtn{padding:7px 14px;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;border:1px solid #0d2744;background:transparent;color:#5a8aaa}
.nbtn.active,.nbtn:hover{border-color:#00e5ff;color:#00e5ff;background:rgba(0,229,255,.08)}
.nbtn.red{border-color:#ff2255;color:#ff2255}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.post-box{background:rgba(7,15,30,.7);border:1px solid #0d2744;border-radius:12px;padding:16px;margin-bottom:20px}
.post-box-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.avatar-sm{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;overflow:hidden}
.avatar-sm img{width:100%;height:100%;object-fit:cover}
.post-username{font-weight:700;font-size:14px}
.textarea{width:100%;background:rgba(1,2,12,.6);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;padding:10px 12px;font-family:Rajdhani,sans-serif;font-size:14px;resize:none;min-height:80px;outline:none}
.textarea:focus{border-color:#00e5ff}
.post-actions{display:flex;align-items:center;gap:10px;margin-top:10px}
.upload-btn{padding:8px 14px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
.upload-btn:hover{border-color:#00e5ff;color:#00e5ff}
.submit-btn{margin-left:auto;padding:9px 20px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.media-preview{margin-top:10px;border-radius:8px;overflow:hidden;max-height:300px;display:none}
.media-preview img,.media-preview video{width:100%;border-radius:8px;max-height:300px;object-fit:cover}
.feed{display:flex;flex-direction:column;gap:16px}
.card{background:rgba(7,15,30,.7);border:1px solid #0d2744;border-radius:12px;overflow:hidden}
.card-header{padding:12px 16px;display:flex;align-items:center;gap:10px}
.card-user{flex:1}
.card-name{font-weight:700;font-size:14px;color:#e8f4ff;cursor:pointer}
.card-name:hover{color:#00e5ff}
.card-time{font-size:11px;color:#5a8aaa;margin-top:1px}
.follow-btn{padding:5px 14px;border-radius:20px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:11px;cursor:pointer;border:1px solid rgba(0,229,255,.4);background:rgba(0,229,255,.08);color:#00e5ff;text-transform:uppercase;letter-spacing:.06em}
.follow-btn.following{border-color:#5a8aaa;color:#5a8aaa;background:transparent}
.card-media{position:relative}
.card-media img,.card-media video{width:100%;max-height:500px;object-fit:cover;display:block}
.card-content{padding:12px 16px}
.card-text{font-size:14px;line-height:1.5;color:#c8d8e8;margin-bottom:10px}
.card-footer{padding:10px 16px;border-top:1px solid #0d2744;display:flex;gap:16px}
.action-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:#5a8aaa;cursor:pointer;font-family:Rajdhani,sans-serif;font-weight:600;border:none;background:none;padding:4px 0}
.action-btn:hover,.action-btn.liked{color:#ff2255}
.action-btn.liked .heart{color:#ff2255}
.empty-feed{text-align:center;padding:48px 20px;color:#5a8aaa}
.empty-feed .icon{font-size:48px;margin-bottom:12px}
.empty-feed p{font-size:14px;line-height:1.6}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:rgba(7,15,30,.5);border-radius:8px;padding:4px}
.tab{flex:1;padding:8px;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-align:center;border:none;background:transparent;color:#5a8aaa;text-transform:uppercase;letter-spacing:.06em}
.tab.active{background:rgba(0,229,255,.12);color:#00e5ff}
.loader{text-align:center;padding:24px;color:#5a8aaa;font-size:13px}
.verified-icon{color:#00e5ff;font-size:12px;margin-left:4px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(7,15,30,.95);border:1px solid #00ff88;color:#00ff88;padding:10px 20px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;z-index:9999;display:none;white-space:nowrap}
@media(max-width:480px){.wrap{padding:12px 10px}}

.comments-section{padding:0 16px 12px;border-top:1px solid rgba(13,39,68,.4)}
.comment-form{display:flex;gap:8px;padding:10px 0;border-bottom:1px solid rgba(13,39,68,.3)}
.comment-inp{flex:1;background:rgba(1,2,12,.6);border:1px solid #0d2744;color:#e8f4ff;border-radius:20px;padding:7px 14px;font-family:Rajdhani,sans-serif;font-size:13px;outline:none}
.comment-inp:focus{border-color:#00e5ff}
.comment-send{padding:7px 14px;background:#ff2255;color:#fff;border:none;border-radius:20px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer}
.comment-list{display:flex;flex-direction:column;gap:8px;padding-top:8px}
.comment-item{display:flex;gap:8px;align-items:flex-start}
.comment-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
.comment-av img{width:100%;height:100%;object-fit:cover}
.comment-body{flex:1;background:rgba(7,15,30,.5);border-radius:0 10px 10px 10px;padding:8px 12px}
.comment-name{font-weight:700;font-size:12px;color:#00e5ff;margin-bottom:2px}
.comment-text{font-size:13px;color:#c8d8e8;line-height:1.4}
.comment-time{font-size:10px;color:#5a8aaa;margin-top:3px}
.comments-toggle{font-size:12px;color:#5a8aaa;cursor:pointer;padding:6px 0;display:block}
.comments-toggle:hover{color:#00e5ff}
.premium-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(1,2,12,0) 0%,rgba(1,2,12,.95) 50%,#01020c 100%);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:20px}
.premium-lock{text-align:center;padding:16px}
.premium-lock-icon{font-size:32px;margin-bottom:8px}
.premium-lock-text{font-family:Orbitron,sans-serif;font-size:12px;color:#e8f4ff;margin-bottom:10px;letter-spacing:.08em}
.premium-sub-btn{padding:10px 24px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em}
.premium-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:#5a8aaa;cursor:pointer;padding:4px 0}
.premium-toggle input{cursor:pointer;accent-color:#ff2255}
.post-premium-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(255,34,85,.15);border:1px solid rgba(255,34,85,.3);color:#ff6680;margin-left:6px}

.report-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center}
.report-modal.open{display:flex}
.report-box{background:#070f1e;border:1px solid #0d2744;border-radius:14px;padding:24px;width:100%;max-width:400px;margin:0 16px}
.report-title{font-family:Orbitron,sans-serif;font-size:13px;color:#ff2255;letter-spacing:.1em;margin-bottom:6px}
.report-sub{font-size:13px;color:#5a8aaa;margin-bottom:18px;line-height:1.5}
.report-reasons{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.report-reason{padding:10px 14px;background:rgba(1,2,12,.6);border:1px solid #0d2744;border-radius:8px;cursor:pointer;font-size:13px;color:#c8d8e8;transition:all .15s;display:flex;align-items:center;gap:10px}
.report-reason:hover,.report-reason.sel{border-color:#ff2255;background:rgba(255,34,85,.1);color:#ff6680}
.report-reason-icon{font-size:16px;flex-shrink:0}
.report-detail{width:100%;padding:10px 12px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-family:Rajdhani,sans-serif;font-size:13px;resize:none;height:70px;margin-bottom:14px;outline:none;display:none}
.report-detail.show{display:block}
.report-detail:focus{border-color:#ff2255}
.report-btns{display:flex;gap:8px}
.rpt-cancel{flex:1;padding:10px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.rpt-submit{flex:2;padding:10px;background:#ff2255;color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase}
.rpt-submit:disabled{opacity:.4;cursor:not-allowed}
/* 3-dot menu on posts */
.post-menu-btn{background:none;border:none;color:#5a8aaa;font-size:18px;cursor:pointer;padding:0 6px;line-height:1;margin-left:auto}
.post-menu-btn:hover{color:#e8f4ff}
.post-menu{position:absolute;top:40px;right:8px;background:#070f1e;border:1px solid #0d2744;border-radius:8px;padding:4px;z-index:50;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.post-menu-item{padding:8px 14px;font-size:13px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px;color:#c8d8e8}
.post-menu-item:hover{background:rgba(255,34,85,.1);color:#ff6680}

/* ==========================================
   TIKTOK-STYLE: Fullscreen Video Player
   ========================================== */
.video-fullscreen-modal{position:fixed;inset:0;background:#000;z-index:9999;display:none;flex-direction:row}
.video-fullscreen-modal.open{display:flex}
.vf-player{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;max-width:calc(100% - 340px)}
.vf-player video{width:100%;height:100%;object-fit:contain}
.vf-player img{width:100%;height:100%;object-fit:contain}
/* Creator info overlay (bottom-left like TikTok) */
.vf-info{position:absolute;bottom:80px;left:16px;right:80px;color:#fff;z-index:10}
.vf-username{font-weight:800;font-size:16px;margin-bottom:6px;display:flex;align-items:center;gap:8px;cursor:pointer}
.vf-username:hover{color:#00e5ff}
.vf-description{font-size:14px;line-height:1.5;margin-bottom:8px;color:rgba(255,255,255,.9)}
.vf-hashtags{display:flex;flex-wrap:wrap;gap:6px}
.vf-hashtag{color:#00e5ff;font-size:13px;font-weight:700;cursor:pointer}
.vf-hashtag:hover{text-decoration:underline}
/* Right-side actions (TikTok style) */
.vf-actions{position:absolute;right:16px;bottom:80px;display:flex;flex-direction:column;align-items:center;gap:18px;z-index:10}
.vf-action-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:#fff}
.vf-action-icon{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:22px;transition:background .2s}
.vf-action-btn:hover .vf-action-icon{background:rgba(255,255,255,.3)}
.vf-action-icon.liked{background:rgba(255,34,85,.4)}
.vf-action-count{font-size:12px;font-weight:700;color:#fff;text-align:center}
/* Nav arrows */
.vf-prev,.vf-next{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:none;color:#fff;font-size:20px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
.vf-prev{top:50%;left:16px;transform:translateY(-50%)}
.vf-next{top:50%;right:76px;transform:translateY(-50%)}
.vf-prev:hover,.vf-next:hover{background:rgba(255,255,255,.3)}
/* Close btn */
.vf-close{position:absolute;top:16px;left:16px;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:24px;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:20}
.vf-close:hover{background:rgba(0,0,0,.8)}
/* Progress bar */
.vf-progress{position:absolute;bottom:60px;left:16px;right:76px;height:3px;background:rgba(255,255,255,.3);border-radius:2px;z-index:10}
.vf-progress-fill{height:100%;background:#ff2255;border-radius:2px;width:0%;transition:width .1s linear}
/* Comments panel (right side like TikTok) */
.vf-comments-panel{width:340px;background:#0a0a0a;border-left:1px solid #1a1a1a;display:flex;flex-direction:column}
.vf-comments-header{padding:16px;border-bottom:1px solid #1a1a1a;font-family:Orbitron,sans-serif;font-size:12px;color:#e8f4ff;letter-spacing:.1em;display:flex;align-items:center;justify-content:space-between}
.vf-comments-list{flex:1;overflow-y:auto;padding:12px}
.vf-comment{display:flex;gap:10px;margin-bottom:14px}
.vf-comment-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:14px;overflow:hidden}
.vf-comment-av img{width:100%;height:100%;object-fit:cover}
.vf-comment-body{flex:1}
.vf-comment-name{font-weight:700;font-size:12px;color:#00e5ff;margin-bottom:2px}
.vf-comment-text{font-size:13px;color:#c8d8e8;line-height:1.4}
.vf-comment-time{font-size:10px;color:#5a8aaa;margin-top:3px}
.vf-comment-input-row{padding:12px;border-top:1px solid #1a1a1a;display:flex;gap:8px}
.vf-comment-inp{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#e8f4ff;border-radius:24px;padding:8px 14px;font-family:Rajdhani,sans-serif;font-size:13px;outline:none}
.vf-comment-inp:focus{border-color:#ff2255}
.vf-comment-send{width:36px;height:36px;background:#ff2255;border:none;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* Mute button */
.vf-mute-btn{position:absolute;bottom:70px;right:76px;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:18px;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10}
/* Upload button in header */
.header-upload-btn{padding:7px 16px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;display:none}
/* Hashtag clickable in feed cards */
.hashtag-link{color:#00e5ff;font-weight:700;cursor:pointer}
.hashtag-link:hover{text-decoration:underline}
/* Autoplay indicator */
.autoplay-badge{position:absolute;top:8px;left:8px;background:rgba(255,34,85,.85);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em;font-family:Rajdhani,sans-serif}
@media(max-width:768px){.vf-player{max-width:100%}.vf-comments-panel{display:none}}

/* Instagram-style Carousel */
.carousel-wrap{position:relative;overflow:hidden;width:100%}
.carousel-track{display:flex;transition:transform .3s ease;height:100%}
.carousel-track img,.carousel-track video{min-width:100%;max-width:100%;object-fit:cover;flex-shrink:0}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center;font-size:16px}
.carousel-prev{left:8px}
.carousel-next{right:8px}
.carousel-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5)}
.carousel-dot.active{background:#fff;width:8px;height:8px}
.carousel-count{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px}
/* Location tag */
.post-location{font-size:12px;color:#5a8aaa;padding:4px 16px;display:flex;align-items:center;gap:4px;cursor:pointer}
.post-location:hover{color:#00e5ff}
/* Location input in post box */
.location-inp{width:100%;padding:8px 12px;background:rgba(1,2,12,.6);border:1px solid #0d2744;color:#e8f4ff;border-radius:6px;font-family:Rajdhani,sans-serif;font-size:13px;outline:none;margin-bottom:8px;display:none}
.location-inp.show{display:block}
.location-inp:focus{border-color:#00e5ff}
.toggle-location-btn{padding:5px 12px;background:transparent;border:1px solid #0d2744;color:#5a8aaa;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:11px;cursor:pointer;margin-bottom:8px;display:none}
.toggle-location-btn.show{display:inline-flex;align-items:center;gap:4px}
.toggle-location-btn:hover{border-color:#00e5ff;color:#00e5ff}

/* Instagram-style Bookmark Collections */
.collections-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:flex-end;justify-content:center}
.collections-modal.open{display:flex}
.collections-sheet{background:#070f1e;border:1px solid #0d2744;border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:20px;max-height:70vh;overflow-y:auto}
.coll-title{font-family:Orbitron,sans-serif;font-size:12px;color:#5a8aaa;letter-spacing:.1em;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.coll-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.coll-item{background:rgba(7,15,30,.8);border:1px solid #0d2744;border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.coll-item:hover,.coll-item.selected{border-color:#ff2255}
.coll-thumb{height:80px;background:linear-gradient(135deg,#1a0020,#000814);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#5a8aaa;font-size:28px}
.coll-thumb img{width:100%;height:100%;object-fit:cover}
.coll-info{padding:8px 10px}
.coll-name{font-size:13px;font-weight:700;color:#e8f4ff}
.coll-count{font-size:11px;color:#5a8aaa;margin-top:2px}
.coll-new-btn{width:100%;padding:11px;background:linear-gradient(135deg,rgba(255,34,85,.2),rgba(150,0,50,.1));border:1px solid rgba(255,34,85,.3);color:#ff6680;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase}
.coll-new-btn:hover{background:rgba(255,34,85,.3)}
.coll-new-inp{width:100%;padding:10px 14px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-family:Rajdhani,sans-serif;font-size:14px;outline:none;margin-bottom:8px;display:none}
.coll-new-inp.show{display:block}
.coll-new-inp:focus{border-color:#ff2255}
.coll-save-btn{width:100%;padding:10px;background:#ff2255;color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;display:none;text-transform:uppercase}
.coll-save-btn.show{display:block}

.post-audio{display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:12px;color:#c8d8e8;cursor:pointer;border-top:1px solid rgba(13,39,68,.3)}
.post-audio:hover{color:#fff}
.post-audio-icon{font-size:14px;animation:spinRecord 3s linear infinite;display:inline-block}
@keyframes spinRecord{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.post-audio-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}
.suggestion-divider{background:rgba(7,15,30,.5);border:1px solid #0d2744;border-radius:12px;padding:14px;margin:16px 0}
.suggestion-title{font-size:11px;color:#5a8aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.suggestion-list{display:flex;flex-direction:column;gap:10px}
.suggestion-user{display:flex;align-items:center;gap:10px}
.suggestion-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:16px;cursor:pointer}
.suggestion-av img{width:100%;height:100%;object-fit:cover}
.suggestion-info{flex:1}
.suggestion-name{font-size:13px;font-weight:700;color:#e8f4ff;cursor:pointer}
.suggestion-name:hover{color:#00e5ff}
.suggestion-reason{font-size:11px;color:#5a8aaa}
.suggestion-follow-btn{padding:6px 14px;background:rgba(0,229,255,.15);border:1px solid rgba(0,229,255,.3);color:#00e5ff;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:11px;cursor:pointer;text-transform:uppercase;flex-shrink:0}
.suggestion-follow-btn.following{background:transparent;color:#5a8aaa;border-color:#0d2744}

/* OnlyFans-style Tips */
.tip-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;background:linear-gradient(135deg,rgba(255,170,0,.15),rgba(200,80,0,.08));border:1px solid rgba(255,170,0,.3);color:#ffaa00;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:12px;cursor:pointer;transition:all .2s}
.tip-btn:hover{background:linear-gradient(135deg,rgba(255,170,0,.3),rgba(200,80,0,.15));border-color:#ffaa00}
.tip-total{font-size:11px;color:#ffaa00;padding:2px 8px}
/* Tip modal */
.tip-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center}
.tip-modal.open{display:flex}
.tip-box{background:#070f1e;border:1px solid #0d2744;border-radius:14px;padding:24px;width:100%;max-width:360px;margin:0 16px}
.tip-box-title{font-family:Orbitron,sans-serif;font-size:13px;color:#ffaa00;letter-spacing:.1em;margin-bottom:6px}
.tip-box-sub{font-size:12px;color:#5a8aaa;margin-bottom:16px}
.tip-amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.tip-amount-btn{padding:10px 6px;border:1px solid #0d2744;background:rgba(255,170,0,.08);color:#ffaa00;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:14px;cursor:pointer;text-align:center;transition:all .2s}
.tip-amount-btn:hover,.tip-amount-btn.selected{border-color:#ffaa00;background:rgba(255,170,0,.2)}
.tip-custom{width:100%;padding:10px 14px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-family:Rajdhani,sans-serif;font-size:14px;outline:none;margin-bottom:8px}
.tip-custom:focus{border-color:#ffaa00}
.tip-msg-inp{width:100%;padding:8px 14px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-family:Rajdhani,sans-serif;font-size:13px;outline:none;margin-bottom:14px}
.tip-send-btn{width:100%;padding:12px;background:linear-gradient(135deg,#ffaa00,#cc6600);color:#000;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:900;font-size:14px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em}
.tip-cancel{width:100%;margin-top:8px;padding:8px;background:transparent;border:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-size:13px;cursor:pointer}
/* Premium preview counter */
.premium-counter{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.75);color:#fff;font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:4px}
/* Discount banner on profile */
.discount-banner{background:linear-gradient(135deg,rgba(255,34,85,.2),rgba(150,0,50,.1));border:1px solid rgba(255,34,85,.4);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.discount-pct{font-family:Orbitron,sans-serif;font-size:20px;color:#ff2255;font-weight:900}
.discount-info{font-size:12px;color:#c8d8e8;margin-left:10px}
.discount-timer{font-size:11px;color:#ff6680;font-weight:700}

/* === EDIT COMMENT 55s === */
.cmt-edit-btn{background:none;border:none;color:#5a8aaa;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:4px;font-family:Rajdhani,sans-serif;font-weight:700;display:inline-flex;align-items:center;gap:3px;transition:color .15s;text-transform:uppercase;letter-spacing:.04em}
.cmt-edit-btn:hover{color:#00e5ff}
.cmt-timer{font-size:10px;color:#5a8aaa;margin-left:4px}
.cmt-edit-form{display:none;margin-top:6px;gap:6px;flex-direction:column}
.cmt-edit-form.open{display:flex}
.cmt-edit-inp{background:rgba(1,2,12,.8);border:1px solid #00e5ff;color:#e8f4ff;border-radius:8px;padding:7px 12px;font-family:Rajdhani,sans-serif;font-size:13px;outline:none;resize:none;min-height:40px}
.cmt-edit-actions{display:flex;gap:6px}
.cmt-edit-save{padding:5px 14px;background:#00e5ff;color:#000;border:none;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:12px;cursor:pointer;text-transform:uppercase}
.cmt-edit-cancel{padding:5px 14px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer}
.cmt-delete-btn{background:none;border:none;color:#5a8aaa;font-size:11px;cursor:pointer;padding:2px 6px;font-family:Rajdhani,sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.cmt-delete-btn:hover{color:#ff2255}

/* === EDIT POST MODAL === */
.edit-post-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center}
.edit-post-modal.open{display:flex}
.edit-post-box{background:#070f1e;border:1px solid #0d2744;border-radius:14px;padding:24px;width:100%;max-width:520px;margin:0 16px}
.edit-post-title{font-family:Orbitron,sans-serif;font-size:13px;color:#00e5ff;letter-spacing:.1em;margin-bottom:14px}
.edit-post-textarea{width:100%;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;padding:12px;font-family:Rajdhani,sans-serif;font-size:14px;resize:none;min-height:100px;outline:none;margin-bottom:14px}
.edit-post-textarea:focus{border-color:#00e5ff}
.edit-post-actions{display:flex;gap:10px}
.edit-post-save{flex:2;padding:11px;background:linear-gradient(135deg,#00e5ff,#0080aa);color:#000;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:900;font-size:14px;cursor:pointer;text-transform:uppercase}
.edit-post-cancel{flex:1;padding:11px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;cursor:pointer}

/* ===== BOTTOM NAV (shared) ===== */
.pg-bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(7,15,30,.97);border-top:1px solid #0d2744;display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));justify-content:space-around;align-items:center;}
.pg-bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 16px;border-radius:8px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:color .2s;}
.pg-bn-item:hover,.pg-bn-item.active{color:#00e5ff;}
.pg-bn-icon{font-size:20px;line-height:1;}
.pg-bn-lbl{font-size:9px;margin-top:1px;}
.pg-bn-plus-inner{width:46px;height:28px;background:linear-gradient(135deg,#ff2255,#cc0030);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.pg-bn-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;border:2px solid #0d2744;color:#fff;font-weight:800;}
.pg-bn-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
@media(min-width:769px){.pg-bottom-nav{max-width:680px;left:50%;right:auto;transform:translateX(-50%);border-radius:16px 16px 0 0;border:1px solid #0d2744;border-bottom:none;}}
/* SN-NAV */
.sn-bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(7,15,30,.97);border-top:1px solid #0d2744;display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));justify-content:space-around;align-items:center;}
.sn-bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:color .2s;}
.sn-bn-item:hover,.sn-bn-active,.sn-bn-active .sn-bn-icon,.sn-bn-active .sn-bn-lbl{color:#ff2255!important;}
.sn-bn-icon{font-size:22px;line-height:1;}
.sn-bn-lbl{font-size:9px;}
.sn-bn-plus{padding:4px 8px!important;}
.sn-bn-plus-inner{width:46px;height:28px;background:linear-gradient(135deg,#ff2255,#cc0030);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;}
.sn-bn-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;border:2px solid #0d2744;color:#fff;font-weight:800;}
.sn-bn-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
@media(min-width:769px){.sn-bottom-nav{max-width:680px;left:50%;right:auto;transform:translateX(-50%);border-radius:16px 16px 0 0;border:1px solid #0d2744;border-bottom:none;}}
</style>
