<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;min-height:100vh;padding-bottom:80px}
header{position:sticky;top:0;z-index:100;padding:12px 20px;background:rgba(1,2,12,.97);border-bottom:1px solid #0d2744;display:flex;align-items:center;gap:12px}
.logo{font-family:Orbitron,sans-serif;font-size:15px;color:#ff2255;letter-spacing:.12em;cursor:pointer}
.page-title{font-family:Orbitron,sans-serif;font-size:12px;color:#5a8aaa;letter-spacing:.1em}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px}
.section-title{font-family:Orbitron,sans-serif;font-size:11px;color:#5a8aaa;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #0d2744}
.period-bar{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.period-bar::-webkit-scrollbar{display:none}
.period-btn{padding:7px 16px;border-radius:20px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;border:1px solid #0d2744;background:transparent;color:#5a8aaa;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;transition:all .2s}
.period-btn.active{background:rgba(255,34,85,.15);border-color:#ff2255;color:#ff2255}
.earnings-box{background:linear-gradient(135deg,rgba(0,255,136,.08),rgba(7,15,30,.6));border:1px solid rgba(0,255,136,.25);border-radius:12px;padding:20px;margin-bottom:24px}
.earnings-main{display:flex;align-items:center;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.earnings-total{font-family:Orbitron,sans-serif;font-size:34px;color:#00ff88}
.earnings-label{font-size:12px;color:#5a8aaa;margin-top:4px}
.withdraw-btn{padding:12px 24px;background:linear-gradient(135deg,#00ff88,#00aa55);color:#000;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:14px;cursor:pointer;text-transform:uppercase}
.withdraw-btn:disabled{opacity:.4;cursor:not-allowed}
.earnings-breakdown{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.eb-item{background:rgba(1,2,12,.4);border-radius:8px;padding:12px;text-align:center}
.eb-val{font-family:Orbitron,sans-serif;font-size:18px;color:#e8f4ff}
.eb-lbl{font-size:11px;color:#5a8aaa;margin-top:4px;text-transform:uppercase}
@media(max-width:500px){.earnings-breakdown{grid-template-columns:repeat(2,1fr)}}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.stat-card{background:rgba(7,15,30,.7);border:1px solid #0d2744;border-radius:12px;padding:14px;display:flex;align-items:center;gap:10px}
.stat-icon{font-size:24px;flex-shrink:0}
.stat-value{font-family:Orbitron,sans-serif;font-size:20px;color:#e8f4ff;margin-bottom:2px}
.stat-label{font-size:10px;color:#5a8aaa;text-transform:uppercase;letter-spacing:.06em}
.stat-delta{font-size:11px;color:#00ff88;margin-top:2px}
.stat-delta.neg{color:#ff2255}
.chart-box{background:rgba(7,15,30,.7);border:1px solid #0d2744;border-radius:12px;padding:16px;margin-bottom:24px;position:relative}
.chart-canvas{width:100%;height:200px;display:block}
.chart-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.chart-leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#5a8aaa}
.chart-leg-dot{width:8px;height:8px;border-radius:50%}
.rev-split{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.rev-card{background:rgba(7,15,30,.7);border:1px solid #0d2744;border-radius:12px;padding:14px;text-align:center;position:relative;overflow:hidden}
.rev-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.rev-card.subs::before{background:#00e5ff}
.rev-card.tips::before{background:#ffaa00}
.rev-card.ppv::before{background:#ff2255}
.rev-val{font-family:Orbitron,sans-serif;font-size:20px;color:#e8f4ff}
.rev-lbl{font-size:11px;color:#5a8aaa;margin-top:4px;text-transform:uppercase}
.rev-pct{font-size:11px;color:#5a8aaa;margin-top:2px}
@media(max-width:500px){.rev-split{grid-template-columns:1fr}}
.eng-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:24px}
.eng-card{background:rgba(7,15,30,.7);border:1px solid #0d2744;border-radius:12px;padding:14px;text-align:center}
.eng-val{font-family:Orbitron,sans-serif;font-size:18px;color:#e8f4ff}
.eng-lbl{font-size:10px;color:#5a8aaa;margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.posts-table{background:rgba(7,15,30,.7);border:1px solid #0d2744;border-radius:12px;overflow:hidden;margin-bottom:24px}
.table-row{display:grid;grid-template-columns:1fr 60px 60px 60px 80px;padding:10px 14px;border-bottom:1px solid rgba(13,39,68,.4);align-items:center;font-size:13px;gap:6px}
.table-header{font-size:10px;color:#5a8aaa;text-transform:uppercase;letter-spacing:.06em;background:rgba(1,2,12,.3)}
.table-text{color:#c8d8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.table-num{font-family:Orbitron,sans-serif;font-size:12px;color:#e8f4ff;text-align:center}
@media(max-width:500px){.table-row{grid-template-columns:1fr 50px 50px 50px}}
.tx-list{background:rgba(7,15,30,.7);border:1px solid #0d2744;border-radius:12px;overflow:hidden;margin-bottom:24px}
.tx-item{padding:12px 16px;border-bottom:1px solid rgba(13,39,68,.4);display:flex;align-items:center;justify-content:space-between}
.tx-type{font-size:13px;color:#c8d8e8}
.tx-date{font-size:11px;color:#5a8aaa;margin-top:2px}
.tx-amount-pos{font-family:Orbitron,sans-serif;font-size:13px;color:#00ff88}
.tx-amount-neg{font-family:Orbitron,sans-serif;font-size:13px;color:#ff2255}
.not-creator{text-align:center;padding:60px 20px;color:#5a8aaa}
.not-creator .icon{font-size:48px;margin-bottom:16px}
.withdrawal-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:none;align-items:center;justify-content:center}
.withdrawal-modal.open{display:flex}
.modal-box{background:#070f1e;border:1px solid #0d2744;border-radius:12px;padding:24px;width:100%;max-width:420px;margin:0 16px}
.modal-title{font-family:Orbitron,sans-serif;font-size:13px;color:#00ff88;margin-bottom:16px}
.inp{width:100%;padding:10px 12px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:6px;font-family:Rajdhani,sans-serif;font-size:14px;margin-bottom:10px;outline:none}
.inp:focus{border-color:#00ff88}
.select{width:100%;padding:10px 12px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:6px;font-family:Rajdhani,sans-serif;font-size:14px;margin-bottom:10px;outline:none}
.modal-btns{display:flex;gap:10px;margin-top:6px}
.cancel-btn{flex:1;padding:10px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.save-btn{flex:2;padding:10px;background:linear-gradient(135deg,#00ff88,#00aa55);color:#000;border:none;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(7,15,30,.95);border:1px solid #00ff88;color:#00ff88;padding:10px 20px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;z-index:9999;display:none;white-space:nowrap}
.sn-bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(7,15,30,.97);border-top:1px solid #0d2744;display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));justify-content:space-around;align-items:center}
.sn-bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:color .2s}
.sn-bn-item:hover,.sn-bn-active{color:#ff2255!important}
.sn-bn-icon{font-size:22px;line-height:1}
.sn-bn-lbl{font-size:9px}
.sn-bn-plus{padding:4px 8px!important}
.sn-bn-plus-inner{width:46px;height:28px;background:linear-gradient(135deg,#ff2255,#cc0030);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1}
.sn-bn-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;border:2px solid #0d2744;color:#fff;font-weight:800}
.sn-bn-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
@media(min-width:769px){.sn-bottom-nav{max-width:680px;left:50%;right:auto;transform:translateX(-50%);border-radius:16px 16px 0 0;border:1px solid #0d2744;border-bottom:none}}

/* === STATS UI ENHANCEMENTS === */
/* Revenue cards - gradient borders */
.rev-card{position:relative;overflow:hidden;transition:all .3s cubic-bezier(.4,0,.2,1)}
.rev-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.rev-card.tips::before{background:linear-gradient(90deg,#ff2255,#ff6680)}
.rev-card.subs::before{background:linear-gradient(90deg,#833ab4,#b066e0)}
.rev-card.ppv::before{background:linear-gradient(90deg,#00e5ff,#0080aa)}
.rev-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}

/* Stat values - animated count */
.stat-value{font-family:Orbitron,monospace;font-weight:900;transition:all .3s}
.stat-value.counting{color:#ff2255}

/* Engagement cards - glow on hover */
.eng-card{transition:all .3s;position:relative;overflow:hidden}
.eng-card::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(255,34,85,.08),transparent);opacity:0;transition:opacity .3s}
.eng-card:hover{transform:translateY(-2px);border-color:rgba(255,34,85,.2)}
.eng-card:hover::after{opacity:1}

/* Chart container - better frame */
.chart-canvas{border-radius:12px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);border:1px solid rgba(255,255,255,.04)}

/* Withdrawal button - pulse */
.withdraw-btn{position:relative;animation:withdrawPulse 3s ease infinite}
@keyframes withdrawPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,34,85,.3)}50%{box-shadow:0 0 20px 4px rgba(255,34,85,.1)}}

/* Section titles */
.section-title{position:relative;padding-bottom:8px}
.section-title::after{content:'';position:absolute;bottom:0;left:0;width:32px;height:2px;background:linear-gradient(90deg,#ff2255,transparent);border-radius:2px}

/* Stagger animations */
.rev-card,.eng-card{animation:statIn .4s ease both}
.rev-card:nth-child(1),.eng-card:nth-child(1){animation-delay:.05s}
.rev-card:nth-child(2),.eng-card:nth-child(2){animation-delay:.1s}
.rev-card:nth-child(3),.eng-card:nth-child(3){animation-delay:.15s}
.rev-card:nth-child(4),.eng-card:nth-child(4){animation-delay:.2s}
@keyframes statIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Top posts - better list items */
.top-post{transition:all .2s;border-radius:8px;padding:8px}
.top-post:hover{background:rgba(255,255,255,.03)}

/* Transaction rows */
.txn-row{transition:background .2s}
.txn-row:hover{background:rgba(255,255,255,.02)}

/* NAV POLISH */
.sn-nav{backdrop-filter:blur(16px)!important;-webkit-backdrop-filter:blur(16px)!important;background:rgba(7,15,30,.92)!important}
.sn-nav-item.active{position:relative;color:#ff2255!important}
.sn-nav-item.active::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#ff2255;box-shadow:0 0 8px rgba(255,34,85,.5)}
.sn-nav-item{transition:all .2s}
.sn-nav-item:active{transform:scale(.9)}
.sn-nav-create{transition:all .3s;box-shadow:0 2px 12px rgba(255,34,85,.3)}
.sn-nav-create:hover{transform:scale(1.1)}
</style>

<script>
var SB_URL='https://cdokplvoqivducsqrejt.supabase.co';
var SB_KEY='sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su';
var sb=supabase.createClient(SB_URL,SB_KEY);window.sb=sb;
var currentUser=null;
var profileData={};
var currentPeriod='month';

sb.auth.getSession().then(function(r){
  if(!r.data.session){window.location.href='/';return;}
  currentUser=r.data.session.user;
  loadStats();
  initNav();
});

function getPeriodStart(period){
  var d=new Date();
  if(period==='week'){d.setDate(d.getDate()-7);}
  else if(period==='month'){d.setDate(1);}
  else if(period==='3months'){d.setMonth(d.getMonth()-3);}
  else if(period==='year'){d.setMonth(0);d.setDate(1);}
  else if(period==='all'){d=new Date('2020-01-01');}
  d.setHours(0,0,0,0);
  return d.toISOString();
}

async function loadStats(){
  var r=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  if(r.error||!r.data){document.getElementById('mainWrap').innerHTML='<div style="text-align:center;padding:60px;color:#ff2255">Error cargando perfil<\/div>';return;}
  profileData=r.data;
  var isCreator=(r.data.role==='creator'||r.data.is_creator);
  if(!isCreator){
    document.getElementById('mainWrap').innerHTML='<div class="not-creator"><div class="icon">&#127775;<\/div><p style="font-size:15px;color:#e8f4ff;margin-bottom:8px">Stats de creador<\/p><p style="font-size:13px;color:#5a8aaa">Solicita ser creador para ver tus estad\u00edsticas.<\/p><button onclick="window.location.href=\'/'+'\''+'" style="margin-top:20px;padding:10px 24px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:14px;cursor:pointer">&#127968; Ir al inicio<\/button><\/div>';
    return;
  }
  renderStats(r.data);
}
async function renderStats(d){
  var earnings=parseFloat(d.total_earnings||0);
  var withdrawn=parseFloat(d.total_withdrawn||0);
  var pending=parseFloat(d.pending_withdrawal||0);
  var available=Math.max(0,earnings-withdrawn);
  var wrap=document.getElementById('mainWrap');
  wrap.innerHTML='';
  var pb=document.createElement('div');pb.className='period-bar';pb.id='periodBar';
  ['week','month','3months','year','all'].forEach(function(p){
    var labels={week:'7 d\u00edas',month:'Este mes','3months':'3 meses',year:'Este a\u00f1o',all:'Todo'};
    var btn=document.createElement('button');btn.className='period-btn'+(p===currentPeriod?' active':'');
    btn.textContent=labels[p];btn.onclick=function(){currentPeriod=p;renderStats(profileData);};
    pb.appendChild(btn);
  });
  wrap.appendChild(pb);
  var eb=document.createElement('div');eb.className='earnings-box';
  eb.innerHTML='<div class="section-title">&#128176; GANANCIAS<\/div>'
    +'<div class="earnings-main">'
    +'<div><div class="earnings-total">$'+earnings.toFixed(2)+'<\/div><div class="earnings-label">Total ganado<\/div><\/div>'
    +'<button class="withdraw-btn" id="wdBtn" onclick="openWithdrawal()"'+(available<10?' disabled':'')+'>'+(available<10?'M\u00ednimo $10':'&#128176; Retirar $'+available.toFixed(2))+'<\/button>'
    +'<\/div>'
    +'<div class="earnings-breakdown">'
    +'<div class="eb-item"><div class="eb-val">$'+available.toFixed(2)+'<\/div><div class="eb-lbl">Disponible<\/div><\/div>'
    +'<div class="eb-item"><div class="eb-val">$'+withdrawn.toFixed(2)+'<\/div><div class="eb-lbl">Retirado<\/div><\/div>'
    +'<div class="eb-item"><div class="eb-val">$'+pending.toFixed(2)+'<\/div><div class="eb-lbl">Pendiente<\/div><\/div>'
    +'<div class="eb-item"><div class="eb-val">10%<\/div><div class="eb-lbl">Comisi\u00f3n SN<\/div><\/div>'
    +'<\/div>';
  wrap.appendChild(eb);
  var rvTitle=document.createElement('div');rvTitle.className='section-title';rvTitle.innerHTML='&#128200; INGRESOS POR FUENTE';wrap.appendChild(rvTitle);
  var rvSplit=document.createElement('div');rvSplit.className='rev-split';rvSplit.id='revSplit';
  rvSplit.innerHTML='<div class="rev-card subs"><div class="rev-val" id="rv-subs">-<\/div><div class="rev-lbl">Suscripciones<\/div><div class="rev-pct" id="rv-subs-pct">-<\/div><\/div>'
    +'<div class="rev-card tips"><div class="rev-val" id="rv-tips">-<\/div><div class="rev-lbl">Propinas<\/div><div class="rev-pct" id="rv-tips-pct">-<\/div><\/div>'
    +'<div class="rev-card ppv"><div class="rev-val" id="rv-ppv">-<\/div><div class="rev-lbl">PPV<\/div><div class="rev-pct" id="rv-ppv-pct">-<\/div><\/div>';
  wrap.appendChild(rvSplit);
  loadRevenueSplit();
  var chTitle=document.createElement('div');chTitle.className='section-title';chTitle.innerHTML='&#128202; TENDENCIA DE GANANCIAS';wrap.appendChild(chTitle);
  var chBox=document.createElement('div');chBox.className='chart-box';
  chBox.innerHTML='<canvas id="earningsChart" class="chart-canvas"><\/canvas>'
    +'<div class="chart-legend">'
    +'<div class="chart-leg-item"><span class="chart-leg-dot" style="background:#00ff88"><\/span>Ganancias<\/div>'
    +'<div class="chart-leg-item"><span class="chart-leg-dot" style="background:#00e5ff"><\/span>Suscriptores<\/div>'
    +'<\/div>';
  wrap.appendChild(chBox);
  var sgTitle=document.createElement('div');sgTitle.className='section-title';sgTitle.innerHTML='&#128202; ESTAD\u00cdSTICAS';wrap.appendChild(sgTitle);
  var sg=document.createElement('div');sg.className='stats-grid';
  var postsCount=parseInt(d.posts_count||0);
  var followersCount=parseInt(d.followers_count||0);
  var subsCount=parseInt(d.subscribers_count||0);
  var convRate=followersCount>0?((subsCount/followersCount)*100).toFixed(1):'0';
  [
    {icon:'&#128101;',val:followersCount,lbl:'Seguidores'},
    {icon:'&#128081;',val:subsCount,lbl:'Suscriptores'},
    {icon:'&#128248;',val:postsCount,lbl:'Publicaciones'},
    {icon:'&#127942;',val:'Lv.'+(d.fan_rank||1),lbl:'Rango'},
    {icon:'&#128200;',val:convRate+'%',lbl:'Conversi\u00f3n'},
    {icon:'&#9878;',val:d.coins_balance||0,lbl:'Almas'}
  ].forEach(function(s){

async function loadRevenueSplit(){

    var ppvTotal=(ppv.data||[]).reduce(function(s,r){return s+parseFloat(r.amount||0);},0);

async function loadEngagement(){
  try{
    var r=await sb.from('posts').select('likes_count,comments_count,views_count').eq('user_id',currentUser.id);
    var posts=r.data||[];
    if(!posts.length){return;}
    var totalLikes=0,totalComments=0,totalViews=0;
    posts.forEach(function(p){
      totalLikes+=parseInt(p.likes_count||0);
      totalComments+=parseInt(p.comments_count||0);
      totalViews+=parseInt(p.views_count||0);
    });
    var avgLikes=(totalLikes/posts.length).toFixed(1);
    var avgComments=(totalComments/posts.length).toFixed(1);
    var followers=parseInt(profileData.followers_count||1);
    var engRate=followers>0?((totalLikes+totalComments)/(posts.length*followers)*100).toFixed(2):'0';
    document.getElementById('eng-rate').textContent=engRate+'%';
    document.getElementById('eng-avg-likes').textContent=avgLikes;
    document.getElementById('eng-avg-comments').textContent=avgComments;
    document.getElementById('eng-total-views').textContent=totalViews>999?(totalViews/1000).toFixed(1)+'K':totalViews;
  }catch(e){}
}

function drawEarningsChart(){
  var canvas=document.getElementById('earningsChart');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var w=canvas.parentElement.clientWidth-32;
  var h=200;
  canvas.width=w*2;canvas.height=h*2;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.scale(2,2);
  var days=currentPeriod==='week'?7:currentPeriod==='month'?30:currentPeriod==='3months'?90:currentPeriod==='year'?365:365;
  var labels=[];var vals=[];
  for(var i=0;i<Math.min(days,30);i++){
    var d=new Date();d.setDate(d.getDate()-(Math.min(days,30)-1-i));
    labels.push((d.getMonth()+1)+'/'+d.getDate());
    vals.push(0);
  }
  loadChartData(ctx,w,h,labels,vals);
}

async function loadChartData(ctx,w,h,labels,vals){
  try{
    var since=getPeriodStart(currentPeriod);
    var r=await sb.from('transactions').select('amount,created_at').eq('creator_id',currentUser.id).gte('created_at',since).order('created_at',{ascending:true});
    var txs=r.data||[];
    var dayMap={};
    txs.forEach(function(tx){
      var key=new Date(tx.created_at).toLocaleDateString('en-US',{month:'numeric',day:'numeric'});
      dayMap[key]=(dayMap[key]||0)+parseFloat(tx.amount||0);
    });
    labels.forEach(function(l,i){vals[i]=dayMap[l]||0;});
  }catch(e){}
  var maxVal=Math.max.apply(null,vals)||1;
  var padL=40,padR=10,padT=10,padB=30;
  var chartW=w-padL-padR;
  var chartH=h-padT-padB;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='rgba(13,39,68,.5)';ctx.lineWidth=0.5;
  for(var i=0;i<5;i++){
    var y=padT+chartH*(i/4);
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(w-padR,y);ctx.stroke();
    ctx.fillStyle='#5a8aaa';ctx.font='9px Rajdhani';ctx.textAlign='right';
    ctx.fillText('$'+(maxVal*(1-i/4)).toFixed(0),padL-4,y+3);
  }
  ctx.fillStyle='#5a8aaa';ctx.font='9px Rajdhani';ctx.textAlign='center';
  var step=Math.max(1,Math.floor(labels.length/6));
  labels.forEach(function(l,i){
    if(i%step===0||i===labels.length-1){
      var x=padL+chartW*(i/(labels.length-1||1));
      ctx.fillText(l,x,h-5);
    }
  });
  if(vals.length>1){
    ctx.beginPath();ctx.strokeStyle='#00ff88';ctx.lineWidth=2;ctx.lineJoin='round';
    vals.forEach(function(v,i){
      var x=padL+chartW*(i/(vals.length-1));
      var y=padT+chartH*(1-v/maxVal);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    ctx.stroke();
    ctx.lineTo(padL+chartW,padT+chartH);ctx.lineTo(padL,padT+chartH);ctx.closePath();
    var grad=ctx.createLinearGradient(0,padT,0,padT+chartH);
    grad.addColorStop(0,'rgba(0,255,136,.2)');grad.addColorStop(1,'rgba(0,255,136,.01)');
    ctx.fillStyle=grad;ctx.fill();
  }
  ctx.fillStyle='#00ff88';
  vals.forEach(function(v,i){
    if(v>0){
      var x=padL+chartW*(i/(vals.length-1||1));
      var y=padT+chartH*(1-v/maxVal);
      ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
    }
  });
}

  });

async function loadTransactions(){
  var since=getPeriodStart(currentPeriod);
  var r=await sb.from('transactions').select('*').eq('creator_id',currentUser.id).gte('created_at',since).order('created_at',{ascending:false}).limit(20);
  var el=document.getElementById('txList');
  if(!el)return;
  if(!r.data||r.data.length===0){el.innerHTML='<div style="padding:16px;color:#5a8aaa;font-size:13px">Sin transacciones en este periodo<\/div>';return;}
  el.innerHTML='';
  r.data.forEach(function(tx){
    var item=document.createElement('div');item.className='tx-item';
    var left=document.createElement('div');
    var type=document.createElement('div');type.className='tx-type';type.textContent=tx.description||tx.type||'Transacci\u00f3n';
    var date=document.createElement('div');date.className='tx-date';date.textContent=new Date(tx.created_at).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
    left.appendChild(type);left.appendChild(date);
    var amt=document.createElement('div');
    var isPos=parseFloat(tx.amount||0)>=0;
    amt.className=isPos?'tx-amount-pos':'tx-amount-neg';
    amt.textContent=(isPos?'+':'')+parseFloat(tx.amount||0).toFixed(2)+' USD';
    item.appendChild(left);item.appendChild(amt);
    el.appendChild(item);
  });
}
function openWithdrawal(){
  document.getElementById('withdrawAccount').value='';
  var msg=document.getElementById('withdrawMsg');msg.style.display='none';
  document.getElementById('withdrawalModal').classList.add('open');
}
async function submitWithdrawal(){
  var method=document.getElementById('withdrawMethod').value;
  var account=document.getElementById('withdrawAccount').value.trim();
  var msg=document.getElementById('withdrawMsg');
  if(!account){msg.textContent='Ingresa tu cuenta de pago';msg.style.color='#ff2255';msg.style.display='block';return;}
  var earnings=parseFloat(profileData.total_earnings||0);
  var withdrawn=parseFloat(profileData.total_withdrawn||0);
  var available=Math.max(0,earnings-withdrawn);
  if(available<10){msg.textContent='M\u00ednimo de retiro: $10.00';msg.style.color='#ff2255';msg.style.display='block';return;}
  var r=await sb.from('withdrawals').insert({user_id:currentUser.id,amount:available,method:method,account_info:account,status:'pending'});
  if(r.error){msg.textContent='Error: '+r.error.message;msg.style.color='#ff2255';msg.style.display='block';return;}
  await sb.from('profiles').update({total_withdrawn:withdrawn+available}).eq('id',currentUser.id);
  document.getElementById('withdrawalModal').classList.remove('open');
  showToast('\u2713 Solicitud de retiro enviada');
  setTimeout(loadStats,500);
}
function showToast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.borderColor=err?'#ff2255':'#00ff88';t.style.color=err?'#ff2255':'#00ff88';
  t.style.display='block';setTimeout(function(){t.style.display='none';},3000);
}
