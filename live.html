<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHADOWNET LIVE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:10px 16px;background:rgba(1,2,12,.97);border-bottom:1px solid #0d2744;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-family:Orbitron,sans-serif;font-size:14px;color:#ff2255;letter-spacing:.12em;cursor:pointer}
.live-badge{background:#ff2255;color:#fff;padding:3px 10px;border-radius:4px;font-family:Orbitron,sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;display:none}
.viewer-count{font-size:12px;color:#5a8aaa;display:none}
.back-btn{padding:6px 12px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;margin-left:auto}
.back-btn:hover{border-color:#00e5ff;color:#00e5ff}
.main{display:flex;flex:1;overflow:hidden}
.video-area{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:cover}
.video-overlay{position:absolute;inset:0;display:flex;flex-direction:column}
.setup-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px}
.setup-icon{font-size:64px}
.setup-title{font-family:Orbitron,sans-serif;font-size:18px;color:#e8f4ff;text-align:center}
.setup-sub{font-size:14px;color:#5a8aaa;text-align:center;max-width:300px;line-height:1.6}
.start-btn{padding:16px 40px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:10px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:16px;cursor:pointer;text-transform:uppercase;letter-spacing:.1em}
.start-btn:hover{background:linear-gradient(135deg,#ff4477,#cc0044)}
.status-msg{font-size:13px;text-align:center;min-height:20px}
.controls{position:absolute;bottom:16px;left:0;right:0;display:none;flex-direction:column;align-items:center;gap:10px}
.ctrl-row{display:flex;gap:10px;justify-content:center}
.ctrl-btn{padding:10px 20px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;border:none}
.ctrl-mic{background:rgba(7,15,30,.85);border:1px solid rgba(0,229,255,.4);color:#00e5ff}
.ctrl-mic.off{border-color:rgba(255,34,85,.4);color:#ff2255}
.ctrl-cam{background:rgba(7,15,30,.85);border:1px solid rgba(0,229,255,.4);color:#00e5ff}
.ctrl-cam.off{border-color:rgba(255,34,85,.4);color:#ff2255}
.ctrl-end{background:#ff2255;color:#fff}
.ctrl-gift{background:rgba(7,15,30,.85);border:1px solid rgba(255,170,0,.4);color:#ffaa00}
.timer{font-family:Orbitron,sans-serif;font-size:20px;color:#fff;text-shadow:0 0 10px rgba(255,34,85,.5)}
.gift-anim{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;z-index:9999;pointer-events:none;animation:giftPop .8s ease-out forwards;display:none}
@keyframes giftPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}70%{transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-60%) scale(1.1)}}
.sidebar{width:300px;border-left:1px solid #0d2744;display:flex;flex-direction:column;flex-shrink:0}
.chat-header{padding:12px 14px;border-bottom:1px solid #0d2744;font-family:Orbitron,sans-serif;font-size:11px;color:#5a8aaa;letter-spacing:.1em}
.chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.chat-msg{font-size:13px;line-height:1.4;color:#c8d8e8;word-break:break-word}
.chat-msg .cn{font-weight:700;color:#00e5ff;margin-right:4px}
.chat-msg.gift-msg .cn{color:#ffaa00}
.chat-msg.gift-msg{background:rgba(255,170,0,.08);border-radius:6px;padding:4px 8px}
.chat-input-row{padding:10px;border-top:1px solid #0d2744;display:flex;gap:6px}
.chat-inp{flex:1;background:rgba(1,2,12,.6);border:1px solid #0d2744;color:#e8f4ff;border-radius:20px;padding:7px 12px;font-family:Rajdhani,sans-serif;font-size:13px;outline:none}
.chat-inp:focus{border-color:#00e5ff}
.chat-send{width:34px;height:34px;background:#ff2255;border:none;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.not-creator{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center;color:#5a8aaa}
.not-creator .icon{font-size:48px}
.not-creator a{color:#00e5ff;font-weight:700}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(7,15,30,.95);border:1px solid #00ff88;color:#00ff88;padding:10px 20px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;z-index:9999;display:none;white-space:nowrap}
.gift-panel{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#070f1e;border:1px solid #0d2744;border-radius:16px;padding:16px;display:none;z-index:500;min-width:320px}
.gift-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.gift-item{background:rgba(1,2,12,.6);border:1px solid #0d2744;border-radius:8px;padding:8px;text-align:center;cursor:pointer;transition:all .2s}
.gift-item:hover,.gift-item.sel{border-color:#ff2255;background:rgba(255,34,85,.1)}
.gift-emoji{font-size:22px;margin-bottom:2px}
.gift-cost{font-size:10px;color:#ff2255;font-weight:700}
.gift-send-btn{width:100%;padding:10px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase}
.gift-send-btn:disabled{opacity:.4;cursor:not-allowed}
@media(max-width:600px){.sidebar{display:none}}
</style>
</head>
<body>
<header>
  <span class="logo" onclick="window.location.href='/'">SHADOWNET</span>
  <span class="live-badge" id="liveBadge">&#128308; EN VIVO</span>
  <span class="viewer-count" id="viewerCount">0 espectadores</span>
  <button class="back-btn" onclick="window.location.href='/'">&#8592; Inicio</button>
</header>
<div class="main">
  <div class="video-area">
    <div id="localVid" style="width:100%;height:100%;position:relative;background:#000"></div>
    <div class="video-overlay" id="videoOverlay">
      <div class="setup-screen" id="setupScreen">
        <div class="setup-icon">&#127897;</div>
        <div class="setup-title">INICIAR TRANSMISION</div>
        <div class="setup-sub">Transmite en vivo a todos tus seguidores de forma gratuita.</div>
        <div class="status-msg" id="statusMsg" style="color:#5a8aaa">Listo para transmitir</div>
        <button class="start-btn" id="startBtn" onclick="startLive()">&#128308; INICIAR LIVE</button>
      </div>
      <div class="controls" id="liveControls">
        <div class="timer" id="liveTimer">00:00</div>
        <div class="ctrl-row">
          <button class="ctrl-btn ctrl-mic" id="micBtn" onclick="toggleMic()">&#127908; Mic ON</button>
          <button class="ctrl-btn ctrl-cam" id="camBtn" onclick="toggleCam()">&#128247; Cam ON</button>
          <button class="ctrl-btn ctrl-gift" onclick="toggleGiftPanel()">&#127873; Regalos</button>
          <button class="ctrl-btn ctrl-end" onclick="stopLive()">&#9632; TERMINAR</button>
        </div>
      </div>
    </div>
    <div class="not-creator" id="notCreatorMsg" style="display:none">
      <div class="icon">&#128250;</div>
      <p>Solo los creadores pueden transmitir en vivo.</p>
      <p style="margin-top:8px"><a href="/">Solicita ser creador</a></p>
    </div>
  </div>
  <div class="sidebar">
    <div class="chat-header">CHAT EN VIVO</div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-input-row">
      <input class="chat-inp" id="chatInp" placeholder="Escribe un mensaje..." maxlength="120">
      <button class="chat-send" onclick="sendMsg()">&#9658;</button>
    </div>
  </div>
</div>
<!-- Gift Panel -->
<div class="gift-panel" id="giftPanel">
  <div id="giftGridEl" class="gift-grid"></div>
  <button class="gift-send-btn" id="giftSendBtn" onclick="sendGift()" disabled>Selecciona un regalo</button>
</div>
<div class="gift-anim" id="giftAnim"></div>
<div class="toast" id="toast"></div>
<script>
var SB_URL="https://cdokplvoqivducsqrejt.supabase.co";
var SB_KEY="sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su";
var sb=supabase.createClient(SB_URL,SB_KEY);
var currentUser=null;
var currentProfile=null;
var isCreator=false;
var stream=null;
var micOn=true;
var camOn=true;
var liveTimer=null;
var liveSeconds=0;
var streamId=null;
var _chatSub=null;
var _giftSub=null;
var selectedGift=null;
var GIFTS=[
  {id:"rose",emoji:"\uD83C\uDF39",name:"Rosa",cost:10},
  {id:"heart",emoji:"\uD83D\uDC97",name:"Coraz\xF3n",cost:25},
  {id:"fire",emoji:"\uD83D\uDD25",name:"Fuego",cost:50},
  {id:"skull",emoji:"\uD83D\uDC80",name:"Alma",cost:100},
  {id:"crown",emoji:"\uD83D\uDC51",name:"Corona",cost:200},
  {id:"gem",emoji:"\uD83D\uDC8E",name:"Diamante",cost:500},
  {id:"rocket",emoji:"\uD83D\uDE80",name:"Cohete",cost:150},
  {id:"star",emoji:"\u2B50",name:"Estrella",cost:75}
];

// Init
sb.auth.getSession().then(function(r){
  if(!r.data.session){window.location.href="/";return;}
  currentUser=r.data.session.user;
  sb.from("profiles").select("username,avatar_url,role,coins_balance").eq("id",currentUser.id).single().then(function(p){
    currentProfile=p.data;
    isCreator=p.data&&(p.data.role==="creator");
    if(!isCreator){
      document.getElementById("videoOverlay").style.display="none";
      document.getElementById("notCreatorMsg").style.display="flex";
    }
    buildGiftGrid();
    subscribeChat();
    subscribeGifts();
    loadRecentChat();
  });
});

function buildGiftGrid(){
  var grid=document.getElementById("giftGridEl");
  GIFTS.forEach(function(g,i){
    var item=document.createElement("div");item.className="gift-item";item.dataset.idx=i;
    item.innerHTML="<div class=\"gift-emoji\">"+g.emoji+"</div><div class=\"gift-cost\">"+g.cost+" \uD83D\uDC80</div>";
    item.addEventListener("click",function(){
      selectedGift=GIFTS[i];
      document.querySelectorAll(".gift-item").forEach(function(el){el.classList.remove("sel");});
      this.classList.add("sel");
      var btn=document.getElementById("giftSendBtn");
      btn.disabled=false;btn.textContent="Enviar "+g.emoji+" "+g.name+" ("+g.cost+" Almas)";
    });
    grid.appendChild(item);
  });
}

function startLive(){
  if(!isCreator)return;
  var btn=document.getElementById("startBtn");
  var statusEl=document.getElementById("statusMsg");
  btn.disabled=true;btn.textContent="Conectando...";
  statusEl.textContent="Activando c\xE1mara...";statusEl.style.color="#00e5ff";
  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(function(s){
    stream=s;
    var vidDiv=document.getElementById("localVid");
    vidDiv.innerHTML="";
    var vid=document.createElement("video");vid.srcObject=s;vid.autoplay=true;vid.muted=true;
    vid.setAttribute("playsinline","");vid.style.cssText="width:100%;height:100%;object-fit:cover";
    vidDiv.appendChild(vid);
    document.getElementById("setupScreen").style.display="none";
    document.getElementById("liveControls").style.display="flex";
    document.getElementById("liveBadge").style.display="inline-block";
    document.getElementById("viewerCount").style.display="inline";
    streamId="live_"+currentUser.id+"_"+Date.now();
    liveSeconds=0;
    liveTimer=setInterval(function(){
      liveSeconds++;
      var m=Math.floor(liveSeconds/60),sec=liveSeconds%60;
      document.getElementById("liveTimer").textContent=(m<10?"0"+m:m)+":"+(sec<10?"0"+sec:sec);
    },1000);
    sb.from("live_streams").insert({host_id:currentUser.id,title:"Live de @"+(currentProfile?.username||"usuario"),is_active:true,started_at:new Date().toISOString()}).then(function(){});
    addChatMsg({username:"Sistema",message:"\uD83D\uDFE2 Live iniciado. \u00A1Hola a todos!"},true);
  }).catch(function(e){
    btn.disabled=false;btn.textContent="\uD83D\uDD34 INICIAR LIVE";
    statusEl.textContent=e.name==="NotAllowedError"?"Permiso denegado. Permite el acceso a la c\xE1mara.":"Error: "+e.message;
    statusEl.style.color="#ff2255";
  });
}

function stopLive(){
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  if(liveTimer){clearInterval(liveTimer);liveTimer=null;}
  document.getElementById("localVid").innerHTML="";
  document.getElementById("setupScreen").style.display="flex";
  document.getElementById("liveControls").style.display="none";
  document.getElementById("liveBadge").style.display="none";
  document.getElementById("viewerCount").style.display="none";
  document.getElementById("liveTimer").textContent="00:00";
  document.getElementById("startBtn").disabled=false;
  document.getElementById("startBtn").textContent="\uD83D\uDD34 INICIAR LIVE";
  document.getElementById("statusMsg").textContent="Live finalizado";
  document.getElementById("statusMsg").style.color="#5a8aaa";
  showToast("Live finalizado");
}

function toggleMic(){
  micOn=!micOn;
  if(stream)stream.getAudioTracks().forEach(function(t){t.enabled=micOn;});
  var btn=document.getElementById("micBtn");
  btn.textContent=micOn?"\uD83C\uDF99 Mic ON":"\uD83D\uDD07 Mic OFF";
  btn.className="ctrl-btn ctrl-mic"+(micOn?"":" off");
}

function toggleCam(){
  camOn=!camOn;
  if(stream)stream.getVideoTracks().forEach(function(t){t.enabled=camOn;});
  var btn=document.getElementById("camBtn");
  btn.textContent=camOn?"\uD83D\uDCF7 Cam ON":"\uD83D\uDCF7 Cam OFF";
  btn.className="ctrl-btn ctrl-cam"+(camOn?"":" off");
}

function toggleGiftPanel(){
  var panel=document.getElementById("giftPanel");
  panel.style.display=panel.style.display==="block"?"none":"block";
}

async function sendGift(){
  if(!selectedGift||!currentUser) return;
  var coins=parseInt(currentProfile?.coins_balance||0);
  if(coins<selectedGift.cost){showToast("Almas insuficientes",true);return;}
  var newCoins=coins-selectedGift.cost;
  await sb.from("profiles").update({coins_balance:newCoins}).eq("id",currentUser.id);
  currentProfile.coins_balance=newCoins;
  var uname=currentProfile?.username||"usuario";
  await sb.from("live_gifts").insert({
    stream_id:streamId||"general",from_user_id:currentUser.id,
    from_username:"@"+uname,gift_id:selectedGift.id,gift_name:selectedGift.name,gift_cost:selectedGift.cost
  });
  document.getElementById("giftPanel").style.display="none";
  showGiftAnimation(selectedGift.emoji);
  showToast("\uD83C\uDF81 "+selectedGift.name+" enviado!");
}

function showGiftAnimation(emoji){
  var el=document.getElementById("giftAnim");
  el.textContent=emoji;el.style.display="block";
  setTimeout(function(){el.style.display="none";},900);
}

async function sendMsg(){
  var inp=document.getElementById("chatInp");
  var msg=inp.value.trim();
  if(!msg||!currentUser)return;
  inp.value="";
  var uname=currentProfile?.username||"usuario";
  await sb.from("live_messages").insert({stream_id:streamId||"general",user_id:currentUser.id,username:"@"+uname,message:msg});
}

function addChatMsg(m,isSystem){
  var el=document.getElementById("chatMsgs");
  var div=document.createElement("div");
  div.className="chat-msg"+(isSystem?" gift-msg":"");
  div.innerHTML="<span class=\"cn\">"+(m.username||"@usuario")+"</span>"+escHtml(m.message||"");
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
  while(el.children.length>100)el.removeChild(el.firstChild);
}

function escHtml(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

async function loadRecentChat(){
  var r=await sb.from("live_messages").select("*").order("created_at",{ascending:false}).limit(10);
  (r.data||[]).reverse().forEach(addChatMsg);
}

function subscribeChat(){
  _chatSub=sb.channel("live-chat-global").on("postgres_changes",{event:"INSERT",schema:"public",table:"live_messages"},function(p){
    addChatMsg(p.new);
  }).subscribe();
}

function subscribeGifts(){
  _giftSub=sb.channel("live-gifts-global").on("postgres_changes",{event:"INSERT",schema:"public",table:"live_gifts"},function(p){
    var g=p.new;
    addChatMsg({username:g.from_username,message:"\uD83C\uDF81 envi\xF3 "+g.gift_name+"!"},false);
    if(document.getElementById("giftPanel").style.display==="none") showGiftAnimation(GIFTS.find(function(gi){return gi.id===g.gift_id;})||{emoji:"\uD83C\uDF81"});
  });
  _giftSub.subscribe();
}

document.getElementById("chatInp").addEventListener("keydown",function(e){if(e.key==="Enter")sendMsg();});

function showToast(msg,err){
  var t=document.getElementById("toast");
  t.textContent=msg;t.style.borderColor=err?"#ff2255":"#00ff88";t.style.color=err?"#ff2255":"#00ff88";
  t.style.display="block";setTimeout(function(){t.style.display="none";},3000);
}
</script>
</body>
</html>
