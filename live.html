<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>SHADOWNET LIVE</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
</head>
<body style="background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;gap:16px">
<h1 style="color:#ff2255">SHADOWNET LIVE 🔴</h1>
<video id="v" autoplay muted playsinline style="width:100%;max-width:400px;border-radius:8px;display:none"></video>
<button onclick="go()" style="background:#ff2255;color:#fff;border:none;padding:14px 40px;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer">📺 INICIAR CÁMARA</button>
<p id="s">Toca el botón para activar tu cámara</p>
<a href="/" style="color:#5a8aaa;font-size:12px">← Volver</a>
<script>
function go(){
  navigator.mediaDevices.getUserMedia({video:true,audio:true})
    .then(s=>{var v=document.getElementById('v');v.srcObject=s;v.style.display='block';document.getElementById('s').textContent='🔴 EN VIVO';})
    .catch(e=>{document.getElementById('s').textContent='Error: '+e.message;});
}
</script>
</body>
</html>
