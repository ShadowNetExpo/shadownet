<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHADOWNET â Stories</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:100;padding:12px 20px;background:rgba(1,2,12,.97);border-bottom:1px solid #0d2744;display:flex;align-items:center;gap:12px}
.logo{font-family:Orbitron,sans-serif;font-size:15px;color:#ff2255;letter-spacing:.12em;cursor:pointer}
.page-title{font-family:Orbitron,sans-serif;font-size:12px;color:#5a8aaa;letter-spacing:.1em}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
/* Stories row */
.stories-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;margin-bottom:24px;scrollbar-width:none}
.stories-row::-webkit-scrollbar{display:none}
.story-bubble{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0}
.story-ring{width:62px;height:62px;border-radius:50%;padding:2px;background:linear-gradient(135deg,#ff2255,#ffaa00,#ff2255);position:relative}
.story-ring.seen{background:linear-gradient(135deg,#333,#555)}
.story-ring.add{background:linear-gradient(135deg,#0d2744,#1a3a60)}
.story-av{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#fff;border:2px solid #01020c;overflow:hidden}
.story-av img{width:100%;height:100%;object-fit:cover}
.story-add-icon{position:absolute;bottom:0;right:0;width:20px;height:20px;background:#ff2255;border-radius:50%;border:2px solid #01020c;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:800}
.story-name{font-size:11px;color:#c8d8e8;text-align:center;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Story viewer */
.story-viewer{position:fixed;inset:0;background:#000;z-index:9999;display:none;flex-direction:column}
.story-viewer.open{display:flex}
.sv-header{position:absolute;top:0;left:0;right:0;z-index:10;padding:12px 16px;display:flex;align-items:center;gap:10px}
.sv-progress{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
.sv-progress-fill{height:100%;background:#fff;width:0%;transition:width linear}
.sv-user{display:flex;align-items:center;gap:8px;color:#fff}
.sv-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;overflow:hidden}
.sv-av img{width:100%;height:100%;object-fit:cover}
.sv-username{font-weight:700;font-size:13px}
.sv-time{font-size:11px;color:rgba(255,255,255,.6)}
.sv-close{margin-left:auto;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;line-height:1}
.sv-media{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.sv-media img,.sv-media video{max-width:100%;max-height:100%;object-fit:contain}
.sv-caption{position:absolute;bottom:80px;left:0;right:0;padding:16px;text-align:center;color:#fff;font-size:15px;text-shadow:0 1px 4px rgba(0,0,0,.8);background:linear-gradient(transparent,rgba(0,0,0,.5))}
.sv-nav{position:absolute;top:60px;bottom:80px;display:flex}
.sv-prev{width:40%;cursor:pointer}
.sv-next{width:60%;margin-left:auto;cursor:pointer}
.sv-footer{padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.sv-reply{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:24px;padding:10px 16px;font-family:Rajdhani,sans-serif;font-size:13px;outline:none}
.sv-views{font-size:12px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:4px}
/* Upload */
.upload-box{background:rgba(7,15,30,.7);border:2px dashed #0d2744;border-radius:12px;padding:24px;text-align:center;cursor:pointer;margin-bottom:24px;transition:border-color .2s;position:relative}
.upload-box:hover{border-color:#ff2255}
.upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:36px;margin-bottom:10px}
.upload-label{font-size:14px;color:#5a8aaa;font-weight:700}
.upload-sub{font-size:12px;color:#3a5060;margin-top:4px}
.caption-inp{width:100%;padding:10px 14px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-family:Rajdhani,sans-serif;font-size:14px;outline:none;margin-bottom:10px}
.caption-inp:focus{border-color:#ff2255}
.publish-btn{width:100%;padding:12px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:14px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;margin-bottom:24px}
.publish-btn:disabled{opacity:.4;cursor:not-allowed}
.preview-box{display:none;margin-bottom:12px;border-radius:8px;overflow:hidden;max-height:200px}
.preview-box img,.preview-box video{width:100%;border-radius:8px;max-height:200px;object-fit:cover}
.section-title{font-family:Orbitron,sans-serif;font-size:12px;color:#5a8aaa;letter-spacing:.1em;margin-bottom:14px;padding-bottom:8px;border-top:1px solid #0d2744;padding-top:20px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(7,15,30,.95);border:1px solid #00ff88;color:#00ff88;padding:10px 20px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;z-index:9999;display:none;white-space:nowrap}

/* Instagram-style Story Reactions */
.story-reactions-bar{position:absolute;bottom:70px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:8px;z-index:20;padding:0 16px}
.story-reaction-emoji{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:transform .2s,background .2s;border:1px solid rgba(255,255,255,.2)}
.story-reaction-emoji:hover,.story-reaction-emoji.selected{transform:scale(1.3);background:rgba(255,255,255,.3)}
.story-reaction-emoji.selected{border-color:#ff2255}
.story-reaction-count{position:absolute;top:-6px;right:-4px;background:#ff2255;color:#fff;font-size:9px;font-weight:800;border-radius:8px;padding:1px 5px;min-width:16px;text-align:center;display:none}
.story-reaction-emoji.has-count .story-reaction-count{display:block}
/* Story reply input */
.sv-reply{flex:1;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:24px;padding:10px 16px;font-family:Rajdhani,sans-serif;font-size:13px;outline:none}
.sv-reply:focus{border-color:#ff2255}
/* Story Highlights on stories page */
.highlights-section{margin-bottom:20px}
.highlights-title{font-family:Orbitron,sans-serif;font-size:11px;color:#5a8aaa;letter-spacing:.1em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #0d2744}
.highlights-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.highlights-row::-webkit-scrollbar{display:none}
.highlight-bubble{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0}
.highlight-ring{width:64px;height:64px;border-radius:50%;padding:2px;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);position:relative}
.highlight-av{width:100%;height:100%;border-radius:50%;background:rgba(7,15,30,.8);display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid #01020c;overflow:hidden}
.highlight-av img{width:100%;height:100%;object-fit:cover}
.highlight-name{font-size:11px;color:#c8d8e8;text-align:center;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.highlight-add-ring{background:linear-gradient(135deg,#0d2744,#1a3a60);padding:2px}
.add-highlight-btn{width:64px;height:64px;border-radius:50%;background:rgba(7,15,30,.8);display:flex;align-items:center;justify-content:center;font-size:26px;color:#5a8aaa;border:2px dashed #0d2744;border-radius:50%;cursor:pointer;transition:border-color .2s}
.add-highlight-btn:hover{border-color:#833ab4;color:#c8d8e8}
/* Create highlight modal */
.hl-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center}
.hl-modal.open{display:flex}
.hl-box{background:#070f1e;border:1px solid #0d2744;border-radius:14px;padding:24px;width:100%;max-width:360px;margin:0 16px}
.hl-title{font-family:Orbitron,sans-serif;font-size:13px;color:#833ab4;letter-spacing:.1em;margin-bottom:16px}
.hl-emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
.hl-emoji-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.hl-emoji-btn:hover,.hl-emoji-btn.sel{background:rgba(131,58,180,.3);border-color:#833ab4}
.hl-inp{width:100%;padding:10px 14px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-family:Rajdhani,sans-serif;font-size:14px;outline:none;margin-bottom:14px}
.hl-inp:focus{border-color:#833ab4}
.hl-btns{display:flex;gap:10px}
.hl-cancel{flex:1;padding:10px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.hl-save{flex:2;padding:10px;background:linear-gradient(135deg,#833ab4,#fd1d1d);color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase}

.btn-back{background:transparent;border:1px solid #0d2744;color:#e8f4ff;padding:7px 14px;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;letter-spacing:.04em;}
.btn-back:hover{border-color:#00e5ff;color:#00e5ff;}
header{justify-content:space-between!important;}
</style>
<style>
/* SN-NAV */
.sn-bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(7,15,30,.97);border-top:1px solid #0d2744;display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));justify-content:space-around;align-items:center;}
.sn-bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:color .2s;}
.sn-bn-item:hover,.sn-bn-active,.sn-bn-active .sn-bn-icon,.sn-bn-active .sn-bn-lbl{color:#ff2255!important;}
.sn-bn-icon{font-size:22px;line-height:1;}
.sn-bn-lbl{font-size:9px;}
.sn-bn-plus{padding:4px 8px!important;}
.sn-bn-plus-inner{width:46px;height:28px;background:linear-gradient(135deg,#ff2255,#cc0030);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;}
.sn-bn-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;border:2px solid #0d2744;color:#fff;font-weight:800;}
.sn-bn-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
@media(min-width:769px){.sn-bottom-nav{max-width:680px;left:50%;right:auto;transform:translateX(-50%);border-radius:16px 16px 0 0;border:1px solid #0d2744;border-bottom:none;}}
</style>
</head>
<body>
<header>
  <button class="btn-back" onclick="history.length>1?history.back():window.location.href='/'">&#8592; Volver</button>
  <span class="page-title">STORIES</span>
  <span style="width:80px"></span>
</header>
<div class="wrap">
  <!-- Highlights Section -->
  <div class="highlights-section" id="highlightsSection" style="display:none">
    <div class="highlights-title">DESTACADOS</div>
    <div class="highlights-row" id="highlightsRow">
      <div class="highlight-bubble" onclick="openCreateHighlight()">
        <div class="add-highlight-btn">+</div>
        <div class="highlight-name">Nuevo</div>
      </div>
    </div>
  </div>
  <div class="stories-row" id="storiesRow">
    <div style="color:#5a8aaa;font-size:13px;padding:20px">Cargando...</div>
  </div>
  <div id="uploadSection" style="display:none">
    <div class="section-title">CREAR STORY</div>
    <div class="upload-box" id="uploadBox">
      <input type="file" id="storyFile" accept="image/*,video/*">
      <div class="upload-icon">ð¸</div>
      <div class="upload-label">Toca para subir foto o video</div>
      <div class="upload-sub">La story desaparece en 24 horas</div>
    </div>
    <div class="preview-box" id="previewBox"></div>
    <input class="caption-inp" id="captionInp" placeholder="Escribe un caption... (opcional)">
    <button class="publish-btn" id="publishBtn" onclick="publishStory()" disabled>
      â° PUBLICAR STORY (24H)
    </button>
  </div>
</div>
<!-- Story Viewer -->
<div class="story-viewer" id="storyViewer">
  <div class="sv-header">
    <div class="sv-progress"><div class="sv-progress-fill" id="svProgressFill"></div></div>
    <div class="sv-user">
      <div class="sv-av" id="svAv"></div>
      <div>
        <div class="sv-username" id="svUsername"></div>
        <div class="sv-time" id="svTime"></div>
      </div>
    </div>
    <button class="sv-close" onclick="closeStoryViewer()">â</button>
  </div>
  <div class="sv-media" id="svMedia"></div>
  <div class="sv-caption" id="svCaption"></div>
  <div class="sv-nav">
    <div class="sv-prev" onclick="prevStory()"></div>
    <div class="sv-next" onclick="nextStory()"></div>
  </div>
  <div class="story-reactions-bar" id="storyReactionsBar" style="display:none">
    </div>
  <div class="sv-footer">
    <input class="sv-reply" id="svReply" placeholder="Responder a la story...">
    <div class="sv-views" id="svViews">ð 0</div>
  </div>
</div>
<div class="toast" id="toast"></div>
</body>
</html>
