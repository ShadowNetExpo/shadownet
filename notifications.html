<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SHADOWNET — Notificaciones</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--sn-abyss:#070f1e;--sn-surface:rgba(13,27,44,.6);--sn-border:#0d2744;--sn-text:#e8f4ff;--sn-text-mid:#8a9bb0;--sn-text-dim:#5a8aaa;--sn-fire:#ff2255;--sn-ice:#00e5ff}
body{background:var(--sn-abyss);color:var(--sn-text);font-family:Rajdhani,sans-serif;min-height:100vh;padding-bottom:70px}
a{text-decoration:none;color:inherit}

.sn-header{position:sticky;top:0;z-index:100;background:rgba(7,15,30,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--sn-border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.sn-header-logo{font-family:Orbitron,monospace;font-size:14px;font-weight:900;color:var(--sn-fire);letter-spacing:.08em}
.header-back{background:none;border:none;color:var(--sn-text-dim);font-size:18px;cursor:pointer;padding:4px 8px}
.header-actions{display:flex;gap:8px}
.mark-read-btn{background:none;border:1px solid var(--sn-border);color:var(--sn-text-dim);font-family:Rajdhani,sans-serif;font-size:11px;font-weight:700;padding:4px 12px;border-radius:16px;cursor:pointer;transition:all .2s}
.mark-read-btn:hover{border-color:var(--sn-fire);color:var(--sn-fire)}

.notif-tabs{display:flex;border-bottom:1px solid var(--sn-border);padding:0 16px}
.notif-tab{flex:1;padding:12px 8px;text-align:center;font-family:Orbitron,monospace;font-size:10px;letter-spacing:.08em;color:var(--sn-text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.notif-tab.active{color:var(--sn-text);border-bottom-color:var(--sn-fire)}
.notif-tab:hover{color:var(--sn-text-mid)}

.notif-list{padding:0}
.notif-item{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(13,39,68,.4);transition:all .2s;animation:notifIn .3s ease both;cursor:pointer}
.notif-item:hover{background:rgba(255,34,85,.03)}
.notif-item.unread{background:rgba(0,229,255,.03);border-left:3px solid var(--sn-ice)}
.notif-item:nth-child(1){animation-delay:.05s}
.notif-item:nth-child(2){animation-delay:.1s}
.notif-item:nth-child(3){animation-delay:.15s}
.notif-item:nth-child(4){animation-delay:.2s}
.notif-item:nth-child(5){animation-delay:.25s}
@keyframes notifIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}

.notif-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--sn-fire),#800011);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;overflow:hidden;border:2px solid var(--sn-border)}
.notif-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.notif-body{flex:1;min-width:0}
.notif-text{font-size:13px;line-height:1.4;color:var(--sn-text)}
.notif-text strong{color:var(--sn-fire);font-weight:700}
.notif-time{font-size:11px;color:var(--sn-text-dim);margin-top:3px}
.notif-icon{font-size:20px;flex-shrink:0;width:32px;text-align:center}

.notif-empty{text-align:center;padding:80px 20px;animation:fadeIn .5s ease}
.notif-empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.notif-empty-text{font-size:15px;color:var(--sn-text-mid)}
.notif-empty-sub{font-size:12px;color:var(--sn-text-dim);margin-top:6px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.sn-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(7,15,30,.95);border-top:1px solid var(--sn-border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));justify-content:space-around;align-items:center}
.sn-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--sn-text-dim);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:all .2s}
.sn-nav-item.active{color:var(--sn-fire)}
.sn-nav-icon{font-size:20px}
.sn-nav-create{width:46px;height:28px;background:linear-gradient(135deg,#ff2255,#cc0030);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.sn-nav-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;border:2px solid var(--sn-border);color:#fff;font-weight:800}
.sn-nav-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
/* NAV POLISH */
.sn-nav{backdrop-filter:blur(16px)!important;-webkit-backdrop-filter:blur(16px)!important;background:rgba(7,15,30,.92)!important}
.sn-nav-item.active{position:relative;color:#ff2255!important}
.sn-nav-item.active::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#ff2255;box-shadow:0 0 8px rgba(255,34,85,.5)}
.sn-nav-item:active{transform:scale(.9)}
</style>
</head>
<body>
<header class="sn-header">
  <div style="display:flex;align-items:center;gap:8px">
    <button class="header-back" onclick="history.back()">&#8592;</button>
    <span class="sn-header-logo">NOTIFICACIONES</span>
  </div>
  <div class="header-actions">
    <button class="mark-read-btn" onclick="markAllRead()">Marcar todo leído</button>
  </div>
</header>

<div class="notif-tabs">
  <div class="notif-tab active" onclick="switchTab('all')">Todas</div>
  <div class="notif-tab" onclick="switchTab('likes')">&#10084; Likes</div>
  <div class="notif-tab" onclick="switchTab('follows')">&#128101; Seguidos</div>
  <div class="notif-tab" onclick="switchTab('tips')">&#128142; Tips</div>
</div>

<div id="notifList" class="notif-list">
  <div class="notif-empty">
    <div class="notif-empty-icon">&#128276;</div>
    <div class="notif-empty-text">Cargando notificaciones...</div>
  </div>
</div>

<nav class="sn-nav">
  <a class="sn-nav-item" href="/feed.html"><span class="sn-nav-icon">&#127968;</span>Inicio</a>
  <a class="sn-nav-item" href="/explore.html"><span class="sn-nav-icon">&#128269;</span>Explorar</a>
  <a class="sn-nav-item" href="/editor.html"><span class="sn-nav-create">&#43;</span></a>
  <a class="sn-nav-item" href="/reels.html"><span class="sn-nav-icon">&#9654;</span>Reels</a>
  <a class="sn-nav-item" href="/profile.html"><div class="sn-nav-avatar" id="snNavAv">&#128100;</div>Perfil</a>
</nav>

<script>
var SB_URL="https://cdokplvoqivducsqrejt.supabase.co";
var SB_KEY="sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su";
var sb=supabase.createClient(SB_URL,SB_KEY);window.sb=sb;
var currentUser=null,currentTab="all";

sb.auth.getSession().then(function(r){
  if(!r.data||!r.data.session){location.href="/";return;}
  currentUser=r.data.session.user;
  window.currentUser=currentUser;
  loadNotifications();
  // Load nav avatar
  sb.from("profiles").select("username,avatar_url").eq("id",currentUser.id).single().then(function(p){
    if(p.data){var a=document.getElementById("snNavAv");if(a){if(p.data.avatar_url)a.innerHTML='<img src="'+p.data.avatar_url+'">';else if(p.data.username)a.textContent=p.data.username[0].toUpperCase();}}
  });
});

var typeIcons={"like":"\u2764\uFE0F","comment":"\uD83D\uDCAC","follow":"\uD83D\uDC64","tip":"\uD83D\uDC8E","gift":"\uD83C\uDF81","subscription":"\uD83C\uDF89","mention":"@","reply":"\u21A9\uFE0F","purchase":"\uD83D\uDED2"};

function timeAgo(d){var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return"ahora";if(s<3600)return Math.floor(s/60)+"m";if(s<86400)return Math.floor(s/3600)+"h";if(s<604800)return Math.floor(s/86400)+"d";return new Date(d).toLocaleDateString("es",{day:"numeric",month:"short"});}

async function loadNotifications(){
  if(!currentUser)return;
  var query=sb.from("notifications").select("*").eq("user_id",currentUser.id).order("created_at",{ascending:false}).limit(50);
  if(currentTab==="likes")query=query.eq("type","like");
  else if(currentTab==="follows")query=query.eq("type","follow");
  else if(currentTab==="tips")query=query.in("type",["tip","gift","subscription"]);
  var r=await query;
  var list=document.getElementById("notifList");
  if(!r.data||!r.data.length){
    list.innerHTML='<div class="notif-empty"><div class="notif-empty-icon">\uD83D\uDD14</div><div class="notif-empty-text">Sin notificaciones aún</div><div class="notif-empty-sub">Cuando alguien interactúe contigo, aparecerá aquí</div></div>';
    return;
  }
  list.innerHTML="";
  r.data.forEach(function(n){
    var item=document.createElement("div");
    item.className="notif-item"+(n.is_read?"":" unread");
    var icon=typeIcons[n.type]||"\uD83D\uDD14";
    var avatar=n.from_username?n.from_username[0].toUpperCase():"?";
    item.innerHTML='<div class="notif-avatar">'+avatar+'</div><div class="notif-body"><div class="notif-text">'+(n.from_username?'<strong>@'+n.from_username+'</strong> ':'')+n.message+'</div><div class="notif-time">'+timeAgo(n.created_at)+'</div></div><div class="notif-icon">'+icon+'</div>';
    item.onclick=function(){
      if(!n.is_read)sb.from("notifications").update({is_read:true}).eq("id",n.id).then(function(){});
      item.classList.remove("unread");
      if(n.post_id)location.href="/feed.html#post-"+n.post_id;
      else if(n.from_user_id)location.href="/profile.html?u="+(n.from_username||"");
    };
    list.appendChild(item);
  });
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".notif-tab").forEach(function(t){t.classList.remove("active");});
  event.target.classList.add("active");
  loadNotifications();
}

async function markAllRead(){
  if(!currentUser)return;
  await sb.from("notifications").update({is_read:true}).eq("user_id",currentUser.id).eq("is_read",false);
  document.querySelectorAll(".notif-item.unread").forEach(function(el){el.classList.remove("unread");});
}
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(function(){});}</script>
</body>
</html>
