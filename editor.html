<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;min-height:100vh;padding-bottom:72px}
header{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #0d2744;position:sticky;top:0;z-index:100;background:#01020c}
.hdr-back{background:none;border:none;color:#5a8aaa;font-size:18px;cursor:pointer;padding:4px 8px}
.hdr-title{font-family:Orbitron,sans-serif;font-size:14px;color:#ff2255;letter-spacing:.12em;flex:1}
.btn-post{padding:9px 22px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:900;font-size:13px;cursor:pointer;letter-spacing:.08em;box-shadow:0 2px 12px rgba(255,34,85,.3);transition:all .2s}
.btn-post:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,34,85,.5)}
.btn-post:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.tabs{display:flex;gap:4px;padding:10px 16px;border-bottom:1px solid #0d2744}
.tab{flex:1;padding:8px;background:none;border:1px solid #0d2744;border-radius:8px;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.tab.active{background:rgba(255,34,85,.15);border-color:#ff2255;color:#ff2255}
.editor-wrap{display:flex;flex-direction:column;align-items:center;padding:16px;gap:16px}
@media(min-width:768px){.editor-wrap{flex-direction:row;align-items:flex-start;max-width:900px;margin:0 auto}}
.preview-area{position:relative;width:100%;max-width:360px;aspect-ratio:9/16;background:#000;border-radius:12px;overflow:hidden;flex-shrink:0}
.preview-area video,.preview-area img{width:100%;height:100%;object-fit:cover;display:block}
.preview-area .text-overlay{position:absolute;color:#fff;font-weight:700;font-size:24px;text-shadow:0 2px 8px rgba(0,0,0,.8);cursor:move;user-select:none;padding:4px 8px}
.upload-zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;border:2px dashed #0d2744;border-radius:12px;transition:all .2s}
.upload-zone:hover{border-color:#ff2255;background:rgba(255,34,85,.05)}
.upload-zone.dragover{border-color:#ff2255;background:rgba(255,34,85,.08)}
.upload-icon{font-size:48px;opacity:.5}
.upload-text{font-size:14px;color:#8aadcc;text-align:center;padding:0 20px}
.upload-text small{color:#5a8aaa;font-size:11px;display:block;margin-top:4px}
input[type=file]{display:none}
.carousel-dots{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:5}
.c-dot{width:24px;height:3px;background:rgba(255,255,255,.3);border-radius:2px}
.c-dot.active{background:#fff}
.tools{width:100%;max-width:400px}
.tool-section{margin-bottom:14px}
.tool-label{font-family:Orbitron,sans-serif;font-size:10px;color:#5a8aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;font-weight:700}
.filter-grid{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:700;border:1px solid #0d2744;background:transparent;color:#5a8aaa;cursor:pointer;font-family:Rajdhani,sans-serif;transition:all .15s}
.chip.active{background:rgba(255,34,85,.15);border-color:#ff2255;color:#ff2255}
.chip:hover{border-color:#5a8aaa}
.trim-wrap{display:flex;align-items:center;gap:8px}
.trim-wrap input[type=range]{flex:1;accent-color:#ff2255}
.trim-val{font-family:Orbitron,monospace;font-size:11px;color:#00e5ff;min-width:36px;text-align:center}
.text-input-row{display:flex;gap:6px}
.inp{padding:8px 12px;background:rgba(13,39,68,.4);border:1px solid #0d2744;border-radius:8px;color:#e8f4ff;font-family:Rajdhani,sans-serif;font-size:14px;outline:none;transition:border-color .15s}
.inp:focus{border-color:#ff2255}
.inp::placeholder{color:#5a8aaa}
.text-input-row input{flex:1}
.mini-btn{padding:8px 14px;background:rgba(255,34,85,.15);border:1px solid #ff2255;border-radius:8px;color:#ff2255;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer}
.caption-area textarea{width:100%;padding:12px;background:rgba(13,39,68,.4);border:1px solid #0d2744;border-radius:8px;color:#e8f4ff;font-family:Rajdhani,sans-serif;font-size:14px;resize:vertical;min-height:70px;outline:none}
.caption-area textarea::placeholder{color:#5a8aaa}
.cat-select{width:100%;padding:10px 12px;background:rgba(13,39,68,.4);border:1px solid #0d2744;border-radius:8px;color:#e8f4ff;font-family:Rajdhani,sans-serif;font-size:13px;margin-top:8px}
.cat-select option{background:#01020c}
.toggle-row{display:flex;align-items:center;gap:10px;margin-top:8px;padding:8px;border-radius:8px;transition:background .2s}
.toggle-row:hover{background:rgba(255,255,255,.02)}
.toggle-row label{font-size:13px;color:#c8d8e8;flex:1;cursor:pointer}
.toggle-sm{width:36px;height:20px;border-radius:10px;background:#0d2744;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.toggle-sm.on{background:#ff2255}
.toggle-sm::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s}
.toggle-sm.on::after{left:18px}
.ppv-price{margin-top:8px;display:none}
.ppv-price.show{display:block}
.ppv-price input{width:100%}
.progress-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;pointer-events:none}
.progress-bar .fill{height:100%;background:#ff2255;width:0;transition:width .3s}
.poll-opts{display:flex;flex-direction:column;gap:6px}
.poll-opt-row{display:flex;gap:6px}
.poll-opt-row input{flex:1}
.poll-remove{background:none;border:none;color:#ff2255;font-size:18px;cursor:pointer;padding:0 8px}
.poll-add{background:none;border:1px dashed #0d2744;border-radius:8px;padding:8px;color:#5a8aaa;font-size:12px;cursor:pointer;width:100%;margin-top:6px;transition:all .15s}
.poll-add:hover{border-color:#ff2255;color:#ff2255}
.audio-list{max-height:200px;overflow-y:auto;border:1px solid #0d2744;border-radius:8px;margin-top:6px}
.audio-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid rgba(13,39,68,.3);transition:background .15s}
.audio-item:last-child{border-bottom:none}
.audio-item:hover,.audio-item.selected{background:rgba(255,34,85,.08)}
.audio-item.selected{border-left:3px solid #ff2255}
.ai-play{width:28px;height:28px;border-radius:50%;background:rgba(255,34,85,.15);border:1px solid #ff2255;color:#ff2255;font-size:11px;cursor:pointer;flex-shrink:0}
.ai-info{flex:1;min-width:0}
.ai-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-artist{font-size:10px;color:#5a8aaa}
.selected-audio-clear{background:rgba(255,34,85,.15);border:1px solid #ff2255;color:#ff2255;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;margin-top:6px;display:none}
.selected-audio-clear.show{display:inline-block}
.collab-banner{padding:10px 16px;background:rgba(255,34,85,.08);border-bottom:1px solid rgba(255,34,85,.2);display:flex;align-items:center;gap:10px;font-size:12px}
.collab-banner-icon{font-size:20px}
.collab-banner-type{font-family:Orbitron,sans-serif;font-size:10px;color:#ff2255;letter-spacing:.06em}
.collab-banner-text{color:#ff9999}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(7,15,30,.97);border:1px solid #00ff88;color:#00ff88;padding:10px 22px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;z-index:9999;display:none}
</style>

<body>
<div class="progress-bar" id="uploadProgress"><div class="fill" id="uploadFill"></div></div>
<header>
  <button class="hdr-back" onclick="history.back()">&#8592;</button>
  <span class="hdr-title" id="hdrTitle">EDITOR</span>
  <button class="btn-post" id="btnPost" onclick="publishPost()" disabled>PUBLICAR</button>
</header>
<div class="tabs">
  <button class="tab active" data-mode="photo" onclick="setMode('photo')">FOTO</button>
  <button class="tab" data-mode="video" onclick="setMode('video')">VIDEO / REEL</button>
  <button class="tab" data-mode="carousel" onclick="setMode('carousel')">CARRUSEL</button>
</div>
<div class="editor-wrap">
  <div class="preview-area" id="previewArea">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon" id="uploadIcon">&#128247;</div>
      <div class="upload-text" id="uploadText">Toca para seleccionar foto<small>JPG, PNG, WebP &bull; Max 50MB</small></div>
    </div>
    <input type="file" id="fileInput" accept="image/*">
    <div class="carousel-dots" id="carouselDots" style="display:none"></div>
  </div>
  <div class="tools" id="toolsPanel" style="display:none">
    <div class="tool-section" id="filterSection"><div class="tool-label">Filtro</div><div class="filter-grid" id="filterGrid"></div></div>
    <div class="tool-section" id="speedSection" style="display:none"><div class="tool-label">Velocidad</div><div class="filter-grid" id="speedRow"></div></div>
    <div class="tool-section" id="trimSection" style="display:none"><div class="tool-label">Recortar</div><div class="trim-wrap"><span class="trim-val" id="trimStartVal">0:00</span><input type="range" id="trimStart" min="0" max="100" value="0" step="0.1"><input type="range" id="trimEnd" min="0" max="100" value="100" step="0.1"><span class="trim-val" id="trimEndVal">0:00</span></div></div>
    <div class="tool-section"><div class="tool-label">Texto</div><div class="text-input-row"><input class="inp" type="text" id="textInput" placeholder="Escribe texto sobre el medio" maxlength="60"><button class="mini-btn" onclick="addTextOverlay()">+ Texto</button></div></div>
    <div class="tool-section">
      <div class="tool-label">Musica / Sonido</div>
      <input class="inp" type="text" id="audioSearch" placeholder="Buscar sonidos..." style="width:100%" oninput="searchSounds(this.value)">
      <div class="audio-list" id="audioList"><div style="padding:12px;text-align:center;color:#5a8aaa;font-size:12px">Cargando sonidos...</div></div>
      <button class="selected-audio-clear" id="clearAudioBtn" onclick="clearSelectedSound()">Quitar sonido</button>
    </div>
    <div class="caption-area tool-section">
      <div class="tool-label">Descripcion</div>
      <textarea class="inp" id="captionText" placeholder="Escribe una descripcion, #hashtags, @mentions..." maxlength="2200"></textarea>
      <select class="cat-select" id="catSelect">
        <option value="">Sin categoria</option>
        <option value="entertainment">Entretenimiento</option><option value="comedy">Comedia</option>
        <option value="music">Musica</option><option value="dance">Baile</option>
        <option value="sports">Deportes</option><option value="gaming">Gaming</option>
        <option value="food">Comida</option><option value="fashion">Moda</option>
        <option value="beauty">Belleza</option><option value="education">Educacion</option>
        <option value="tech">Tecnologia</option><option value="travel">Viajes</option>
        <option value="fitness">Fitness</option><option value="art">Arte</option>
        <option value="pets">Mascotas</option><option value="lifestyle">Lifestyle</option>
        <option value="cosplay">Cosplay</option>
      </select>
      <div class="toggle-row"><label for="togReel">Marcar como Reel (aparece en /reels)</label><button class="toggle-sm on" id="togReel" onclick="this.classList.toggle('on')"></button></div>
      <div class="toggle-row"><label for="togNsfw">Contenido para adultos (+18)</label><button class="toggle-sm" id="togNsfw" onclick="this.classList.toggle('on')"></button></div>
      <div class="toggle-row"><label for="togSubOnly">Solo para suscriptores</label><button class="toggle-sm" id="togSubOnly" onclick="this.classList.toggle('on')"></button></div>
      <div class="toggle-row"><label for="togPpv">Pay-per-view (PPV)</label><button class="toggle-sm" id="togPpv" onclick="this.classList.toggle('on');togglePpvPrice()"></button></div>
      <div class="ppv-price" id="ppvPriceWrap">
        <input class="inp" type="number" id="ppvPrice" placeholder="Precio en Almas (minimo 10)" min="10" max="10000" value="20">
      </div>
    </div>
    <div class="tool-section">
      <div class="tool-label">Programar publicacion (opcional)</div>
      <input class="inp" type="datetime-local" id="scheduleInput" style="width:100%">
    </div>
    <div class="tool-section">
      <div class="tool-label">Encuesta (opcional)</div>
      <div class="poll-opts" id="pollOptions"></div>
      <button class="poll-add" id="pollAddBtn" onclick="addPollOption()">+ Agregar opcion (max 4)</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var SB_URL='https://cdokplvoqivducsqrejt.supabase.co';
var SB_KEY='sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su';
var sb=supabase.createClient(SB_URL,SB_KEY);window.sb=sb;
var currentUser=null,_mode='photo',_files=[],_mediaDuration=0,_filter='none',_speed=1,_trimStart=0,_trimEnd=1,_textOverlays=[],_mediaEl=null,_selectedSound=null,_pollOptions=[],_collabType=null,_originalPostId=null,_previewAudio=null,_allSounds=[];

var FILTERS=[
  {name:'Normal',css:'none'},{name:'Cine',css:'contrast(1.1) saturate(1.3) sepia(0.15)'},
  {name:'Frio',css:'saturate(0.8) brightness(1.1) hue-rotate(15deg)'},{name:'Calido',css:'saturate(1.2) sepia(0.2) brightness(1.05)'},
  {name:'B&W',css:'grayscale(1) contrast(1.1)'},{name:'Retro',css:'sepia(0.4) contrast(1.2) brightness(0.95)'},
  {name:'Vivido',css:'saturate(1.8) contrast(1.1)'},{name:'Drama',css:'contrast(1.4) brightness(0.9) saturate(0.9)'},
  {name:'Pastel',css:'saturate(0.6) brightness(1.15)'},{name:'Neon',css:'saturate(2) brightness(1.1) contrast(1.2)'}
];
var SPEEDS=[0.5,0.75,1,1.5,2,3];

sb.auth.getSession().then(function(r){
  if(!r.data.session){location.href='/';return;}
  currentUser=r.data.session.user;init();
  var p=new URLSearchParams(location.search);
  var d=p.get('duet'),s=p.get('stitch'),rm=p.get('remix');
  if(d||s||rm){setMode('video');loadCollabMode(d||s||rm,d?'duet':s?'stitch':'remix');}
});

function init(){
  var fg=document.getElementById('filterGrid');
  FILTERS.forEach(function(f,i){
    var c=document.createElement('button');c.className='chip'+(i===0?' active':'');c.textContent=f.name;
    c.onclick=function(){
      document.querySelectorAll('#filterGrid .chip').forEach(function(x){x.classList.remove('active');});
      c.classList.add('active');_filter=f.css;
      if(_mediaEl)_mediaEl.style.filter=f.css==='none'?'':f.css;
    };
    fg.appendChild(c);
  });
  var sr=document.getElementById('speedRow');
  SPEEDS.forEach(function(sp){
    var b=document.createElement('button');b.className='chip'+(sp===1?' active':'');b.textContent=sp+'x';
    b.onclick=function(){
      document.querySelectorAll('#speedRow .chip').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');_speed=sp;if(_mediaEl&&_mediaEl.tagName==='VIDEO')_mediaEl.playbackRate=sp;
    };
    sr.appendChild(b);
  });
  document.getElementById('fileInput').addEventListener('change',handleFiles);
  document.getElementById('trimStart').addEventListener('input',function(){
    _trimStart=parseFloat(this.value)/100;
    if(_mediaDuration){document.getElementById('trimStartVal').textContent=fmtTime(_trimStart*_mediaDuration);if(_mediaEl&&_mediaEl.tagName==='VIDEO')_mediaEl.currentTime=_trimStart*_mediaDuration;}
  });
  document.getElementById('trimEnd').addEventListener('input',function(){
    _trimEnd=parseFloat(this.value)/100;
    if(_mediaDuration)document.getElementById('trimEndVal').textContent=fmtTime(_trimEnd*_mediaDuration);
  });
  var uz=document.getElementById('uploadZone');
  uz.addEventListener('dragover',function(e){e.preventDefault();uz.classList.add('dragover');});
  uz.addEventListener('dragleave',function(){uz.classList.remove('dragover');});
  uz.addEventListener('drop',function(e){e.preventDefault();uz.classList.remove('dragover');if(e.dataTransfer.files.length){document.getElementById('fileInput').files=e.dataTransfer.files;handleFiles({target:{files:e.dataTransfer.files}});}});
  setTimeout(loadSounds,800);
}

function setMode(m){
  _mode=m;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.mode===m);});
  var inp=document.getElementById('fileInput');
  var icon=document.getElementById('uploadIcon'),txt=document.getElementById('uploadText');
  if(m==='photo'){inp.accept='image/*';inp.multiple=false;icon.innerHTML='&#128247;';txt.innerHTML='Toca para seleccionar foto<small>JPG, PNG, WebP &bull; Max 50MB</small>';}
  else if(m==='video'){inp.accept='video/*';inp.multiple=false;icon.innerHTML='&#127909;';txt.innerHTML='Toca para seleccionar video<small>MP4, WebM &bull; Max 60s, 50MB</small>';}
  else{inp.accept='image/*';inp.multiple=true;icon.innerHTML='&#128444;';txt.innerHTML='Toca para seleccionar multiples fotos<small>Hasta 10 fotos</small>';}
  document.getElementById('speedSection').style.display=m==='video'?'block':'none';
  document.getElementById('trimSection').style.display=m==='video'?'block':'none';
  // reset
  _files=[];_mediaEl=null;_mediaDuration=0;_textOverlays=[];
  var pa=document.getElementById('previewArea');
  pa.querySelectorAll('video,img,.text-overlay').forEach(function(e){e.remove();});
  document.getElementById('uploadZone').style.display='flex';
  document.getElementById('toolsPanel').style.display='none';
  document.getElementById('btnPost').disabled=true;
  document.getElementById('carouselDots').style.display='none';
}

function handleFiles(e){
  var files=Array.from(e.target.files||[]);
  if(!files.length)return;
  if(_mode==='carousel' && files.length>10)files=files.slice(0,10);
  if(_mode==='carousel' && files.length<2){showToast('Selecciona al menos 2 fotos para carrusel',true);return;}
  _files=files;
  var pa=document.getElementById('previewArea');
  document.getElementById('uploadZone').style.display='none';
  pa.querySelectorAll('video,img,.text-overlay').forEach(function(e){e.remove();});
  if(_mode==='video'){
    var v=document.createElement('video');v.src=URL.createObjectURL(files[0]);v.autoplay=true;v.loop=true;v.muted=true;v.playsInline=true;v.setAttribute('playsinline','');
    v.addEventListener('loadedmetadata',function(){
      _mediaDuration=v.duration;
      document.getElementById('trimEndVal').textContent=fmtTime(_mediaDuration);
      if(_mediaDuration>60){_trimEnd=60/_mediaDuration;document.getElementById('trimEnd').value=_trimEnd*100;document.getElementById('trimEndVal').textContent='1:00';showToast('Video recortado a 60s',false);}
    });
    v.addEventListener('click',function(){if(v.paused)v.play();else v.pause();});
    pa.insertBefore(v,pa.firstChild);_mediaEl=v;
  } else if(_mode==='photo'){
    var img=document.createElement('img');img.src=URL.createObjectURL(files[0]);pa.insertBefore(img,pa.firstChild);_mediaEl=img;
  } else {
    // carousel
    var dots=document.getElementById('carouselDots');dots.innerHTML='';dots.style.display='flex';
    files.forEach(function(f,i){
      var d=document.createElement('div');d.className='c-dot'+(i===0?' active':'');dots.appendChild(d);
    });
    var img=document.createElement('img');img.src=URL.createObjectURL(files[0]);pa.insertBefore(img,pa.firstChild);_mediaEl=img;
    var idx=0;
    pa.addEventListener('click',function(e){
      if(e.target.tagName!=='IMG')return;
      idx=(idx+1)%files.length;
      _mediaEl.src=URL.createObjectURL(files[idx]);
      dots.querySelectorAll('.c-dot').forEach(function(x,j){x.classList.toggle('active',j===idx);});
    });
  }
  document.getElementById('toolsPanel').style.display='block';
  document.getElementById('btnPost').disabled=false;
}

function addTextOverlay(){
  var t=document.getElementById('textInput').value.trim();if(!t)return;
  var pa=document.getElementById('previewArea');
  var el=document.createElement('div');el.className='text-overlay';el.textContent=t;el.style.top='40%';el.style.left='10%';
  pa.appendChild(el);_textOverlays.push({text:t,x:10,y:40});
  document.getElementById('textInput').value='';
  makeDraggable(el,pa);
}

function makeDraggable(el,parent){
  var dragging=false,ox=0,oy=0;
  el.addEventListener('mousedown',function(e){dragging=true;ox=e.offsetX;oy=e.offsetY;
    function mm(e2){if(!dragging)return;var pr=parent.getBoundingClientRect();
      el.style.left=Math.max(0,Math.min(80,(e2.clientX-ox-pr.left)/pr.width*100))+'%';
      el.style.top=Math.max(0,Math.min(90,(e2.clientY-oy-pr.top)/pr.height*100))+'%';}
    function mu(){dragging=false;document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);}
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
  el.addEventListener('touchstart',function(e){dragging=true;var r=el.getBoundingClientRect();ox=e.touches[0].clientX-r.left;oy=e.touches[0].clientY-r.top;},{passive:true});
  el.addEventListener('touchmove',function(e){if(!dragging)return;var pr=parent.getBoundingClientRect();
    el.style.left=Math.max(0,Math.min(80,(e.touches[0].clientX-ox-pr.left)/pr.width*100))+'%';
    el.style.top=Math.max(0,Math.min(90,(e.touches[0].clientY-oy-pr.top)/pr.height*100))+'%';},{passive:true});
  el.addEventListener('touchend',function(){dragging=false;});
}

function togglePpvPrice(){
  var on=document.getElementById('togPpv').classList.contains('on');
  document.getElementById('ppvPriceWrap').classList.toggle('show',on);
}

function addPollOption(){
  if(_pollOptions.length>=4){showToast('Maximo 4 opciones',true);return;}
  _pollOptions.push('');renderPoll();
}
function removePollOption(i){_pollOptions.splice(i,1);renderPoll();}
function renderPoll(){
  var c=document.getElementById('pollOptions');c.innerHTML='';
  _pollOptions.forEach(function(opt,i){
    var row=document.createElement('div');row.className='poll-opt-row';
    var inp=document.createElement('input');inp.className='inp';inp.placeholder='Opcion '+(i+1);inp.value=opt;inp.oninput=function(){_pollOptions[i]=this.value;};
    var rm=document.createElement('button');rm.className='poll-remove';rm.textContent='✕';rm.onclick=function(){removePollOption(i);};
    row.appendChild(inp);row.appendChild(rm);c.appendChild(row);
  });
}

async function loadSounds(){
  try {
    var r=await sb.from('sounds').select('id,name,artist,audio_url,uses_count').order('uses_count',{ascending:false}).limit(50);
    if(r.data&&r.data.length){_allSounds=r.data;renderSoundList(r.data);}
    else{document.getElementById('audioList').innerHTML='<div style="padding:12px;text-align:center;color:#5a8aaa;font-size:12px">Sin sonidos</div>';}
  } catch(e){
    document.getElementById('audioList').innerHTML='<div style="padding:12px;text-align:center;color:#5a8aaa;font-size:12px">Error cargando</div>';
  }
}
function renderSoundList(sounds){
  var l=document.getElementById('audioList');l.innerHTML='';
  if(!sounds.length){l.innerHTML='<div style="padding:12px;text-align:center;color:#5a8aaa;font-size:12px">Sin resultados</div>';return;}
  sounds.forEach(function(s){
    var it=document.createElement('div');it.className='audio-item';
    it.innerHTML='<button class="ai-play" onclick="event.stopPropagation();previewSound(\''+s.id+'\')">▶</button><div class="ai-info"><div class="ai-name">'+(s.name||'Sin nombre')+'</div><div class="ai-artist">'+(s.artist||'Original')+'</div></div><div style="font-size:10px;color:#5a8aaa">'+(s.uses_count||0)+'</div>';
    it.onclick=function(){selectSound(s,it);};
    l.appendChild(it);
  });
}
function searchSounds(q){if(!q){renderSoundList(_allSounds);return;}var f=_allSounds.filter(function(s){return (s.name||'').toLowerCase().includes(q.toLowerCase())||(s.artist||'').toLowerCase().includes(q.toLowerCase());});renderSoundList(f);}
function selectSound(s,el){_selectedSound=s;document.querySelectorAll('.audio-item').forEach(function(x){x.classList.remove('selected');});el.classList.add('selected');document.getElementById('clearAudioBtn').classList.add('show');}
function clearSelectedSound(){_selectedSound=null;document.querySelectorAll('.audio-item').forEach(function(x){x.classList.remove('selected');});document.getElementById('clearAudioBtn').classList.remove('show');}
function previewSound(id){var s=_allSounds.find(function(x){return x.id===id;});if(!s||!s.audio_url)return;if(_previewAudio){_previewAudio.pause();_previewAudio=null;}_previewAudio=new Audio(s.audio_url);_previewAudio.play().catch(function(e){console.warn("[silent]",e);});}

async function loadCollabMode(pid,type){
  _collabType=type;_originalPostId=pid;
  var r=await sb.from('posts').select('media_url,user_id,profiles(username)').eq('id',pid).single();
  if(!r.data)return;
  var b=document.createElement('div');b.className='collab-banner';
  b.innerHTML='<span class="collab-banner-icon">'+(type==='duet'?'🎬':type==='stitch'?'✂️':'🔄')+'</span><div><div class="collab-banner-type">'+type.toUpperCase()+'</div><div class="collab-banner-text">Con @'+(r.data.profiles&&r.data.profiles.username||'usuario')+'</div></div>';
  document.querySelector('header').after(b);
  document.getElementById('hdrTitle').textContent=type.toUpperCase();
}

async function publishPost(){
  if(!_files.length||!currentUser){showToast('Selecciona un archivo primero',true);return;}
  var btn=document.getElementById('btnPost');btn.disabled=true;btn.textContent='Subiendo...';
  var fill=document.getElementById('uploadFill');fill.style.width='5%';
  try {
    var urls=[];
    for(var i=0;i<_files.length;i++){
      var f=_files[i];
      var ext=f.name.split('.').pop().toLowerCase()||(f.type.startsWith('video')?'mp4':'jpg');
      var folder=_mode==='video'?'videos':'images';
      var path=folder+'/'+currentUser.id+'/'+Date.now()+'-'+i+'.'+ext;
      var up=await sb.storage.from('media').upload(path,f,{contentType:f.type,upsert:false});
      if(up.error)throw up.error;
      var pub=sb.storage.from('media').getPublicUrl(path);
      urls.push(pub.data.publicUrl);
      fill.style.width=(10+(i+1)/_files.length*70)+'%';
    }
    var isReel=document.getElementById('togReel').classList.contains('on') && _mode==='video';
    var isNsfw=document.getElementById('togNsfw').classList.contains('on');
    var isSub=document.getElementById('togSubOnly').classList.contains('on');
    var isPpv=document.getElementById('togPpv').classList.contains('on');
    var ppvPriceVal=isPpv?Math.max(10,parseInt(document.getElementById('ppvPrice').value||20)):null;
    var caption=document.getElementById('captionText').value.trim();
    var category=document.getElementById('catSelect').value||null;
    var sched=document.getElementById('scheduleInput').value;
    var mediaType=_mode==='video'?'video':(_mode==='carousel'?'carousel':'image');
    var trimStartMs=_mode==='video'?Math.round(_trimStart*_mediaDuration*1000):0;
    var trimEndMs=_mode==='video'?Math.round(_trimEnd*_mediaDuration*1000):0;
    fill.style.width='85%';
    var postData={
      user_id:currentUser.id,
      content:caption||null,
      media_url:urls[0],
      media_urls:urls.length>1?urls:null,
      media_type:mediaType,
      is_reel:isReel,
      is_premium:isNsfw,
      content_rating:isNsfw?'nsfw':'sfw',
      is_subscriber_only:isSub,
      is_ppv:isPpv,
      ppv_price:ppvPriceVal,
      category:category,
      video_duration_ms:trimEndMs?trimEndMs-trimStartMs:null,
      video_filter:_filter==='none'?null:_filter,
      video_speed:_mode==='video'?_speed:null,
      text_overlays:_textOverlays.length?JSON.stringify(_textOverlays):null,
      audio_track:_selectedSound?_selectedSound.name:null,
      sound_id:_selectedSound?_selectedSound.id:null,
      scheduled_at:sched?new Date(sched).toISOString():null,
      is_published:!sched,
      collab_type:_collabType||null,
      original_post_id:_originalPostId||null
    };
    var ins=await sb.from('posts').insert(postData).select('id').single();
    if(ins.error)throw ins.error;
    var validPoll=_pollOptions.filter(function(o){return o.trim();});
    if(validPoll.length>=2 && ins.data){
      await sb.from('polls').insert({post_id:ins.data.id,question:'',options:validPoll.map(function(o){return{text:o,votes:0};}),total_votes:0}).catch(function(e){console.warn("[silent]",e);});
    }
    fill.style.width='100%';
    showToast(sched?'✅ Programado':'✅ Publicado');
    setTimeout(function(){location.href=isReel?'/reels.html':'/feed.html';},800);
  } catch(err){
    btn.disabled=false;btn.textContent='PUBLICAR';fill.style.width='0';
    showToast('Error: '+(err.message||err),true);
  }
}

function showToast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.borderColor=err?'#ff2255':'#00ff88';t.style.color=err?'#ff2255':'#00ff88';
  t.style.display='block';setTimeout(function(){t.style.display='none';},3500);
}
function fmtTime(s){var m=Math.floor(s/60);var sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
