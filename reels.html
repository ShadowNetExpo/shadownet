.reel-play-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;color:rgba(255,255,255,.8);opacity:0;transition:opacity .3s;pointer-events:none}

/* === REELS ENHANCEMENTS === */
/* Sound bar - TikTok style */
.reel-sound-bar{position:absolute;bottom:70px;left:12px;right:80px;display:flex;align-items:center;gap:8px;z-index:5}
.sound-disc{width:36px;height:36px;border-radius:50%;background:#1a1a1a;border:2px solid #333;display:flex;align-items:center;justify-content:center;animation:discSpin 3s linear infinite;overflow:hidden;flex-shrink:0}

.sound-name{font-size:12px;color:#fff;overflow:hidden;white-space:nowrap;max-width:200px}
.sound-name span{display:inline-block;animation:marquee 8s linear infinite}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* Double-tap heart animation */
.double-tap-heart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:80px;z-index:20;pointer-events:none;filter:drop-shadow(0 0 12px rgba(255,34,85,.5))}
.double-tap-heart.show{animation:heartPop .8s ease forwards}
@keyframes heartPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}

/* Video progress bar */

.cd-send:active{transform:scale(.9)}

/* Share sheet */
.share-sheet{position:fixed;bottom:0;left:0;right:0;background:rgba(7,15,30,.98);border-radius:16px 16px 0 0;z-index:100;transform:translateY(100%);transition:transform .3s;padding:20px;backdrop-filter:blur(16px)}
.share-sheet.open{transform:translateY(0)}
.share-options{display:flex;gap:16px;justify-content:center;padding:16px 0}

.share-opt-icon:active{transform:scale(.9)}
.share-opt-label{font-size:10px;color:#8a9bb0}

/* Creator info overlay */
.reel-creator{position:absolute;bottom:90px;left:12px;z-index:5}
.reel-creator-name{font-size:14px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8);display:flex;align-items:center;gap:6px}
.reel-creator-name .verified{color:#00e5ff;font-size:11px}
.reel-caption{font-size:12px;color:rgba(255,255,255,.8);margin-top:4px;max-width:240px;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.reel-hashtags{margin-top:4px}
.reel-hashtags span{color:#00e5ff;font-size:12px;cursor:pointer;margin-right:6px}

/* Overlay for drawer background */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
.drawer-overlay.open{display:block}

<script>
var SB_URL='https://cdokplvoqivducsqrejt.supabase.co';
var SB_KEY='sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su';
var sb=supabase.createClient(SB_URL,SB_KEY);window.sb=sb;
var currentUser=null;var _reels=[];var _reelIdx=0;var _reelMode='foryou';var _touchStartY=0;var _swiping=false;var _showNsfw=false;

sb.auth.getSession().then(function(r){
  if(r.data.session){
    currentUser=r.data.session.user;
    window._currentUserId=currentUser.id;
    sb.from('profiles').select('show_nsfw').eq('id',currentUser.id).single().then(function(p){
      if(p.data) _showNsfw=p.data.show_nsfw||false;
    });
  }
  loadReels();
  initNav();
});

function switchReelTab(mode){
  _reelMode=mode;
  var _tfy=document.getElementById('tabForYou');if(_tfy)_tfy.classList.toggle('active',mode==='foryou');
  var _tfl=document.getElementById('tabFollowing');if(_tfl)_tfl.classList.toggle('active',mode==='following');
  _reels=[];_reelIdx=0;loadReels();
}

async function loadReels(){
  var uid=currentUser?currentUser.id:null;
  var r=await sb.rpc('get_reels_feed',{p_user_id:uid,p_limit:15,p_offset:0,p_show_nsfw:_showNsfw});
  if(r.error||!r.data||!r.data.length){
    document.getElementById('reelLoading').innerHTML='<div class="reel-empty"><div class="reel-empty-icon">&#9654;</div><div>No hay reels disponibles</div><div style="font-size:12px">Sube el primer video desde el feed</div></div>';
    return;
  }
  _reels=r.data;_reelIdx=0;renderReel(0);
}

function renderReel(idx){
  if(idx<0||idx>=_reels.length) return;
  var reel=_reels[idx];
  var container=document.getElementById('reelsContainer');
  container.innerHTML='';
  var slide=document.createElement('div');slide.className='reel-slide';
  var vid=document.createElement('video');
  vid.src=reel.media_url;vid.autoplay=true;vid.loop=true;vid.muted=false;vid.playsInline=true;
  vid.setAttribute('playsinline','');vid.setAttribute('webkit-playsinline','');
  vid.addEventListener('click',function(){
    if(vid.paused){vid.play();indicator.classList.remove('show');}
    else{vid.pause();indicator.classList.add('show');}
  });
  slide.appendChild(vid);
  var indicator=document.createElement('div');indicator.className='reel-play-indicator';indicator.textContent='\u25B6\uFE0F';
  slide.appendChild(indicator);
  var muteBtn=document.createElement('button');muteBtn.style.cssText='position:absolute;top:60px;right:16px;z-index:25;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center';muteBtn.textContent='\uD83D\uDD0A';muteBtn.onclick=function(){vid.muted=!vid.muted;muteBtn.textContent=vid.muted?'\uD83D\uDD07':'\uD83D\uDD0A';};slide.appendChild(muteBtn);
  var progress=document.createElement('div');progress.className='reel-progress';
  var progressFill=document.createElement('div');progressFill.className='reel-progress-fill';
  progress.appendChild(progressFill);slide.appendChild(progress);
  vid.addEventListener('timeupdate',function(){
    if(vid.duration){progressFill.style.width=(vid.currentTime/vid.duration*100)+'%';}
  });
  var overlay=document.createElement('div');overlay.className='reel-overlay';
  var info=document.createElement('div');info.className='reel-info';
  var un=document.createElement('div');un.className='reel-username';
  un.textContent='@'+(reel.username||'usuario');
  un.onclick=function(){location.href='profile.html?u='+encodeURIComponent(reel.username||'');};
  if(window.currentUser&&reel.user_id!==window.currentUser.id){var flb=document.createElement('button');flb.style.cssText='background:none;border:1px solid #ff2255;color:#ff2255;border-radius:16px;padding:2px 12px;font-family:Rajdhani,sans-serif;font-size:11px;font-weight:700;cursor:pointer;margin-left:8px;text-shadow:none';flb.textContent='Seguir';flb.onclick=function(e){e.stopPropagation();snFollowFromReel(reel.user_id,flb);};un.appendChild(flb);}
  info.appendChild(un);
  if(reel.content){var cap=document.createElement('div');cap.className='reel-caption';cap.textContent=reel.content;info.appendChild(cap);}
  if(reel.category){var cat=document.createElement('span');cat.className='reel-category';cat.textContent=reel.category;info.appendChild(cat);}
  if(reel.audio_track){var aud=document.createElement('div');aud.className='reel-audio';aud.innerHTML='\uD83C\uDFB5 '+reel.audio_track;info.appendChild(aud);}
  overlay.appendChild(info);slide.appendChild(overlay);
  var actions=document.createElement('div');actions.className='reel-actions';
  var av=document.createElement('div');av.className='reel-avatar';
  av.innerHTML='<img src="'+(reel.avatar_url||('https://api.dicebear.com/7.x/personas/svg?seed='+(reel.username||'u')))+'">';
  av.onclick=function(){location.href='profile.html?u='+encodeURIComponent(reel.username||'');};
  actions.appendChild(av);
  actions.appendChild(createAction('\u2764\uFE0F',reel.likes_count||0,function(icon){toggleReelLike(reel.post_id,icon);}));
  actions.appendChild(createAction('\uD83D\uDCAC',reel.comments_count||0,function(){location.href='feed.html#post-'+reel.post_id;}));
  actions.appendChild(createAction('\uD83D\uDD16',0,function(icon){snSaveReel(reel.post_id,icon);}));
  actions.appendChild(createAction('\uD83D\uDD17',reel.shares_count||0,function(){
    if(navigator.share){navigator.share({title:'SHADOWNET',url:location.origin+'/feed.html#post-'+reel.post_id}).catch(function(e){console.warn("[silent]",e);});
  // Duet + Stitch buttons
  var duetBtn=createAction('\uD83C\uDFAC',0,function(){location.href='/editor.html?duet='+reel.post_id;});
  duetBtn.querySelector('.reel-action-icon').classList.add('duet');
  duetBtn.querySelector('.reel-action-count').textContent='Duet';
  actions.appendChild(duetBtn);
  var stitchBtn=createAction('\u2702\uFE0F',0,function(){location.href='/editor.html?stitch='+reel.post_id;});
  stitchBtn.querySelector('.reel-action-icon').classList.add('duet');
  stitchBtn.querySelector('.reel-action-count').textContent='Stitch';
  actions.appendChild(stitchBtn);}
    else{navigator.clipboard.writeText(location.origin+'/feed.html#post-'+reel.post_id);}
  }));
  slide.appendChild(actions);container.appendChild(slide);
  if(currentUser){try{sb.rpc('record_watch_time',{p_user_id:currentUser.id,p_post_id:reel.post_id,p_watch_ms:3000,p_total_ms:0,p_looped:false}).then(function(){});}catch(e){}}
  if(idx+1<_reels.length){var pl=document.createElement('link');pl.rel='preload';pl.as='video';pl.href=_reels[idx+1].media_url;document.head.appendChild(pl);}
}

function createAction(icon,count,onClick){
  var wrap=document.createElement('div');wrap.className='reel-action';
  var iconEl=document.createElement('div');iconEl.className='reel-action-icon';iconEl.textContent=icon;
  iconEl.addEventListener('click',function(){onClick(iconEl);});
  var countEl=document.createElement('div');countEl.className='reel-action-count';
  countEl.textContent=count>999?(count/1000).toFixed(1)+'K':count;
  wrap.appendChild(iconEl);wrap.appendChild(countEl);return wrap;
}

async function toggleReelLike(postId,iconEl){
  if(!currentUser){location.href='/';return;}
  var uid=currentUser.id;
  var chk=await sb.from('post_likes').select('id').eq('post_id',postId).eq('user_id',uid);
  if(chk.data&&chk.data.length){
    await sb.from('post_likes').delete().eq('post_id',postId).eq('user_id',uid);
    iconEl.classList.remove('liked');
  }else{
    await sb.from('post_likes').insert({post_id:postId,user_id:uid});
    iconEl.classList.add('liked');
  }
}

document.addEventListener('touchstart',function(e){_touchStartY=e.touches[0].clientY;_swiping=true;},{passive:true});
document.addEventListener('touchend',function(e){
  if(!_swiping) return;
  var dy=e.changedTouches[0].clientY-_touchStartY;
  _swiping=false;
  if(Math.abs(dy)<50) return;
  if(dy<0&&_reelIdx<_reels.length-1){_reelIdx++;renderReel(_reelIdx);}
  else if(dy>0&&_reelIdx>0){_reelIdx--;renderReel(_reelIdx);}
  else if(dy<0&&_reelIdx>=_reels.length-1){loadMoreReels();}
},{passive:true});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowDown'&&_reelIdx<_reels.length-1){_reelIdx++;renderReel(_reelIdx);}
  else if(e.key==='ArrowUp'&&_reelIdx>0){_reelIdx--;renderReel(_reelIdx);}
  else if(e.key===' '){
    var vid=document.querySelector('.reel-slide video');
    if(vid){if(vid.paused)vid.play();else vid.pause();}
    e.preventDefault();
  }
});

async function loadMoreReels(){
  var uid=currentUser?currentUser.id:null;
  var r=await sb.rpc('get_reels_feed',{p_user_id:uid,p_limit:10,p_offset:_reels.length,p_show_nsfw:_showNsfw});
  if(r.data&&r.data.length){_reels=_reels.concat(r.data);_reelIdx++;renderReel(_reelIdx);}
}

function initNav(){
  if(!currentUser) return;
  sb.from('profiles').select('username,avatar_url').eq('id',currentUser.id).single().then(function(p){
    var a=document.getElementById('snNavAv');

    else if(p.data.username) a.textContent=p.data.username[0].toUpperCase();
  });
}

// === REELS ENHANCEMENTS ===
var _currentReelId=null,_currentReelUserId=null;

// Double-tap to like
document.addEventListener("dblclick",function(e){
  var reel=e.target.closest(".reel-container,.reel-item,.reel-card");
  if(!reel)return;
  var postId=reel.getAttribute("data-id")||reel.getAttribute("data-post-id");
  if(postId){
    toggleReelLike(postId);
    // Show heart animation
    var heart=document.createElement("div");heart.className="double-tap-heart";heart.textContent="\u2764\uFE0F";
    reel.style.position="relative";reel.appendChild(heart);
    requestAnimationFrame(function(){heart.classList.add("show");});
    setTimeout(function(){heart.remove();},900);
  }
});

// Video progress bar
function initVideoProgress(video,container){
  if(!video||!container)return;
  var bar=document.createElement("div");bar.className="reel-progress";
  var fill=document.createElement("div");fill.className="reel-progress-fill";
  bar.appendChild(fill);container.appendChild(bar);
  video.addEventListener("timeupdate",function(){
    if(video.duration){fill.style.width=(video.currentTime/video.duration*100)+"%";}
  });
}

// Sound bar renderer
function renderSoundBar(reel,container){
  if(!reel||!container)return;
  var sound=reel.sound_name||reel.audio_name||"Sonido original";
  var artist=reel.sound_artist||reel.username||"";
  var bar=document.createElement("div");bar.className="reel-sound-bar";
  bar.innerHTML='<div class="sound-disc"><span>&#127925;</span></div><div class="sound-name"><span class="sound-icon">&#127925;</span> <span>'+sound+(artist?" - "+artist:"")+'</span></div>';
  container.appendChild(bar);
}

// Creator info overlay
function renderCreatorInfo(reel,container){
  if(!reel||!container)return;
  var prof=reel.profiles||reel;
  var username=prof.username||"";
  var caption=reel.content||reel.caption||"";
  var info=document.createElement("div");info.className="reel-creator";
  var nameHTML='<div class="reel-creator-name">@'+username+(prof.is_verified?' <span class="verified">\u2713</span>':'')+'</div>';
  var captionHTML=caption?'<div class="reel-caption">'+caption.substring(0,120)+'</div>':"";
  // Extract hashtags
  var tags=(caption.match(/#[\w]+/g)||[]);
  var tagsHTML="";
  if(tags.length){tagsHTML='<div class="reel-hashtags">'+tags.map(function(t){return '<span onclick="location.href=\'search.html?q='+encodeURIComponent(t)+'\'">'+t+'</span>';}).join("")+'</div>';}
  info.innerHTML=nameHTML+captionHTML+tagsHTML;
  container.appendChild(info);
}

// Comment drawer
function openComments(postId){
  _currentReelId=postId;
  document.getElementById("drawerOverlay").classList.add("open");
  document.getElementById("commentDrawer").classList.add("open");
  loadReelComments(postId);
}
async function loadReelComments(postId){
  var list=document.getElementById("cdList");if(!list)return;
  list.innerHTML='<div style="text-align:center;padding:30px;color:#5a8aaa">Cargando...</div>';
  if(!window.sb)return;
  var r=await window.sb.from("comments").select("*,profiles:user_id(username,avatar_url)").eq("post_id",postId).order("created_at",{ascending:true}).limit(50);
  if(!r.data||!r.data.length){list.innerHTML='<div style="text-align:center;padding:40px;color:#5a8aaa">Sin comentarios a\u00FAn. \u00A1S\u00E9 el primero!</div>';return;}
  list.innerHTML="";
  r.data.forEach(function(c){
    var prof=c.profiles||{};
    var av=prof.avatar_url?'<img src="'+prof.avatar_url+'">':((prof.username||"?")[0].toUpperCase());
    var ago=Math.floor((Date.now()-new Date(c.created_at))/60000);
    var time=ago<60?ago+"m":ago<1440?Math.floor(ago/60)+"h":Math.floor(ago/1440)+"d";
    var item=document.createElement("div");item.className="cd-item";
    item.innerHTML='<div class="cd-avatar">'+av+'</div><div class="cd-body"><div class="cd-user">@'+(prof.username||"")+'</div><div class="cd-text">'+c.content+'</div><div class="cd-time">'+time+'</div></div>';
    list.appendChild(item);
  });
  list.scrollTop=list.scrollHeight;
}
async function postReelComment(){
  var input=document.getElementById("cdInput");if(!input||!input.value.trim()||!_currentReelId||!window.sb||!window.currentUser)return;
  var content=input.value.trim();input.value="";
  await window.sb.from("comments").insert({post_id:_currentReelId,user_id:window.currentUser.id,content:content});
  loadReelComments(_currentReelId);
}

// Share sheet
function openShare(postId){
  _currentReelId=postId;
  document.getElementById("drawerOverlay").classList.add("open");
  document.getElementById("shareSheet").classList.add("open");
}
function shareAction(type){
  var url="https://shadownet-xi.vercel.app/reels.html#"+_currentReelId;
  if(type==="copy"){navigator.clipboard.writeText(url);if(window.showToast)showToast("Link copiado");}
  else if(type==="whatsapp")window.open("https://wa.me/?text="+encodeURIComponent("Mira este reel en SHADOWNET "+url));
  else if(type==="twitter")window.open("https://twitter.com/intent/tweet?url="+encodeURIComponent(url)+"&text="+encodeURIComponent("Mira esto en SHADOWNET"));
  else if(type==="telegram")window.open("https://t.me/share/url?url="+encodeURIComponent(url));
  closeDrawers();
}

function closeDrawers(){
  document.getElementById("drawerOverlay").classList.remove("open");
  document.getElementById("commentDrawer").classList.remove("open");
  document.getElementById("shareSheet").classList.remove("open");
}

// Hook into renderReel to add enhancements
(function(){
  var origRender=window.renderReel;
  if(!origRender)return;
  window.renderReel=function(reel){
    var el=origRender.apply(this,arguments);
    if(el){
      if(reel&&reel.id){el.setAttribute("data-post-id",reel.id);if(reel.is_subscriber_only||reel.is_ppv||reel.ppv_price>0)el.setAttribute("data-premium","true");el.setAttribute("data-watermark","@"+(reel.username||""));}
      var video=el.querySelector("video");
      if(video)initVideoProgress(video,el);
      renderSoundBar(reel,el);
      renderCreatorInfo(reel,el);
    }
    return el;
  };
})();
