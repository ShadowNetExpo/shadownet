<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHADOWNET — Stories</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:100;padding:12px 20px;background:rgba(1,2,12,.97);border-bottom:1px solid #0d2744;display:flex;align-items:center;gap:12px}
.logo{font-family:Orbitron,sans-serif;font-size:15px;color:#ff2255;letter-spacing:.12em;cursor:pointer}
.page-title{font-family:Orbitron,sans-serif;font-size:12px;color:#5a8aaa;letter-spacing:.1em}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
/* Stories row */
.stories-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;margin-bottom:24px;scrollbar-width:none}
.stories-row::-webkit-scrollbar{display:none}
.story-bubble{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0}
.story-ring{width:62px;height:62px;border-radius:50%;padding:2px;background:linear-gradient(135deg,#ff2255,#ffaa00,#ff2255);position:relative}
.story-ring.seen{background:linear-gradient(135deg,#333,#555)}
.story-ring.add{background:linear-gradient(135deg,#0d2744,#1a3a60)}
.story-av{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#fff;border:2px solid #01020c;overflow:hidden}
.story-av img{width:100%;height:100%;object-fit:cover}
.story-add-icon{position:absolute;bottom:0;right:0;width:20px;height:20px;background:#ff2255;border-radius:50%;border:2px solid #01020c;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:800}
.story-name{font-size:11px;color:#c8d8e8;text-align:center;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Story viewer */
.story-viewer{position:fixed;inset:0;background:#000;z-index:9999;display:none;flex-direction:column}
.story-viewer.open{display:flex}
.sv-header{position:absolute;top:0;left:0;right:0;z-index:10;padding:12px 16px;display:flex;align-items:center;gap:10px}
.sv-progress{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
.sv-progress-fill{height:100%;background:#fff;width:0%;transition:width linear}
.sv-user{display:flex;align-items:center;gap:8px;color:#fff}
.sv-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;overflow:hidden}
.sv-av img{width:100%;height:100%;object-fit:cover}
.sv-username{font-weight:700;font-size:13px}
.sv-time{font-size:11px;color:rgba(255,255,255,.6)}
.sv-close{margin-left:auto;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;line-height:1}
.sv-media{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.sv-media img,.sv-media video{max-width:100%;max-height:100%;object-fit:contain}
.sv-caption{position:absolute;bottom:80px;left:0;right:0;padding:16px;text-align:center;color:#fff;font-size:15px;text-shadow:0 1px 4px rgba(0,0,0,.8);background:linear-gradient(transparent,rgba(0,0,0,.5))}
.sv-nav{position:absolute;top:60px;bottom:80px;display:flex}
.sv-prev{width:40%;cursor:pointer}
.sv-next{width:60%;margin-left:auto;cursor:pointer}
.sv-footer{padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.sv-reply{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:24px;padding:10px 16px;font-family:Rajdhani,sans-serif;font-size:13px;outline:none}
.sv-views{font-size:12px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:4px}
/* Upload */
.upload-box{background:rgba(7,15,30,.7);border:2px dashed #0d2744;border-radius:12px;padding:24px;text-align:center;cursor:pointer;margin-bottom:24px;transition:border-color .2s;position:relative}
.upload-box:hover{border-color:#ff2255}
.upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:36px;margin-bottom:10px}
.upload-label{font-size:14px;color:#5a8aaa;font-weight:700}
.upload-sub{font-size:12px;color:#3a5060;margin-top:4px}
.caption-inp{width:100%;padding:10px 14px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-family:Rajdhani,sans-serif;font-size:14px;outline:none;margin-bottom:10px}
.caption-inp:focus{border-color:#ff2255}
.publish-btn{width:100%;padding:12px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:14px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;margin-bottom:24px}
.publish-btn:disabled{opacity:.4;cursor:not-allowed}
.preview-box{display:none;margin-bottom:12px;border-radius:8px;overflow:hidden;max-height:200px}
.preview-box img,.preview-box video{width:100%;border-radius:8px;max-height:200px;object-fit:cover}
.section-title{font-family:Orbitron,sans-serif;font-size:12px;color:#5a8aaa;letter-spacing:.1em;margin-bottom:14px;padding-bottom:8px;border-top:1px solid #0d2744;padding-top:20px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(7,15,30,.95);border:1px solid #00ff88;color:#00ff88;padding:10px 20px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;z-index:9999;display:none;white-space:nowrap}
</style>
</head>
<body>
<header>
  <span class="logo" onclick="window.location.href='/'">SN</span>
  <span class="page-title">STORIES</span>
</header>
<div class="wrap">
  <div class="stories-row" id="storiesRow">
    <div style="color:#5a8aaa;font-size:13px;padding:20px">Cargando...</div>
  </div>
  <div id="uploadSection" style="display:none">
    <div class="section-title">CREAR STORY</div>
    <div class="upload-box" id="uploadBox">
      <input type="file" id="storyFile" accept="image/*,video/*">
      <div class="upload-icon">📸</div>
      <div class="upload-label">Toca para subir foto o video</div>
      <div class="upload-sub">La story desaparece en 24 horas</div>
    </div>
    <div class="preview-box" id="previewBox"></div>
    <input class="caption-inp" id="captionInp" placeholder="Escribe un caption... (opcional)">
    <button class="publish-btn" id="publishBtn" onclick="publishStory()" disabled>
      ⏰ PUBLICAR STORY (24H)
    </button>
  </div>
</div>
<!-- Story Viewer -->
<div class="story-viewer" id="storyViewer">
  <div class="sv-header">
    <div class="sv-progress"><div class="sv-progress-fill" id="svProgressFill"></div></div>
    <div class="sv-user">
      <div class="sv-av" id="svAv"></div>
      <div>
        <div class="sv-username" id="svUsername"></div>
        <div class="sv-time" id="svTime"></div>
      </div>
    </div>
    <button class="sv-close" onclick="closeStoryViewer()">✕</button>
  </div>
  <div class="sv-media" id="svMedia"></div>
  <div class="sv-caption" id="svCaption"></div>
  <div class="sv-nav">
    <div class="sv-prev" onclick="prevStory()"></div>
    <div class="sv-next" onclick="nextStory()"></div>
  </div>
  <div class="sv-footer">
    <input class="sv-reply" id="svReply" placeholder="Responder a la story...">
    <div class="sv-views" id="svViews">👁 0</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var SB_URL="https://cdokplvoqivducsqrejt.supabase.co";
var SB_KEY="sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su";
var sb=supabase.createClient(SB_URL,SB_KEY);
var currentUser=null;
var currentProfile=null;
var allStories=[];
var storyGroups=[];
var activeGroupIdx=0;
var activeStoryIdx=0;
var storyTimer=null;
var storyDuration=5000;
var storyFile=null;

sb.auth.getSession().then(function(r){
  if(!r.data.session){window.location.href="/";return;}
  currentUser=r.data.session.user;
  sb.from("profiles").select("username,avatar_url,role").eq("id",currentUser.id).single().then(function(p){
    currentProfile=p.data;
    if(p.data&&p.data.role==="creator") document.getElementById("uploadSection").style.display="block";
    loadStories();
  });
});

async function loadStories(){
  var row=document.getElementById("storiesRow");
  var r=await sb.from("stories").select("*,profiles(id,username,avatar_url)").gt("expires_at",new Date().toISOString()).order("created_at",{ascending:false}).limit(50);
  if(r.error||!r.data||r.data.length===0){row.innerHTML="<div style=\"color:#5a8aaa;font-size:13px;padding:16px 0\">No hay stories activos</div>";return;}
  // Group by user
  var groups={};
  r.data.forEach(function(s){
    var uid=s.user_id;
    if(!groups[uid]) groups[uid]={user:s.profiles,stories:[]};
    groups[uid].stories.push(s);
  });
  storyGroups=Object.values(groups);
  row.innerHTML="";
  // My story bubble (add)
  if(currentProfile?.role==="creator"){
    var addBubble=document.createElement("div");addBubble.className="story-bubble";
    addBubble.innerHTML="<div class=\"story-ring add\" style=\"position:relative\">"
      +"<div class=\"story-av\">"+(currentProfile?.avatar_url?"<img src=\""+currentProfile.avatar_url+"\">":(currentProfile?.username||"?")[0].toUpperCase())+"</div>"
      +"<div class=\"story-add-icon\">+</div></div><div class=\"story-name\">Tu story</div>";
    addBubble.addEventListener("click",function(){document.getElementById("uploadSection").scrollIntoView({behavior:"smooth"});});
    row.appendChild(addBubble);
  }
  storyGroups.forEach(function(g,idx){
    var bubble=document.createElement("div");bubble.className="story-bubble";
    var uname=g.user?.username||"usuario";
    var avHTML=g.user?.avatar_url?"<img src=\""+g.user.avatar_url+"\">":(uname[0]||"?").toUpperCase();
    bubble.innerHTML="<div class=\"story-ring\"><div class=\"story-av\">"+avHTML+"</div></div><div class=\"story-name\">@"+uname+"</div>";
    bubble.addEventListener("click",function(){openStoryGroup(idx);});
    row.appendChild(bubble);
  });
}

function openStoryGroup(idx){
  activeGroupIdx=idx;
  activeStoryIdx=0;
  showStory();
  document.getElementById("storyViewer").classList.add("open");
}

function showStory(){
  var group=storyGroups[activeGroupIdx];
  if(!group)return;
  var story=group.stories[activeStoryIdx];
  if(!story)return;
  var uname=group.user?.username||"usuario";
  var svAv=document.getElementById("svAv");
  svAv.innerHTML=group.user?.avatar_url?"<img src=\""+group.user.avatar_url+"\">":(uname[0]||"?").toUpperCase();
  document.getElementById("svUsername").textContent="@"+uname;
  document.getElementById("svTime").textContent=getTimeLeft(story.expires_at);
  document.getElementById("svCaption").textContent=story.caption||"";
  document.getElementById("svViews").textContent="👁 "+(story.views_count||0);
  var media=document.getElementById("svMedia");
  media.innerHTML="";
  if(story.media_type==="video"){var vid=document.createElement("video");vid.src=story.media_url;vid.autoplay=true;vid.muted=false;vid.loop=false;media.appendChild(vid);storyDuration=15000;}
  else{var img=document.createElement("img");img.src=story.media_url;media.appendChild(img);storyDuration=5000;}
  // Progress bar
  var fill=document.getElementById("svProgressFill");
  fill.style.transition="none";fill.style.width="0%";
  setTimeout(function(){fill.style.transition="width "+storyDuration+"ms linear";fill.style.width="100%";},50);
  // Auto advance
  clearTimeout(storyTimer);
  storyTimer=setTimeout(nextStory,storyDuration);
  // Record view
  if(currentUser) sb.from("story_views").upsert({story_id:story.id,user_id:currentUser.id}).then(function(){
    sb.from("stories").update({views_count:(story.views_count||0)+1}).eq("id",story.id).then(function(){});
  });
}

function nextStory(){
  clearTimeout(storyTimer);
  var group=storyGroups[activeGroupIdx];
  if(activeStoryIdx<(group.stories.length-1)){activeStoryIdx++;showStory();}
  else if(activeGroupIdx<storyGroups.length-1){activeGroupIdx++;activeStoryIdx=0;showStory();}
  else closeStoryViewer();
}

function prevStory(){
  clearTimeout(storyTimer);
  if(activeStoryIdx>0){activeStoryIdx--;showStory();}
  else if(activeGroupIdx>0){activeGroupIdx--;activeStoryIdx=storyGroups[activeGroupIdx].stories.length-1;showStory();}
}

function closeStoryViewer(){
  clearTimeout(storyTimer);
  document.getElementById("storyViewer").classList.remove("open");
  document.getElementById("svMedia").innerHTML="";
  document.getElementById("svProgressFill").style.transition="none";
  document.getElementById("svProgressFill").style.width="0%";
}

document.getElementById("storyFile").addEventListener("change",function(){
  storyFile=this.files[0];
  var preview=document.getElementById("previewBox");
  var btn=document.getElementById("publishBtn");
  if(!storyFile){preview.style.display="none";btn.disabled=true;return;}
  preview.innerHTML="";preview.style.display="block";
  var url=URL.createObjectURL(storyFile);
  if(storyFile.type.startsWith("video")){var vid=document.createElement("video");vid.src=url;vid.controls=true;preview.appendChild(vid);}
  else{var img=document.createElement("img");img.src=url;preview.appendChild(img);}
  btn.disabled=false;
});

async function publishStory(){
  if(!storyFile||!currentUser)return;
  var btn=document.getElementById("publishBtn");
  btn.disabled=true;btn.textContent="Subiendo...";
  var ext=storyFile.name.split(".").pop();
  var path="stories/"+currentUser.id+"/"+Date.now()+"."+ext;
  var up=await sb.storage.from("media").upload(path,storyFile,{upsert:true});
  if(up.error){showToast("Error: "+up.error.message,true);btn.disabled=false;btn.textContent="⏰ PUBLICAR STORY";return;}
  var url=sb.storage.from("media").getPublicUrl(path).data.publicUrl;
  var caption=document.getElementById("captionInp").value.trim();
  var mt=storyFile.type.startsWith("video")?"video":"image";
  var r=await sb.from("stories").insert({user_id:currentUser.id,media_url:url,media_type:mt,caption:caption||null});
  if(r.error){showToast("Error: "+r.error.message,true);}
  else{showToast("✓ Story publicado. Expira en 24h.");document.getElementById("captionInp").value="";document.getElementById("previewBox").style.display="none";storyFile=null;loadStories();}
  btn.disabled=false;btn.textContent="⏰ PUBLICAR STORY (24H)";
}

function getTimeLeft(exp){
  var diff=(new Date(exp)-Date.now())/3600000;
  if(diff<1)return Math.round(diff*60)+"min restantes";
  return Math.round(diff)+"h restantes";
}

function getTimeAgo(ts){
  var d=(Date.now()-new Date(ts))/1000;
  if(d<60)return "ahora";if(d<3600)return Math.floor(d/60)+"m";return Math.floor(d/3600)+"h";
}

function showToast(msg,err){
  var t=document.getElementById("toast");
  t.textContent=msg;t.style.borderColor=err?"#ff2255":"#00ff88";t.style.color=err?"#ff2255":"#00ff88";
  t.style.display="block";setTimeout(function(){t.style.display="none";},3000);
}
</script>
</body>
</html>
