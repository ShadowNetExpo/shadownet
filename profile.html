<!DOCTYPE html>
<html lang="es">
<head>
<script>
(function(){
  // Clear all service worker caches immediately
  if('caches' in window){
    caches.keys().then(function(k){k.forEach(function(n){caches.delete(n);});});
  }
  // Unregister any old service worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){
        if(r.active&&r.active.scriptURL&&r.active.scriptURL.indexOf('sw.js')>-1){
          // Only unregister if it's an old version (not v5)
          r.active.postMessage({type:'GET_VERSION'});
        }
      });
    });
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff2255">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SHADOWNET">
<link rel="apple-touch-icon" href="/icon.svg">
<title>SHADOWNET</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/sn-design.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;min-height:100vh;padding-bottom:72px}
header{position:sticky;top:0;z-index:100;padding:10px 16px;background:rgba(1,2,12,.97);border-bottom:1px solid #0d2744;display:flex;align-items:center;gap:10px}
.logo{font-family:Orbitron,sans-serif;font-size:14px;color:#ff2255;letter-spacing:.12em;cursor:pointer}
.back-btn{padding:6px 12px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:11px;cursor:pointer;margin-left:auto}
.back-btn:hover{border-color:#00e5ff;color:#00e5ff}
.profile-cover{width:100%;height:220px;background:linear-gradient(135deg,#1a0020 0%,#000814 50%,#0a0020 100%);position:relative;overflow:hidden}
.profile-cover img{width:100%;height:100%;object-fit:cover;transition:object-position .08s linear;cursor:grab;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}.profile-cover img.dragging{cursor:grabbing;transition:none}
.highlights-row{padding:12px 16px 8px;border-bottom:1px solid #0d2744;background:rgba(7,15,30,.4);display:flex;gap:16px;overflow-x:auto;scrollbar-width:none}
.highlights-row::-webkit-scrollbar{display:none}
.highlight-bubble{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;min-width:64px}
.highlight-ring{width:60px;height:60px;border-radius:50%;padding:2px;background:linear-gradient(135deg,#0d2744,#1e3a55);border:2px solid #0d2744;overflow:hidden;display:flex;align-items:center;justify-content:center}
.highlight-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.highlight-ring-add{background:rgba(1,2,12,.6);border:2px dashed rgba(0,229,255,.3)}
.highlight-ring-add-icon{font-size:24px;color:rgba(0,229,255,.6)}
.highlight-name{font-size:10px;color:#c8d8e8;text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.02em}
.highlight-add-name{color:rgba(0,229,255,.7)}
/* Highlight modal */
.highlight-modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:none;align-items:center;justify-content:center}
.highlight-modal.open{display:flex}
.highlight-box{background:#070f1e;border:1px solid #0d2744;border-radius:16px;padding:24px;width:100%;max-width:420px;margin:0 16px;max-height:85vh;overflow-y:auto}
.highlight-box-title{font-family:Orbitron,sans-serif;font-size:12px;color:#00e5ff;letter-spacing:.1em;margin-bottom:16px}
.highlight-inp{width:100%;padding:10px 14px;background:rgba(1,2,12,.8);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;font-family:Rajdhani,sans-serif;font-size:14px;outline:none;margin-bottom:12px}
.highlight-inp:focus{border-color:#00e5ff}
.highlight-stories-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;max-height:240px;overflow-y:auto}
.hs-item{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;position:relative}
.hs-item img,.hs-item video{width:100%;height:100%;object-fit:cover}
.hs-item.selected{border-color:#00e5ff}
.hs-item.selected::after{content:"";position:absolute;top:4px;right:4px;background:#00e5ff;color:#000;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.highlight-save-btn{width:100%;padding:12px;background:linear-gradient(135deg,#00e5ff,#0080aa);color:#000;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:900;font-size:14px;cursor:pointer;text-transform:uppercase}
.highlight-cancel-btn{width:100%;margin-top:8px;padding:8px;background:transparent;border:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-size:13px;cursor:pointer}

.cover-drag-hint{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;justify-content:center;padding-top:8px;pointer-events:none}.cover-drag-pill{background:rgba(0,0,0,.72);backdrop-filter:blur(8px);color:#fff;font-family:Rajdhani,sans-serif;font-size:12px;font-weight:700;padding:6px 16px;border-radius:20px;pointer-events:auto;border:1px solid rgba(255,255,255,.15);letter-spacing:.04em}.avatar-repos-btn{position:absolute;bottom:0;right:0;width:26px;height:26px;background:#ff2255;border:2px solid #01020c;border-radius:50%;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;padding:0}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(1,2,12,.9))}
.profile-wrap{max-width:700px;margin:0 auto;padding:0 16px 80px}
.profile-header{position:relative;margin-bottom:16px}
.profile-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:#fff;border:3px solid #01020c;overflow:hidden;margin-top:-50px;position:relative;z-index:2}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-info{margin-top:12px}
.profile-username{font-family:Orbitron,sans-serif;font-size:16px;color:#e8f4ff;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.v-badge{color:#00e5ff;font-size:13px}
.role-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;background:rgba(255,34,85,.15);color:#ff6680;border:1px solid rgba(255,34,85,.3)}
.profile-bio{font-size:14px;color:#8a9bb0;line-height:1.6;margin-top:8px}
.rank-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:12px;font-size:11px;font-family:Rajdhani,sans-serif;font-weight:700;background:linear-gradient(135deg,rgba(255,170,0,.15),rgba(200,80,0,.08));border:1px solid rgba(255,170,0,.3);color:#ffaa00;margin-top:8px;cursor:pointer}
.rank-badge:hover{background:linear-gradient(135deg,rgba(255,170,0,.25),rgba(200,80,0,.15))}
.profile-actions{display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.action-btn{padding:8px 16px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;border:1px solid #0d2744;background:transparent;color:#5a8aaa;transition:all .2s}
.action-btn:hover{border-color:#00e5ff;color:#00e5ff}
.action-btn.following{border-color:rgba(0,229,255,.4);color:#00e5ff}
.action-btn.primary{background:linear-gradient(135deg,#ff2255,#aa0030);border:none;color:#fff}
.coins-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;background:rgba(255,34,85,.12);border:1px solid rgba(255,34,85,.2);color:#ff6680}
.profile-stats{display:flex;gap:0;margin-top:16px;border:1px solid #0d2744;border-radius:10px;overflow:hidden}
.stat{flex:1;text-align:center;padding:12px 8px;border-right:1px solid #0d2744;cursor:pointer;transition:background .15s}
.stat:last-child{border-right:none}
.stat:hover{background:rgba(0,229,255,.04)}
.stat-num{font-family:Orbitron,sans-serif;font-size:16px;color:#e8f4ff}
.stat-lbl{font-size:10px;color:#5a8aaa;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.sub-section{margin-top:16px;padding:14px;background:rgba(7,15,30,.6);border:1px solid #0d2744;border-radius:10px}
.sub-price{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;margin-bottom:10px}
.sub-price.paid{background:rgba(255,34,85,.15);border:1px solid rgba(255,34,85,.3);color:#ff6680}
.sub-price.free{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.25);color:#00e5ff}
.sub-btn{width:100%;padding:10px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase;border:none}
.sub-btn.paid{background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff}
.sub-btn.free{background:linear-gradient(135deg,#00e5ff,#0080aa);color:#000}
.sub-btn.subscribed{background:rgba(0,255,136,.15);border:1px solid rgba(0,255,136,.3);color:#00ff88}
.posts-title{font-family:Orbitron,sans-serif;font-size:11px;color:#5a8aaa;letter-spacing:.1em;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid #0d2744}.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.post-thumb{aspect-ratio:1;background:rgba(7,15,30,.7);border-radius:4px;overflow:hidden;cursor:pointer;position:relative}
.post-thumb img,.post-thumb video{width:100%;height:100%;object-fit:cover}
.post-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background .2s}
.post-thumb:hover .post-overlay{background:rgba(0,0,0,.45)}
.post-stats{color:#fff;font-size:12px;font-weight:700;opacity:0;transition:opacity .2s;text-align:center}
.post-thumb:hover .post-stats{opacity:1}
.empty-posts{text-align:center;padding:40px;color:#5a8aaa;grid-column:1/-1}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(7,15,30,.95);border:1px solid #00ff88;color:#00ff88;padding:10px 20px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;z-index:9999;display:none;white-space:nowrap}

.profile-cover img{transition:object-position .1s}
.profile-cover{cursor:default}

/* Story Highlights on Profile */
.profile-highlights{margin:16px 0 0;overflow:hidden}
.highlights-scroll{display:flex;gap:14px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.highlights-scroll::-webkit-scrollbar{display:none}
.hl-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;min-width:72px}
.hl-ring{width:66px;height:66px;border-radius:50%;padding:2px;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)}
.hl-inner{width:100%;height:100%;border-radius:50%;background:rgba(7,15,30,.8);display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid #01020c;overflow:hidden}
.hl-inner img{width:100%;height:100%;object-fit:cover}
.hl-label{font-size:11px;color:#c8d8e8;text-align:center;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hl-add-ring{background:linear-gradient(135deg,#0d2744,#1a3a60)}
.hl-add-inner{font-size:22px;color:#5a8aaa;background:rgba(7,15,30,.6);border:2px dashed #0d2744}

/* Instagram-style Profile Tabs */
.profile-tabs{display:flex;border-bottom:1px solid #0d2744;margin:16px 0 0;gap:0}
.profile-tab{flex:1;padding:12px 8px;text-align:center;font-family:Orbitron,sans-serif;font-size:10px;letter-spacing:.08em;color:#5a8aaa;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.profile-tab:hover{color:#c8d8e8}
.profile-tab.active{color:#e8f4ff;border-bottom-color:#ff2255}
.profile-tab-icon{font-size:14px}
/* Saved & Tagged grids */
.saved-grid,.tagged-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.empty-tab{text-align:center;padding:40px;color:#5a8aaa;grid-column:1/-1;font-size:13px}

/* New Post Modal */
.new-post-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px}
.new-post-modal.open{display:flex}
.new-post-box{background:#070f1e;border:1px solid #0d2744;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding-bottom:16px}
.new-post-hdr{padding:16px 20px;border-bottom:1px solid #0d2744;display:flex;align-items:center;justify-content:space-between}
.new-post-title{font-family:Orbitron,sans-serif;font-size:13px;color:#e8f4ff;letter-spacing:.08em}
.post-media-zone{margin:16px;border:2px dashed #0d2744;border-radius:10px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;background:rgba(1,2,12,.4)}
.post-media-zone:hover{border-color:#00e5ff}
.post-media-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.post-media-preview{width:100%;max-height:360px;object-fit:contain;border-radius:8px;display:none}
.post-media-video{width:100%;max-height:360px;border-radius:8px;display:none}
.post-type-tabs{display:flex;gap:8px;padding:0 16px;margin-bottom:12px}
.post-type-btn{flex:1;padding:8px;border-radius:8px;border:1px solid #0d2744;background:transparent;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .2s}
.post-type-btn.active{background:rgba(0,229,255,.15);border-color:#00e5ff;color:#00e5ff}
.post-caption-wrap{padding:0 16px 16px}
.post-caption{width:100%;background:rgba(1,2,12,.6);border:1px solid #0d2744;color:#e8f4ff;border-radius:8px;padding:12px;font-family:Rajdhani,sans-serif;font-size:14px;resize:none;min-height:80px;outline:none;line-height:1.6}
.post-caption:focus{border-color:#00e5ff}
.post-options{padding:0 16px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.post-option-label{font-size:12px;color:#5a8aaa;display:flex;align-items:center;gap:6px;cursor:pointer}
.post-option-label input{cursor:pointer;accent-color:#ff2255}
.post-submit-btn{width:calc(100% - 32px);margin:0 16px 0;padding:13px;position:sticky;bottom:0;z-index:10;background:linear-gradient(135deg,#ff2255,#aa0030);background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:14px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;transition:opacity .2s}
.post-submit-btn:disabled{opacity:.4;cursor:not-allowed}
.post-progress{width:calc(100% - 32px);margin:0 16px 8px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;display:none}
.post-progress-fill{height:100%;background:linear-gradient(90deg,#ff2255,#00e5ff);border-radius:2px;width:0;transition:width .3s}
.post-msg{text-align:center;font-size:12px;padding:0 16px 12px;display:none}
/* New post floating btn */
.new-post-fab{position:fixed;bottom:80px;right:20px;z-index:200;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:50%;width:56px;height:56px;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(255,34,85,.5);display:none;align-items:center;justify-content:center;transition:transform .2s}
.new-post-fab:hover{transform:scale(1.1)}
.new-post-fab.visible{display:flex}
/* Posts grid own profile */
.posts-grid-own .post-card{cursor:pointer}
.profile-post-plus{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(7,15,30,.5);border:2px dashed #0d2744;border-radius:8px;min-height:180px;cursor:pointer;gap:8px;color:#5a8aaa;transition:all .2s;font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.profile-post-plus:hover{border-color:#ff2255;color:#ff2255}
.profile-post-plus-icon{font-size:32px}

/* ===== COVER DRAG ===== */
.profile-cover{cursor:default;user-select:none}
.profile-cover.own-cover{cursor:grab}
.profile-cover.own-cover:active{cursor:grabbing}
.cover-drag-hint{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#fff;font-family:Rajdhani,sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;padding:4px 12px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:5px;white-space:nowrap;z-index:10}
.profile-cover.own-cover:hover .cover-drag-hint{opacity:1}
.cover-save-badge{position:absolute;top:8px;right:8px;background:rgba(255,34,85,.9);color:#fff;font-family:Rajdhani,sans-serif;font-weight:700;font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;display:none;z-index:10;transition:all .2s}
.cover-save-badge:hover{background:#ff2255}

/* ===== AVATAR REPOSITION ===== */
.avatar-edit-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;cursor:pointer;z-index:5;font-size:18px;color:#fff}
.profile-avatar:hover .avatar-edit-overlay{display:flex}

/* ===== LOGOUT BUTTON IN PROFILE ===== */
.profile-logout-btn{display:none;align-items:center;gap:6px;padding:8px 18px;border:1px solid rgba(255,34,85,.3);background:rgba(255,34,85,.08);color:#ff6680;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .2s;margin-top:8px}
.profile-logout-btn:hover{background:rgba(255,34,85,.2);border-color:#ff2255}
.profile-logout-btn.visible{display:inline-flex}

/* ===== BOTTOM NAV (shared) ===== */
.pg-bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(7,15,30,.97);border-top:1px solid #0d2744;display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));justify-content:space-around;align-items:center;}
.pg-bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 16px;border-radius:8px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:color .2s;}
.pg-bn-item:hover,.pg-bn-item.active{color:#00e5ff;}
.pg-bn-icon{font-size:20px;line-height:1;}
.pg-bn-lbl{font-size:9px;margin-top:1px;}
.pg-bn-plus-inner{width:46px;height:28px;background:linear-gradient(135deg,#ff2255,#cc0030);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.pg-bn-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;border:2px solid #0d2744;color:#fff;font-weight:800;}
.pg-bn-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
@media(min-width:769px){.pg-bottom-nav{max-width:680px;left:50%;right:auto;transform:translateX(-50%);border-radius:16px 16px 0 0;border:1px solid #0d2744;border-bottom:none;}}

/* SN-NAV */
.sn-bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(7,15,30,.97);border-top:1px solid #0d2744;display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));justify-content:space-around;align-items:center;}
.sn-bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:color .2s;}
.sn-bn-item:hover,.sn-bn-active,.sn-bn-active .sn-bn-icon,.sn-bn-active .sn-bn-lbl{color:#ff2255!important;}
.sn-bn-icon{font-size:22px;line-height:1;}
.sn-bn-lbl{font-size:9px;}
.sn-bn-plus{padding:4px 8px!important;}
.sn-bn-plus-inner{width:46px;height:28px;background:linear-gradient(135deg,#ff2255,#cc0030);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;}
.sn-bn-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;border:2px solid #0d2744;color:#fff;font-weight:800;}
.sn-bn-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

/* === LIVE TOAST === */

var sb=supabase.createClient(SB_URL,SB_KEY);window.sb=sb;
var currentUser=null;
var currentProfile=null;
var targetProfile=null;

sb.auth.getSession().then(function(r){
  if(r.data.session){
    currentUser=r.data.session.user;
    sb.from("profiles").select("*").eq("id",currentUser.id).single().then(function(p){
      currentProfile=p.data;
    });
  }
  var params=new URLSearchParams(location.search);
  var u=params.get("u"),id=params.get("id");
  if(u) loadByUsername(u);
  else if(id) loadById(id);
  else if(currentUser) loadById(currentUser.id);
  else {
    // Retry once in case session token hasn't loaded yet
    setTimeout(function(){
      sb.auth.getSession().then(function(r2){
        if(r2.data.session){
          currentUser = r2.data.session.user;
          loadById(currentUser.id);
        } else {
          window.location.href="/";
        }
      });
    }, 800);
  }
});

async function loadByUsername(username){
  var r=await sb.from("profiles").select("*").eq("username",username).single();
  if(r.error||!r.data){showToast("Usuario no encontrado",true);return;}
  renderProfile(r.data); loadPosts(r.data.id);
  loadProfileHighlights(r.data.id, !!(currentUser&&r.data.id===currentUser.id));
  checkOwnProfile(r.data.id);
}

async function loadById(id){
  var r=await sb.from("profiles").select("*").eq("id",id).single();
  if(r.error||!r.data){showToast("Perfil no encontrado",true);return;}
  renderProfile(r.data); loadPosts(r.data.id);
  loadProfileHighlights(r.data.id, !!(currentUser&&r.data.id===currentUser.id));
  if(currentUser&&r.data.id===currentUser.id) checkOwnProfile(r.data.id, r.data.cover_position||50);

      subBtn.className="sub-btn "+(price>0?"paid":"free");
      subBtn.id="subActionBtn";
      subBtn.dataset.creatorId=p.id;
      subBtn.dataset.price=String(price);
      subBtn.dataset.paypal=p.paypal_email||"";
      subBtn.dataset.username=p.username;
      subBtn.textContent=price>0?"Suscribirse $"+price.toFixed(2)+"/mes":"Seguir gratis";
      subBtn.addEventListener("click",function(){
        handleSubscribe(this.dataset.creatorId,parseFloat(this.dataset.price),this.dataset.paypal,this.dataset.username);
      });
      checkSubState(p.id,subBtn);
      subDiv.appendChild(subBtn);
    }
    subSec.appendChild(subDiv);
  }
}

async function checkFollowState(uid,btn){

  var r=await sb.from("follows").select("id").eq("follower_id",currentUser.id).eq("following_id",uid).single();

}

async function toggleFollow(btn,uid){
  if(!currentUser){window.location.href="/";return;}
  var isF=btn.classList.contains("following");
  if(isF){
    await sb.from("follows").delete().eq("follower_id",currentUser.id).eq("following_id",uid);
    btn.textContent="Seguir";btn.classList.remove("following");
  } else {
    await sb.from("follows").insert({follower_id:currentUser.id,following_id:uid});
    btn.textContent="Siguiendo";btn.classList.add("following");
    if(currentProfile){
      await sb.from("notifications").insert({
        user_id:uid,from_user_id:currentUser.id,type:"follow",
        message:"@"+currentProfile.username+" te empieza a seguir"
      });
    }
  }
  var sf=document.getElementById("statFollowers");
  if(sf) sf.textContent=Math.max(0,parseInt(sf.textContent||0)+(isF?-1:1));
}

async function checkSubState(creatorId,btn){

async function handleSubscribe(creatorId,price,paypalEmail,creatorUsername){

    openSubscribeModal(creatorId);

    await sb.from("subscriptions").upsert({subscriber_id:currentUser.id,creator_id:creatorId,status:"active",amount:0,price:0,active:true,expires_at:new Date(Date.now()+30*24*3600*1000).toISOString()},{onConflict:"subscriber_id,creator_id"});

function switchTab(tab) {

async function loadTabContent(tab, userId) {
  var grid = document.getElementById('postsGrid');
  grid.innerHTML = '<div class="empty-posts">Cargando...</div>';

  if(tab === 'posts'){
    var r = await (window.sb||sb).from('posts').select('*').eq('user_id', userId).order('is_pinned',{ascending:false,nullsFirst:false}).order('created_at',{ascending:false}).limit(30);
    if(r.error){grid.innerHTML='<div class="empty-posts">Error cargando posts: '+r.error.message+'</div>';return;}
    renderPostsGrid(r.data||[]);

  } else if(tab === 'reels'){
    var rr = await (window.sb||sb).from('posts').select('*').eq('user_id', userId).eq('media_type','video').order('created_at',{ascending:false}).limit(30);
    if(!rr.data||!rr.data.length){
      grid.innerHTML = '<div class="tab-empty"><div class="tab-empty-icon">\u25B6\uFE0F</div><div class="tab-empty-text">Sin reels todavía</div></div>';
    } else renderPostsGrid(rr.data);

  } else if(tab === 'saved'){
    if(!currentUser||currentUser.id!==userId){grid.innerHTML='<div class="tab-empty"><div class="tab-empty-text">Solo tu puedes ver tus guardados</div></div>';return;}
    var rs = await (window.sb||sb).from('bookmarks').select('post_id, posts(*)').eq('user_id', userId).limit(30);
    var posts2 = (rs.data||[]).map(function(b){return b.posts;}).filter(Boolean);
    if(!posts2.length){grid.innerHTML='<div class="tab-empty"><div class="tab-empty-icon">\uD83D\uDD16</div><div class="tab-empty-text">No has guardado nada todavía</div></div>';}
    else renderPostsGrid(posts2);

  } else if(tab === 'tagged'){
    grid.innerHTML = '<div class="tab-empty"><div class="tab-empty-icon">\uD83C\uDFF7\uFE0F</div><div class="tab-empty-text">Sin etiquetas todavía</div></div>';
  }
}

      if(post.media_type==='video'){

      td.style.cssText='width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:8px;font-size:11px;color:#5a8aaa;line-height:1.3';
      td.textContent=(post.content||'').slice(0,60);thumb.appendChild(td);

  var _capti=document.getElementById("captionCount");if(_capti)_capti.textContent = '0';

  var _postI=document.getElementById("postImgPreview");if(_postI)_postI.style.display = 'none';
  var _postV=document.getElementById("postVidPreview");if(_postV)_postV.style.display = 'none';
  var _postM=document.getElementById("postMediaPlaceholder");if(_postM)_postM.style.display = 'block';
  var _postP=document.getElementById("postProgress");if(_postP)_postP.style.display = 'none';
  var _postP=document.getElementById("postProgressFill");if(_postP)_postP.style.width = '0';

function closeNewPost(){
  var _newPo=document.getElementById("newPostModal");if(_newPo)_newPo.classList.remove('open');
  _postFile = null;
}

function selectPostType(type){
  _postType = type;
  ['image','video','text'].forEach(function(t){
    var btn = document.getElementById('pt'+t.charAt(0).toUpperCase()+t.slice(1));
    if(btn) btn.classList.toggle('active', t===type);
  });
  var zone = document.getElementById('postMediaZone');
  var inp = document.getElementById('postFileInput');
  if(type==='text'){
    zone.style.display = 'none';
  } else {
    zone.style.display = 'flex';
    inp.accept = type==='image' ? 'image/*' : 'video/*,image/*';
    var ph = document.getElementById('postMediaPlaceholder');
    ph.querySelector('div').textContent = type==='image' ? '\uD83D\uDCF7' : '\uD83C\uDFA5';
    ph.querySelectorAll('div')[1].textContent = type==='image' ? 'Toca para seleccionar foto' : 'Toca para seleccionar video';
  }
}

function postFileSelected(){
  var inp = document.getElementById('postFileInput');
  var file = inp.files && inp.files[0];
  if(!file) return;
  _postFile = file;
  var isVideo = file.type.startsWith('video/');
  var img = document.getElementById('postImgPreview');
  var vid = document.getElementById('postVidPreview');
  var _postM=document.getElementById("postMediaPlaceholder");if(_postM)_postM.style.display = 'none';
  if(isVideo){
    _postType = 'video';
    selectPostType('video');
    var url = URL.createObjectURL(file);
    vid.src = url;
    vid.style.display = 'block';
    img.style.display = 'none';
  } else {
    _postType = 'image';
    selectPostType('image');
    var reader = new FileReader();
    reader.onload = function(e){ img.src = e.target.result; img.style.display = 'block'; vid.style.display = 'none'; };
    reader.readAsDataURL(file);
  }
}

// Caption counter
document.addEventListener('DOMContentLoaded', function(){
  var cap = document.getElementById('postCaption');
  if(cap) cap.addEventListener('input', function(){ var _capti=document.getElementById("captionCount");if(_capti)_capti.textContent = this.value.length; });
});

async function submitPost(){
  if(!window.sb || !window.currentUser){ showToast('Inicia sesi\u00F3n primero', true); return; }
  var caption = (document.getElementById('postCaption').value||'').trim();
  var isPaywall = document.getElementById('postPaywall').checked;
  if(_postType !== 'text' && !_postFile && !caption){ showToast('A\u00F1ade una foto, video o texto', true); return; }
  
  var btn = document.getElementById('postSubmitBtn');
  var progress = document.getElementById('postProgress');
  var fill = document.getElementById('postProgressFill');
  var msg = document.getElementById('postMsg');
  btn.disabled = true; btn.textContent = 'Subiendo...';
  progress.style.display = 'block';
  msg.style.display = 'none';

  try {
    var mediaUrl = null;
    var mediaType = _postType;

    // Upload file if present
    if(_postFile){
      fill.style.width = '30%';
      var ext = _postFile.name.split('.').pop().toLowerCase() || 'jpg';
      var path = window.currentUser.id + '/posts/' + Date.now() + '.' + ext;
      var upResult = await window.sb.storage.from('media').upload(path, _postFile, {upsert:true, contentType:_postFile.type});
      if(upResult.error) throw new Error('Upload: ' + upResult.error.message);
      fill.style.width = '70%';
      var pubUrl = window.sb.storage.from('media').getPublicUrl(path);
      mediaUrl = pubUrl.data?.publicUrl;
      mediaType = _postFile.type.startsWith('video/') ? 'video' : 'image';
    }

    fill.style.width = '85%';

    // Insert post
    var postData = {
      user_id: window.currentUser.id,
      content: caption || null,
      media_url: mediaUrl,
      media_type: mediaType,
      is_subscriber_only: isPaywall,
      likes_count: 0,
      comments_count: 0,
    };
    var ins = await window.sb.from('posts').insert(postData).select().single();
    if(ins.error) throw new Error('Post: ' + ins.error.message);

    fill.style.width = '100%';

    // Update posts_count
    await window.sb.from('profiles').update({posts_count: (currentProfile?.posts_count||0)+1}).eq('id',window.currentUser.id);

    if(currentProfile) currentProfile.posts_count = (currentProfile.posts_count||0)+1;
    setTimeout(function(){
      closeNewPost();
      loadPosts(window.currentUser.id);
      showToast('\u2713 Publicaci\u00F3n creada!');
    }, 400);

  } catch(e){
    btn.disabled = false; btn.textContent = '\uD83D\uDE80 Publicar';
    msg.textContent = 'Error: ' + e.message; msg.style.color='#ff2255'; msg.style.display='block';
    fill.style.width = '0';
  }
}
