<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#ff2255">
<meta name="robots" content="noindex,nofollow">
<title>Moderación &mdash; SHADOWNET</title>
<link rel="manifest" href="/manifest.json">
<link rel="canonical" href="https://shadownet-xi.vercel.app/moderation.html">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/sn-design.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080e1a;color:#e0e8f0;font-family:Rajdhani,sans-serif;min-height:100vh;padding-bottom:40px}
.hd{display:flex;align-items:center;padding:14px 18px;background:#080e1a;border-bottom:1px solid #1a2845;position:sticky;top:0;z-index:10;gap:10px}
.hd-back{background:rgba(255,255,255,.06);border:1px solid #1a2845;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer}
.hd-title{flex:1;font-family:Orbitron,sans-serif;font-weight:900;font-size:16px;color:#ff2255;letter-spacing:.08em}
.hd-count{font-size:12px;color:#5a8aaa;background:rgba(255,34,85,.12);border:1px solid rgba(255,34,85,.3);border-radius:14px;padding:4px 10px;font-weight:700}
.main{max-width:760px;margin:0 auto;padding:16px}
.empty{text-align:center;padding:60px 20px;color:#5a8aaa;font-size:14px}
.empty-emoji{font-size:48px;margin-bottom:12px;opacity:.6}
.no-admin{text-align:center;padding:60px 20px;color:#ff6680}
.list{display:flex;flex-direction:column;gap:12px}
.report{background:#0d152a;border:1px solid #1a2845;border-radius:14px;padding:14px;transition:border-color .2s}
.report:hover{border-color:rgba(255,34,85,.3)}
.r-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.r-emoji{font-size:22px;flex-shrink:0}
.r-title{flex:1;font-weight:800;font-size:14px;color:#fff}
.r-time{font-size:11px;color:#5a8aaa;font-weight:600}
.r-reason{display:inline-flex;align-items:center;gap:5px;background:rgba(255,34,85,.12);border:1px solid rgba(255,34,85,.3);color:#ff6680;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700;margin-bottom:8px}
.r-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;font-size:11px;color:#5a8aaa}
.r-meta-pill{background:rgba(255,255,255,.04);border:1px solid #1a2845;border-radius:10px;padding:3px 9px;font-weight:600}
.r-desc{background:rgba(0,0,0,.3);border-left:3px solid #ff2255;padding:8px 12px;border-radius:0 8px 8px 0;font-size:13px;color:#ccc;margin:8px 0;line-height:1.5;font-style:italic}
.r-people{display:flex;justify-content:space-between;gap:10px;margin:10px 0;padding:8px;background:rgba(0,0,0,.2);border-radius:8px}
.person{display:flex;align-items:center;gap:7px;font-size:12px}
.person-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;overflow:hidden;flex-shrink:0}
.person-av img{width:100%;height:100%;object-fit:cover}
.person-name{font-weight:700;color:#ccc}
.person-lbl{font-size:9px;color:#5a8aaa;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.r-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}
.act{padding:9px;border:none;border-radius:9px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:12px;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:transform .15s}
.act:hover{transform:scale(1.02)}.act:active{transform:scale(.97)}
.act-dismiss{background:transparent;color:#5a8aaa;border:1px solid #1a2845}
.act-warn{background:rgba(255,170,0,.15);color:#ffaa00;border:1px solid rgba(255,170,0,.3)}
.act-remove{background:rgba(255,34,85,.18);color:#ff6680;border:1px solid rgba(255,34,85,.3)}
.act-ban{background:linear-gradient(135deg,#ff2255,#cc0030);color:#fff}
.r-link{display:inline-block;margin-top:6px;font-size:11px;color:#5a8aaa;text-decoration:none}
.r-link:hover{color:#ff6680}
</style>
</head>
<body>
<div class="hd">
  <button class="hd-back" onclick="history.length>1?history.back():location.href='/'">&larr;</button>
  <div class="hd-title">🚩 MODERACIÓN</div>
  <div class="hd-count" id="hdcount">0 pendientes</div>
</div>
<div class="main" id="main">
  <div class="empty">Cargando...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SB_URL='https://cdokplvoqivducsqrejt.supabase.co';
var SB_KEY='sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su';
var sb=supabase.createClient(SB_URL,SB_KEY);
window.sb=sb;
var REASON_LABEL = {
  spam:'Spam', harassment:'Acoso', sexual_minor:'Sexual con menor', violence:'Violencia',
  fraud:'Fraude', impersonation:'Suplantación', copyright:'Copyright', self_harm:'Autolesión', other:'Otro'
};
var REASON_EMOJI = {
  spam:'📢', harassment:'😡', sexual_minor:'🚫', violence:'⚠️',
  fraud:'💰', impersonation:'🎭', copyright:'©️', self_harm:'💔', other:'…'
};
var TYPE_LABEL = { post:'Post', comment:'Comentario', user:'Usuario', live:'Live', message:'Mensaje' };

function timeAgo(ts){
  var s=Math.floor((Date.now()-new Date(ts))/1000);
  if(s<60) return 'ahora';
  if(s<3600) return Math.floor(s/60)+'m';
  if(s<86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
}
function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}

async function loadReports(){
  var main = document.getElementById('main');
  var sess = await sb.auth.getSession();
  if(!sess.data || !sess.data.session){
    main.innerHTML = '<div class="no-admin"><div class="empty-emoji">🔐</div>Necesitas iniciar sesión</div>';
    return;
  }
  var r = await sb.rpc('get_pending_reports', {p_limit:100, p_offset:0});
  if(r.error){
    main.innerHTML = '<div class="no-admin"><div class="empty-emoji">⛔</div>'+(r.error.message.indexOf('forbidden')>=0?'Solo administradores pueden acceder.':'Error: '+esc(r.error.message))+'</div>';
    return;
  }
  var rows = r.data || [];
  document.getElementById('hdcount').textContent = rows.length+' pendiente'+(rows.length===1?'':'s');
  if(rows.length===0){
    main.innerHTML = '<div class="empty"><div class="empty-emoji">✨</div>Cola vacía. Todo bajo control.</div>';
    return;
  }
  var html = '<div class="list">';
  rows.forEach(function(rp){
    var emoji = REASON_EMOJI[rp.reason] || '🚩';
    var rlbl = REASON_LABEL[rp.reason] || rp.reason;
    var typeLbl = TYPE_LABEL[rp.content_type] || rp.content_type;
    var deepLink = '';
    if (rp.content_type==='post') deepLink = '/feed.html?post='+encodeURIComponent(rp.content_id);
    else if (rp.content_type==='user' && rp.reported_username) deepLink = '/profile.html?u='+encodeURIComponent(rp.reported_username);
    else if (rp.content_type==='live' && rp.reported_username) deepLink = '/live.html?creator='+encodeURIComponent(rp.reported_username);
    var repAvHtml = rp.reporter_avatar ? '<img src="'+esc(rp.reporter_avatar)+'">' : esc((rp.reporter_username||'?').charAt(0).toUpperCase());
    var tgtAvHtml = rp.reported_avatar ? '<img src="'+esc(rp.reported_avatar)+'">' : esc((rp.reported_username||'?').charAt(0).toUpperCase());
    html += '<div class="report" data-id="'+rp.id+'">';
    html += '<div class="r-head"><span class="r-emoji">'+emoji+'</span><span class="r-title">'+typeLbl+' &middot; '+esc(rlbl)+'</span><span class="r-time">'+timeAgo(rp.created_at)+'</span></div>';
    html += '<div class="r-people">';
    html += '<div class="person"><div class="person-av">'+repAvHtml+'</div><div><div class="person-lbl">Reportador</div><div class="person-name">@'+esc(rp.reporter_username||'?')+'</div></div></div>';
    html += '<div class="person" style="text-align:right"><div><div class="person-lbl">Reportado</div><div class="person-name">@'+esc(rp.reported_username||'?')+'</div></div><div class="person-av">'+tgtAvHtml+'</div></div>';
    html += '</div>';
    if (rp.description) html += '<div class="r-desc">'+esc(rp.description)+'</div>';
    html += '<div class="r-meta"><span class="r-meta-pill">ID: '+esc(rp.content_id.substring(0,12))+'…</span></div>';
    if (deepLink) html += '<a class="r-link" href="'+deepLink+'" target="_blank" rel="noopener">Ver contenido →</a>';
    html += '<div class="r-actions">';
    html += '<button class="act act-dismiss" data-act="dismissed" data-id="'+rp.id+'">Desestimar</button>';
    html += '<button class="act act-warn" data-act="warn" data-id="'+rp.id+'">Advertir</button>';
    html += '<button class="act act-remove" data-act="remove_content" data-id="'+rp.id+'">Eliminar</button>';
    html += '<button class="act act-ban" data-act="ban_user" data-id="'+rp.id+'">Banear</button>';
    html += '</div></div>';
  });
  html += '</div>';
  main.innerHTML = html;
  main.querySelectorAll('.act').forEach(function(b){
    b.addEventListener('click', function(){ resolve(b.dataset.id, b.dataset.act, b); });
  });
}

async function resolve(reportId, action, btn){
  var note = null;
  if (action==='ban_user' || action==='remove_content') {
    note = prompt('Nota (opcional) para el log:', '');
    if (note===null) return;
  }
  btn.disabled = true; btn.textContent = '...';
  var r = await sb.rpc('resolve_report', {
    p_report_id: reportId, p_action_taken: action, p_admin_note: note || null
  });
  if (r.error) { alert('Error: '+r.error.message); btn.disabled=false; return; }
  if (r.data && !r.data.ok) { alert('Error: '+(r.data.error||'desconocido')); btn.disabled=false; return; }
  // Remove the row
  var card = btn.closest('.report');
  if (card) card.style.opacity='0';
  setTimeout(function(){ if (card) card.remove(); var rest = document.querySelectorAll('.report').length; document.getElementById('hdcount').textContent = rest+' pendiente'+(rest===1?'':'s'); if (rest===0) loadReports(); }, 250);
}

document.addEventListener('DOMContentLoaded', loadReports);
</script>
</body>
</html>
