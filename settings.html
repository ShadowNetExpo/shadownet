<script>
(function(){
  // Clear all service worker caches immediately
  if('caches' in window){
    caches.keys().then(function(k){k.forEach(function(n){caches.delete(n);});});
  }
  // Unregister any old service worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){
        if(r.active&&r.active.scriptURL&&r.active.scriptURL.indexOf('sw.js')>-1){
          // Only unregister if it's an old version (not v5)
          r.active.postMessage({type:'GET_VERSION'});
        }
      });
    });
  }
})();
</script>

async function saveProfile(){
  var btn=document.querySelector(".save-btn");btn.disabled=true;btn.textContent="Guardando...";
  var username=document.getElementById("usernameInp").value.trim().replace(/[^a-zA-Z0-9_]/g,"");
  var bio=document.getElementById("bioInp").value.trim();
  var updates={username:username,bio:bio};
  // Upload avatar if changed
  if(pendingAvatarFile){
    var ext=pendingAvatarFile.name.split(".").pop();
    var path="avatars/"+currentUser.id+"/avatar."+ext;
    var up=await sb.storage.from("media").upload(path,pendingAvatarFile,{upsert:true});
    if(!up.error) updates.avatar_url=sb.storage.from("media").getPublicUrl(path).data.publicUrl;
  }
  // Upload cover if changed
  if(pendingCoverFile){
    var ext2=pendingCoverFile.name.split(".").pop();
    var path2="covers/"+currentUser.id+"/cover."+ext2;
    var up2=await sb.storage.from("media").upload(path2,pendingCoverFile,{upsert:true});
    if(!up2.error) updates.cover_url=sb.storage.from("media").getPublicUrl(path2).data.publicUrl;
  }
  var r=await sb.from("profiles").update(updates).eq("id",currentUser.id);
  btn.disabled=false;btn.textContent="\u2713 Guardar Perfil";
  if(r.error){showToast("Error: "+r.error.message,true);}
  else{showToast("\u2713 Perfil actualizado!");pendingAvatarFile=null;pendingCoverFile=null;}
}

async function saveCreatorSettings(){
  var price=parseFloat(document.getElementById("priceInp").value||0);
  var paypal=document.getElementById("paypalInp").value.trim();
  if(price>0&&price<1){showToast("Precio m\u00EDnimo $1.00",true);return;}
  var r=await sb.from("profiles").update({subscription_price:price,paypal_email:paypal}).eq("id",currentUser.id);
  if(r.error){showToast("Error: "+r.error.message,true);}
  else showToast("\u2713 Configuraci\u00F3n de creador guardada!");
}

async function changePassword(){
  var pw=document.getElementById("pwInp").value;
  var pw2=document.getElementById("pw2Inp").value;
  if(!pw){showToast("Ingresa una nueva contrase\u00F1a",true);return;}
  if(pw.length<8){showToast("M\u00EDnimo 8 caracteres",true);return;}
  if(pw!==pw2){showToast("Las contrase\u00F1as no coinciden",true);return;}
  var r=await sb.auth.updateUser({password:pw});
  if(r.error){showToast("Error: "+r.error.message,true);}
  else{showToast("\u2713 Contrase\u00F1a cambiada!");document.getElementById("pwInp").value="";document.getElementById("pw2Inp").value="";}
}

  if(confirm("\u00BFCerrar sesi\u00F3n?")){sb.auth.signOut().then(function(){window.location.href="/";});}

function updateBioCount(){

// Avatar file picker
document.getElementById("avatarInp").addEventListener("change",function(){
  if(!this.files[0])return;
  pendingAvatarFile=this.files[0];
  var url=URL.createObjectURL(pendingAvatarFile);
  var av=document.getElementById("avPreview");av.innerHTML="";
  var img=document.createElement("img");img.src=url;av.appendChild(img);
});
// Cover file picker
document.getElementById("coverInp").addEventListener("change",function(){
  if(!this.files[0])return;
  pendingCoverFile=this.files[0];
  var url=URL.createObjectURL(pendingCoverFile);
  var cp=document.getElementById("coverPreview");
  var existing=cp.querySelector("img");
  if(existing)existing.remove();
  var img=document.createElement("img");
  img.src=url;
  img.style.objectFit="cover";
  img.style.width="100%";
  img.style.height="100%";
  img.style.objectPosition="center 50%";
  _coverOffsetY=50;
  cp.appendChild(img);
  var lbl=document.getElementById("coverLabel");
  if(lbl)lbl.style.display="none";
  initCoverReposition(img);
  setupDragListeners();
});

function showToast(msg,err){
  var t=document.getElementById("toast");t.textContent=msg;
  t.style.borderColor=err?"#ff2255":"#00ff88";t.style.color=err?"#ff2255":"#00ff88";
  t.style.display="block";setTimeout(function(){t.style.display="none";},3000);
}

// =============================================
// COVER IMAGE DRAG-TO-REPOSITION
// =============================================
var _coverDragging = false;
var _coverStartY = 0;
var _coverOffsetY = 50; // percentage (0-100)
var _coverStartOffset = 50;
var _repositioning = false;

function handleCoverClick(e) {
  if (_repositioning) return;
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
  var cp = document.getElementById("coverPreview");
  if (!cp.classList.contains("has-image")) {
    document.getElementById("coverInp").click();
  }
}

function startReposition(e) {
  e.stopPropagation();
  _repositioning = true;
  var cp = document.getElementById("coverPreview");
  cp.classList.add("repositioning");
  var hint = document.getElementById("coverDragHint");
  if (hint) hint.textContent = "Arrastra la imagen para ajustar";
  setupDragListeners();
}

function setupDragListeners() {
  var cp = document.getElementById("coverPreview");
  var img = cp.querySelector("img");
  if (!img) return;

  function onStart(e) {
    if (!_repositioning) return;
    _coverDragging = true;
    _coverStartY = e.touches ? e.touches[0].clientY : e.clientY;
    _coverStartOffset = _coverOffsetY;
    img.classList.add("dragging");
    e.preventDefault();
  }

  function onMove(e) {
    if (!_coverDragging || !_repositioning) return;
    var currentY = e.touches ? e.touches[0].clientY : e.clientY;
    var delta = currentY - _coverStartY;
    var containerH = cp.offsetHeight;
    var imgH = img.naturalHeight * (cp.offsetWidth / img.naturalWidth);
    var maxDelta = Math.max(0, imgH - containerH);
    var pctDelta = maxDelta > 0 ? (delta / maxDelta) * 100 : 0;
    _coverOffsetY = Math.max(0, Math.min(100, _coverStartOffset - pctDelta));
    img.style.objectPosition = "center " + _coverOffsetY + "%";
    img.style.objectFit = "cover";
    img.style.position = "";
    img.style.top = "";
    img.style.left = "";
    img.style.width = "100%";
    img.style.height = "100%";
    e.preventDefault();
  }

  function onEnd() {
    _coverDragging = false;
    if (img) img.classList.remove("dragging");
  }

  img.addEventListener("mousedown", onStart);
  img.addEventListener("touchstart", onStart, {passive:false});
  document.addEventListener("mousemove", onMove);
  document.addEventListener("touchmove", onMove, {passive:false});
  document.addEventListener("mouseup", onEnd);
  document.addEventListener("touchend", onEnd);
}

function savePosition(e) {
  e.stopPropagation();
  _repositioning = false;
  var cp = document.getElementById("coverPreview");
  cp.classList.remove("repositioning");
  var img = cp.querySelector("img");
  if (img) img.classList.remove("dragging");
  var hint = document.getElementById("coverDragHint");
  if (hint) hint.textContent = "Arrastra para ajustar la posicion";
  // Save position to profile
  saveCoverPosition(_coverOffsetY);
  showToast("\u2713 Posicion de portada guardada");
}

async function saveCoverPosition(posY) {
  if (!currentUser) return;
  await sb.from("profiles").update({cover_position: posY}).eq("id", currentUser.id);
}

// Initialize cover repositioning when cover loaded
function initCoverReposition(img) {
  var cp = document.getElementById("coverPreview");
  cp.classList.add("has-image");
  // Load saved position
  sb.from("profiles").select("cover_position").eq("id", currentUser.id).single().then(function(r) {
    if (r.data && r.data.cover_position !== null && r.data.cover_position !== undefined) {
      _coverOffsetY = parseFloat(r.data.cover_position) || 50;
      img.style.objectPosition = "center " + _coverOffsetY + "%";
    }
  });
}

// ---- NOTIF PREFS ----
async function saveNotifPrefs(){
  if(!window.sb||!currentUser)return;
  // Toggle divs use class "on" — not checkboxes
  function isOn(id){ var el=document.getElementById(id); return el ? el.classList.contains('on') : true; }
  var prefs={
    notif_likes: isOn('togLikes'),
    notif_comments: isOn('togComments'),
    notif_follows: isOn('togFollows'),
    notif_messages: isOn('togDMs'),
    notif_subs: isOn('togSubs'),
    notif_tips: true
  };
  var r=await window.sb.from('profiles').update(prefs).eq('id',currentUser.id);
  showToast(r.error?'Error: '+r.error.message:'\u2713 Preferencias guardadas');
}

async function connectStripe(){
  if(!window.sb)return;
  var sess=await window.sb.auth.getSession();
  if(!sess.data.session){window.location.href='/';return;}
  var btn=document.getElementById('stripeConnectBtn');
  if(btn){btn.disabled=true;btn.textContent='Conectando...';}
  try{
    var res=await fetch('https://cdokplvoqivducsqrejt.supabase.co/functions/v1/stripe-onboard',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+sess.data.session.access_token,'apikey':'sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su'}
    });
    var data=await res.json();
    if(data.url){window.location.href=data.url;}
    else{showToast(data.error||'Error al conectar Stripe',true);if(btn){btn.disabled=false;btn.textContent='💳 Conectar cuenta bancaria';}}
  }catch(e){
    showToast('Error: '+e.message,true);
    if(btn){btn.disabled=false;btn.textContent='💳 Conectar cuenta bancaria';}
  }
}
