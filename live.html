<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHADOWNET LIVE</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#e8f4ff;font-family:Rajdhani,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fire{0%{transform:translateY(0) scaleX(1);opacity:1}50%{transform:translateY(-20px) scaleX(1.2);opacity:.6}100%{transform:translateY(-45px) scaleX(.7);opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes neon{0%,100%{text-shadow:0 0 10px #ff2255,0 0 20px #ff0000}50%{text-shadow:0 0 20px #ff4400,0 0 40px #ff2200}}
header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:rgba(1,2,12,.9);border-bottom:1px solid #0d2744;flex-shrink:0}
.logo{font-family:Orbitron,sans-serif;font-size:14px;color:#ff2255;letter-spacing:.15em;animation:neon 2s ease-in-out infinite}
.badge{background:#ff2255;color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:3px;display:none;animation:pulse 1s ease-in-out infinite}
.badge.on{display:inline-block}
.end-btn{background:rgba(255,34,85,.15);border:1px solid #ff2255;color:#ff2255;padding:7px 16px;border-radius:4px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-transform:uppercase}
.main{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
#videoEl{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.setup{display:flex;flex-direction:column;align-items:center;text-align:center;padding:32px 20px;z-index:10;position:relative}
.portal-wrap{position:relative;width:140px;height:140px;margin:0 auto 16px;animation:pulse 3s ease-in-out infinite}
.portal-outer{width:140px;height:140px;border-radius:50%;background:conic-gradient(from 0deg,#ff0000,#ff4400,#ff8800,#ffaa00,#ff4400,#ff0000);animation:spin 3s linear infinite;box-shadow:0 0 40px #ff4400,0 0 80px #ff2200}
.portal-mid{position:absolute;inset:10px;border-radius:50%;background:conic-gradient(from 180deg,#cc0000,#ff6600,#ff0000,#cc0000);animation:spin 2s linear infinite reverse}
.portal-inner{position:absolute;inset:22px;border-radius:50%;background:radial-gradient(circle,#000 40%,#1a0000 70%,#330000 100%)}
.portal-core{position:absolute;inset:38px;border-radius:50%;background:radial-gradient(circle,#000044,#000011,#000)}
.fire-box{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:180px;height:70px;display:flex;justify-content:center;gap:3px;pointer-events:none}
.fl{border-radius:50% 50% 20% 20%;animation:fire 1.2s ease-out infinite;transform-origin:bottom center}
.f1{width:14px;height:50px;background:linear-gradient(to top,#ff4400,#ff8800,#ffcc00,transparent);animation-duration:1.1s}
.f2{width:18px;height:65px;background:linear-gradient(to top,#ff2200,#ff6600,#ffaa00,transparent);animation-delay:.15s;animation-duration:1.3s}
.f3{width:22px;height:80px;background:linear-gradient(to top,#ff1100,#ff4400,#ff8800,#ffcc00,transparent);animation-delay:.05s}
.f4{width:16px;height:55px;background:linear-gradient(to top,#ff4400,#ff7700,#ffcc00,transparent);animation-delay:.1s}
.f5{width:18px;height:60px;background:linear-gradient(to top,#ff2200,#ff5500,#ffaa00,transparent);animation-delay:.08s}
h1{font-family:Orbitron,sans-serif;font-size:20px;color:#ff2255;margin-bottom:8px;letter-spacing:.1em}
.sub{font-size:13px;color:#5a8aaa;margin-bottom:28px;line-height:1.7;max-width:320px}
#startBtn{background:linear-gradient(135deg,#ff1100,#ff6600);color:#fff;border:none;border-radius:8px;padding:16px 48px;font-size:16px;font-family:Rajdhani,sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;box-shadow:0 0 30px rgba(255,68,0,.4);margin-bottom:14px;min-width:260px}
#startBtn:disabled{opacity:.5;cursor:not-allowed}
#st{font-size:13px;color:#00ff88}
#st.err{color:#ff2255}
.ctrls{padding:12px 18px;background:rgba(1,2,12,.95);display:none;align-items:center;gap:10px;flex-shrink:0}
.ctrls.show{display:flex}
.cb{background:rgba(0,229,255,.1);border:1px solid #00e5ff;color:#00e5ff;padding:10px 16px;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-transform:uppercase}
.cb.off{border-color:#ff2255;color:#ff2255;background:rgba(255,34,85,.1)}
#tmr{font-size:12px;color:#5a8aaa;font-family:Orbitron,sans-serif;margin:0 8px}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="logo">SHADOWNET LIVE</span>
    <span class="badge" id="badge">EN VIVO</span>
  </div>
  <button class="end-btn" onclick="end()">&#9632; Terminar</button>
</header>

<div class="main">
  <video id="videoEl" autoplay muted playsinline webkit-playsinline></video>
  <div class="setup" id="setup">
    <div class="portal-wrap">
      <div class="portal-outer">
        <div class="portal-mid">
          <div class="portal-inner">
            <div class="portal-core"></div>
          </div>
        </div>
      </div>
      <div class="fire-box">
        <div class="fl f1"></div>
        <div class="fl f2"></div>
        <div class="fl f3"></div>
        <div class="fl f4"></div>
        <div class="fl f5"></div>
      </div>
    </div>
    <h1>IR EN VIVO</h1>
    <p class="sub">Toca el boton para activar tu camara y microfono.</p>
    <button id="startBtn" onclick="go()">&#128308; INICIAR TRANSMISION</button>
    <p id="st">&#10003; Listo para transmitir</p>
  </div>
</div>

<div class="ctrls" id="ctrls">
  <button class="cb" id="mBtn" onclick="tM()">&#127908; Mic</button>
  <button class="cb" id="cBtn" onclick="tC()">&#128247; Cam</button>
  <div style="flex:1"></div>
  <span id="tmr">00:00</span>
  <a href="/" style="background:rgba(0,229,255,.1);border:1px solid #00e5ff;color:#00e5ff;padding:10px 16px;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;text-decoration:none;text-transform:uppercase;white-space:nowrap">&#8592; Salir</a>
</div>

<script>
var S=null,mic=true,cam=true,tmr=null,s=0;
function go(){
  var b=document.getElementById('startBtn');
  var st=document.getElementById('st');
  b.disabled=true;
  b.textContent='Activando...';
  st.textContent='Solicitando permiso de camara...';
  st.className='';
  navigator.mediaDevices.getUserMedia({video:true,audio:true})
    .then(function(stream){
      S=stream;
      var v=document.getElementById('videoEl');
      v.srcObject=stream;
      v.style.display='block';
      v.play();
      document.getElementById('setup').style.display='none';
      document.getElementById('ctrls').className='ctrls show';
      document.getElementById('badge').className='badge on';
      s=0;
      tmr=setInterval(function(){
        s++;
        var m=Math.floor(s/60),sc=s%60;
        document.getElementById('tmr').textContent=(m<10?'0'+m:m)+':'+(sc<10?'0'+sc:sc);
      },1000);
    })
    .catch(function(e){
      b.disabled=false;
      b.textContent='&#128308; INICIAR TRANSMISION';
      st.innerHTML=e.name==='NotAllowedError'
        ?'&#10060; Permiso denegado. Ve a Ajustes del navegador y permite la camara.'
        :e.name==='NotFoundError'
        ?'&#10060; No se encontro camara en este dispositivo.'
        :'&#10060; Error: '+e.message;
      st.className='err';
    });
}
function end(){
  if(S) S.getTracks().forEach(function(t){t.stop();});
  if(tmr) clearInterval(tmr);
  window.location.href='/';
}
function tM(){
  mic=!mic;
  if(S) S.getAudioTracks().forEach(function(t){t.enabled=mic;});
  var b=document.getElementById('mBtn');
  b.textContent=mic?'&#127908; Mic':'&#128263; Mic OFF';
  b.className=mic?'cb':'cb off';
}
function tC(){
  cam=!cam;
  if(S) S.getVideoTracks().forEach(function(t){t.enabled=cam;});
  var b=document.getElementById('cBtn');
  b.textContent=cam?'&#128247; Cam':'&#128247; Cam OFF';
  b.className=cam?'cb':'cb off';
}
</script>
</body>
</html>
