<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080e1a;color:#e0e8f0;font-family:Inter,sans-serif;min-height:100vh;padding-bottom:90px}
.sn-hd{display:flex;align-items:center;padding:16px;background:#080e1a;border-bottom:1px solid #0d2744;position:sticky;top:0;z-index:100;gap:12px}
.sn-hd-back{background:none;border:none;color:#5a8aaa;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px}
.sn-hd-title{font-family:Rajdhani,sans-serif;font-weight:900;font-size:20px;color:#fff;flex:1}
.sn-tabs{display:flex;background:#0d0d1a;border-bottom:1px solid #1a1a2e;overflow-x:auto}
.sn-tab{flex:1;padding:12px 8px;background:none;border:none;color:#555;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid transparent;min-width:80px}
.sn-tab.active{color:#ff2255;border-bottom-color:#ff2255}
.sn-section{display:none;padding:16px}
.sn-section.active{display:block}
.sn-card{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:16px;overflow:hidden;margin-bottom:12px}
.sn-lb-top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:16px 16px 0;margin-bottom:8px}
.sn-lb-podium{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.sn-lb-podium.p1{order:2}.sn-lb-podium.p2{order:1}.sn-lb-podium.p3{order:3}
.sn-lb-av-wrap{position:relative}
.sn-lb-av{width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid #1a1a2e}
.sn-lb-av.p1{width:76px;height:76px;border-color:#ffd700}
.sn-lb-av.p2{border-color:#c0c0c0}
.sn-lb-av.p3{border-color:#cd7f32}
.sn-lb-crown{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:18px}
.sn-lb-medal{font-size:16px}
.sn-lb-pname{font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;color:#fff;text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sn-lb-pval{font-size:11px;color:#888;font-family:Rajdhani,sans-serif}
.sn-lb-list{padding:0 8px 8px}
.sn-lb-row{display:flex;align-items:center;gap:12px;padding:10px 8px;border-bottom:1px solid #1a1a2e;cursor:pointer;transition:background .15s;border-radius:8px}
.sn-lb-row:last-child{border-bottom:none}
.sn-lb-row:hover{background:rgba(255,34,85,.04)}
.sn-lb-num{font-family:Rajdhani,sans-serif;font-weight:900;font-size:16px;color:#333;width:24px;text-align:center}
.sn-lb-av-sm{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #1a1a2e;flex-shrink:0}
.sn-lb-info{flex:1;min-width:0}
.sn-lb-name{font-family:Rajdhani,sans-serif;font-weight:700;font-size:14px;color:#ccc}
.sn-lb-sub{font-size:11px;color:#555;font-family:Rajdhani,sans-serif}
.sn-lb-val{font-family:Rajdhani,sans-serif;font-weight:800;color:#ff2255;font-size:15px}
.sn-lb-badge{font-size:18px}
.sn-loading{text-align:center;padding:40px;color:#333;font-family:Rajdhani,sans-serif;font-size:14px}
/* NOTIF */
.sn-nb{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:color .2s}.sn-nb:hover{color:#fff}.sn-nbc{position:absolute;top:2px;right:8px;background:#ff2255;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:900;display:none;align-items:center;justify-content:center;font-family:Rajdhani,sans-serif;border:1.5px solid #000}.sn-nbc.on{display:flex}.sn-np{position:fixed;top:0;right:0;width:min(360px,100vw);height:100vh;background:#111;z-index:9998;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;border-left:1px solid #1a1a2e}.sn-np.open{transform:translateX(0)}.sn-nov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9997;display:none}.sn-nov.on{display:block}.sn-nh{display:flex;align-items:center;padding:16px;border-bottom:1px solid #1a1a2e;flex-shrink:0}.sn-nht{flex:1;font-family:Rajdhani,sans-serif;font-weight:900;font-size:18px;color:#fff}.sn-nmr{background:none;border:1px solid #1a1a2e;color:#666;border-radius:8px;padding:4px 10px;font-family:Rajdhani,sans-serif;font-size:11px;font-weight:700;cursor:pointer}.sn-ncl{background:none;border:none;color:#555;font-size:22px;cursor:pointer;padding:0 4px;margin-left:8px}.sn-nl{flex:1;overflow-y:auto;padding:4px 0}.sn-ni{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid #0d0d1a;cursor:pointer}.sn-ni.u{background:rgba(255,34,85,.04);border-left:3px solid #ff2255}.sn-nic{width:40px;height:40px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}.sn-nid{flex:1;min-width:0}.sn-nit{font-size:13px;color:#ccc;line-height:1.4}.sn-niz{font-size:11px;color:#555;font-family:Rajdhani,sans-serif}.sn-nem{text-align:center;padding:40px 20px;color:#333;font-family:Rajdhani,sans-serif}
/* NAV */
.sn-bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0f1c;border-top:1px solid #0d2744;display:flex;justify-content:space-around;padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:900}
.sn-bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:color .2s}
.sn-bn-item:hover,.sn-bn-item.active{color:#ff2255}
.sn-bn-icon{font-size:22px;line-height:1}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>

</nav>

  <div class="sn-nh"><div class="sn-nht">Notificaciones</div><button class="sn-nmr" onclick="snNMR()">Todo le&iacute;do</button><button class="sn-ncl" onclick="snNC()">&#10005;</button></div>
  <div class="sn-nl" id="sn-nl"><div class="sn-nem">Cargando...</div></div>
</div>

// Tabs
window.snLBTab=function(id,btn){
  document.querySelectorAll(".sn-section").forEach(function(s){s.classList.remove("active");});
  document.querySelectorAll(".sn-tab").forEach(function(b){b.classList.remove("active");});
  document.getElementById("lb-"+id).classList.add("active");
  btn.classList.add("active");
  if(id==="creators"&&!window._lbC)snLBCreators();
  if(id==="fans"&&!window._lbF)snLBFans();
  if(id==="earners"&&!window._lbE)snLBEarners();
};
function snAvSrc(u){return u||("https://api.dicebear.com/7.x/personas/svg?seed="+(Math.random().toString(36).slice(2)));}
function snPodium(podEl,listEl,items,valFn,subFn){
  podEl.innerHTML="";
  var top3=items.slice(0,3),rest=items.slice(3);
  var medals=["\uD83E\uDD47","\uD83E\uDD48","\uD83E\uDD49"],crowns=["\uD83D\uDC51","",""],pClasses=["p1","p2","p3"];
  top3.forEach(function(u,i){
    var p=document.createElement("div");p.className="sn-lb-podium "+pClasses[i];
    p.onclick=function(){if(u.username)location.href="profile.html?u="+encodeURIComponent(u.username);};
    var aw=document.createElement("div");aw.className="sn-lb-av-wrap";
    if(i===0){var cr=document.createElement("div");cr.className="sn-lb-crown";cr.textContent=crowns[0];aw.appendChild(cr);}
    var av=document.createElement("img");av.className="sn-lb-av "+pClasses[i];
    av.src=snAvSrc(u.avatar_url);aw.appendChild(av);
    var md=document.createElement("div");md.className="sn-lb-medal";md.textContent=medals[i];
    var nm=document.createElement("div");nm.className="sn-lb-pname";nm.textContent="@"+(u.username||"?");
    var vl=document.createElement("div");vl.className="sn-lb-pval";vl.textContent=valFn(u);
    p.appendChild(aw);p.appendChild(md);p.appendChild(nm);p.appendChild(vl);
    podEl.appendChild(p);
  });
  listEl.innerHTML="";
  rest.forEach(function(u,i){
    var row=document.createElement("div");row.className="sn-lb-row";
    row.onclick=function(){if(u.username)location.href="profile.html?u="+encodeURIComponent(u.username);};
    var num=document.createElement("div");num.className="sn-lb-num";num.textContent=i+4;
    var av=document.createElement("img");av.className="sn-lb-av-sm";av.src=snAvSrc(u.avatar_url);
    var info=document.createElement("div");info.className="sn-lb-info";
    var nm=document.createElement("div");nm.className="sn-lb-name";nm.textContent="@"+(u.username||"?");
    var sb=document.createElement("div");sb.className="sn-lb-sub";sb.textContent=subFn(u);
    info.appendChild(nm);info.appendChild(sb);
    var vl=document.createElement("div");vl.className="sn-lb-val";vl.textContent=valFn(u);
    row.appendChild(num);row.appendChild(av);row.appendChild(info);row.appendChild(vl);
    listEl.appendChild(row);
  });
}
function snLBCreators(){
  window._lbC=true;
  var pod=document.getElementById("lb-c-podium"),lst=document.getElementById("lb-c-list");
  fetch(_SBL+"/rest/v1/profiles?is_creator=eq.true&select=id,username,avatar_url,follower_count,subscriber_count&order=follower_count.desc&limit=15",{headers:{"apikey":_AKL}})
  .then(function(r){return r.json();})
  .then(function(d){
    d=d||[];
    if(!d.length){pod.innerHTML='<div class="sn-loading">Sin datos a\u00FAn</div>';return;}
    snPodium(pod,lst,d,function(u){return (u.follower_count||0)+" seguidores";},function(u){return (u.subscriber_count||0)+" subs";});
  }).catch(function(){pod.innerHTML='<div class="sn-loading">Error cargando</div>';});
}
function snLBFans(){
  window._lbF=true;
  var pod=document.getElementById("lb-f-podium"),lst=document.getElementById("lb-f-list");
  // Top fans by total points across all creators
  fetch(_SBL+"/rest/v1/fan_memberships?select=fan_id,points,profiles!fan_memberships_fan_id_fkey(id,username,avatar_url)&order=points.desc&limit=15",{headers:{"apikey":_AKL,"Accept":"application/vnd.pgrst.object+json"}})
  .then(function(r){return r.json();})
  .then(function(d){
    d=d||[];
    var items=d.map(function(x){var p=x.profiles||{};return {username:p.username,avatar_url:p.avatar_url,points:x.points};});
    if(!items.length){pod.innerHTML='<div class="sn-loading">Sin datos a\u00FAn</div>';return;}
    snPodium(pod,lst,items,function(u){return (u.points||0)+" pts";},function(u){return "Fan activo";});
  }).catch(function(){pod.innerHTML='<div class="sn-loading">Error cargando</div>';});
}
function snLBEarners(){
  window._lbE=true;
  var pod=document.getElementById("lb-e-podium"),lst=document.getElementById("lb-e-list");
  // Top earners by coins_balance (almas earned)
  fetch(_SBL+"/rest/v1/profiles?is_creator=eq.true&select=id,username,avatar_url,coins_balance&order=coins_balance.desc&limit=15",{headers:{"apikey":_AKL}})
  .then(function(r){return r.json();})
  .then(function(d){
    d=d||[];
    if(!d.length){pod.innerHTML='<div class="sn-loading">Sin datos a\u00FAn</div>';return;}
    snPodium(pod,lst,d,function(u){return (u.coins_balance||0)+" Almas";},function(u){return "Creador";});
  }).catch(function(){pod.innerHTML='<div class="sn-loading">Error cargando</div>';});
}
// NOTIF
var _NB="https://cdokplvoqivducsqrejt.supabase.co",_NK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkb2twbHZvcWl2ZHVjc3FyZWp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTk4NjksImV4cCI6MjA5MDI3NDg2OX0.aFXuBGq5MPReDdkzHlG-lRNKwFeuapLVBJs2Y5n1L0g";
function snNTA(ts){var s=Math.floor((Date.now()-new Date(ts))/1000);return s<60?"ahora":s<3600?Math.floor(s/60)+"m":s<86400?Math.floor(s/3600)+"h":Math.floor(s/86400)+"d";}
function snNSB(n){var b=document.getElementById("sn-nbc");if(!b)return;if(n>0){b.textContent=n>9?"9+":n;b.classList.add("on");}else{b.classList.remove("on");b.textContent="";}}
function snNL(){if(!_NU||!_NT)return;fetch(_NB+"/rest/v1/notifications?user_id=eq."+_NU+"&order=created_at.desc&limit=20",{headers:{"apikey":_NK,"Authorization":"Bearer "+_NT}}).then(function(r){return r.json();}).then(function(ns){ns=ns||[];var el=document.getElementById("sn-nl");if(!el)return;el.innerHTML="";if(!ns.length){var e=document.createElement("div");e.className="sn-nem";e.textContent="No hay notificaciones";el.appendChild(e);return;}ns.forEach(function(n){var it=document.createElement("div");it.className="sn-ni"+(n.is_read?"":" u");it.onclick=function(){if(n.from_username)location.href="profile.html?u="+encodeURIComponent(n.from_username);else snNC();};var ic=document.createElement("div");ic.className="sn-nic";ic.textContent="\uD83D\uDD14";var ct=document.createElement("div");ct.className="sn-nid";var tx=document.createElement("div");tx.className="sn-nit";tx.textContent=n.title||n.message||"";var ti=document.createElement("div");ti.className="sn-niz";ti.textContent=snNTA(n.created_at);ct.appendChild(tx);ct.appendChild(ti);it.appendChild(ic);it.appendChild(ct);el.appendChild(it);});var u=ns.filter(function(n){return !n.is_read;}).length;snNSB(u);}).catch(function(){});}
window.snNO=function(){document.getElementById("sn-np").classList.add("open");document.getElementById("sn-nov").classList.add("on");snNL();};
window.snNC=function(){document.getElementById("sn-np").classList.remove("open");document.getElementById("sn-nov").classList.remove("on");};
window.snNMR=function(){if(!_NU||!_NT)return;fetch(_NB+"/rest/v1/rpc/mark_notifications_read",{method:"POST",headers:{"Content-Type":"application/json","apikey":_NK,"Authorization":"Bearer "+_NT},body:JSON.stringify({p_user_id:_NU})}).then(function(){snNL();}).catch(function(){});};
(function(){
  function init(){
    if(!window.sb){setTimeout(init,400);return;}
    window.sb.auth.getSession().then(function(s){
      if(s.data&&s.data.session){_NU=s.data.session.user.id;_NT=s.data.session.access_token;fetch(_NB+"/rest/v1/rpc/get_unread_count",{method:"POST",headers:{"Content-Type":"application/json","apikey":_NK,"Authorization":"Bearer "+_NT},body:JSON.stringify({p_user_id:_NU})}).then(function(r){return r.json();}).then(function(c){snNSB(c||0);}).catch(function(){});}
    });
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",function(){setTimeout(init,600);});else setTimeout(init,600);
  // Load first tab
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",function(){snLBCreators();});else snLBCreators();
})();
<\/script>
