<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;min-height:100vh}
header{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #0d2744;position:sticky;top:0;z-index:100;background:#01020c}
.logo{font-family:Orbitron,sans-serif;font-size:14px;color:#ff2255;letter-spacing:.12em;cursor:pointer}
.hdr-title{font-size:14px;font-weight:700;letter-spacing:.06em;flex:1}
.btn-post{padding:8px 20px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;letter-spacing:.04em}
.btn-post:disabled{opacity:.4;cursor:not-allowed}
.editor-wrap{display:flex;flex-direction:column;align-items:center;padding:16px}
@media(min-width:768px){.editor-wrap{flex-direction:row;align-items:flex-start;gap:24px;max-width:900px;margin:0 auto}}
.preview-area{position:relative;width:100%;max-width:360px;aspect-ratio:9/16;background:#000;border-radius:12px;overflow:hidden;margin-bottom:16px}
.preview-area video{width:100%;height:100%;object-fit:cover}
.preview-area .text-overlay{position:absolute;color:#fff;font-weight:700;font-size:24px;text-shadow:0 2px 8px rgba(0,0,0,.8);cursor:move;user-select:none;padding:4px 8px;pointer-events:auto}
.upload-zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;border:2px dashed #0d2744;border-radius:12px}
.upload-zone:hover{border-color:#ff2255;background:rgba(255,34,85,.03)}
.upload-icon{font-size:48px;opacity:.4}
.upload-text{font-size:14px;color:#5a8aaa;text-align:center;padding:0 20px}
input[type=file]{display:none}
.tools{width:100%;max-width:400px}
.tool-section{margin-bottom:16px}
.tool-label{font-size:11px;color:#5a8aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;font-weight:700}
.filter-grid{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:700;border:1px solid #0d2744;background:transparent;color:#5a8aaa;cursor:pointer;transition:all .2s;font-family:Rajdhani,sans-serif}
.filter-chip.active{background:rgba(255,34,85,.15);border-color:#ff2255;color:#ff2255}
.filter-chip:hover{border-color:#5a8aaa}
.speed-row{display:flex;gap:6px}
.speed-btn{padding:6px 12px;border-radius:16px;font-size:12px;font-weight:700;border:1px solid #0d2744;background:transparent;color:#5a8aaa;cursor:pointer;transition:all .2s;font-family:Rajdhani,sans-serif}
.speed-btn.active{background:rgba(255,34,85,.15);border-color:#ff2255;color:#ff2255}
.trim-wrap{display:flex;align-items:center;gap:8px}
.trim-wrap input[type=range]{flex:1;accent-color:#ff2255}
.trim-val{font-size:12px;color:#5a8aaa;min-width:36px;text-align:center}
.text-input-row{display:flex;gap:6px}
.text-input-row input{flex:1;padding:8px 12px;background:rgba(13,39,68,.4);border:1px solid #0d2744;border-radius:8px;color:#e8f4ff;font-family:Rajdhani,sans-serif;font-size:14px}
.text-input-row input::placeholder{color:#5a8aaa}
.text-input-row button{padding:8px 14px;background:rgba(255,34,85,.15);border:1px solid #ff2255;border-radius:8px;color:#ff2255;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer}
.caption-area{width:100%;max-width:400px;margin:12px 0}
.caption-area textarea{width:100%;padding:12px;background:rgba(13,39,68,.4);border:1px solid #0d2744;border-radius:8px;color:#e8f4ff;font-family:Rajdhani,sans-serif;font-size:14px;resize:none;height:60px}
.caption-area textarea::placeholder{color:#5a8aaa}
.cat-select{width:100%;padding:8px 12px;background:rgba(13,39,68,.4);border:1px solid #0d2744;border-radius:8px;color:#e8f4ff;font-family:Rajdhani,sans-serif;font-size:13px;margin-top:8px}
.cat-select option{background:#01020c}
.toggle-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.toggle-row label{font-size:13px;color:#5a8aaa;flex:1}
.toggle-sm{width:36px;height:20px;border-radius:10px;background:#0d2744;position:relative;cursor:pointer;border:none;transition:background .2s}
.toggle-sm.on{background:#ff2255}
.toggle-sm::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s}
.toggle-sm.on::after{left:18px}
.progress-bar{position:fixed;top:0;left:0;right:0;height:3px;background:transparent;z-index:999}
.progress-bar .fill{height:100%;background:#ff2255;width:0;transition:width .3s}

.collab-banner{padding:10px 16px;background:rgba(255,34,85,.08);border-bottom:1px solid rgba(255,34,85,.2);display:flex;align-items:center;gap:10px;font-size:12px}
.collab-banner-icon{font-size:20px}
.collab-banner-text{flex:1;color:#ff9999}
.collab-banner-type{font-family:Orbitron,sans-serif;font-size:10px;color:#ff2255;letter-spacing:.06em}
.collab-preview{position:absolute;bottom:8px;left:8px;width:80px;height:120px;border-radius:8px;overflow:hidden;border:2px solid #ff2255;z-index:5}
.collab-preview video{width:100%;height:100%;object-fit:cover}

.audio-section{margin-top:4px}
.audio-search{display:flex;gap:6px;margin-bottom:8px}
.audio-search input{flex:1;padding:7px 12px;background:rgba(13,39,68,.4);border:1px solid #0d2744;border-radius:8px;color:#e8f4ff;font-family:Rajdhani,sans-serif;font-size:13px}
.audio-search input::placeholder{color:#5a8aaa}
.audio-list{max-height:180px;overflow-y:auto;border:1px solid #0d2744;border-radius:8px}
.audio-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(13,39,68,.3)}
.audio-item:last-child{border-bottom:none}
.audio-item:hover,.audio-item.selected{background:rgba(255,34,85,.08)}
.audio-item.selected{border-left:2px solid #ff2255}
.ai-play{width:28px;height:28px;border-radius:50%;background:rgba(255,34,85,.15);border:1px solid #ff2255;color:#ff2255;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-info{flex:1;min-width:0}
.ai-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-artist{font-size:10px;color:#5a8aaa}
.ai-uses{font-size:10px;color:#5a8aaa;flex-shrink:0}

.product-tag-section{margin-top:4px}
.product-tag-list{max-height:120px;overflow-y:auto;border:1px solid #0d2744;border-radius:8px}
.pt-item{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(13,39,68,.3);font-size:12px}
.pt-item:hover,.pt-item.selected{background:rgba(255,34,85,.08)}
.pt-item.selected{border-left:2px solid #ff2255}
.pt-img{width:32px;height:32px;border-radius:6px;background:#0d2744;overflow:hidden;flex-shrink:0}
.pt-img img{width:100%;height:100%;object-fit:cover}
.pt-name{font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-price{color:#ff2255;font-family:Orbitron,sans-serif;font-size:10px;flex-shrink:0}
.pt-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;background:rgba(255,34,85,.08);border:1px solid rgba(255,34,85,.2);color:#ff9999;margin-top:6px}

.schedule-section,.poll-section{margin-top:4px}
.schedule-row{display:flex;gap:8px;align-items:center}
.schedule-input{flex:1;padding:7px 10px;background:rgba(13,39,68,.4);border:1px solid #0d2744;border-radius:8px;color:#e8f4ff;font-family:Rajdhani,sans-serif;font-size:13px}
.poll-options{margin-bottom:8px}
.poll-opt-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.poll-opt-input{flex:1;padding:7px 10px;background:rgba(13,39,68,.4);border:1px solid #0d2744;border-radius:8px;color:#e8f4ff;font-family:Rajdhani,sans-serif;font-size:13px}
.poll-opt-input::placeholder{color:#5a8aaa}
.poll-remove{background:none;border:none;color:#ff2255;font-size:16px;cursor:pointer;padding:4px}
.poll-add{background:none;border:1px dashed #0d2744;border-radius:8px;padding:6px;text-align:center;color:#5a8aaa;font-size:12px;cursor:pointer;transition:border-color .15s}
.poll-add:hover{border-color:#ff2255;color:#ff2255}
</style>

<header class="sn-header">

<div class="editor-wrap">
  <div class="preview-area" id="previewArea">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('vidInput').click()">
      <div class="upload-icon">&#127909;</div>
      <div class="upload-text">Toca para seleccionar video<br><small>MP4, WebM &bull; Max 60s</small></div>
    </div>

    <div class="tool-section"><div class="tool-label">Texto</div><div class="text-input-row"><input type="text" id="textInput" placeholder="Escribe texto..." maxlength="60"><button onclick="addTextOverlay()">Agregar</button></div></div>

      <div class="toggle-row"><label>Marcar como Reel</label><button class="toggle-sm on" id="togReel" onclick="this.classList.toggle('on')"></button></div>
      <div class="toggle-row"><label>Contenido premium (+18)</label><button class="toggle-sm" id="togNsfw" onclick="this.classList.toggle('on')"></button></div>
    </div>
      <div class="tool-section product-tag-section">
        <div class="tool-label">Etiquetar producto</div>
        <div class="product-tag-list" id="productTagList"><div style="padding:10px;text-align:center;color:#5a8aaa;font-size:11px">Cargando tus productos...</div></div>
        <div id="selectedProductBadge"></div>
      </div>
  </div>
</div>
<script>
var SB_URL='https://cdokplvoqivducsqrejt.supabase.co';
var SB_KEY='sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su';
var sb=supabase.createClient(SB_URL,SB_KEY);window.sb=sb;
var currentUser=null;var _videoFile=null;var _videoDuration=0;var _filter='none';var _speed=1;var _trimStart=0;var _trimEnd=1;var _textOverlays=[];var _videoEl=null;

var FILTERS=[
  {name:'Normal',css:'none'},{name:'Cine',css:'contrast(1.1) saturate(1.3) sepia(0.15)'},
  {name:'Frio',css:'saturate(0.8) brightness(1.1) hue-rotate(15deg)'},
  {name:'Calido',css:'saturate(1.2) sepia(0.2) brightness(1.05)'},
  {name:'B&W',css:'grayscale(1) contrast(1.1)'},{name:'Retro',css:'sepia(0.4) contrast(1.2) brightness(0.95)'},
  {name:'Vivido',css:'saturate(1.8) contrast(1.1)'},{name:'Drama',css:'contrast(1.4) brightness(0.9) saturate(0.9)'},
  {name:'Pastel',css:'saturate(0.6) brightness(1.15)'},{name:'Neon',css:'saturate(2) brightness(1.1) contrast(1.2)'}
];
var SPEEDS=[0.5,0.75,1,1.5,2,3];

sb.auth.getSession().then(function(r){
  if(!r.data.session){location.href='/';return;}
  currentUser=r.data.session.user;initEditor();
    // Check for duet/stitch/remix params
    var _params=new URLSearchParams(location.search);
    var _duetId=_params.get('duet');
    var _stitchId=_params.get('stitch');
    var _remixId=_params.get('remix');
    var _soundParam=_params.get('sound');
    if(_duetId||_stitchId||_remixId) loadCollabMode(_duetId||_stitchId||_remixId, _duetId?'duet':_stitchId?'stitch':'remix');

});

function initEditor(){
  var fg=document.getElementById('filterGrid');
  FILTERS.forEach(function(f,i){
    var chip=document.createElement('button');chip.className='filter-chip'+(i===0?' active':'');chip.textContent=f.name;
    chip.onclick=function(){
      document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.remove('active');});
      chip.classList.add('active');_filter=f.css;
      if(_videoEl) _videoEl.style.filter=f.css==='none'?'':f.css;
    };
    fg.appendChild(chip);
  });
  var sr=document.getElementById('speedRow');
  SPEEDS.forEach(function(s){
    var btn=document.createElement('button');btn.className='speed-btn'+(s===1?' active':'');btn.textContent=s+'x';
    btn.onclick=function(){
      document.querySelectorAll('.speed-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');_speed=s;if(_videoEl) _videoEl.playbackRate=s;
    };
    sr.appendChild(btn);
  });
  document.getElementById('vidInput').addEventListener('change',handleVideoSelect);
  document.getElementById('trimStart').addEventListener('input',function(){
    _trimStart=parseFloat(this.value)/100;
    if(_videoEl&&_videoDuration){document.getElementById('trimStartVal').textContent=fmtTime(_trimStart*_videoDuration);_videoEl.currentTime=_trimStart*_videoDuration;}
  });
  document.getElementById('trimEnd').addEventListener('input',function(){
    _trimEnd=parseFloat(this.value)/100;
    if(_videoDuration) document.getElementById('trimEndVal').textContent=fmtTime(_trimEnd*_videoDuration);
  });
}

function handleVideoSelect(e){
  var file=e.target.files[0];if(!file) return;
  _videoFile=file;var url=URL.createObjectURL(file);
  var area=document.getElementById('previewArea');
  document.getElementById('uploadZone').style.display='none';
  _videoEl=document.createElement('video');_videoEl.src=url;_videoEl.autoplay=true;_videoEl.loop=true;_videoEl.muted=true;_videoEl.playsInline=true;_videoEl.setAttribute('playsinline','');
  _videoEl.addEventListener('loadedmetadata',function(){
    _videoDuration=_videoEl.duration;
    document.getElementById('trimEndVal').textContent=fmtTime(_videoDuration);
    if(_videoDuration>60){_trimEnd=60/_videoDuration;document.getElementById('trimEnd').value=_trimEnd*100;document.getElementById('trimEndVal').textContent='1:00';}
  });
  _videoEl.addEventListener('click',function(){if(_videoEl.paused)_videoEl.play();else _videoEl.pause();});
  area.insertBefore(_videoEl,area.firstChild);
  document.getElementById('toolsPanel').style.display='block';
  document.getElementById('btnPost').disabled=false;
}

function addTextOverlay(){
  var text=document.getElementById('textInput').value.trim();if(!text) return;
  var area=document.getElementById('previewArea');
  var el=document.createElement('div');el.className='text-overlay';el.textContent=text;el.style.top='40%';el.style.left='10%';
  area.appendChild(el);_textOverlays.push({text:text,x:10,y:40});
  document.getElementById('textInput').value='';
  var dragging=false,ox=0,oy=0;
  el.addEventListener('mousedown',function(e){
    dragging=true;ox=e.offsetX;oy=e.offsetY;
    function mm(e2){if(!dragging)return;var pr=area.getBoundingClientRect();
      el.style.left=Math.max(0,Math.min(80,(e2.clientX-ox-pr.left)/pr.width*100))+'%';
      el.style.top=Math.max(0,Math.min(90,(e2.clientY-oy-pr.top)/pr.height*100))+'%';}
    function mu(){dragging=false;document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);}
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
  el.addEventListener('touchstart',function(e){dragging=true;var r=el.getBoundingClientRect();ox=e.touches[0].clientX-r.left;oy=e.touches[0].clientY-r.top;},{passive:true});
  el.addEventListener('touchmove',function(e){if(!dragging)return;var pr=area.getBoundingClientRect();
    el.style.left=Math.max(0,Math.min(80,(e.touches[0].clientX-ox-pr.left)/pr.width*100))+'%';
    el.style.top=Math.max(0,Math.min(90,(e.touches[0].clientY-oy-pr.top)/pr.height*100))+'%';},{passive:true});
  el.addEventListener('touchend',function(){dragging=false;});
}

async function publishReel(){
  if(!_videoFile||!currentUser) return;
  var btn=document.getElementById('btnPost');btn.disabled=true;btn.textContent='Subiendo...';
  var fill=document.getElementById('uploadFill');fill.style.width='10%';
  try{
    var ext=_videoFile.name.split('.').pop()||'mp4';
    var path='videos/'+currentUser.id+'/'+Date.now()+'.'+ext;
    fill.style.width='30%';
    var upRes=await sb.storage.from('media').upload(path,_videoFile,{contentType:_videoFile.type,upsert:false});
    if(upRes.error) throw upRes.error;
    fill.style.width='60%';
    var urlRes=sb.storage.from('media').getPublicUrl(path);
    var mediaUrl=urlRes.data.publicUrl;
    var isReel=document.getElementById('togReel').classList.contains('on');
    var isNsfw=document.getElementById('togNsfw').classList.contains('on');
    var caption=document.getElementById('captionText').value.trim();
    var category=document.getElementById('catSelect').value||null;
    var trimStartMs=Math.round(_trimStart*_videoDuration*1000);
    var trimEndMs=Math.round(_trimEnd*_videoDuration*1000);
    fill.style.width='80%';
    var postData={user_id:currentUser.id,content:caption||null,media_url:mediaUrl,media_type:'video',
      is_reel:isReel,is_premium:isNsfw,content_rating:isNsfw?'nsfw':'sfw',category:category,
      video_duration_ms:trimEndMs-trimStartMs,video_filter:_filter==='none'?null:_filter,
      video_speed:_speed,text_overlays:_textOverlays.length?JSON.stringify(_textOverlays):null,
      audio_track:_selectedSound?_selectedSound.name:null,
      scheduled_at:document.getElementById('scheduleInput')?.value?new Date(document.getElementById('scheduleInput').value).toISOString():null,
      is_published:!document.getElementById('scheduleInput')?.value,
      collab_type:_collabType||null,
      original_post_id:_originalPostId||null};
    var ins=await sb.from('posts').insert(postData).select('id').single();
    if(ins.error) throw ins.error
    
    // Save poll if options exist
    if(_pollOptions.length>=2&&ins.data&&ins.data.id){
      var validOpts=_pollOptions.filter(function(o){return o.trim();});
      if(validOpts.length>=2){
        await sb.from('polls').insert({post_id:ins.data.id,question:'',options:validOpts.map(function(o){return{text:o,votes:0};}),total_votes:0});
      }
    }
// Save product tags
    if(_taggedProducts.length&&ins.data&&ins.data.id){
      for(var ti=0;ti<_taggedProducts.length;ti++){await sb.from('post_product_tags').insert({post_id:ins.data.id,product_id:_taggedProducts[ti].id});}
    }
    fill.style.width='100%';
    setTimeout(function(){location.href=isReel?'/reels.html':'/feed.html';},500);
  }catch(err){
    btn.disabled=false;btn.textContent='PUBLICAR';fill.style.width='0';
    alert('Error: '+(err.message||err));
  }
}
function fmtTime(s){var m=Math.floor(s/60);var sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
</script>

<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}
// == P1: SCHEDULE ==
function clearSchedule(){document.getElementById('scheduleInput').value='';}

// == P1: POLL CREATOR ==
var _pollOptions=[];
function addPollOption(){
  if(_pollOptions.length>=4) return;
  _pollOptions.push('');
  renderPollInputs();
}
function removePollOption(i){
  _pollOptions.splice(i,1);
  renderPollInputs();
}
function renderPollInputs(){
  var c=document.getElementById('pollOptions');c.innerHTML='';
  _pollOptions.forEach(function(opt,i){
    var row=document.createElement('div');row.className='poll-opt-row';
    row.innerHTML='<input class="poll-opt-input" placeholder="Opcion '+(i+1)+'" value="'+opt+'" oninput="_pollOptions['+i+']=this.value"><button class="poll-remove" onclick="removePollOption('+i+')">\u2715</button>';
    c.appendChild(row);
  });
}


// == PRODUCT TAGGING ==
var _taggedProducts=[];
async function loadMyProducts(){
  if(!currentUser) return;
  var shopR=await sb.from('shops').select('id').eq('owner_id',currentUser.id).single();
  if(!shopR.data){document.getElementById('productTagList').innerHTML='<div style="padding:10px;text-align:center;color:#5a8aaa;font-size:11px"><a href="/shop.html" style="color:#ff2255">Crea tu tienda</a> para etiquetar productos</div>';return;}
  var r=await sb.rpc('get_shop_products',{p_shop_id:shopR.data.id,p_limit:20});
  if(!r.data||!r.data.length){document.getElementById('productTagList').innerHTML='<div style="padding:10px;text-align:center;color:#5a8aaa;font-size:11px">Sin productos. <a href="/shop.html" style="color:#ff2255">Agrega productos</a></div>';return;}
  var list=document.getElementById('productTagList');list.innerHTML='';
  r.data.forEach(function(p){
    var item=document.createElement('div');item.className='pt-item';item.dataset.pid=p.product_id;
    var imgs=p.images;if(typeof imgs==='string')try{imgs=JSON.parse(imgs);}catch(e){imgs=[];}
    var imgUrl=(imgs&&imgs.length)?imgs[0]:'';
    item.innerHTML='<div class="pt-img">'+(imgUrl?'<img src="'+imgUrl+'">':'')+'</div><span class="pt-name">'+p.name+'</span><span class="pt-price">'+(p.price_cents/100).toFixed(2)+'</span>';
    item.onclick=function(){
      var isSelected=item.classList.contains('selected');
      document.querySelectorAll('.pt-item').forEach(function(el){el.classList.remove('selected');});
      if(!isSelected){
        item.classList.add('selected');
        _taggedProducts=[{product_id:p.product_id,x_position:50,y_position:50}];
        document.getElementById('selectedProductBadge').innerHTML='<div class="pt-badge">\uD83D\uDED2 '+p.name+' etiquetado</div>';
      }else{
        _taggedProducts=[];
        document.getElementById('selectedProductBadge').innerHTML='';
      }
    };
    list.appendChild(item);
  });
}
setTimeout(loadMyProducts,2000);


// == AUDIO LIBRARY BROWSER ==
var _allSounds=[];var _selectedSound=null;var _previewAudio=null;
async function loadSounds(){
  var r=await sb.rpc('get_trending_sounds',{p_limit:50});
  if(r.data&&r.data.length){
    _allSounds=r.data;
    renderSoundList(r.data);
  } else {
    // Also try direct query
    var r2=await sb.from('sounds').select('id,name,artist,audio_url,uses_count').order('uses_count',{ascending:false}).limit(50);
    if(r2.data&&r2.data.length){_allSounds=r2.data.map(function(s){return{sound_id:s.id,name:s.name,artist:s.artist,audio_url:s.audio_url,uses_count:s.uses_count};});renderSoundList(_allSounds);}
    else{document.getElementById('audioList').innerHTML='<div style="padding:12px;text-align:center;color:#5a8aaa;font-size:12px">Sin sonidos disponibles</div>';}
  }
}
function renderSoundList(sounds){
  var list=document.getElementById('audioList');list.innerHTML='';
  sounds.forEach(function(s){
    var item=document.createElement('div');item.className='audio-item';
    item.innerHTML='<button class="ai-play" onclick="event.stopPropagation();previewSound(\''+s.sound_id+'\')" id="play-'+s.sound_id+'">\u25B6</button><div class="ai-info"><div class="ai-name">'+(s.name||'Sin nombre')+'</div><div class="ai-artist">'+(s.artist||'Original')+'</div></div><div class="ai-uses">'+(s.uses_count||0)+' usos</div>';
    item.onclick=function(){selectSound(s);};
    list.appendChild(item);
  });
}
function searchSounds(q){
  if(!q){renderSoundList(_allSounds);return;}
  var filtered=_allSounds.filter(function(s){return (s.name||'').toLowerCase().includes(q.toLowerCase())||(s.artist||'').toLowerCase().includes(q.toLowerCase());});
  renderSoundList(filtered);
}
function selectSound(s){
  _selectedSound=s;
  document.querySelectorAll('.audio-item').forEach(function(el){el.classList.remove('selected');});
  event.currentTarget.classList.add('selected');
}
function previewSound(id){
  var s=_allSounds.find(function(x){return x.sound_id===id;});
  if(!s||!s.audio_url) return;
  if(_previewAudio){_previewAudio.pause();_previewAudio=null;document.querySelectorAll('.ai-play').forEach(function(b){b.textContent='\u25B6';});}
  _previewAudio=new Audio(s.audio_url);
  _previewAudio.play();
  var btn=document.getElementById('play-'+id);if(btn)btn.textContent='\u23F8';
  _previewAudio.addEventListener('ended',function(){if(btn)btn.textContent='\u25B6';_previewAudio=null;});
}
// Load sounds when editor opens
setTimeout(loadSounds,1500);

// == COLLAB MODE (Duet/Stitch/Remix) ==
var _collabType=null;var _originalPostId=null;
async function loadCollabMode(postId,type){
  _collabType=type;_originalPostId=postId;
  var r=await sb.from('posts').select('media_url,content,user_id,profiles(username)').eq('id',postId).single();
  if(!r.data) return;
  // Show collab banner
  var banner=document.createElement('div');banner.className='collab-banner';
  banner.innerHTML='<span class="collab-banner-icon">'+(type==='duet'?'\uD83C\uDFAC':type==='stitch'?'\u2702\uFE0F':'\uD83D\uDD04')+'</span><div><div class="collab-banner-type">'+type.toUpperCase()+'</div><div class="collab-banner-text">Con @'+(r.data.profiles?.username||'usuario')+'</div></div>';
  document.querySelector('header').after(banner);
  // Show original video preview in the preview area
  var area=document.getElementById('previewArea');
  var preview=document.createElement('div');preview.className='collab-preview';
  var vid=document.createElement('video');vid.src=r.data.media_url;vid.muted=true;vid.loop=true;vid.autoplay=true;vid.playsInline=true;
  preview.appendChild(vid);area.appendChild(preview);
  // Update title
  document.querySelector('.hdr-title').textContent=type.toUpperCase()+' \u2014 Editor';
}
</script>
