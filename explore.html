/* === EXPLORE UI ENHANCEMENTS === */
/* Animated search placeholder */
.sn-header .sn-search-btn{position:relative;overflow:hidden}

/* Creator cards - better hover */
.creator-card{transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.creator-card::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(255,34,85,.08));opacity:0;transition:opacity .3s;pointer-events:none}
.creator-card:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 0 1px rgba(255,34,85,.15)}
.creator-card:hover::after{opacity:1}
.creator-card:active{transform:translateY(-2px)}

/* Filter tabs - better active state */
.cat{position:relative;overflow:hidden;transition:all .2s}
.cat.active{box-shadow:0 0 20px rgba(0,229,255,.15)}
.cat::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,229,255,.1),transparent);opacity:0;transition:opacity .2s}

@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Section titles - glow effect */
.explore-section-title,.section-title{position:relative}
.explore-section-title::after,.section-title::after{content:'';position:absolute;bottom:-4px;left:0;width:40px;height:2px;background:var(--sn-grad-fire);border-radius:2px}

/* Better empty state */

.explore-empty-icon{font-size:48px;margin-bottom:16px;filter:grayscale(1);opacity:.3}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Grid animation - stagger */
.creators-grid .creator-card{animation:cardIn .4s ease both}
.creators-grid .creator-card:nth-child(1){animation-delay:.05s}
.creators-grid .creator-card:nth-child(2){animation-delay:.1s}
.creators-grid .creator-card:nth-child(3){animation-delay:.15s}
.creators-grid .creator-card:nth-child(4){animation-delay:.2s}
.creators-grid .creator-card:nth-child(5){animation-delay:.25s}
.creators-grid .creator-card:nth-child(6){animation-delay:.3s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

<script>
var SB_URL="https://cdokplvoqivducsqrejt.supabase.co";
var SB_KEY="sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su";
var sb=supabase.createClient(SB_URL,SB_KEY);window.sb=sb;
var currentUser=null;
var followingSet={};
var allCreators=[];

sb.auth.getSession().then(function(r){
  if(r.data.session){
    currentUser=r.data.session.user;
    sb.from("follows").select("following_id").eq("follower_id",currentUser.id).then(function(f){
      (f.data||[]).forEach(function(x){followingSet[x.following_id]=true;});
    });
  }
  loadCreators();
});

async function loadCreators(){
  var r=await sb.from("profiles")
    .select("id,username,avatar_url,cover_url,bio,verification_status,followers_count,subscribers_count,posts_count,subscription_price,fan_rank_name,fan_rank,role")
    .eq("role","creator").eq("is_banned",false).order("followers_count",{ascending:false}).limit(30);
  if(r.error){document.getElementById("creatorsGrid").innerHTML="<div class=\"empty\">Error cargando creadores</div>";return;}
  allCreators=r.data||[];
  renderCreators(allCreators);
}

function filterCreators(filter,btn){
  document.querySelectorAll(".cat").forEach(function(c){c.classList.remove("active");});
  btn.classList.add("active");
  var filtered=allCreators.slice();
  if(filter==="top") filtered=filtered.sort(function(a,b){return (b.followers_count||0)-(a.followers_count||0);});
  else if(filter==="new") filtered=filtered.reverse();
  else if(filter==="verified") filtered=filtered.filter(function(c){return c.verification_status==="verified";});
  renderCreators(filtered);
}

function renderCreators(creators){
  var grid=document.getElementById("creatorsGrid");
  if(!creators||creators.length===0){grid.innerHTML="<div class=\"empty\">No hay creadores en esta categor\xEDa a\xFAn</div>";return;}
  grid.innerHTML="";
  creators.forEach(function(c){grid.appendChild(buildCreatorCard(c));});
}

function buildCreatorCard(c){
  var card=document.createElement("div");card.className="creator-card";
  card.addEventListener("click",function(){window.location.href="/profile.html?u="+c.username;});
  // Cover
  var cover=document.createElement("div");cover.className="creator-cover";
  if(c.cover_url){var ci=document.createElement("img");ci.src=c.cover_url;cover.appendChild(ci);}
  var grad=document.createElement("div");grad.className="creator-cover-grad";cover.appendChild(grad);
  var av=document.createElement("div");av.className="creator-av";
  if(c.avatar_url){var ai=document.createElement("img");ai.src=c.avatar_url;av.appendChild(ai);}else av.textContent=(c.username||"?")[0].toUpperCase();
  cover.appendChild(av);card.appendChild(cover);
  // Body
  var body=document.createElement("div");body.className="creator-body";
  var name=document.createElement("div");name.className="creator-name";
  name.textContent="@"+c.username;
  if(c.verification_status==="verified"){var vb=document.createElement("span");vb.className="v-badge";vb.textContent="\u2713";name.appendChild(vb);}
  if(c.fan_rank_name&&c.fan_rank>1){var rb=document.createElement("span");rb.className="rank-badge";rb.textContent="\u2B50 "+c.fan_rank_name;name.appendChild(rb);}
  var bio=document.createElement("div");bio.className="creator-bio";bio.textContent=c.bio||"Creador en SHADOWNET";
  var stats=document.createElement("div");stats.className="creator-stats";
  [{n:c.followers_count||0,l:"Seg."},{n:c.subscribers_count||0,l:"Subs"},{n:c.posts_count||0,l:"Posts"}].forEach(function(s){
    var cs=document.createElement("div");cs.className="cs";
    var num=document.createElement("div");num.className="cs-num";num.textContent=s.n>=1000?(s.n/1000).toFixed(1)+"K":s.n;
    var lbl=document.createElement("div");lbl.className="cs-lbl";lbl.textContent=s.l;
    cs.appendChild(num);cs.appendChild(lbl);stats.appendChild(cs);
  });
  var price=document.createElement("div");price.className="creator-price";
  var p=parseFloat(c.subscription_price||0);
  price.textContent=p>0?"\uD83D\uDC0D Suscripci\u00F3n: $"+p.toFixed(2)+"/mes":"\uD83D\uDD13 Contenido gratis";
  var subbtn=document.createElement("button");
  subbtn.className="sub-btn"+(p===0?" free":"");
  subbtn.textContent=p===0?"Seguir gratis":"Suscribirse";
  subbtn.dataset.uid=c.id;subbtn.dataset.uname=c.username;
  subbtn.addEventListener("click",function(e){e.stopPropagation();goToProfile(this.dataset.uname);});
  body.appendChild(name);body.appendChild(bio);body.appendChild(stats);body.appendChild(price);body.appendChild(subbtn);
  card.appendChild(body);
  return card;
}

function goToProfile(uname){window.location.href="/profile.html?u="+uname;}

function showToast(msg,err){
  var t=document.getElementById("toast");t.textContent=msg;
  t.style.borderColor=err?"#ff2255":"#00ff88";t.style.color=err?"#ff2255":"#00ff88";
  t.style.display="block";setTimeout(function(){t.style.display="none";},2500);
}
</script>

<!-- Auth guard v3 - uses shared sb client -->
<script>
(function(){
  function doCheck(){
    var client = window.sb;
    if(!client){ setTimeout(doCheck,200); return; }
    client.auth.getSession().then(function(res){
      if(res.data && res.data.session) return; // logged in, do nothing
      // Not logged in yet - wait 800ms for token refresh before redirecting
      setTimeout(function(){
        client.auth.getSession().then(function(res2){
          if(!res2.data || !res2.data.session) window.location.replace('/');
        });
      }, 800);
    });
  }
  // Delay to ensure main scripts have run and window.sb is set
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){ setTimeout(doCheck,400); });
  } else {
    setTimeout(doCheck,400);
  }
})();

    var container=document.getElementById('trendingSounds');
    var _ts=document.getElementById('trendingSoundsSection');if(_ts)_ts.style.display='block';
    r.data.forEach(function(s){
      var chip=document.createElement('div');chip.className='sound-chip';
      chip.onclick=function(){location.href='/sound.html?id='+s.sound_id;};
      chip.innerHTML='<div class="sound-chip-disc">\uD83C\uDFB5</div><div class="sound-chip-info"><div class="sound-chip-name">'+(s.name||'Sonido')+'</div><div class="sound-chip-uses">'+(s.uses_count||0)+' videos</div></div>';
      container.appendChild(chip);
    });
  }).catch(function(){});
  // Load trending products as shops
  window.sb.rpc('get_trending_products',{p_limit:8}).then(function(r){
    if(!r.data||!r.data.length) return;
    var container=document.getElementById('trendingShops');
    var _ss=document.getElementById('shopSection');if(_ss)_ss.style.display='block';
    r.data.forEach(function(p){
      var chip=document.createElement('div');chip.className='shop-chip';
      chip.onclick=function(){location.href='/shop.html?u='+(p.seller_username||'');};
      chip.innerHTML='<div class="shop-chip-icon">\uD83D\uDED2</div><div class="shop-chip-name">'+(p.name||'Producto')+'</div>';
      container.appendChild(chip);
    });
  }).catch(function(){});
},2000);
</script>
