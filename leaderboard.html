<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHADOWNET — Ranking</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:100;padding:12px 20px;background:rgba(1,2,12,.97);border-bottom:1px solid #0d2744;display:flex;align-items:center;gap:12px}
.logo{font-family:Orbitron,sans-serif;font-size:15px;color:#ff2255;letter-spacing:.12em;cursor:pointer}
.page-title{font-family:Orbitron,sans-serif;font-size:12px;color:#5a8aaa;letter-spacing:.1em}
.wrap{max-width:700px;margin:0 auto;padding:24px 16px}
/* Hero podium */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin-bottom:32px;padding:0 8px}
.podium-item{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;max-width:140px}
.podium-av{border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;overflow:hidden;cursor:pointer}
.podium-av img{width:100%;height:100%;object-fit:cover}
.p1 .podium-av{width:72px;height:72px;font-size:26px;border-color:#ffd700}
.p2 .podium-av{width:60px;height:60px;font-size:22px;border-color:#c0c0c0}
.p3 .podium-av{width:52px;height:52px;font-size:18px;border-color:#cd7f32}
.podium-name{font-weight:700;font-size:13px;text-align:center;cursor:pointer}
.podium-name:hover{color:#00e5ff}
.podium-pts{font-family:Orbitron,sans-serif;font-size:11px;color:#5a8aaa}
.podium-rank{font-size:10px;color:#5a8aaa;background:rgba(7,15,30,.6);border:1px solid #0d2744;padding:2px 8px;border-radius:10px}
.podium-block{border-radius:8px 8px 0 0;width:100%}
.p1 .podium-block{height:80px;background:linear-gradient(180deg,rgba(255,215,0,.25),rgba(255,215,0,.1));border:1px solid rgba(255,215,0,.3)}
.p2 .podium-block{height:60px;background:linear-gradient(180deg,rgba(192,192,192,.2),rgba(192,192,192,.08));border:1px solid rgba(192,192,192,.25)}
.p3 .podium-block{height:44px;background:linear-gradient(180deg,rgba(205,127,50,.2),rgba(205,127,50,.08));border:1px solid rgba(205,127,50,.25)}
.medal{font-size:24px;margin-bottom:-4px}
/* List */
.lb-list{background:rgba(7,15,30,.6);border:1px solid #0d2744;border-radius:12px;overflow:hidden;margin-bottom:24px}
.lb-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(13,39,68,.4);cursor:pointer;transition:background .15s}
.lb-item:hover{background:rgba(0,229,255,.04)}
.lb-item.me{background:rgba(255,34,85,.06);border-left:3px solid #ff2255}
.lb-pos{font-family:Orbitron,sans-serif;font-size:13px;color:#5a8aaa;width:28px;text-align:center;flex-shrink:0}
.lb-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-info{flex:1;min-width:0}
.lb-name{font-weight:700;font-size:14px;color:#e8f4ff}
.lb-rank{font-size:11px;color:#5a8aaa;margin-top:2px}
.lb-pts{font-family:Orbitron,sans-serif;font-size:14px;color:#ffaa00;flex-shrink:0}
.lb-verified{color:#00e5ff;font-size:12px;margin-left:4px}
/* My rank box */
.my-rank-box{background:linear-gradient(135deg,rgba(255,34,85,.1),rgba(7,15,30,.6));border:1px solid rgba(255,34,85,.3);border-radius:12px;padding:18px;margin-bottom:24px;display:none}
.my-rank-title{font-family:Orbitron,sans-serif;font-size:11px;color:#ff6680;letter-spacing:.1em;margin-bottom:12px}
.my-rank-row{display:flex;align-items:center;gap:16px}
.my-rank-pos{font-family:Orbitron,sans-serif;font-size:36px;color:#ffaa00}
.my-rank-info{flex:1}
.my-rank-name{font-weight:700;font-size:16px;color:#e8f4ff;margin-bottom:4px}
.my-rank-pts{font-size:13px;color:#5a8aaa}
.my-rank-bar{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-top:10px}
.my-rank-fill{height:100%;background:linear-gradient(90deg,#ff2255,#ffaa00);border-radius:4px;transition:width .6s ease}
.my-rank-next{font-size:11px;color:#5a8aaa;margin-top:6px}
/* Referral box */
.referral-box{background:rgba(7,15,30,.7);border:1px solid #0d2744;border-radius:12px;padding:18px;margin-bottom:24px;display:none}
.ref-title{font-family:Orbitron,sans-serif;font-size:11px;color:#00ff88;letter-spacing:.1em;margin-bottom:12px}
.ref-code-row{display:flex;gap:8px;margin-bottom:10px}
.ref-code{flex:1;background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.3);color:#00ff88;border-radius:8px;padding:10px 14px;font-family:Orbitron,sans-serif;font-size:16px;letter-spacing:.12em;text-align:center}
.copy-btn{padding:10px 16px;background:rgba(0,255,136,.15);border:1px solid rgba(0,255,136,.4);color:#00ff88;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase}
.copy-btn:hover{background:rgba(0,255,136,.25)}
.ref-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ref-stat{background:rgba(1,2,12,.4);border-radius:8px;padding:10px;text-align:center}
.ref-stat-num{font-family:Orbitron,sans-serif;font-size:20px;color:#e8f4ff}
.ref-stat-lbl{font-size:11px;color:#5a8aaa;text-transform:uppercase;margin-top:3px}
.ref-desc{font-size:12px;color:#5a8aaa;line-height:1.5;margin-bottom:12px}
.empty{text-align:center;padding:32px;color:#5a8aaa}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(7,15,30,.95);border:1px solid #00ff88;color:#00ff88;padding:10px 20px;border-radius:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;z-index:9999;display:none;white-space:nowrap}

/* ===== SN Bottom Nav ===== */
.sn-bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(7,15,30,.97);border-top:1px solid #0d2744;display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));justify-content:space-around;align-items:center;}
.sn-bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:color .2s;}
.sn-bn-item:hover,.sn-bn-active{color:#00e5ff!important;}
.sn-bn-active .sn-bn-icon,.sn-bn-active .sn-bn-lbl{color:#ff2255!important;}
.sn-bn-icon{font-size:20px;line-height:1;}
.sn-bn-lbl{font-size:9px;}
.sn-bn-plus{padding:0!important;}
.sn-bn-plus-inner{width:46px;height:28px;background:linear-gradient(135deg,#ff2255,#cc0030);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;}
.sn-bn-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;border:2px solid #0d2744;color:#fff;font-weight:800;}
@media(min-width:769px){.sn-bottom-nav{max-width:680px;left:50%;right:auto;transform:translateX(-50%);border-radius:16px 16px 0 0;border:1px solid #0d2744;border-bottom:none;}}
body{padding-bottom:70px!important;}
</style>
</head>
<body>
<header>
  <span class="logo" onclick="window.location.href='/'">SN</span>
  <span class="page-title">RANKING GLOBAL</span>
</header>
<div class="wrap">
  <!-- Podium top 3 -->
  <div class="podium" id="podium"></div>
  <!-- My rank -->
  <div class="my-rank-box" id="myRankBox">
    <div class="my-rank-title">TU POSICION</div>
    <div class="my-rank-row">
      <div class="my-rank-pos" id="myPos">#-</div>
      <div class="my-rank-info">
        <div class="my-rank-name" id="myRankName">⭐ Sombra Lv.1</div>
        <div class="my-rank-pts" id="myRankPts">0 puntos</div>
      </div>
    </div>
    <div class="my-rank-bar"><div class="my-rank-fill" id="myRankFill" style="width:0%"></div></div>
    <div class="my-rank-next" id="myRankNext"></div>
  </div>
  <!-- Referral box -->
  <div class="referral-box" id="referralBox">
    <div class="ref-title">🎁 PROGRAMA DE REFERIDOS</div>
    <p class="ref-desc">Comparte tu código y gana <strong style="color:#00ff88">100 Almas</strong> + <strong style="color:#ffaa00">50 puntos</strong> por cada amigo que se registre. ¡Ellos también reciben 50 Almas!</p>
    <div class="ref-code-row">
      <div class="ref-code" id="refCode">CARGANDO</div>
      <button class="copy-btn" onclick="copyRefCode()">Copiar</button>
    </div>
    <div class="ref-stats">
      <div class="ref-stat"><div class="ref-stat-num" id="refCount">0</div><div class="ref-stat-lbl">Referidos</div></div>
      <div class="ref-stat"><div class="ref-stat-num" id="refEarnings">0</div><div class="ref-stat-lbl">Almas ganadas</div></div>
    </div>
  </div>
  <!-- Full leaderboard -->
  <div style="font-family:Orbitron,sans-serif;font-size:12px;color:#5a8aaa;letter-spacing:.1em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #0d2744">TOP FANS</div>
  <div class="lb-list" id="lbList"><div class="empty">Cargando...</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
var SB_URL="https://cdokplvoqivducsqrejt.supabase.co";
var SB_KEY="sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su";
var sb=supabase.createClient(SB_URL,SB_KEY);
var currentUser=null;
var currentProfile=null;

sb.auth.getSession().then(function(r){
  if(r.data.session){
    currentUser=r.data.session.user;
    sb.from("profiles").select("username,avatar_url,fan_points,fan_rank,fan_rank_name,referral_code,referral_count,coins_balance").eq("id",currentUser.id).single().then(function(p){
      currentProfile=p.data;
      loadReferralBox(p.data);
    });
  }
  loadLeaderboard();
});

async function loadLeaderboard(){
  var r=await sb.from("profiles").select("id,username,avatar_url,fan_points,fan_rank,fan_rank_name,verification_status").gt("fan_points",0).order("fan_points",{ascending:false}).limit(50);
  if(r.error||!r.data||r.data.length===0){document.getElementById("lbList").innerHTML="<div class=\"empty\">Aún no hay fans en el ranking. ¡Sé el primero!</div>";return;}
  var top3=r.data.slice(0,3);
  var rest=r.data.slice(3);
  buildPodium(top3);
  buildList(r.data);
  // Find my position
  if(currentUser){
    var myIdx=r.data.findIndex(function(u){return u.id===currentUser.id;});
    if(myIdx>-1) showMyRank(r.data[myIdx],myIdx+1);
  }
}

function buildPodium(top){
  var podium=document.getElementById("podium");
  podium.innerHTML="";
  var order=[1,0,2]; // 2nd, 1st, 3rd
  var medals=["🥈","🥇","🥉"];
  var classes=["p2","p1","p3"];
  order.forEach(function(idx){
    if(!top[idx])return;
    var u=top[idx];
    var item=document.createElement("div");item.className="podium-item "+classes[order.indexOf(idx)];
    var av=document.createElement("div");av.className="podium-av";
    av.style.background="linear-gradient(135deg,#ff2255,#800011)";
    if(u.avatar_url){var img=document.createElement("img");img.src=u.avatar_url;av.appendChild(img);}
    else av.textContent=(u.username||"?")[0].toUpperCase();
    av.addEventListener("click",function(){window.location.href="/profile.html?u="+u.username;});
    var medal=document.createElement("div");medal.className="medal";medal.textContent=medals[idx];
    var name=document.createElement("div");name.className="podium-name";name.textContent="@"+u.username;
    name.addEventListener("click",function(){window.location.href="/profile.html?u="+u.username;});
    var pts=document.createElement("div");pts.className="podium-pts";pts.textContent=(u.fan_points||0)+" pts";
    var rank=document.createElement("div");rank.className="podium-rank";rank.textContent="⭐ "+(u.fan_rank_name||"Sombra");
    var block=document.createElement("div");block.className="podium-block";
    item.appendChild(medal);item.appendChild(av);item.appendChild(name);item.appendChild(pts);item.appendChild(rank);item.appendChild(block);
    podium.appendChild(item);
  });
}

function buildList(data){
  var list=document.getElementById("lbList");list.innerHTML="";
  data.forEach(function(u,i){
    var item=document.createElement("div");item.className="lb-item"+(currentUser&&u.id===currentUser.id?" me":"");
    item.addEventListener("click",function(){window.location.href="/profile.html?u="+u.username;});
    var pos=document.createElement("div");pos.className="lb-pos";pos.textContent="#"+(i+1);
    var av=document.createElement("div");av.className="lb-av";
    if(u.avatar_url){var img=document.createElement("img");img.src=u.avatar_url;av.appendChild(img);}
    else av.textContent=(u.username||"?")[0].toUpperCase();
    var info=document.createElement("div");info.className="lb-info";
    var name=document.createElement("div");name.className="lb-name";
    name.textContent="@"+u.username;
    if(u.verification_status==="verified"){var vb=document.createElement("span");vb.className="lb-verified";vb.textContent="✓";name.appendChild(vb);}
    var rankEl=document.createElement("div");rankEl.className="lb-rank";rankEl.textContent="⭐ Lv."+(u.fan_rank||1)+" "+(u.fan_rank_name||"Sombra");
    info.appendChild(name);info.appendChild(rankEl);
    var pts=document.createElement("div");pts.className="lb-pts";pts.textContent=(u.fan_points||0);
    item.appendChild(pos);item.appendChild(av);item.appendChild(info);item.appendChild(pts);
    list.appendChild(item);
  });
}

function showMyRank(u,pos){
  var box=document.getElementById("myRankBox");box.style.display="block";
  document.getElementById("myPos").textContent="#"+pos;
  document.getElementById("myRankName").textContent="⭐ "+(u.fan_rank_name||"Sombra")+" Lv."+(u.fan_rank||1);
  document.getElementById("myRankPts").textContent=(u.fan_points||0)+" puntos";
  var pct=Math.min(100,(u.fan_points||0)%100);
  document.getElementById("myRankFill").style.width=pct+"%";
  var nextPts=Math.ceil((u.fan_points||0)/100)*100;
  document.getElementById("myRankNext").textContent="Próximo nivel en "+(nextPts-(u.fan_points||0))+" pts";
}

function loadReferralBox(p){
  if(!p)return;
  var box=document.getElementById("referralBox");box.style.display="block";
  document.getElementById("refCode").textContent=p.referral_code||"XXXXXXXX";
  document.getElementById("refCount").textContent=p.referral_count||0;
  document.getElementById("refEarnings").textContent=(p.referral_count||0)*100;
}

function copyRefCode(){
  var code=document.getElementById("refCode").textContent;
  var url=window.location.origin+"/?ref="+code;
  navigator.clipboard.writeText(url).then(function(){showToast("✓ Link copiado: "+url);}).catch(function(){showToast("Código: "+code);});
}

function showToast(msg,err){
  var t=document.getElementById("toast");
  t.textContent=msg;t.style.borderColor=err?"#ff2255":"#00ff88";t.style.color=err?"#ff2255":"#00ff88";
  t.style.display="block";setTimeout(function(){t.style.display="none";},3000);
}
</script>

<!-- SN Bottom Nav -->
<nav class="sn-bottom-nav" id="snBottomNav">
  <a class="sn-bn-item" href="/"><span class="sn-bn-icon">&#127968;</span><span class="sn-bn-lbl">Inicio</span></a>
  <a class="sn-bn-item sn-bn-active" href="/explore.html"><span class="sn-bn-icon">&#128269;</span><span class="sn-bn-lbl">Explorar</span></a>
  <a class="sn-bn-item sn-bn-plus" href="/feed.html"><span class="sn-bn-plus-inner">&#43;</span></a>
  <a class="sn-bn-item" href="/messages.html"><span class="sn-bn-icon">&#128172;</span><span class="sn-bn-lbl">Mensajes</span></a>
  <a class="sn-bn-item" href="/profile.html"><div class="sn-bn-avatar" id="snNavAv">&#128100;</div><span class="sn-bn-lbl">Perfil</span></a>
</nav>
<script>
// Update nav avatar from session
(function(){
  var SB_URL='https://cdokplvoqivducsqrejt.supabase.co';
  var SB_KEY='sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su';
  function loadNavUser(){
    var sb=window.sb||(window.supabase&&window.supabase.createClient?window.supabase.createClient(SB_URL,SB_KEY):null);
    if(!sb)return;
    sb.auth.getSession().then(function(r){
      if(!r.data||!r.data.session)return;
      sb.from('profiles').select('username,avatar_url').eq('id',r.data.session.user.id).single().then(function(p){
        if(!p.data)return;
        var av=document.getElementById('snNavAv');
        if(!av)return;
        if(p.data.avatar_url){
          av.innerHTML='<img src="'+p.data.avatar_url+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
        } else if(p.data.username){
          av.textContent=p.data.username[0].toUpperCase();
        }
      });
    });
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',loadNavUser);
  else loadNavUser();
})();
</script>
</body>
</html>
