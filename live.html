<script>

function loadAgoraSDK(){
  return new Promise(function(resolve,reject){
    if(window.AgoraRTC){resolve();return;}
    var s=document.createElement('script');
    s.src='https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js';
    s.onload=resolve;
    s.onerror=reject;
    document.head.appendChild(s);
  });
}

async function initAgoraHost(){
  try{
    await loadAgoraSDK();
    if(!AGORA_APP_ID){showToastMsg("â  Configura Agora App ID en el admin para transmitir",true);await initCameraFallback();return;}
    AGORA_CHANNEL=currentUser.id;
    agoraClient=AgoraRTC.createClient({mode:"live",codec:"vp8"});
    await agoraClient.setClientRole("host");
    localVideoTrack=await AgoraRTC.createCameraVideoTrack({facingMode:currentFacingMode,encoderConfig:{width:720,height:1280,frameRate:30,bitrateMin:600,bitrateMax:2000}});
    localAudioTrack=await AgoraRTC.createMicrophoneAudioTrack({encoderConfig:"speech_standard"});
    await agoraClient.join(AGORA_APP_ID,AGORA_CHANNEL,null,currentUser.id);
    await agoraClient.publish([localVideoTrack,localAudioTrack]);
    localVideoTrack.play("liveVideo");
    document.getElementById("liveSubtitle").textContent="EN VIVO â¢ "+new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
    liveStartTime=Date.now();
    agoraClient.on("exception",function(e){showToastMsg("â  "+e.msg,true);});
    agoraClient.on("network-quality",function(stats){if(stats.uplinkNetworkQuality>=4)showToastMsg("â  ConexiÃ³n dÃ©bil",true);});
    showToastMsg("ð¢ TransmisiÃ³n activa vÃ­a Agora");
  }catch(e){showToastMsg("Error Agora: "+e.message,true);await initCameraFallback();}
}

async function initCameraFallback(){
  try{
    liveStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacingMode,width:{ideal:720},height:{ideal:1280}},audio:true});
    document.getElementById("liveVideo").srcObject=liveStream;
    document.getElementById("liveSubtitle").textContent="EN VIVO (local) â¢ "+new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
    liveStartTime=Date.now();
  }catch(e){showToastMsg("Error cÃ¡mara: "+e.message,true);}
}

async function flipCamera(){
  currentFacingMode=currentFacingMode==="user"?"environment":"user";
  if(localVideoTrack){try{await localVideoTrack.setDevice(currentFacingMode==="user"?"camera_0":"camera_1");}catch(e){await localVideoTrack.stop();localVideoTrack=await AgoraRTC.createCameraVideoTrack({facingMode:currentFacingMode});localVideoTrack.play("liveVideo");await agoraClient.unpublish();await agoraClient.publish([localVideoTrack,localAudioTrack]);}showToastMsg(currentFacingMode==="user"?"CÃ¡mara frontal":"CÃ¡mara trasera");return;}
  if(liveStream)liveStream.getTracks().forEach(function(t){t.stop();});
  await initCameraFallback();showToastMsg(currentFacingMode==="user"?"CÃ¡mara frontal":"CÃ¡mara trasera");
}

async function initViewer(){
  var r=await sb.from("profiles").select("id,username,avatar_url").eq("username",_creatorParam).single();
  if(!r.data){showToastMsg("Creador no encontrado",true);setTimeout(function(){window.location.href="/";},2000);return;}
  var creator=r.data;
  AGORA_CHANNEL=creator.id;
  document.getElementById("liveTitle").textContent=creator.username.toUpperCase()+" EN VIVO";
  document.getElementById("liveSubtitle").textContent="Conectando...";
  document.getElementById("rightControls").style.display="none";
  buildViewerActionBar();buildGiftsGrid();
  if(!AGORA_APP_ID){showToastMsg("Streaming no disponible",true);document.getElementById("liveSubtitle").textContent="Sin seÃ±al";return;}
  try{
    await loadAgoraSDK();
    agoraClient=AgoraRTC.createClient({mode:"live",codec:"vp8"});
    await agoraClient.setClientRole("audience",{level:1});
    agoraClient.on("user-published",async function(user,mediaType){
      await agoraClient.subscribe(user,mediaType);
      if(mediaType==="video"){user.videoTrack.play("liveVideo");document.getElementById("liveSubtitle").textContent="EN VIVO";}
      if(mediaType==="audio"){user.audioTrack.play();}
    });
    agoraClient.on("user-unpublished",function(user,mediaType){if(mediaType==="video")document.getElementById("liveSubtitle").textContent="CÃ¡mara apagada";});
    agoraClient.on("user-left",function(){showToastMsg("El creador terminÃ³ el live");document.getElementById("liveSubtitle").textContent="Live terminado";});
    var uid=currentUser?currentUser.id:("anon_"+Math.floor(Math.random()*1e8));
    await agoraClient.join(AGORA_APP_ID,AGORA_CHANNEL,null,uid);
    document.getElementById("liveSubtitle").textContent="Esperando al creador...";
    subscribeLiveChannelViewer(creator.id);
  }catch(e){showToastMsg("Error conexiÃ³n: "+e.message,true);}
}

function buildViewerActionBar(){
  var bar=document.getElementById("actionBar");
  var actions=[{icon:"ð",label:"Regalos",fn:"openPanel('giftsPanel')"},{icon:"ð¬",label:"Chat",fn:"document.getElementById('chatInp').focus()"},{icon:"ð",label:"Compartir",fn:"shareLive()"},{icon:"ðª",label:"Salir",fn:"window.location.href='/'",style:"background:rgba(255,34,85,.2)"}];
  bar.innerHTML="";
  actions.forEach(function(a){var btn=document.createElement("div");btn.className="live-action-btn";var icon=document.createElement("div");icon.className="live-action-icon";icon.innerHTML=a.icon;if(a.style)icon.style.cssText=a.style;var label=document.createElement("div");label.className="live-action-label";label.textContent=a.label;btn.appendChild(icon);btn.appendChild(label);btn.addEventListener("click",function(){eval(a.fn);});bar.appendChild(btn);});
}

function subscribeLiveChannelViewer(creatorId){
  _liveChannel=sb.channel("live:"+creatorId)
    .on("broadcast",{event:"chat"},function(p){addChatMessage(p.payload.user,p.payload.text,p.payload.avatar);})
    .on("broadcast",{event:"gift"},function(p){animateGift(p.payload.emoji,p.payload.name,p.payload.cost);})
    .on("broadcast",{event:"viewer_count"},function(p){document.getElementById("viewerCount").textContent=p.payload.count||0;})
    .subscribe(function(status){
      if(status==="SUBSCRIBED"&&_liveChannel){_liveChannel.send({type:"broadcast",event:"viewer_join",payload:{username:currentProfile?.username||"AnÃ³nimo"}});}
    });
}

function setVoiceEffect(type,btn){document.querySelectorAll(".voice-btn").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");var vid=document.getElementById("liveVideo");var f={normal:"",robot:"hue-rotate(90deg) saturate(2)",chipmunk:"brightness(1.1) saturate(1.2)",deep:"brightness(.9) saturate(1.5)",echo:"contrast(1.1)",megaphone:"contrast(1.3) saturate(1.3)"};vid.style.filter=f[type]||"";showToastMsg("Voz: "+type);}
function toggleBeauty(type,btn){beautyActive[type]=!beautyActive[type];btn.classList.toggle("active",beautyActive[type]);applyBeautyFilters();showToastMsg((beautyActive[type]?"ON: ":"OFF: ")+type);}
function updateBeautySlider(type,val){document.getElementById(type+"Val").textContent=val+"%";applyBeautyFilters();}
function applyBeautyFilters(){var filters=[];if(beautyActive.smooth)filters.push("blur("+(parseInt(document.getElementById("smoothSlider").value)*0.03)+"px)");if(beautyActive.bright)filters.push("brightness("+(1+(parseInt(document.getElementById("brightSlider").value)-50)/100)+")");document.getElementById("liveVideo").style.filter=filters.join(" ")||"none";}
function playSFX(type){var ctx=new(window.AudioContext||window.webkitAudioContext)();var osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);var now=ctx.currentTime;var sfxMap={applause:{f:440,t:.1},laugh:{f:300,t:.8},horn:{f:440,t:.5},alarm:{f:880,t:.7},drum:{f:150,t:.5},confetti:{f:523,t:.3}};var s=sfxMap[type]||{f:440,t:.3};osc.frequency.value=s.f;gain.gain.setValueAtTime(.3,now);gain.gain.exponentialRampToValueAtTime(.001,now+s.t);osc.start(now);osc.stop(now+s.t);var icons={applause:"ð",laugh:"ð",horn:"ð¯",alarm:"ð¨",drum:"ð¥",confetti:"ð"};showToastMsg((icons[type]||"")+" "+type);}

// ââ STICKERS ââ
function buildStickerGrid(){var grid=document.getElementById("stickerGrid");STICKERS.forEach(function(s){var btn=document.createElement("div");btn.className="sticker-pick";btn.textContent=s;btn.addEventListener("click",function(){addSticker(s);});grid.appendChild(btn);});}
function addSticker(emoji){var sticker=document.createElement("div");sticker.className="sticker-item";sticker.textContent=emoji;sticker.style.left=Math.random()*60+10+"%";sticker.style.top=Math.random()*60+15+"%";var isDrag=false,sx,sy,ol,ot;sticker.addEventListener("mousedown",function(e){isDrag=true;sx=e.clientX;sy=e.clientY;ol=sticker.offsetLeft;ot=sticker.offsetTop;});document.addEventListener("mousemove",function(e){if(!isDrag)return;sticker.style.left=(ol+e.clientX-sx)+"px";sticker.style.top=(ot+e.clientY-sy)+"px";sticker.style.transform="";});document.addEventListener("mouseup",function(){isDrag=false;});var lastTap=0;sticker.addEventListener("click",function(){var now=Date.now();if(now-lastTap<400){sticker.remove();}lastTap=now;});document.getElementById("liveContainer").appendChild(sticker);closePanel("stickersPanel");}
function clearStickers(){document.querySelectorAll(".sticker-item").forEach(function(s){s.remove()});}

// ââ GIFTS ââ
function buildGiftsGrid(){var grid=document.getElementById("giftsGrid");GIFTS.forEach(function(gift){var item=document.createElement("div");item.className="gift-item";item.innerHTML="<span class='gift-emoji'>"+gift.emoji+"</span><div class='gift-name'>"+gift.name+"</div><div class='gift-cost'>ð "+gift.cost+"</div>";item.addEventListener("click",function(){sendGiftFromPanel(gift);});grid.appendChild(item);});}
async function sendGiftFromPanel(gift){if(!currentUser)return;if((currentProfile?.coins_balance||0)<gift.cost){showToastMsg("No tienes suficientes Almas",true);return;}await sb.from("profiles").update({coins_balance:(currentProfile.coins_balance-gift.cost)}).eq("id",currentUser.id);currentProfile.coins_balance-=gift.cost;document.getElementById("panelCoinsBalance").textContent=currentProfile.coins_balance;if(_liveChannel)_liveChannel.send({type:"broadcast",event:"gift",payload:{emoji:gift.emoji,name:gift.name,cost:gift.cost}});animateGift(gift.emoji,gift.name,gift.cost);closePanel("giftsPanel");}
function animateGift(emoji,name,cost){var el=document.createElement("div");el.className="gift-float";el.textContent=emoji;document.getElementById("liveContainer").appendChild(el);setTimeout(function(){el.remove();},2500);var alert=document.createElement("div");alert.className="gift-alert";alert.innerHTML=emoji+"<br><span style='font-size:11px'>"+name+" (+"+cost+" Almas)</span>";document.getElementById("liveContainer").appendChild(alert);setTimeout(function(){alert.remove();},3000);totalGiftsReceived+=cost;updateGoalProgress(cost);}

// ââ POLL ââ
function startPoll(){var q=document.getElementById("pollQuestion").value.trim();var opts=[document.getElementById("pollOpt1").value.trim(),document.getElementById("pollOpt2").value.trim(),document.getElementById("pollOpt3").value.trim()].filter(Boolean);if(!q||opts.length<2){showToastMsg("Escribe la pregunta y al menos 2 opciones",true);return;}pollData={question:q,options:opts};document.getElementById("pollCreate").style.display="none";var res=document.getElementById("pollResults");res.style.display="block";res.innerHTML="<div style='font-size:13px;font-weight:700;color:#e8f4ff;margin-bottom:12px'>"+q+"</div>";opts.forEach(function(opt){var bar=document.createElement("div");bar.className="poll-result-bar";bar.innerHTML="<div class='poll-result-label'><span>"+opt+"</span><span>0%</span></div><div class='poll-bar-wrap'><div class='poll-bar-fill' style='width:0%'></div></div>";res.appendChild(bar);});var stop=document.createElement("button");stop.className="poll-start-btn";stop.style.background="rgba(255,34,85,.3)";stop.textContent="Terminar encuesta";stop.addEventListener("click",function(){pollData=null;document.getElementById("pollCreate").style.display="block";res.style.display="none";res.innerHTML="";});res.appendChild(stop);showToastMsg("ð Encuesta lanzada!");}

// ââ GOAL ââ
function setLiveGoal(){var target=parseInt(document.getElementById("goalTarget").value||0);var desc=document.getElementById("goalDescription").value.trim();if(target<10){showToastMsg("Meta mÃ­nima: 10 Almas",true);return;}goalTarget=target;goalCurrent=0;document.getElementById("liveGoal").style.display="block";document.getElementById("goalLabel").textContent=desc||"Meta de regalos";document.getElementById("goalProgress").textContent="0 / "+target+" Almas";document.getElementById("goalFill").style.width="0%";closePanel("goalPanel");showToastMsg("ð¯ Meta de "+target+" Almas!");}
function updateGoalProgress(amount){if(!goalTarget)return;goalCurrent+=amount;var pct=Math.min(100,(goalCurrent/goalTarget)*100);document.getElementById("goalFill").style.width=pct+"%";document.getElementById("goalProgress").textContent=goalCurrent+" / "+goalTarget+" Almas";if(goalCurrent>=goalTarget)showToastMsg("ð META ALCANZADA!");}

// ââ CHAT ââ
function sendChatMsg(){var inp=document.getElementById("chatInp"),text=inp.value.trim();if(!text)return;inp.value="";if(text.startsWith("?"))addQAQuestion(text.slice(1).trim());if(_liveChannel)_liveChannel.send({type:"broadcast",event:"chat",payload:{user:currentProfile?.username||"Usuario",text:text,avatar:currentProfile?.avatar_url||null}});addChatMessage(currentProfile?.username||"TÃº",text,currentProfile?.avatar_url||null);}
function addChatMessage(username,text,avatar){var overlay=document.getElementById("chatOverlay");var msg=document.createElement("div");msg.className="live-chat-msg";var av=document.createElement("div");av.className="live-chat-av";if(avatar){var img=document.createElement("img");img.src=avatar;av.appendChild(img);}else av.textContent=(username||"?")[0].toUpperCase();var body=document.createElement("div");body.innerHTML="<span class='live-chat-name'>@"+username+"</span><span class='live-chat-text'>"+text+"</span>";msg.appendChild(av);msg.appendChild(body);overlay.appendChild(msg);while(overlay.children.length>8)overlay.removeChild(overlay.firstChild);}
function addQAQuestion(question){var list=document.getElementById("qaList");list.innerHTML=list.innerHTML.replace('<div class="qa-empty">Sin preguntas aun.</div>',"");var item=document.createElement("div");item.className="qa-item";item.innerHTML="<div class='qa-question'>"+question+"</div><div class='qa-from'>@"+(currentProfile?.username||"usuario")+"</div><button class='qa-show-btn' onclick='showQAOnScreen(this)'>Mostrar</button>";item.querySelector(".qa-show-btn").dataset.q=question;list.prepend(item);}
function showQAOnScreen(btn){var q=btn.dataset.q;var el=document.createElement("div");el.style.cssText="position:absolute;top:130px;left:12px;right:70px;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:12px;z-index:60;font-size:13px;color:#fff";el.innerHTML="<div style='font-size:10px;color:#00e5ff;font-weight:700;margin-bottom:4px'>â PREGUNTA</div>"+q;document.getElementById("liveContainer").appendChild(el);setTimeout(function(){el.remove();},8000);}

// ââ SUPABASE CHANNEL (host) ââ
function subscribeLiveChannel(){
  if(!currentUser)return;
  _liveChannel=sb.channel("live:"+currentUser.id)
    .on("broadcast",{event:"chat"},function(p){if(p.payload.user!==currentProfile?.username)addChatMessage(p.payload.user,p.payload.text,p.payload.avatar);})
    .on("broadcast",{event:"gift"},function(p){animateGift(p.payload.emoji,p.payload.name,p.payload.cost);})
    .on("broadcast",{event:"viewer_join"},function(p){totalViewers++;maxViewers=Math.max(maxViewers,totalViewers);document.getElementById("viewerCount").textContent=totalViewers;addChatMessage("Sistema",p.payload.username+" se uniÃ³ ð",null);_liveChannel.send({type:"broadcast",event:"viewer_count",payload:{count:totalViewers}});})
    .on("broadcast",{event:"viewer_leave"},function(){totalViewers=Math.max(0,totalViewers-1);document.getElementById("viewerCount").textContent=totalViewers;_liveChannel.send({type:"broadcast",event:"viewer_count",payload:{count:totalViewers}});})
    .subscribe();
}

// ââ TIMER ââ
function startLiveTimer(){liveTimer=setInterval(function(){if(!liveStartTime)return;var e=Math.floor((Date.now()-liveStartTime)/1000),m=Math.floor(e/60),s=e%60;document.getElementById("liveSubtitle").textContent="EN VIVO â¢ "+(m>0?m+"m ":"")+s+"s";},1000);}

// ââ ACTION BAR (host) ââ
function buildActionBar(){var bar=document.getElementById("actionBar");var actions=[{icon:"ð",label:"Regalos",fn:"openPanel('giftsPanel')"},{icon:"ð",label:"Mic",fn:"toggleMic()",id:"micBtn"},{icon:"ð¹",label:"Cam",fn:"toggleCam()",id:"camBtn"},{icon:"ð¢",label:"Compartir",fn:"shareLive()"},{icon:"ð",label:"Terminar",fn:"confirmEndLive()",style:"background:rgba(255,34,85,.3)"}];actions.forEach(function(a){var btn=document.createElement("div");btn.className="live-action-btn";if(a.id)btn.id=a.id;var icon=document.createElement("div");icon.className="live-action-icon";icon.innerHTML=a.icon;if(a.style)icon.style.cssText=a.style;var label=document.createElement("div");label.className="live-action-label";label.textContent=a.label;btn.appendChild(icon);btn.appendChild(label);btn.addEventListener("click",function(){eval(a.fn);});bar.appendChild(btn);});}

// ââ END LIVE ââ
function shareLive(){var url=location.origin+"/live.html?creator="+(currentProfile?.username||"");if(navigator.share)navigator.share({title:"SHADOWNET LIVE",text:"Estoy en vivo!",url:url});else navigator.clipboard.writeText(url).then(function(){showToastMsg("ð Link copiado!");});}
function confirmEndLive(){if(confirm("Terminar el live?"))endLive();}
function endLive(){
  clearInterval(liveTimer);
  if(localVideoTrack){localVideoTrack.stop();localVideoTrack.close();}
  if(localAudioTrack){localAudioTrack.stop();localAudioTrack.close();}
  if(agoraClient){agoraClient.leave();}
  if(liveStream)liveStream.getTracks().forEach(function(t){t.stop();});
  if(_liveChannel)sb.removeChannel(_liveChannel);
  var e=liveStartTime?Math.floor((Date.now()-liveStartTime)/1000):0;
  document.getElementById("endViewers").textContent=maxViewers;
  document.getElementById("endDuration").textContent=Math.floor(e/60)+"m "+e%60+"s";
  document.getElementById("endGifts").textContent=totalGiftsReceived;
  document.getElementById("endScreen").classList.add("show");
}

// ââ PANELS / TOAST ââ
function openPanel(id){document.querySelectorAll(".live-panel").forEach(function(p){p.classList.remove("open");});document.getElementById(id)?.classList.add("open");}
function closePanel(id){document.getElementById(id)?.classList.remove("open");}
function showToastMsg(msg,err){var t=document.getElementById("liveToast");t.textContent=msg;t.style.borderColor=err?"#ff2255":"#00ff88";t.style.color=err?"#ff2255":"#00ff88";t.style.display="block";clearTimeout(t._timer);t._timer=setTimeout(function(){t.style.display="none";},2500);}

// ââ MIRROR ââ
function toggleMirror(){isMirrored=!isMirrored;document.getElementById("liveVideo").style.transform=isMirrored?"scaleX(-1)":"scaleX(1)";document.getElementById("mirrorBtn").classList.toggle("active",isMirrored);showToastMsg(isMirrored?"Modo espejo ON":"Modo espejo OFF");}

document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("chatInp")?.addEventListener("keydown",function(e){if(e.key==="Enter")sendChatMsg();});
  document.addEventListener("click",function(e){if(!e.target.closest(".live-panel")&&!e.target.closest(".live-ctrl-btn")&&!e.target.closest(".live-action-btn")){document.querySelectorAll(".live-panel").forEach(function(p){p.classList.remove("open");});}});
});
</script>

<style>
