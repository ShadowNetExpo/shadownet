<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHADOWNET \u2014 Shop</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/sn-design.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#01020c;color:#e8f4ff;font-family:Rajdhani,sans-serif;padding-bottom:80px}
header{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #0d2744;position:sticky;top:0;z-index:100;background:rgba(1,2,12,.97)}
.back-btn{background:none;border:none;color:#5a8aaa;font-size:20px;cursor:pointer;padding:4px}
.hdr-title{font-family:Orbitron,sans-serif;font-size:13px;color:#ff2255;letter-spacing:.1em;flex:1}
.shop-banner{height:120px;background:linear-gradient(135deg,#0d2744,#01020c);display:flex;align-items:center;justify-content:center;overflow:hidden}
.shop-banner img{width:100%;height:100%;object-fit:cover}
.shop-info{padding:16px;border-bottom:1px solid #0d2744}
.shop-name{font-family:Orbitron,sans-serif;font-size:16px;color:#fff;letter-spacing:.06em;margin-bottom:4px}
.shop-owner{font-size:13px;color:#5a8aaa;margin-bottom:8px}
.shop-desc{font-size:13px;color:#c8d8e8;line-height:1.5}
.tabs{display:flex;border-bottom:1px solid #0d2744;padding:0 16px}
.tab{padding:10px 16px;font-size:12px;font-weight:700;color:#5a8aaa;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:.06em}
.tab.active{color:#ff2255;border-bottom-color:#ff2255}
.products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px}
@media(min-width:600px){.products-grid{grid-template-columns:repeat(3,1fr)}}
.product-card{background:rgba(13,39,68,.3);border:1px solid #0d2744;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.product-card:hover{border-color:#ff2255}
.product-img{aspect-ratio:1;background:#0d2744;overflow:hidden}
.product-img img{width:100%;height:100%;object-fit:cover}
.product-body{padding:10px}
.product-name{font-size:13px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-price{font-family:Orbitron,sans-serif;font-size:14px;color:#ff2255;font-weight:900}
.product-stats{display:flex;gap:10px;margin-top:6px;font-size:11px;color:#5a8aaa}
.product-rating{color:#ffaa00}
.empty-shop{text-align:center;padding:60px 20px;color:#5a8aaa}
.empty-shop-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.product-detail{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;overflow-y:auto}
.product-detail.open{display:block}
.pd-close{position:absolute;top:12px;right:12px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;z-index:10}
.pd-images{width:100%;max-height:400px;overflow:hidden}
.pd-images img{width:100%;object-fit:cover}
.pd-body{padding:20px}
.pd-name{font-family:Orbitron,sans-serif;font-size:18px;color:#fff;margin-bottom:6px}
.pd-price{font-family:Orbitron,sans-serif;font-size:22px;color:#ff2255;margin-bottom:12px}
.pd-desc{font-size:14px;color:#c8d8e8;line-height:1.6;margin-bottom:16px}
.pd-buy{width:100%;padding:14px;background:linear-gradient(135deg,#ff2255,#aa0030);color:#fff;border:none;border-radius:10px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:15px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em}
.pd-buy:disabled{opacity:.4}
.sn-bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(1,2,12,.97);border-top:1px solid #0d2744;display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));justify-content:space-around;align-items:center}
.sn-bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:none;color:#5a8aaa;font-family:Rajdhani,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none}
.sn-bn-item:hover{color:#ff2255!important}
.sn-bn-icon{font-size:22px;line-height:1}
.sn-bn-plus-inner{width:46px;height:28px;background:linear-gradient(135deg,#ff2255,#cc0030);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1}
.sn-bn-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff2255,#800011);display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;border:2px solid rgba(255,255,255,.2);color:#fff;font-weight:800}
.sn-bn-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* === SHOP UI IMPROVEMENTS === */
.empty-shop{animation:fadeIn .5s ease}
.empty-shop div:first-child{font-size:52px;margin-bottom:16px}
.empty-shop div:nth-child(2){font-size:16px;font-weight:600;color:#c8d8e8}
.empty-shop div:nth-child(3){font-size:13px;color:#5a8aaa;margin-top:8px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* === SHOP UI ENHANCEMENTS === */
/* Product cards - premium look */
.products-grid{gap:12px!important}
.product-card{transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;border-radius:12px}
.product-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sn-grad-fire);opacity:0;transition:opacity .3s}
.product-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.5)}
.product-card:hover::before{opacity:1}

/* Product image - better placeholder */
.product-img{position:relative;overflow:hidden;border-radius:8px;aspect-ratio:1/1;background:linear-gradient(135deg,rgba(255,34,85,.05),rgba(0,229,255,.05))}
.product-img img{transition:transform .4s cubic-bezier(.4,0,.2,1)}
.product-card:hover .product-img img{transform:scale(1.05)}

/* Price badge */
.product-price{font-family:var(--sn-font-display,Orbitron,monospace);color:#ff2255;font-weight:900;font-size:16px}

/* Tabs - improve active state */
.tab{transition:all .2s;position:relative}
.tab.active{box-shadow:0 0 16px rgba(0,229,255,.12)}
.tab:not(.active):hover{background:rgba(255,255,255,.03)}

/* Detail modal - slide up animation */
.product-detail{animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

/* Buy button - pulse effect */
.buy-btn,.sn-btn-fire{position:relative;overflow:hidden}
.buy-btn::after,.sn-btn-fire::after{content:'';position:absolute;inset:-2px;background:linear-gradient(135deg,#ff2255,#ff0044);border-radius:inherit;opacity:0;z-index:-1;filter:blur(8px);transition:opacity .3s}
.buy-btn:hover::after,.sn-btn-fire:hover::after{opacity:.5}

/* Empty shop - better design */
.empty-shop{position:relative}
.empty-shop::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;background:radial-gradient(circle,rgba(255,34,85,.06),transparent);border-radius:50%}

/* Stagger grid animation */
.products-grid .product-card{animation:cardIn .4s ease both}
.products-grid .product-card:nth-child(1){animation-delay:.05s}
.products-grid .product-card:nth-child(2){animation-delay:.1s}
.products-grid .product-card:nth-child(3){animation-delay:.15s}
.products-grid .product-card:nth-child(4){animation-delay:.2s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* NAV POLISH */
.sn-nav{backdrop-filter:blur(16px)!important;-webkit-backdrop-filter:blur(16px)!important;background:rgba(7,15,30,.92)!important}
.sn-nav-item.active{position:relative;color:#ff2255!important}
.sn-nav-item.active::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#ff2255;box-shadow:0 0 8px rgba(255,34,85,.5)}
.sn-nav-item{transition:all .2s}
.sn-nav-item:active{transform:scale(.9)}
.sn-nav-create{transition:all .3s;box-shadow:0 2px 12px rgba(255,34,85,.3)}
.sn-nav-create:hover{transform:scale(1.1)}
</style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff2255">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/icon.svg">
</head>
<body>
<header class="sn-header">
  <button class="sn-header-btn" onclick="history.back()">&#8592;</button>
  <span class="sn-header-logo">SHOP</span>
</header>
<div id="shopContent"></div>
<div class="product-detail" id="productDetail">
  <button class="pd-close" onclick="closeDetail()">&#10005;</button>
  <div class="pd-images" id="pdImages"></div>
  <div class="pd-body">
    <div class="pd-name" id="pdName"></div>
    <div class="pd-price" id="pdPrice"></div>
    <div class="pd-desc" id="pdDesc"></div>
    <button class="pd-buy" id="pdBuy" onclick="buyProduct()">COMPRAR</button>
  </div>
</div>
<nav class="sn-nav">
  <a class="sn-nav-item" href="/feed.html"><span class="sn-nav-icon">&#127968;</span>Inicio</a>
  <a class="sn-nav-item" href="/explore.html"><span class="sn-nav-icon">&#128269;</span>Explorar</a>
  <a class="sn-nav-item" href="/editor.html"><span class="sn-nav-create">&#43;</span></a>
  <a class="sn-nav-item" href="/reels.html"><span class="sn-nav-icon">&#9654;</span>Reels</a>
  <a class="sn-nav-item" href="/profile.html"><div class="sn-nav-avatar">&#128100;</div>Perfil</a>
</nav>
<script>
var SB_URL='https://cdokplvoqivducsqrejt.supabase.co';
var SB_KEY='sb_publishable_9M1y678W_KFlnk1uUcrgIg_93A-62su';
var sb=supabase.createClient(SB_URL,SB_KEY);window.sb=sb;
var currentUser=null;var _selectedProduct=null;
var params=new URLSearchParams(location.search);
var shopUser=params.get('u');var shopId=params.get('id');
sb.auth.getSession().then(function(r){if(r.data.session)currentUser=r.data.session.user;});
if(shopId){loadShopById(shopId);}else if(shopUser){loadShopByUser(shopUser);}else{loadTrending();}

async function loadShopById(id){
  var r=await sb.from('shops').select('*,profiles(username,avatar_url,display_name)').eq('id',id).single();
  if(r.data){renderShop(r.data);loadProducts(r.data.id);}
}
async function loadShopByUser(username){
  var pr=await sb.from('profiles').select('id').eq('username',username).single();
  if(!pr.data)return;
  var r=await sb.from('shops').select('*,profiles(username,avatar_url,display_name)').eq('owner_id',pr.data.id).single();
  if(r.data){renderShop(r.data);loadProducts(r.data.id);}
  else{var _shop=document.getElementById("shopContent");if(_shop)_shop.innerHTML='<div class="empty-shop"><div class="empty-shop-icon">&#128722;</div><div>Este creador aún no tiene tienda</div></div>';}
}
async function loadTrending(){
  var _ht=document.querySelector('.hdr-title');if(_ht)_ht.textContent='MARKETPLACE';
  var r=await sb.rpc('get_trending_products',{p_limit:20});
  if(r.data&&r.data.length){
    var _shop=document.getElementById("shopContent");if(_shop)_shop.innerHTML='<div class="tabs"><div class="tab active">Trending</div></div><div class="products-grid" id="productsGrid"></div>';
    renderProducts(r.data.map(function(p){return{id:p.product_id,name:p.name,price_cents:p.price_cents,currency:p.currency,images:p.images,sales_count:p.sales_count,rating_avg:p.rating_avg};}));
  }else{
    var _shop=document.getElementById("shopContent");if(_shop)_shop.innerHTML='<div class="empty-shop"><div class="empty-shop-icon">&#128722;</div><div>No hay productos todavía</div><div style="font-size:12px;margin-top:6px">Sé el primero en abrir una tienda</div></div>';
  }
}
function renderShop(shop){
  var p=shop.profiles||{};var html='';
  if(shop.banner_url)html+='<div class="shop-banner"><img src="'+shop.banner_url+'"></div>';
  else html+='<div class="shop-banner"></div>';
  html+='<div class="shop-info"><div class="shop-name">'+shop.shop_name+'</div>';
  html+='<div class="shop-owner">@'+(p.username||'creador')+'</div>';
  if(shop.description)html+='<div class="shop-desc">'+shop.description+'</div>';
  html+='</div><div class="tabs"><div class="tab active">Productos</div></div><div class="products-grid" id="productsGrid"></div>';
  var _shop=document.getElementById("shopContent");if(_shop)_shop.innerHTML=html;
}
async function loadProducts(sid){
  var r=await sb.rpc('get_shop_products',{p_shop_id:sid,p_limit:30});
  if(r.data&&r.data.length)renderProducts(r.data);
  else{var g=document.getElementById('productsGrid');if(g)g.innerHTML='<div class="empty-shop" style="grid-column:1/-1"><div class="empty-shop-icon">&#128230;</div><div>Sin productos</div></div>';}
}
function renderProducts(products){
  var grid=document.getElementById('productsGrid');if(!grid)return;grid.innerHTML='';
  products.forEach(function(p){
    var card=document.createElement('div');card.className='product-card';
    card.onclick=function(){openDetail(p);};
    var imgs=p.images;if(typeof imgs==='string')try{imgs=JSON.parse(imgs);}catch(e){imgs=[];}
    var imgUrl=(imgs&&imgs.length)?imgs[0]:'';
    card.innerHTML='<div class="product-img">'+(imgUrl?'<img src="'+imgUrl+'">':'<div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;opacity:.3">&#128230;</div>')+'</div>'
      +'<div class="product-body"><div class="product-name">'+p.name+'</div>'
      +'<div class="product-price">'+fmtPrice(p.price_cents,p.currency)+'</div>'
      +'<div class="product-stats">'+(p.sales_count?'<span>'+p.sales_count+' vendidos</span>':'')+(p.rating_avg?'<span class="product-rating">\u2605 '+Number(p.rating_avg).toFixed(1)+'</span>':'')+'</div></div>';
    grid.appendChild(card);
  });
}
function fmtPrice(c,cur){return new Intl.NumberFormat('es-ES',{style:'currency',currency:cur||'EUR'}).format(c/100);}
function openDetail(p){
  _selectedProduct=p;
  var imgs=p.images;if(typeof imgs==='string')try{imgs=JSON.parse(imgs);}catch(e){imgs=[];}
  var _pdIm=document.getElementById("pdImages");if(_pdIm)_pdIm.innerHTML=(imgs&&imgs.length)?'<img src="'+imgs[0]+'">':'';
  var _pdNa=document.getElementById("pdName");if(_pdNa)_pdNa.textContent=p.name;
  var _pdPr=document.getElementById("pdPrice");if(_pdPr)_pdPr.textContent=fmtPrice(p.price_cents,p.currency);
  var _pdDe=document.getElementById("pdDesc");if(_pdDe)_pdDe.textContent=p.description||'';
  var _prod=document.getElementById("productDetail");if(_prod)_prod.classList.add('open');
}
function closeDetail(){var _prod=document.getElementById("productDetail");if(_prod)_prod.classList.remove('open');_selectedProduct=null;}
async function buyProduct(){
  if(!currentUser){location.href='/';return;}if(!_selectedProduct)return;
  var btn=document.getElementById('pdBuy');btn.disabled=true;btn.textContent='Procesando...';
  try{
    // 1. Create order
    var order=await sb.from('orders').insert({buyer_id:currentUser.id,seller_id:_selectedProduct.seller_id||null,product_id:_selectedProduct.id||_selectedProduct.product_id,quantity:1,total_cents:_selectedProduct.price_cents,currency:_selectedProduct.currency||'EUR',status:'pending'}).select('id').single();
    if(order.error) throw order.error;
    // 2. Call CCBill payment edge function
    var sess=await sb.auth.getSession();
    var tok=sess.data.session?sess.data.session.access_token:'';
    var r=await fetch('https://cdokplvoqivducsqrejt.supabase.co/functions/v1/ccbill-payment',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
      body:JSON.stringify({
        action:'create_checkout',
        order_id:order.data.id,
        product_name:_selectedProduct.name,
        amount:_selectedProduct.price_cents,
        currency:(_selectedProduct.currency||'EUR').toLowerCase(),
        success_url:location.origin+'/shop.html?success=1',
        cancel_url:location.origin+'/shop.html?cancelled=1'
      })
    });
    var data=await r.json();
    if(data.url){
      window.location.href=data.url;
    } else if(data.error){
      throw new Error(data.error);
    } else {
      btn.textContent='\u2713 Pedido #'+order.data.id.substring(0,8);
      setTimeout(closeDetail,2000);
    }
  }catch(err){btn.disabled=false;btn.textContent='COMPRAR';alert('Error: '+(err.message||err));}
}

// Check for checkout result
var _sp=new URLSearchParams(location.search);
if(_sp.get('success')==='1'){
  setTimeout(function(){alert('\u2713 Pago completado! Tu pedido esta en camino.');},500);
  history.replaceState(null,'','/shop.html');
}
if(_sp.get('cancelled')==='1'){
  setTimeout(function(){alert('Pago cancelado.');},500);
  history.replaceState(null,'','/shop.html');
}
</script>

<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}</script>

</body>
